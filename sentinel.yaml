          construct:
            milestoneId: m1
            topicId: t1
            knowledgeId: k1
            quizId: q1
        type: unit
        assert:
          doesNotThrow: true
      - name: "Given an AuditableTopic and AuditContext, when onTopic is called, then\
          \ completes without error"
        target: LemmaRecurrenceAnalyzer
        invoke:
          method: onTopic
          args:
          - ref:topic
          - ref:ctx
        fixtures:
        - id: topic
          type: AuditableTopic
          construct:
            knowledge: "[]"
        - id: ctx
          type: AuditContext
          construct:
            milestoneId: m1
            topicId: t1
            knowledgeId: k1
            quizId: q1
        type: unit
        assert:
          doesNotThrow: true
      - name: "Given an AuditableMilestone and AuditContext, when onMilestone is called,\
          \ then completes without error"
        target: LemmaRecurrenceAnalyzer
        invoke:
          method: onMilestone
          args:
          - ref:milestone
          - ref:ctx
        fixtures:
        - id: milestone
          type: AuditableMilestone
          construct:
            topics: "[]"
        - id: ctx
          type: AuditContext
          construct:
            milestoneId: m1
            topicId: t1
            knowledgeId: k1
            quizId: q1
        type: unit
        assert:
          doesNotThrow: true
      implements:
      - ContentAnalyzer
    - name: DefaultContentWordFilter
      tests:
      - name: "Given a NOUN token, when isContentWord is called, then returns true"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:nounToken
        fixtures:
        - id: nounToken
          type: NlpToken
          construct:
            text: cat
            lemma: cat
            posTag: NOUN
            frequencyRank: 100
            isStop: false
            isPunct: false
        type: unit
        traceability:
          feature: F-LREC
          rule: F-LREC-R003
        assert:
          returns: true
      - name: "Given a VERB token, when isContentWord is called, then returns true"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:verbToken
        fixtures:
        - id: verbToken
          type: NlpToken
          construct:
            text: running
            lemma: run
            posTag: VERB
            frequencyRank: 50
            isStop: false
            isPunct: false
        type: unit
        traceability:
          feature: F-LREC
          rule: F-LREC-R003
        assert:
          returns: true
      - name: "Given an ADJ token, when isContentWord is called, then returns true"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:adjToken
        fixtures:
        - id: adjToken
          type: NlpToken
          construct:
            text: big
            lemma: big
            posTag: ADJ
            frequencyRank: 200
            isStop: false
            isPunct: false
        type: unit
        traceability:
          feature: F-LREC
          rule: F-LREC-R003
        assert:
          returns: true
      - name: "Given an ADV token, when isContentWord is called, then returns true"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:advToken
        fixtures:
        - id: advToken
          type: NlpToken
          construct:
            text: quickly
            lemma: quickly
            posTag: ADV
            frequencyRank: 300
            isStop: false
            isPunct: false
        type: unit
        traceability:
          feature: F-LREC
          rule: F-LREC-R003
        assert:
          returns: true
      - name: "Given a DET token, when isContentWord is called, then returns false"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:detToken
        fixtures:
        - id: detToken
          type: NlpToken
          construct:
            text: the
            lemma: the
            posTag: DET
            frequencyRank: 1
            isStop: true
            isPunct: false
        type: unit
        traceability:
          feature: F-LREC
          rule: F-LREC-R003
        assert:
          returns: false
      - name: "Given a PUNCT token, when isContentWord is called, then returns false"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:punctToken
        fixtures:
        - id: punctToken
          type: NlpToken
          construct:
            text: .
            lemma: .
            posTag: PUNCT
            frequencyRank: 0
            isStop: false
            isPunct: true
        type: unit
        traceability:
          feature: F-LREC
          rule: F-LREC-R003
        assert:
          returns: false
      implements:
      - ContentWordFilter
    - name: DefaultIntervalCalculator
      tests:
      - name: "Given positions [10, 110], when calculateMeanInterval is called, then\
          \ returns 100.0"
        target: DefaultIntervalCalculator
        invoke:
          method: calculateMeanInterval
