        traceability:
          feature: FEAT-RCSL
          rule: F-RCSL-R008
        _change: add
      - name: should print correction context section in table format for SENTENCE_LENGTH
          task
        traceability:
          feature: FEAT-RCSL
          rule: F-RCSL-R008
        _change: add
      - name: should resolve correction context when task diagnosis is LEMMA_ABSENCE
        traceability:
          feature: FEAT-RCLA
