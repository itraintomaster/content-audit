    - name: "Given a knowledge with null title, when onKnowledge is called and getResults\
        \ checked, then score is 0.0"
      target: KnowledgeTitleLengthAnalyzer
      fixtures:
      - id: knowledge
        type: AuditableKnowledge
        construct:
          quizzes: "[]"
          instructions: some instructions
          isSentence: false
      - id: ctx
        type: AuditContext
        construct:
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
      - id: expectedScore
        type: ScoredItem
        construct:
          analyzerName: knowledge-title-length
          target: KNOWLEDGE
          score: 0.0
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
      type: integration
      steps:
      - invoke:
          method: onKnowledge
          args:
          - ref:knowledge
          - ref:ctx
        assert:
          doesNotThrow: true
      - invoke:
          method: getResults
        assert:
          returns: "[ref:expectedScore]"
      traceability:
