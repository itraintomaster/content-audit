    - name: delegate
      type: NlpTokenizer
    implements:
    - NlpTokenizer
  - name: DefaultSentenceLengthConfig
    types:
    - Component
    implements:
    - SentenceLengthConfig
  - name: DefaultAuditRunner
    requiresInject:
    - name: courseRepository
      type: CourseRepository
    - name: courseToAuditableMapper
      type: CourseToAuditableMapper
    - name: contentAudit
