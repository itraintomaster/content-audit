system: ContentAudit
version: 0.0.1
architecture: hexagonal
packagePrefix: com.learney.contentaudit
modules:
- name: audit-domain
  models:
  - name: AuditReport
    type: record
    fields:
    - name: overallScore
      type: double
      description: Average of all analyzer course-level scores
    - name: scores
      type: NodeScores
      description: Course-level scores per analyzer
    - name: milestones
      type: List<MilestoneNode>
      description: Milestone-level breakdown
  - name: AuditableCourse
    type: record
    fields:
    - name: milestones
      type: List<AuditableMilestone>
  - name: AuditContext
    type: record
    fields:
    - name: milestoneId
      type: String
      description: Current milestone identifier in traversal
    - name: topicId
      type: String
      description: Current topic identifier in traversal
    - name: knowledgeId
      type: String
      description: Current knowledge identifier in traversal
    - name: quizId
      type: String
      description: Current quiz identifier in traversal
    - name: topicLabel
      type: String
      description: Human-readable label of the current topic in traversal
    - name: knowledgeLabel
      type: String
      description: Human-readable label of the current knowledge in traversal
    - name: quizLabel
      type: String
      description: Human-readable title of the current quiz in traversal
  - name: AuditableKnowledge
    type: record
    fields:
    - name: quizzes
      type: List<AuditableQuiz>
    - name: title
      type: String
    - name: instructions
      type: String
    - name: isSentence
      type: boolean
      description: Flag indicating whether this knowledge contains sentence-type quizzes
        eligible for length analysis
    - name: id
      type: String
      description: Knowledge identifier
    - name: label
      type: String
      description: Human-readable knowledge label (same as title)
    - name: code
      type: String
      description: Knowledge short code
    extends: AuditableEntity
  - name: AuditableTopic
    type: record
    fields:
    - name: knowledge
      type: List<AuditableKnowledge>
    - name: id
      type: String
      description: Topic identifier
    - name: label
      type: String
      description: Human-readable topic label
    - name: code
      type: String
      description: Topic short code
    extends: AuditableEntity
  - name: AuditableMilestone
    type: record
    fields:
    - name: topics
      type: List<AuditableTopic>
    - name: id
      type: String
      description: Milestone identifier
    - name: label
      type: String
      description: Human-readable milestone label
    - name: code
      type: String
      description: Milestone short code
    extends: AuditableEntity
  - name: AuditableQuiz
    type: record
    fields:
    - name: sentence
      type: String
    - name: tokens
      type: List<NlpToken>
      description: Pre-computed enriched NLP tokens for the quiz sentence
    - name: id
      type: String
      description: Quiz identifier
    - name: label
      type: String
      description: Human-readable quiz label
    - name: code
      type: String
      description: Quiz short code
    extends: AuditableEntity
  - name: CefrLevel
    type: enum
    fields:
    - name: A1
    - name: A2
    - name: B1
    - name: B2
  - name: TargetRange
    type: record
    fields:
    - name: level
      type: CefrLevel
      description: The CEFR level this range applies to
    - name: minTokens
      type: int
      description: Minimum expected token count for sentences at this level
    - name: maxTokens
      type: int
      description: Maximum expected token count for sentences at this level
  - name: AuditTarget
    type: enum
    fields:
    - name: QUIZ
    - name: KNOWLEDGE
    - name: TOPIC
    - name: MILESTONE
    - name: COURSE
  - name: ScoredItem
    type: record
    fields:
    - name: analyzerName
      type: String
      description: Name of the analyzer that produced this score
    - name: target
      type: AuditTarget
      description: The level this score was computed at
    - name: score
      type: double
      description: Score value 0.0-1.0
    - name: milestoneId
      type: String
      description: Milestone this score belongs to (always present)
    - name: topicId
      type: String
      description: Topic this score belongs to (null if target is MILESTONE or COURSE)
    - name: knowledgeId
      type: String
      description: "Knowledge this score belongs to (null if target is MILESTONE,\
        \ TOPIC, or COURSE)"
    - name: quizId
      type: String
      description: Quiz this score belongs to (only present if target is QUIZ)
    - name: source
      type: AuditableEntity
      description: Reference to the auditable entity that generated this score
    - name: metadata
      type: "Map<String,Object>"
      description: "Optional analyzer-specific data (misplaced lemmas, sub-scores\
        \ by absence type, etc.)"
  - name: NodeScores
    type: record
    fields:
    - name: scores
      type: "Map<String,Double>"
      description: Map of analyzerName to score at this node level
  - name: QuizNode
    type: record
    fields:
    - name: quizId
      type: String
    - name: scores
      type: NodeScores
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
  - name: KnowledgeNode
    type: record
    fields:
    - name: knowledgeId
      type: String
    - name: scores
      type: NodeScores
    - name: quizzes
      type: List<QuizNode>
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
  - name: TopicNode
    type: record
    fields:
    - name: topicId
      type: String
    - name: scores
      type: NodeScores
    - name: knowledges
      type: List<KnowledgeNode>
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
  - name: MilestoneNode
    type: record
    fields:
    - name: milestoneId
      type: String
    - name: scores
      type: NodeScores
    - name: topics
      type: List<TopicNode>
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
  - name: NlpToken
    type: record
    fields:
    - name: text
      type: String
      description: Original text of the token
    - name: lemma
      type: String
      description: Lemmatized form of the token
    - name: posTag
      type: String
      description: "Universal Dependencies POS tag (NOUN, VERB, ADJ, etc.)"
    - name: frequencyRank
      type: Integer
      description: COCA frequency ranking (nullable if not found)
    - name: isStop
      type: boolean
      description: Whether this token is a stop word
    - name: isPunct
      type: boolean
      description: Whether this token is punctuation
  - name: AnalyzerDescriptor
    type: record
    fields:
    - name: name
      type: String
      description: Analyzer unique name (e.g. sentence-length)
    - name: description
      type: String
      description: Human-readable description of what the analyzer checks
    - name: target
      type: AuditTarget
      description: The audit target level this analyzer operates at
  interfaces:
  - name: ContentAudit
    stereotype: service
    sealed: false
    exposes:
    - signature: "audit(AuditableCourse): AuditReport"
  - name: AuditEngine
    stereotype: port
    sealed: false
    exposes:
    - signature: "runAudit(AuditableCourse): AuditReport"
  - name: ContentAnalyzer
    stereotype: port
    sealed: false
    exposes:
    - signature: "onKnowledge(AuditableKnowledge knowledge,AuditContext ctx): Void"
    - signature: "onQuiz(AuditableQuiz quiz,AuditContext ctx): Void"
    - signature: "onMilestone(AuditableMilestone milestone,AuditContext ctx): Void"
    - signature: "onTopic(AuditableTopic topic,AuditContext ctx): Void"
    - signature: "onCourseComplete(AuditableCourse course,AuditContext ctx): Void"
    - signature: "getName(): String"
    - signature: "getTarget(): AuditTarget"
    - signature: "getResults(): List<ScoredItem>"
    - signature: "getDescription(): String"
  - name: AnalysisResult
    stereotype: port
    sealed: false
    exposes:
    - signature: "getName(): String"
    - signature: "getScore(): double"
    - signature: "getTarget(): AuditTarget"
  - name: NlpTokenizer
    stereotype: port
    sealed: false
    exposes:
    - signature: "tokenize(String text): List<String>"
    - signature: "countTokens(String text): int"
    - signature: "analyzeTokens(String text): List<NlpToken>"
    - signature: "analyzeTokensBatch(List<String> sentences): Map<String,List<NlpToken>>"
  - name: SentenceLengthConfig
    stereotype: port
    sealed: false
    exposes:
    - signature: "getTargetRange(CefrLevel level): Optional<TargetRange>"
    - signature: "getToleranceMargin(): int"
    extends:
    - SelfDescribingConfig
  - name: ScoreAggregator
    stereotype: port
    sealed: false
    exposes:
    - signature: "aggregate(List<ScoredItem> scores,Map<String,AuditableEntity> entityMap):\
        \ AuditReport"
  - name: CocaBucketsConfig
    stereotype: port
    sealed: false
    exposes:
    - signature: "getBandConfiguration(): BandConfiguration"
    - signature: "getTargetsForLevel(String levelName): List<BucketTarget>"
    - signature: "getQuarterTargetsForLevel(String levelName): List<QuarterBucketTargets>"
    - signature: "getToleranceMargin(): double"
    - signature: "getAnalysisStrategy(): AnalysisStrategy"
    - signature: "getProgressionExpectations(): List<ProgressionExpectation>"
    extends:
    - SelfDescribingConfig
  - name: ContentWordFilter
    stereotype: port
    sealed: false
    exposes:
    - signature: "isContentWord(NlpToken token): boolean"
  - name: LemmaRecurrenceConfig
    stereotype: port
    sealed: false
    exposes:
    - signature: "getTop(): int"
    - signature: "getSubExposedThreshold(): double"
    - signature: "getOverExposedThreshold(): double"
    extends:
    - SelfDescribingConfig
  - name: LemmaAbsenceConfig
    stereotype: port
    sealed: true
    exposes:
    - signature: "getAbsoluteThreshold(CefrLevel level): int"
    - signature: "getPercentageThreshold(CefrLevel level): double"
    - signature: "getLevelWeight(CefrLevel level): double"
    - signature: "getHighPriorityBound(): int"
    - signature: "getMediumPriorityBound(): int"
    - signature: "getLowPriorityBound(): int"
    - signature: "getHighPriorityAlertThreshold(): int"
    - signature: "getMediumPriorityAlertThreshold(): int"
    - signature: "getLowPriorityAlertThreshold(): int"
    - signature: "getCriticalAbsenceThreshold(): int"
    - signature: "getAcceptableAbsenceThreshold(): int"
    - signature: "getHighReportLimit(): int"
    - signature: "getMediumReportLimit(): int"
    - signature: "getLowReportLimit(): int"
    - signature: "getDiscountPerLevel(): double"
    extends:
    - SelfDescribingConfig
  - name: EvpCatalogPort
    stereotype: port
    sealed: false
    exposes:
    - signature: "getExpectedLemmas(CefrLevel level): Set<LemmaAndPos>"
    - signature: "isPhrase(String lemma): boolean"
    - signature: "getCocaRank(LemmaAndPos lemmaAndPos): Optional<Integer>"
    - signature: "getSemanticCategory(LemmaAndPos lemmaAndPos): Optional<String>"
  - name: AuditableEntity
    stereotype: port
    sealed: false
    exposes:
    - signature: "getId(): String"
    - signature: "getLabel(): String"
    - signature: "getCode(): String"
  - name: SelfDescribingConfig
    stereotype: port
    sealed: false
    exposes:
    - signature: "describe(): Map<String,Object>"
  implementations:
  - name: IAuditEngine
    requiresInject:
    - name: contentAnalyzers
      type: List<ContentAnalyzer>
    - name: scoreAggregator
      type: ScoreAggregator
    implements:
    - AuditEngine
  - name: KnowledgeTitleLengthAnalyzer
    handwrittenTests:
    - name: should return knowledge-title-length as analyzer name
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
    - name: should return KNOWLEDGE as audit target
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
    - name: should score 0.0 for knowledge with null title
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
    - name: should score 0.0 for knowledge with empty title
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
    - name: should score 1.0 for knowledge with title within limit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
    - name: should score 1.0 for knowledge with title at exactly 28 weighted chars
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R001
    - name: should score 1.0 for title fitting with weighted length 5.1
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R002
    - name: should score 1.0 for zero-weight special chars title
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R002
    - name: should score 1.0 for mixed-weight title with weighted length 2.7
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R002
    - name: should score 0.75 for title of weighted length 35
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
    - name: should score 0.5 for title of weighted length 42
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
    - name: should score 0.0 for title of weighted length 56
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
    - name: should score 0.0 for title of weighted length 70
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
    - name: should complete without error when onQuiz is called
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
    - name: should complete without error when onMilestone is called
      traceability:
        feature: F-KTLEN
    - name: should complete without error when onTopic is called
      traceability:
        feature: F-KTLEN
    - name: should complete without error when onCourseComplete is called
      traceability:
        feature: F-KTLEN
    - name: should return two correctly scored items for two knowledges with different
        title lengths
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
    - name: should return empty list when no knowledges have been processed
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
    implements:
    - ContentAnalyzer
  - name: KnowledgeInstructionsLengthAnalyzer
    handwrittenTests:
    - name: should return knowledge-instructions-length as analyzer name
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
    - name: should return KNOWLEDGE as audit target
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
    - name: should score 1.0 for knowledge with null instructions
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R006
    - name: should score 1.0 for knowledge with empty instructions
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R006
    - name: should score 1.0 for instructions exactly at soft limit of 70 chars
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R005
    - name: should score 1.0 for instructions of 30 chars within soft limit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R006
    - name: should score 0.5 for instructions of 71 chars just above soft limit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R005
    - name: should score 0.5 for instructions exactly at hard limit of 100 chars
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R005
    - name: should score 0.5 for instructions of 85 chars between soft and hard limits
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R006
    - name: should score 0.0 for instructions of 101 chars just above hard limit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R005
    - name: should score 0.0 for instructions of 200 chars well above hard limit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R006
    - name: should complete without error when onQuiz is called
      traceability:
        feature: F-KTLEN
    - name: should complete without error when onMilestone is called
      traceability:
        feature: F-KTLEN
    - name: should complete without error when onTopic is called
      traceability:
        feature: F-KTLEN
    - name: should complete without error when onCourseComplete is called
      traceability:
        feature: F-KTLEN
    - name: should return empty list when getResults is called without prior processing
      traceability:
        feature: F-KTLEN
    - name: should produce correct scores for three knowledges with different instruction
        lengths
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R006
    implements:
    - ContentAnalyzer
  - name: IContentAudit
    requiresInject:
    - name: auditEngine
      type: AuditEngine
    implements:
    - ContentAudit
  - name: SentenceLengthAnalyzer
    requiresInject:
    - name: nlpTokenizer
      type: NlpTokenizer
    - name: config
      type: SentenceLengthConfig
    handwrittenTests:
    - name: should exclude quiz when milestoneId is null
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R001
    - name: should exclude quiz when milestoneId is non-numeric
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R001
    - name: should exclude quiz when no target range configured for level
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R012
    - name: should score only sentence quizzes when processing mixed knowledge types
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R001
    - name: should return sentence-length as analyzer name
      traceability:
        feature: F-SLEN
    - name: should return QUIZ as audit target
      traceability:
        feature: F-SLEN
    - name: should score 1.0 for quiz within A1 range
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R002
    - name: should score 0.75 for quiz 1 token above A1 max
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R002
    - name: should score 0.25 for quiz 3 tokens below A1 min
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R002
    - name: should score 1.0 for quiz exactly at A1 minimum boundary
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R002
    - name: should score 1.0 for quiz exactly at A1 maximum boundary
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R002
    - name: should score 0.0 for quiz 4 tokens above A1 max at tolerance boundary
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R009
    - name: should exclude non-sentence knowledge quiz from results
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R001
    - name: should score 1.0 for B2 level quiz within range
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R012
    - name: should score 0.0 for quiz exactly at tolerance boundary
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R009
    - name: should score 0.5 for quiz 2 tokens above A1 max
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R002
    - name: should complete without error when onTopic is called
      traceability:
        feature: F-SLEN
    - name: should complete without error when onCourseComplete is called
      traceability:
        feature: F-SLEN
    - name: should produce correct scores for full milestone-knowledge-quiz sequence
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R002
    - name: should exclude non-sentence quizzes from scoring
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R001
    implements:
    - ContentAnalyzer
  - name: IScoreAggregator
    implements:
    - ScoreAggregator
  patterns:
  - type: Strategy
    implementations:
    - IScoreAggregator
    - CocaTokenAccumulationAggregator
    suppressed: false
    interface: ScoreAggregator
  scope: internal
  packages:
  - name: coca
    description: "COCA frequency bucket distribution analysis. Classifies NLP tokens\
      \ into frequency bands (K1-K5+), evaluates distribution against configurable\
      \ targets per CEFR level, assesses progression across levels, and generates\
      \ improvement directives."
    visibility: internal
    models:
    - name: FrequencyBand
      type: record
      fields:
      - name: name
        type: String
        description: "Band identifier (e.g. K1, K2, K3, K4, K5_PLUS)"
      - name: lowerBound
        type: int
        description: Inclusive lower frequency rank bound
      - name: upperBound
        type: int
        description: Inclusive upper frequency rank bound (Integer.MAX_VALUE for open-ended)
    - name: BandConfiguration
      type: record
      fields:
      - name: bands
        type: List<FrequencyBand>
        description: Ordered list of frequency bands from most common to least common
      - name: openEnded
        type: boolean
        description: "If true, the last band captures all ranks above its lower bound"
    - name: AssessmentState
      type: enum
      fields:
      - name: OPTIMAL
      - name: ADEQUATE
      - name: DEFICIENT
      - name: EXCESSIVE
    - name: TargetKind
      type: enum
      fields:
      - name: AT_LEAST
      - name: AT_MOST
    - name: BucketTarget
      type: record
      fields:
      - name: bandName
        type: String
        description: Name of the frequency band this target applies to
      - name: targetPercentage
        type: double
        description: Expected percentage of tokens in this band (0.0-1.0)
      - name: kind
        type: TargetKind
        description: Whether the target is a minimum or maximum threshold
    - name: BucketResult
      type: record
      fields:
      - name: bandName
        type: String
        description: Name of the frequency band
      - name: count
        type: int
        description: Number of tokens classified into this band
      - name: percentage
        type: double
        description: Actual percentage of tokens in this band (0.0-1.0)
      - name: targetPercentage
        type: double
        description: Expected percentage for this band (0.0-1.0)
      - name: score
        type: double
        description: Score for this bucket (0.0-1.0) based on proximity to target
      - name: assessment
        type: AssessmentState
        description: Qualitative assessment of this bucket result
    - name: QuarterBucketTargets
      type: record
      fields:
      - name: targets
        type: List<BucketTarget>
        description: Bucket targets for a specific quarter of a level
    - name: QuarterResult
      type: record
      fields:
      - name: index
        type: int
        description: Quarter index (0-based) within the level
      - name: bucketResults
        type: List<BucketResult>
        description: Distribution results per band for this quarter
      - name: score
        type: double
        description: Aggregated score for this quarter (0.0-1.0)
    - name: LevelBucketDistribution
      type: record
      fields:
      - name: levelName
        type: String
        description: "CEFR level name (e.g. A1, A2, B1, B2)"
      - name: score
        type: double
        description: Aggregated score for this level (0.0-1.0)
      - name: bucketResults
        type: List<BucketResult>
        description: Overall distribution results per band for this level
      - name: quarterResults
        type: List<QuarterResult>
        description: Quarter-by-quarter breakdown within this level
      - name: topicDistributions
        type: List<TopicBucketDistribution>
        description: Per-topic breakdown within this level
    - name: TopicBucketDistribution
      type: record
      fields:
      - name: topicId
        type: String
        description: Topic identifier
      - name: score
        type: double
        description: Aggregated score for this topic (0.0-1.0)
      - name: bucketResults
        type: List<BucketResult>
        description: Distribution results per band for this topic
      - name: topicLabel
        type: String
        description: Human-readable topic name for COCA distribution reports
    - name: ProgressionState
      type: enum
      fields:
      - name: ASCENDING
      - name: DESCENDING
      - name: STATIC
      - name: IRREGULAR
    - name: ProgressionExpectation
      type: record
      fields:
      - name: bandName
        type: String
        description: The frequency band whose progression is being specified
      - name: expectedProgression
        type: ProgressionState
        description: Expected progression pattern across levels for this band
    - name: ProgressionAssessment
      type: record
      fields:
      - name: bandName
        type: String
        description: The frequency band assessed
      - name: actualProgression
        type: ProgressionState
        description: Observed progression pattern across levels
      - name: expectedProgression
        type: ProgressionState
        description: Expected progression pattern from configuration
      - name: matches
        type: boolean
        description: Whether actual matches expected progression
    - name: ImprovementDirectiveType
      type: enum
      fields:
      - name: ENRICH
      - name: REDUCE
    - name: ImprovementDirective
      type: record
      fields:
      - name: type
        type: ImprovementDirectiveType
        description: Whether to enrich or reduce tokens in the target range
      - name: bandName
        type: String
        description: The frequency band this directive targets
      - name: levelName
        type: String
        description: The CEFR level this directive applies to
      - name: frequencyRangeFrom
        type: int
        description: Lower bound of the COCA frequency range
      - name: frequencyRangeTo
        type: int
        description: Upper bound of the COCA frequency range
      - name: actualPercentage
        type: double
        description: Current percentage of tokens in this band (0.0-1.0)
      - name: targetPercentage
