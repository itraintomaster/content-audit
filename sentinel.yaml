        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R022
      - name: "Given A2 exceeds its threshold, when assessment is computed, then result\
          \ is NEEDS_IMPROVEMENT regardless of B1 B2 status"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R022
      - name: "Given A2 has 1 absent lemma but it represents 6 percent of expected,\
