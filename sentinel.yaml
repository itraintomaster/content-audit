        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R007
      - name: "Given a lemma expected in A2 that only appears in B1 and B2, when classified,\
          \ then absence type is APPEARS_TOO_LATE"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R007
      - name: "Given a lemma expected in B1 that only appears in A1, when classified,\
          \ then absence type is APPEARS_TOO_EARLY"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R007
      - name: "Given a lemma expected in A2 that appears in A1 and B2, when classified,\
