        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R018
      - name: "Given a B2 sentence containing lemma cat-NOUN expected in A1, when\
          \ sentence is scored, then discount is 0.3 and score is 0.7"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R018
      - name: "Given a sentence with two misplaced lemmas at distances 1 and 3, when\
          \ sentence is scored, then score uses max discount of 0.3 resulting in 0.7"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R019
      - name: "Given a sentence with no misplaced lemmas, when sentence is scored,\
          \ then score is 1.0"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R020
      - name: "Given a sentence containing only non-EVP lemmas, when sentence is scored,\
          \ then score is 1.0"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R020
      - name: "Given a sentence with a lemma correctly placed at its expected level,\
          \ when sentence is scored, then that lemma contributes no discount"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R017
      - name: "Given all levels within their absolute and percentage thresholds, when\
          \ assessment is computed, then result is OPTIMAL"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R022
      - name: "Given B1 exceeds its threshold but A1 and A2 are within thresholds,\
