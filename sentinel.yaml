  scope: internal
- name: audit-cli
  description: CLI entry point for running content audits from the command line
  dependsOn:
  - audit-application
  - audit-domain
  - course-domain
  - course-infrastructure
  - nlp-infrastructure
  - vocabulary-infrastructure
  models:
  - name: ReportViewModel
    type: record
    fields:
    - name: overallScore
      type: double
      description: Course-level overall score
    - name: analyzerNames
      type: List<String>
      description: Ordered list of all analyzer names present in the report
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Course-level score per analyzer
    - name: milestoneScores
      type: List<MilestoneScoreRow>
      description: Per-milestone breakdown of analyzer scores
  - name: MilestoneScoreRow
    type: record
    fields:
    - name: milestoneId
      type: String
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Score per analyzer for this milestone
    - name: overallScore
      type: double
      description: Average score across all analyzers at milestone level
    - name: topicScores
      type: List<TopicScoreRow>
      description: Per-topic breakdown of analyzer scores
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
    extends: ScoreRow
  - name: QuizScoreRow
    type: record
    fields:
    - name: quizId
      type: String
      description: Quiz identifier
    - name: overallScore
      type: double
      description: Average score across all analyzers at quiz level
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Score per analyzer for this quiz
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
    extends: ScoreRow
  - name: KnowledgeScoreRow
    type: record
    fields:
    - name: knowledgeId
      type: String
      description: Knowledge identifier
    - name: overallScore
      type: double
      description: Average score across all analyzers at knowledge level
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Score per analyzer for this knowledge
    - name: quizScores
      type: List<QuizScoreRow>
      description: Per-quiz breakdown of analyzer scores
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
    extends: ScoreRow
  - name: TopicScoreRow
    type: record
    fields:
    - name: topicId
      type: String
      description: Topic identifier
    - name: overallScore
      type: double
      description: Average score across all analyzers at topic level
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Score per analyzer for this topic
    - name: knowledgeScores
      type: List<KnowledgeScoreRow>
      description: Per-knowledge breakdown of analyzer scores
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
    extends: ScoreRow
  - name: DrillDownScope
    type: record
    fields:
    - name: level
      type: Optional<String>
      description: Selected milestone/level to drill into (e.g. A1)
    - name: topic
      type: Optional<String>
      description: Selected topic within the level
    - name: knowledge
      type: Optional<String>
      description: Selected knowledge within the topic
  - name: DrillDownLevel
    type: enum
    fields:
    - name: COURSE
    - name: MILESTONE
    - name: TOPIC
    - name: KNOWLEDGE
  - name: DrillDownView
    type: record
    fields:
    - name: depth
      type: DrillDownLevel
      description: The resolved depth of the drill-down
    - name: nodeName
      type: String
      description: "Display name of the focused node (course title, level id, topic\
        \ id, or knowledge id)"
    - name: overallScore
      type: double
      description: Overall score of the focused node
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Per-analyzer scores of the focused node
    - name: analyzerNames
      type: List<String>
      description: Ordered analyzer names for column headers
    - name: childRows
      type: List<ScoreRow>
      description: One level of children detail rows
  - name: ChildScoreRow
    type: record
    fields:
    - name: id
      type: String
      description: Child node identifier
    - name: overallScore
      type: double
      description: Child overall score
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Child per-analyzer scores
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
    extends: ScoreRow
  - name: AnalyzerStatsView
    type: record
    fields:
    - name: analyzerName
      type: String
      description: Name of the analyzer
    - name: analyzerDescription
      type: String
      description: Description of the analyzer
    - name: courseScore
      type: double
      description: Course-level score for this analyzer
    - name: levelScores
      type: "Map<String,Double>"
      description: Per-milestone/level score breakdown
    - name: worstItems
      type: List<ScoredItemRow>
      description: Worst-scoring items sorted ascending
    - name: scoreDistribution
      type: "Map<String,Integer>"
      description: Histogram buckets (e.g. 0.0-0.2 -> count)
  - name: ScoredItemRow
    type: record
    fields:
    - name: milestoneId
      type: String
      description: Milestone containing this item
    - name: topicId
      type: String
      description: Topic containing this item
    - name: knowledgeId
      type: String
      description: Knowledge containing this item
    - name: quizId
      type: String
      description: Quiz id if target is quiz-level
    - name: score
      type: double
      description: Score for this item
    - name: label
      type: String
      description: Human-readable label of the item
  interfaces:
  - name: ReportFormatter
    stereotype: port
    sealed: false
    exposes:
    - signature: "format(ReportViewModel viewModel,DrillDownScope scope): String"
  - name: AuditCli
    stereotype: port
    sealed: true
    exposes:
    - signature: "run(String[] args): int"
    - signature: "call(): Integer"
  - name: FormatterRegistry
    stereotype: port
    sealed: false
    exposes:
    - signature: "getFormatter(String formatName): ReportFormatter"
  - name: ReportViewModelTransformer
    stereotype: port
    sealed: false
    exposes:
    - signature: "transform(AuditReport report): ReportViewModel"
  - name: RawReportFormatter
    stereotype: port
    sealed: false
    exposes:
    - signature: "format(AuditReport report): String"
  - name: DrillDownResolver
    stereotype: port
    sealed: true
    exposes:
