        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R007
      - name: "Given a lemma expected in A2 that appears in A2 and also in B1, when\
          \ onCourseComplete is called, then lemma is not marked as absent"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R010
      - name: "Given COMPLETELY_ABSENT type, when impact score is checked, then it\
          \ is 1.0"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R008
      - name: "Given APPEARS_TOO_LATE type, when impact score is checked, then it\
          \ is 0.8"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R008
      - name: "Given APPEARS_TOO_EARLY type, when impact score is checked, then it\
          \ is 0.6"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R008
      - name: "Given SCATTERED_PLACEMENT type, when impact score is checked, then\
          \ it is 0.4"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R008
      - name: "Given APPEARS_TOO_LATE and APPEARS_TOO_EARLY impacts, when compared,\
          \ then TOO_LATE impact 0.8 is greater than TOO_EARLY impact 0.6"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R009
      - name: "Given an absent lemma with COCA rank 500, when priority is assigned,\
          \ then priority is HIGH"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R011
      - name: "Given an absent lemma with COCA rank 1000, when priority is assigned,\
          \ then priority is HIGH"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R011
      - name: "Given an absent lemma with COCA rank 1500, when priority is assigned,\
          \ then priority is MEDIUM"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R011
      - name: "Given an absent lemma with COCA rank 3000, when priority is assigned,\
          \ then priority is MEDIUM"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R011
      - name: "Given an absent lemma with COCA rank 4000, when priority is assigned,\
