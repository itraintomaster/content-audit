  scope: internal
- name: audit-cli
  description: CLI entry point for running content audits from the command line
  dependsOn:
  - audit-application
  - audit-domain
  - course-domain
  - course-infrastructure
  - nlp-infrastructure
  - vocabulary-infrastructure
  models:
  - name: ReportViewModel
    type: record
    fields:
    - name: overallScore
      type: double
      description: Course-level overall score
    - name: analyzerNames
      type: List<String>
      description: Ordered list of all analyzer names present in the report
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Course-level score per analyzer
    - name: milestoneScores
      type: List<MilestoneScoreRow>
      description: Per-milestone breakdown of analyzer scores
  - name: MilestoneScoreRow
    type: record
    fields:
    - name: milestoneId
      type: String
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Score per analyzer for this milestone
    - name: overallScore
      type: double
      description: Average score across all analyzers at milestone level
    - name: topicScores
      type: List<TopicScoreRow>
      description: Per-topic breakdown of analyzer scores
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
    extends: ScoreRow
  - name: QuizScoreRow
    type: record
    fields:
    - name: quizId
      type: String
      description: Quiz identifier
    - name: overallScore
      type: double
      description: Average score across all analyzers at quiz level
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Score per analyzer for this quiz
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
    extends: ScoreRow
  - name: KnowledgeScoreRow
    type: record
    fields:
    - name: knowledgeId
      type: String
      description: Knowledge identifier
    - name: overallScore
      type: double
      description: Average score across all analyzers at knowledge level
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Score per analyzer for this knowledge
    - name: quizScores
      type: List<QuizScoreRow>
      description: Per-quiz breakdown of analyzer scores
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
    extends: ScoreRow
  - name: TopicScoreRow
    type: record
    fields:
    - name: topicId
      type: String
      description: Topic identifier
    - name: overallScore
      type: double
      description: Average score across all analyzers at topic level
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Score per analyzer for this topic
    - name: knowledgeScores
      type: List<KnowledgeScoreRow>
      description: Per-knowledge breakdown of analyzer scores
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
    extends: ScoreRow
  - name: DrillDownScope
    type: record
    fields:
    - name: level
      type: Optional<String>
      description: Selected milestone/level to drill into (e.g. A1)
    - name: topic
      type: Optional<String>
      description: Selected topic within the level
    - name: knowledge
      type: Optional<String>
      description: Selected knowledge within the topic
  - name: DrillDownLevel
    type: enum
    fields:
    - name: COURSE
    - name: MILESTONE
    - name: TOPIC
    - name: KNOWLEDGE
  - name: DrillDownView
    type: record
    fields:
    - name: depth
      type: DrillDownLevel
      description: The resolved depth of the drill-down
    - name: nodeName
      type: String
      description: "Display name of the focused node (course title, level id, topic\
        \ id, or knowledge id)"
    - name: overallScore
      type: double
      description: Overall score of the focused node
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Per-analyzer scores of the focused node
    - name: analyzerNames
      type: List<String>
      description: Ordered analyzer names for column headers
    - name: childRows
      type: List<ScoreRow>
      description: One level of children detail rows
  - name: ChildScoreRow
    type: record
    fields:
    - name: id
      type: String
      description: Child node identifier
    - name: overallScore
      type: double
      description: Child overall score
    - name: analyzerScores
      type: "Map<String,Double>"
      description: Child per-analyzer scores
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
    extends: ScoreRow
  - name: AnalyzerStatsView
    type: record
    fields:
    - name: analyzerName
      type: String
      description: Name of the analyzer
    - name: analyzerDescription
      type: String
      description: Description of the analyzer
    - name: courseScore
      type: double
      description: Course-level score for this analyzer
    - name: levelScores
      type: "Map<String,Double>"
      description: Per-milestone/level score breakdown
    - name: worstItems
      type: List<ScoredItemRow>
      description: Worst-scoring items sorted ascending
    - name: scoreDistribution
      type: "Map<String,Integer>"
      description: Histogram buckets (e.g. 0.0-0.2 -> count)
    - name: subMetricsByLevel
      type: "Map<String,Map<String,Double>>"
      description: Sub-metric scores per level (e.g. level -> quarter -> score)
    - name: itemCount
      type: int
      description: Total number of scored items for this analyzer
  - name: ScoredItemRow
    type: record
    fields:
    - name: milestoneId
      type: String
      description: Milestone containing this item
    - name: topicId
      type: String
      description: Topic containing this item
    - name: knowledgeId
      type: String
      description: Knowledge containing this item
    - name: quizId
      type: String
      description: Quiz id if target is quiz-level
    - name: score
      type: double
      description: Score for this item
    - name: label
      type: String
      description: Human-readable label of the item
  interfaces:
  - name: ReportFormatter
    stereotype: port
    sealed: false
    exposes:
    - signature: "format(ReportViewModel viewModel,DrillDownScope scope): String"
  - name: FormatterRegistry
    stereotype: port
    sealed: false
    exposes:
    - signature: "getFormatter(String formatName): ReportFormatter"
  - name: ReportViewModelTransformer
    stereotype: port
    sealed: false
    exposes:
    - signature: "transform(AuditReport report): ReportViewModel"
  - name: RawReportFormatter
    stereotype: port
    sealed: false
    exposes:
    - signature: "format(AuditReport report): String"
  - name: DrillDownResolver
    stereotype: port
    sealed: true
    exposes:
    - signature: "resolve(ReportViewModel viewModel,DrillDownScope scope): DrillDownView"
  - name: AnalyzerStatsTransformer
    stereotype: port
    sealed: false
    exposes:
    - signature: "transform(AuditReport report,String analyzerName,AnalyzerRegistry\
        \ registry): AnalyzerStatsView"
  - name: ScoreRow
    stereotype: port
    sealed: false
    exposes:
    - signature: "getEntity(): AuditableEntity"
    - signature: "getOverallScore(): double"
    - signature: "getAnalyzerScores(): Map<String,Double>"
  - name: DetailedFormatter
    stereotype: formatter
    sealed: false
    exposes:
    - signature: "format(String analyzerName,List<ScoredItem> items): String"
  implementations:
  - name: TextReportFormatter
    requiresInject:
    - name: drillDownResolver
      type: DrillDownResolver
    implements:
    - ReportFormatter
  - name: JsonReportFormatter
    requiresInject:
    - name: drillDownResolver
      type: DrillDownResolver
    implements:
    - ReportFormatter
  - name: DefaultFormatterRegistry
    types:
    - Component
    implements:
    - FormatterRegistry
  - name: DefaultReportViewModelTransformer
    implements:
    - ReportViewModelTransformer
  - name: TableReportFormatter
    requiresInject:
    - name: drillDownResolver
      type: DrillDownResolver
    implements:
    - ReportFormatter
  - name: RawJsonReportFormatter
    implements:
    - RawReportFormatter
  - name: DefaultDrillDownResolver
    types:
    - Component
    implements:
    - DrillDownResolver
  - name: DefaultAnalyzerStatsTransformer
    types:
    - Component
    implements:
    - AnalyzerStatsTransformer
  - name: ContentAuditCmd
    types:
    - Component
    externalImplements:
    - java.util.concurrent.Callable<Integer>
  - name: AnalyzeCmd
    requiresInject:
    - name: auditRunner
      type: AuditRunner
    - name: formatterRegistry
      type: FormatterRegistry
    - name: viewModelTransformer
      type: ReportViewModelTransformer
    - name: rawReportFormatter
      type: RawReportFormatter
    - name: drillDownResolver
      type: DrillDownResolver
    - name: detailedFormatters
      type: "Map<String,DetailedFormatter>"
    types:
    - Component
    externalImplements:
    - java.util.concurrent.Callable<Integer>
  - name: AnalyzerCmd
    types:
    - Component
    externalImplements:
    - java.util.concurrent.Callable<Integer>
  - name: AnalyzerListCmd
    requiresInject:
    - name: analyzerRegistry
      type: AnalyzerRegistry
    types:
    - Component
    externalImplements:
    - java.util.concurrent.Callable<Integer>
  - name: AnalyzerConfigCmd
    requiresInject:
    - name: analyzerRegistry
      type: AnalyzerRegistry
    types:
    - Component
    externalImplements:
    - java.util.concurrent.Callable<Integer>
  - name: AnalyzerStatsCmd
    requiresInject:
    - name: analyzerRegistry
      type: AnalyzerRegistry
    - name: analyzerStatsTransformer
      type: AnalyzerStatsTransformer
    - name: auditRunner
      type: AuditRunner
    types:
    - Component
    externalImplements:
    - java.util.concurrent.Callable<Integer>
  - name: LemmaAbsenceDetailedFormatter
    types:
    - Component
    implements:
    - DetailedFormatter
  patterns:
  - type: Strategy
    implementations:
    - TextReportFormatter
    - JsonReportFormatter
    - TableReportFormatter
    suppressed: false
    interface: ReportFormatter
  scope: public
- name: nlp-infrastructure
  description: "Infrastructure module for NLP processing. Provides SpaCy-backed tokenization\
    \ behind a factory, with internal caching. Only the factory and configuration\
    \ model are public; all processing internals are package-private."
  dependsOn:
  - audit-domain
  models:
  - name: NlpTokenizerConfig
    type: record
    fields:
    - name: pythonScriptPath
      type: String
      description: Path to the SpaCy Python processing script
    - name: cocaDataPath
      type: String
      description: Path to the COCA frequency data file
    - name: timeoutSeconds
      type: int
      description: Maximum seconds to wait for SpaCy process completion
  interfaces:
  - name: NlpTokenizerFactory
    stereotype: factory
    sealed: false
    exposes:
    - signature: "create(NlpTokenizerConfig config): NlpTokenizer"
  patterns:
  - type: Factory
    implementations:
    - SpacyNlpTokenizerFactory
    suppressed: false
    interface: NlpTokenizerFactory
  packages:
  - name: spacy
    description: SpaCy-backed NLP tokenization internals. Only the factory is public;
      all processing classes are package-private.
    visibility: public
    implementations:
    - name: SpacyNlpTokenizerFactory
      types:
      - Component
      visibility: public
      implements:
      - NlpTokenizerFactory
    - name: SpacyNlpTokenizer
      requiresInject:
      - name: processRunner
        type: SpacyProcessRunner
      - name: resultParser
        type: SpacyResultParser
      visibility: package-private
      implements:
      - NlpTokenizer
    - name: SpacyProcessRunner
      requiresInject:
      - name: config
        type: NlpTokenizerConfig
      visibility: package-private
    - name: SpacyResultParser
      visibility: package-private
    - name: CachedNlpTokenizer
      requiresInject:
      - name: delegate
        type: NlpTokenizer
      visibility: package-private
      implements:
      - NlpTokenizer
- name: vocabulary-infrastructure
  description: "Infrastructure module for linguistic reference catalogs (EVP vocabulary\
    \ profiles, COCA frequency data). Provides static lookup data for vocabulary analysis.\
    \ Separate from NLP processing (which handles runtime tokenization)."
  dependsOn:
  - audit-domain
  packages:
  - name: evp
    description: "EVP catalog access — expected lemmas by CEFR level, semantic categories"
    visibility: internal
    implementations:
    - name: FileSystemEvpCatalog
      implements:
      - EvpCatalogPort
  - name: coca
    description: COCA frequency ranking lookups
    visibility: internal
language:
  name: java
  version: 17
