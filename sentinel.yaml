        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R030
      - name: "Given a LemmaByLevelAbsenceAnalyzer, when onQuiz is called, then it\
