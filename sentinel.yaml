        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R021
      - name: "Given A1 has zero tolerance threshold, when any lemma is absent in\
          \ A1, then A1 exceeds its threshold"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R021
      - name: "Given level metrics for A1, when computed, then result includes totalExpected\
          \ and totalAbsent and absencePercentage and absentLemmasByType"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R023
      - name: "Given A1 and A2 have weight 2.0 and B1 and B2 have weight 1.0, when\
