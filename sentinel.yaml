        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R024
      - name: "Given total HIGH priority absent lemmas is between acceptable threshold\
          \ 5 and critical threshold 10, when assessment is computed, then result\
