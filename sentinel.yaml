        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R030
      - name: "Given a recommendation affecting 6 lemmas, when effort level is estimated,\
          \ then it is MEDIUM"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R030
      - name: "Given a recommendation affecting 15 lemmas, when effort level is estimated,\
