      - name: "Given positions [10, 110] and mean 100.0, when calculateStdDevInterval\
          \ is called, then returns 0.0"
        target: DefaultIntervalCalculator
        invoke:
          method: calculateStdDevInterval
          args:
          - "[10, 110]"
          - 100.0
        type: unit
        traceability:
          feature: F-LREC
          rule: F-LREC-R007
        assert:
          returns: 0.0
      - name: "Given positions [0, 100, 200, 300] and mean 100.0, when calculateStdDevInterval\
          \ is called, then returns 0.0"
        target: DefaultIntervalCalculator
        invoke:
          method: calculateStdDevInterval
          args:
          - "[0, 100, 200, 300]"
