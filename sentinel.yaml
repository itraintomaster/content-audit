system: ContentAudit
version: 0.0.1
architecture: hexagonal
packagePrefix: com.learney.contentaudit
modules:
- name: audit-domain
  models:
  - name: AuditReport
    type: record
    fields:
    - name: overallScore
      type: double
      description: Average of all analyzer course-level scores
    - name: scores
      type: NodeScores
      description: Course-level scores per analyzer
    - name: milestones
      type: List<MilestoneNode>
      description: Milestone-level breakdown
  - name: AuditableCourse
    type: record
    fields:
    - name: milestones
      type: List<AuditableMilestone>
  - name: AuditContext
    type: record
    fields:
    - name: milestoneId
      type: String
      description: Current milestone identifier in traversal
    - name: topicId
      type: String
      description: Current topic identifier in traversal
    - name: knowledgeId
      type: String
      description: Current knowledge identifier in traversal
    - name: quizId
      type: String
      description: Current quiz identifier in traversal
    - name: topicLabel
      type: String
      description: Human-readable label of the current topic in traversal
    - name: knowledgeLabel
      type: String
      description: Human-readable label of the current knowledge in traversal
    - name: quizLabel
      type: String
      description: Human-readable title of the current quiz in traversal
  - name: AuditableKnowledge
    type: record
    fields:
    - name: quizzes
      type: List<AuditableQuiz>
    - name: title
      type: String
    - name: instructions
      type: String
    - name: isSentence
      type: boolean
      description: Flag indicating whether this knowledge contains sentence-type quizzes
        eligible for length analysis
    - name: id
      type: String
      description: Knowledge identifier
    - name: label
      type: String
      description: Human-readable knowledge label (same as title)
    - name: code
      type: String
      description: Knowledge short code
    extends: AuditableEntity
  - name: AuditableTopic
    type: record
    fields:
    - name: knowledge
      type: List<AuditableKnowledge>
    - name: id
      type: String
      description: Topic identifier
    - name: label
      type: String
      description: Human-readable topic label
    - name: code
      type: String
      description: Topic short code
    extends: AuditableEntity
  - name: AuditableMilestone
    type: record
    fields:
    - name: topics
      type: List<AuditableTopic>
    - name: id
      type: String
      description: Milestone identifier
    - name: label
      type: String
      description: Human-readable milestone label
    - name: code
      type: String
      description: Milestone short code
    extends: AuditableEntity
  - name: AuditableQuiz
    type: record
    fields:
    - name: sentence
      type: String
    - name: tokens
      type: List<NlpToken>
      description: Pre-computed enriched NLP tokens for the quiz sentence
    - name: id
      type: String
      description: Quiz identifier
    - name: label
      type: String
      description: Human-readable quiz label
    - name: code
      type: String
      description: Quiz short code
    extends: AuditableEntity
  - name: CefrLevel
    type: enum
    fields:
    - name: A1
    - name: A2
    - name: B1
    - name: B2
  - name: TargetRange
    type: record
    fields:
    - name: level
      type: CefrLevel
      description: The CEFR level this range applies to
    - name: minTokens
      type: int
      description: Minimum expected token count for sentences at this level
    - name: maxTokens
      type: int
      description: Maximum expected token count for sentences at this level
  - name: AuditTarget
    type: enum
    fields:
    - name: QUIZ
    - name: KNOWLEDGE
    - name: TOPIC
    - name: MILESTONE
    - name: COURSE
  - name: ScoredItem
    type: record
    fields:
    - name: analyzerName
      type: String
      description: Name of the analyzer that produced this score
    - name: target
      type: AuditTarget
      description: The level this score was computed at
    - name: score
      type: double
      description: Score value 0.0-1.0
    - name: milestoneId
      type: String
      description: Milestone this score belongs to (always present)
    - name: topicId
      type: String
      description: Topic this score belongs to (null if target is MILESTONE or COURSE)
    - name: knowledgeId
      type: String
      description: "Knowledge this score belongs to (null if target is MILESTONE,\
        \ TOPIC, or COURSE)"
    - name: quizId
      type: String
      description: Quiz this score belongs to (only present if target is QUIZ)
    - name: source
      type: AuditableEntity
      description: Reference to the auditable entity that generated this score
  - name: NodeScores
    type: record
    fields:
    - name: scores
      type: "Map<String,Double>"
      description: Map of analyzerName to score at this node level
  - name: QuizNode
    type: record
    fields:
    - name: quizId
      type: String
    - name: scores
      type: NodeScores
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
  - name: KnowledgeNode
    type: record
    fields:
    - name: knowledgeId
      type: String
    - name: scores
      type: NodeScores
    - name: quizzes
      type: List<QuizNode>
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
  - name: TopicNode
    type: record
    fields:
    - name: topicId
      type: String
    - name: scores
      type: NodeScores
    - name: knowledges
      type: List<KnowledgeNode>
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
  - name: MilestoneNode
    type: record
    fields:
    - name: milestoneId
      type: String
    - name: scores
      type: NodeScores
    - name: topics
      type: List<TopicNode>
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity carrying identity (id, label,\
        \ code)"
  - name: NlpToken
    type: record
    fields:
    - name: text
      type: String
      description: Original text of the token
    - name: lemma
      type: String
      description: Lemmatized form of the token
    - name: posTag
      type: String
      description: "Universal Dependencies POS tag (NOUN, VERB, ADJ, etc.)"
    - name: frequencyRank
      type: Integer
      description: COCA frequency ranking (nullable if not found)
    - name: isStop
      type: boolean
      description: Whether this token is a stop word
    - name: isPunct
      type: boolean
      description: Whether this token is punctuation
  - name: AnalyzerDescriptor
    type: record
    fields:
    - name: name
      type: String
      description: Analyzer unique name (e.g. sentence-length)
    - name: description
      type: String
      description: Human-readable description of what the analyzer checks
    - name: target
      type: AuditTarget
      description: The audit target level this analyzer operates at
  interfaces:
  - name: ContentAudit
    stereotype: service
    sealed: false
    exposes:
    - signature: "audit(AuditableCourse): AuditReport"
  - name: AuditEngine
    stereotype: port
    sealed: false
    exposes:
    - signature: "runAudit(AuditableCourse): AuditReport"
  - name: ContentAnalyzer
    stereotype: port
    sealed: false
    exposes:
    - signature: "onKnowledge(AuditableKnowledge knowledge,AuditContext ctx): Void"
    - signature: "onQuiz(AuditableQuiz quiz,AuditContext ctx): Void"
    - signature: "onMilestone(AuditableMilestone milestone,AuditContext ctx): Void"
    - signature: "onTopic(AuditableTopic topic,AuditContext ctx): Void"
    - signature: "onCourseComplete(AuditableCourse course,AuditContext ctx): Void"
    - signature: "getName(): String"
    - signature: "getTarget(): AuditTarget"
    - signature: "getResults(): List<ScoredItem>"
    - signature: "getDescription(): String"
  - name: AnalysisResult
    stereotype: port
    sealed: false
    exposes:
    - signature: "getName(): String"
    - signature: "getScore(): double"
    - signature: "getTarget(): AuditTarget"
  - name: NlpTokenizer
    stereotype: port
    sealed: false
    exposes:
    - signature: "tokenize(String text): List<String>"
    - signature: "countTokens(String text): int"
    - signature: "analyzeTokens(String text): List<NlpToken>"
    - signature: "analyzeTokensBatch(List<String> sentences): Map<String,List<NlpToken>>"
  - name: SentenceLengthConfig
    stereotype: port
    sealed: false
    extends:
    - SelfDescribingConfig
    exposes:
    - signature: "getTargetRange(CefrLevel level): Optional<TargetRange>"
    - signature: "getToleranceMargin(): int"
  - name: ScoreAggregator
    stereotype: port
    sealed: false
    exposes:
    - signature: "aggregate(List<ScoredItem> scores,Map<String,AuditableEntity> entityMap):\
        \ AuditReport"
  - name: CocaBucketsConfig
    stereotype: port
    sealed: false
    extends:
    - SelfDescribingConfig
    exposes:
    - signature: "getBandConfiguration(): BandConfiguration"
    - signature: "getTargetsForLevel(String levelName): List<BucketTarget>"
    - signature: "getQuarterTargetsForLevel(String levelName): List<QuarterBucketTargets>"
    - signature: "getToleranceMargin(): double"
    - signature: "getAnalysisStrategy(): AnalysisStrategy"
    - signature: "getProgressionExpectations(): List<ProgressionExpectation>"
  - name: ContentWordFilter
    stereotype: port
    sealed: false
    exposes:
    - signature: "isContentWord(NlpToken token): boolean"
  - name: LemmaRecurrenceConfig
    stereotype: port
    sealed: false
    extends:
    - SelfDescribingConfig
    exposes:
    - signature: "getTop(): int"
    - signature: "getSubExposedThreshold(): double"
    - signature: "getOverExposedThreshold(): double"
  - name: LemmaAbsenceConfig
    stereotype: port
    sealed: true
    exposes:
    - signature: "getAbsoluteThreshold(CefrLevel level): int"
    - signature: "getPercentageThreshold(CefrLevel level): double"
    - signature: "getLevelWeight(CefrLevel level): double"
    - signature: "getHighPriorityBound(): int"
    - signature: "getMediumPriorityBound(): int"
    - signature: "getLowPriorityBound(): int"
    - signature: "getHighPriorityAlertThreshold(): int"
    - signature: "getMediumPriorityAlertThreshold(): int"
    - signature: "getLowPriorityAlertThreshold(): int"
    - signature: "getCriticalAbsenceThreshold(): int"
    - signature: "getAcceptableAbsenceThreshold(): int"
    - signature: "getHighReportLimit(): int"
    - signature: "getMediumReportLimit(): int"
    - signature: "getLowReportLimit(): int"
    - signature: "getDiscountPerLevel(): double"
  - name: EvpCatalogPort
    stereotype: port
    sealed: false
    exposes:
    - signature: "getExpectedLemmas(CefrLevel level): Set<LemmaAndPos>"
    - signature: "isPhrase(String lemma): boolean"
    - signature: "getCocaRank(LemmaAndPos lemmaAndPos): Optional<Integer>"
    - signature: "getSemanticCategory(LemmaAndPos lemmaAndPos): Optional<String>"
  - name: AuditableEntity
    stereotype: port
    sealed: false
    exposes:
    - signature: "getId(): String"
    - signature: "getLabel(): String"
    - signature: "getCode(): String"
  - name: SelfDescribingConfig
    stereotype: port
    sealed: false
    exposes:
    - signature: "describe(): Map<String,Object>"
  implementations:
  - name: IAuditEngine
    requiresInject:
    - name: contentAnalyzers
      type: List<ContentAnalyzer>
    - name: scoreAggregator
      type: ScoreAggregator
    implements:
    - AuditEngine
  - name: KnowledgeTitleLengthAnalyzer
    tests:
    - name: "Given a KnowledgeTitleLengthAnalyzer, when getName is called, then returns\
        \ knowledge-title-length"
      target: KnowledgeTitleLengthAnalyzer
      invoke:
        method: getName
      type: unit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
      assert:
        returns: knowledge-title-length
    - name: "Given a KnowledgeTitleLengthAnalyzer, when getTarget is called, then\
        \ returns KNOWLEDGE"
      target: KnowledgeTitleLengthAnalyzer
      invoke:
        method: getTarget
      type: unit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
      assert:
        returns: KNOWLEDGE
    - name: "Given a knowledge with null title, when onKnowledge is called and getResults\
        \ checked, then score is 0.0"
      target: KnowledgeTitleLengthAnalyzer
      fixtures:
      - id: knowledge
        type: AuditableKnowledge
        construct:
          quizzes: "[]"
          instructions: some instructions
          isSentence: false
      - id: ctx
        type: AuditContext
        construct:
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
      - id: expectedScore
        type: ScoredItem
        construct:
          analyzerName: knowledge-title-length
          target: KNOWLEDGE
          score: 0.0
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
      type: integration
      steps:
      - invoke:
          method: onKnowledge
          args:
          - ref:knowledge
          - ref:ctx
        assert:
          doesNotThrow: true
      - invoke:
          method: getResults
        assert:
          returns: "[ref:expectedScore]"
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
    - name: "Given a knowledge with empty title, when onKnowledge is called and getResults\
