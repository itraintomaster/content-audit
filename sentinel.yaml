  - name: formatting
    description: "Internal formatting infrastructure — report transformers, view models,\
      \ formatters, and drill-down resolution"
    visibility: internal
    models:
    - name: ReportViewModel
      type: record
      fields:
      - name: overallScore
        type: double
        description: Course-level overall score
      - name: analyzerNames
        type: List<String>
        description: Ordered list of all analyzer names present in the report
      - name: analyzerScores
        type: "Map<String,Double>"
        description: Course-level score per analyzer
      - name: milestoneScores
        type: List<MilestoneScoreRow>
        description: Per-milestone breakdown of analyzer scores
    - name: MilestoneScoreRow
      type: record
      fields:
      - name: milestoneId
        type: String
      - name: analyzerScores
        type: "Map<String,Double>"
        description: Score per analyzer for this milestone
      - name: overallScore
        type: double
        description: Average score across all analyzers at milestone level
      - name: topicScores
        type: List<TopicScoreRow>
        description: Per-topic breakdown of analyzer scores
      - name: entity
