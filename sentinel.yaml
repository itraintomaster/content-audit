- name: audit-cli
  description: CLI entry point for running content audits from the command line
  dependsOn:
  - audit-application
  - audit-domain
  - course-domain
  - course-infrastructure
  interfaces:
  - name: ReportFormatter
    stereotype: port
    sealed: false
    exposes:
    - signature: "format(AuditReport report): String"
  - name: AuditCli
    stereotype: port
    sealed: true
    exposes:
    - signature: "run(String[] args): int"
  - name: FormatterRegistry
    stereotype: port
    sealed: false
    exposes:
    - signature: "getFormatter(String formatName): ReportFormatter"
  implementations:
  - name: TextReportFormatter
    implements:
    - ReportFormatter
  - name: JsonReportFormatter
    implements:
    - ReportFormatter
  - name: DefaultAuditCli
    requiresInject:
    - name: auditRunner
      type: AuditRunner
    - name: formatterRegistry
      type: FormatterRegistry
    tests:
    - name: "Given valid args with course path, when run is called, then returns exit\
        \ code 0"
      target: DefaultAuditCli
      mocks:
      - dependency: auditRunner
        method: runAudit
        thenReturn: ref:report
        args:
        - match: any
      - dependency: formatterRegistry
        method: getFormatter
        thenReturn: ref:formatter
        args:
        - match: eq
          value: text
      invoke:
        method: run
        args:
        - /path/to/course
      fixtures:
      - id: emptyScores
        type: NodeScores
        construct:
          scores: "{}"
