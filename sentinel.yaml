system: ContentAudit
version: 0.0.1
architecture: hexagonal
packagePrefix: com.learney.contentaudit
modules:
- name: audit-domain
  models:
  - name: AuditReport
    type: record
    fields:
    - name: root
      type: AuditNode
      description: Root node of the audit tree (target=COURSE). Children are milestones.
        Course-level scores live in root.scores.
  - name: AuditableCourse
    type: record
    fields:
    - name: milestones
      type: List<AuditableMilestone>
  - name: AuditableKnowledge
    type: record
    fields:
    - name: quizzes
      type: List<AuditableQuiz>
    - name: title
      type: String
    - name: instructions
      type: String
    - name: isSentence
      type: boolean
      description: Flag indicating whether this knowledge contains sentence-type quizzes
        eligible for length analysis
    - name: id
      type: String
      description: Knowledge identifier
    - name: label
      type: String
      description: Human-readable knowledge label (same as title)
    - name: code
      type: String
      description: Knowledge short code
    extends: AuditableEntity
  - name: AuditableTopic
    type: record
    fields:
    - name: knowledge
      type: List<AuditableKnowledge>
    - name: id
      type: String
      description: Topic identifier
    - name: label
      type: String
      description: Human-readable topic label
    - name: code
      type: String
      description: Topic short code
    extends: AuditableEntity
  - name: AuditableMilestone
    type: record
    fields:
    - name: topics
      type: List<AuditableTopic>
    - name: id
      type: String
      description: Milestone identifier
    - name: label
      type: String
      description: Human-readable milestone label
    - name: code
      type: String
      description: Milestone short code
    extends: AuditableEntity
  - name: AuditableQuiz
    type: record
    fields:
    - name: sentence
      type: String
    - name: tokens
      type: List<NlpToken>
      description: Pre-computed enriched NLP tokens for the quiz sentence
    - name: id
      type: String
      description: Quiz identifier
    - name: label
      type: String
      description: Human-readable quiz label
    - name: code
      type: String
      description: Quiz short code
    - name: translation
      type: String
      description: Spanish translation of the quiz sentence
    extends: AuditableEntity
  - name: CefrLevel
    type: enum
    fields:
    - name: A1
    - name: A2
    - name: B1
    - name: B2
  - name: TargetRange
    type: record
    fields:
    - name: level
      type: CefrLevel
      description: The CEFR level this range applies to
    - name: minTokens
      type: int
      description: Minimum expected token count for sentences at this level
    - name: maxTokens
      type: int
      description: Maximum expected token count for sentences at this level
  - name: AuditTarget
    type: enum
    fields:
    - name: QUIZ
    - name: KNOWLEDGE
    - name: TOPIC
    - name: MILESTONE
    - name: COURSE
  - name: NlpToken
    type: record
    fields:
    - name: text
      type: String
      description: Original text of the token
    - name: lemma
      type: String
      description: Lemmatized form of the token
    - name: posTag
      type: String
      description: "Universal Dependencies POS tag (NOUN, VERB, ADJ, etc.)"
    - name: frequencyRank
      type: Integer
      description: COCA frequency ranking (nullable if not found)
    - name: isStop
      type: boolean
      description: Whether this token is a stop word
    - name: isPunct
      type: boolean
      description: Whether this token is punctuation
  - name: AnalyzerDescriptor
    type: record
    fields:
    - name: name
      type: String
      description: Analyzer unique name (e.g. sentence-length)
    - name: description
      type: String
      description: Human-readable description of what the analyzer checks
    - name: target
      type: AuditTarget
      description: The audit target level this analyzer operates at
  - name: AuditNode
    type: record
    fields:
    - name: entity
      type: AuditableEntity
      description: "Reference to the auditable entity at this node (AuditableCourse,\
        \ AuditableMilestone, etc.)"
    - name: target
      type: AuditTarget
      description: "The hierarchy level: COURSE, MILESTONE, TOPIC, KNOWLEDGE, or QUIZ"
    - name: parent
      type: AuditNode
      description: "Parent node in the tree, null for the root (COURSE) node"
    - name: children
      type: List<AuditNode>
      description: Child nodes; empty for leaf (QUIZ) nodes
    - name: scores
      type: "Map<String,Double>"
      description: Per-analyzer scores at this node level (analyzerName -> score)
    - name: metadata
      type: "Map<String,Object>"
      description: "Analyzer-specific data attached to this node (e.g., misplaced\
        \ lemmas, sub-scores)"
    - name: diagnoses
      type: NodeDiagnoses
      description: "Per-level typed diagnoses container. The concrete type matches\
        \ the node's AuditTarget level (CourseDiagnoses, LevelDiagnoses, TopicDiagnoses,\
        \ KnowledgeDiagnoses, or QuizDiagnoses)."
  - name: SentenceLengthDiagnosis
    type: record
    fields:
    - name: tokenCount
      type: int
      description: Actual token count of the quiz sentence
    - name: targetMin
      type: int
      description: Minimum expected tokens for this CEFR level
    - name: targetMax
      type: int
      description: Maximum expected tokens for this CEFR level
    - name: cefrLevel
      type: CefrLevel
      description: The CEFR level derived from the ancestor milestone
    - name: delta
      type: int
      description: "Tokens over/under range (0 if within, positive if over, negative\
        \ if under)"
    - name: toleranceMargin
      type: int
      description: Configured tolerance margin used for scoring
  - name: AuditReportSummary
    type: record
    fields:
    - name: id
      type: String
      description: Unique audit report identifier (timestamp-based)
    - name: timestamp
      type: Instant
      description: When the audit was executed
    - name: courseName
      type: String
      description: Name of the audited course
    - name: overallScore
      type: double
      description: Aggregate score from the audit
  interfaces:
  - name: AuditEngine
    stereotype: port
    sealed: false
    exposes:
    - signature: "runAudit(AuditableCourse course): AuditReport"
  - name: ContentAnalyzer
    stereotype: port
    sealed: false
    exposes:
    - signature: "onKnowledge(AuditNode node): Void"
    - signature: "onQuiz(AuditNode node): Void"
    - signature: "onMilestone(AuditNode node): Void"
    - signature: "onTopic(AuditNode node): Void"
    - signature: "onCourseComplete(AuditNode rootNode): Void"
    - signature: "getName(): String"
    - signature: "getTarget(): AuditTarget"
    - signature: "getDescription(): String"
  - name: AnalysisResult
    stereotype: port
    sealed: false
    exposes:
    - signature: "getName(): String"
    - signature: "getScore(): double"
    - signature: "getTarget(): AuditTarget"
  - name: NlpTokenizer
    stereotype: port
    sealed: false
    exposes:
    - signature: "tokenize(String text): List<String>"
    - signature: "countTokens(String text): int"
    - signature: "analyzeTokens(String text): List<NlpToken>"
    - signature: "analyzeTokensBatch(List<String> sentences): Map<String,List<NlpToken>>"
  - name: SentenceLengthConfig
    stereotype: port
    sealed: false
    exposes:
    - signature: "getTargetRange(CefrLevel level): Optional<TargetRange>"
    - signature: "getToleranceMargin(): int"
    extends:
    - SelfDescribingConfig
  - name: ScoreAggregator
    stereotype: port
    sealed: false
    exposes:
    - signature: "aggregate(AuditNode rootNode): void"
  - name: CocaBucketsConfig
    stereotype: port
    sealed: false
    exposes:
    - signature: "getBandConfiguration(): BandConfiguration"
    - signature: "getTargetsForLevel(String levelName): List<BucketTarget>"
    - signature: "getQuarterTargetsForLevel(String levelName): List<QuarterBucketTargets>"
    - signature: "getToleranceMargin(): double"
    - signature: "getAnalysisStrategy(): AnalysisStrategy"
    - signature: "getProgressionExpectations(): List<ProgressionExpectation>"
    extends:
    - SelfDescribingConfig
  - name: ContentWordFilter
    stereotype: port
    sealed: false
    exposes:
    - signature: "isContentWord(NlpToken token): boolean"
  - name: LemmaRecurrenceConfig
    stereotype: port
    sealed: false
    exposes:
    - signature: "getTop(): int"
    - signature: "getSubExposedThreshold(): double"
    - signature: "getOverExposedThreshold(): double"
    extends:
    - SelfDescribingConfig
  - name: LemmaAbsenceConfig
    stereotype: port
    sealed: true
    exposes:
    - signature: "getAbsoluteThreshold(CefrLevel level): int"
    - signature: "getPercentageThreshold(CefrLevel level): double"
    - signature: "getLevelWeight(CefrLevel level): double"
    - signature: "getHighPriorityBound(): int"
    - signature: "getMediumPriorityBound(): int"
    - signature: "getLowPriorityBound(): int"
    - signature: "getHighPriorityAlertThreshold(): int"
    - signature: "getMediumPriorityAlertThreshold(): int"
    - signature: "getLowPriorityAlertThreshold(): int"
    - signature: "getCriticalAbsenceThreshold(): int"
    - signature: "getAcceptableAbsenceThreshold(): int"
    - signature: "getHighReportLimit(): int"
    - signature: "getMediumReportLimit(): int"
    - signature: "getLowReportLimit(): int"
    - signature: "getDiscountPerLevel(): double"
    - signature: "getCoverageTarget(CefrLevel level): double"
    extends:
    - SelfDescribingConfig
  - name: EvpCatalogPort
    stereotype: port
    sealed: false
    exposes:
    - signature: "getExpectedLemmas(CefrLevel level): Set<LemmaAndPos>"
    - signature: "isPhrase(String lemma): boolean"
    - signature: "getCocaRank(LemmaAndPos lemmaAndPos): Optional<Integer>"
    - signature: "getSemanticCategory(LemmaAndPos lemmaAndPos): Optional<String>"
  - name: AuditableEntity
    stereotype: port
    sealed: false
    exposes:
    - signature: "getId(): String"
    - signature: "getLabel(): String"
    - signature: "getCode(): String"
  - name: SelfDescribingConfig
    stereotype: port
    sealed: false
    exposes:
    - signature: "describe(): Map<String,Object>"
  - name: NodeDiagnoses
    stereotype: port
    sealed: true
  - name: CourseDiagnoses
    stereotype: port
    sealed: false
    exposes:
    - signature: "getLemmaAbsenceDiagnosis(): Optional<LemmaAbsenceCourseDiagnosis>"
    - signature: "getCocaBucketsDiagnosis(): Optional<CocaProgressionDiagnosis>"
  - name: LevelDiagnoses
    stereotype: port
    sealed: false
    exposes:
    - signature: "getLemmaAbsenceDiagnosis(): Optional<LemmaAbsenceLevelDiagnosis>"
    - signature: "getCocaBucketsDiagnosis(): Optional<CocaBucketsLevelDiagnosis>"
  - name: TopicDiagnoses
    stereotype: port
    sealed: false
    exposes:
    - signature: "getLemmaAbsenceDiagnosis(): Optional<LemmaPlacementDiagnosis>"
    - signature: "getCocaBucketsDiagnosis(): Optional<CocaBucketsTopicDiagnosis>"
  - name: KnowledgeDiagnoses
    stereotype: port
    sealed: false
    exposes:
    - signature: "getLemmaAbsenceDiagnosis(): Optional<LemmaPlacementDiagnosis>"
  - name: QuizDiagnoses
    stereotype: port
    sealed: false
    exposes:
    - signature: "getLemmaAbsenceDiagnosis(): Optional<LemmaPlacementDiagnosis>"
    - signature: "getSentenceLengthDiagnosis(): Optional<SentenceLengthDiagnosis>"
  - name: AuditReportStore
    stereotype: port
    sealed: false
    exposes:
    - signature: "save(AuditReport report): String"
    - signature: "load(String id): Optional<AuditReport>"
    - signature: "loadLatest(): Optional<AuditReport>"
    - signature: "list(): List<AuditReportSummary>"
  implementations:
  - name: IAuditEngine
    requiresInject:
    - name: contentAnalyzers
      type: List<ContentAnalyzer>
    - name: scoreAggregator
      type: ScoreAggregator
    visibility: public
    implements:
    - AuditEngine
  - name: KnowledgeTitleLengthAnalyzer
    tests:
    - name: should score 0.5 for title of weighted length 28.5
      target: KnowledgeTitleLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
      _change: add
    - name: should score 0.0 for title of weighted length 29
      target: KnowledgeTitleLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
      _change: add
    - name: should score 0.0 for title of weighted length 35
      target: KnowledgeTitleLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
      _change: add
    - name: should score 0.0 for title well beyond limit at weighted length 70
      target: KnowledgeTitleLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
      _change: add
    visibility: public
    handwrittenTests:
    - name: should return knowledge-title-length as analyzer name
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should return KNOWLEDGE as audit target
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should score 0.0 for knowledge with null title
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
    - name: should score 0.0 for knowledge with empty title
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
    - name: should score 1.0 for knowledge with title within limit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
    - name: should score 1.0 for knowledge with title at exactly 28 weighted chars
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R001
    - name: should score 1.0 for title fitting with weighted length 5.1
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R002
    - name: should score 1.0 for zero-weight special chars title
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R002
    - name: should score 1.0 for mixed-weight title with weighted length 2.7
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R002
    - name: should score 0.75 for title of weighted length 35
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
    - name: should score 0.5 for title of weighted length 42
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
    - name: should score 0.0 for title of weighted length 56
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
    - name: should score 0.0 for title of weighted length 70
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
    - name: should complete without error when onQuiz is called
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should complete without error when onMilestone is called
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should complete without error when onTopic is called
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should complete without error when onCourseComplete is called
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should return two correctly scored items for two knowledges with different
        title lengths
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
    - name: should return empty list when no knowledges have been processed
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R003
    implements:
    - ContentAnalyzer
  - name: KnowledgeInstructionsLengthAnalyzer
    tests:
    - name: should score 1.0 for instructions exactly at soft limit of 70 weighted
        chars
      target: KnowledgeInstructionsLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R005
      _change: add
    - name: should score 1.0 for instructions of 30 weighted chars within soft limit
      target: KnowledgeInstructionsLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R006
      _change: add
    - name: should score 0.5 for instructions of 71 weighted chars just above soft
        limit
      target: KnowledgeInstructionsLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R005
      _change: add
    - name: should score 0.5 for instructions exactly at hard limit of 100 weighted
        chars
      target: KnowledgeInstructionsLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R005
      _change: add
    - name: should score 0.5 for instructions of 85 weighted chars between soft and
        hard limits
      target: KnowledgeInstructionsLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R006
      _change: add
    - name: should score 0.0 for instructions of 101 weighted chars just above hard
        limit
      target: KnowledgeInstructionsLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R005
      _change: add
    - name: should score 0.0 for instructions of 200 weighted chars well above hard
        limit
      target: KnowledgeInstructionsLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R006
      _change: add
    - name: should use weighted character length not plain string length for scoring
        instructions
      target: KnowledgeInstructionsLengthAnalyzer
      type: unit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R005
        journey: F-KTLEN-J003
      _change: add
    visibility: public
    handwrittenTests:
    - name: should return knowledge-instructions-length as analyzer name
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should return KNOWLEDGE as audit target
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should score 1.0 for knowledge with null instructions
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R006
    - name: should score 1.0 for knowledge with empty instructions
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R006
    - name: should score 1.0 for instructions exactly at soft limit of 70 chars
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R005
    - name: should score 1.0 for instructions of 30 chars within soft limit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R006
    - name: should score 0.5 for instructions of 71 chars just above soft limit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R005
    - name: should score 0.5 for instructions exactly at hard limit of 100 chars
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R005
    - name: should score 0.5 for instructions of 85 chars between soft and hard limits
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R006
    - name: should score 0.0 for instructions of 101 chars just above hard limit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R005
    - name: should score 0.0 for instructions of 200 chars well above hard limit
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R006
    - name: should complete without error when onQuiz is called
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should complete without error when onMilestone is called
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should complete without error when onTopic is called
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should complete without error when onCourseComplete is called
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R008
    - name: should produce correct scores for three knowledges with different instruction
        lengths
      traceability:
        feature: FEAT-KTLEN
        rule: F-KTLEN-R006
    implements:
    - ContentAnalyzer
  - name: SentenceLengthAnalyzer
    requiresInject:
    - name: nlpTokenizer
      type: NlpTokenizer
    - name: config
      type: SentenceLengthConfig
    visibility: public
    handwrittenTests:
    - name: should exclude quiz when milestoneId is null
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R001
    - name: should exclude quiz when milestoneId is non-numeric
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R001
    - name: should exclude quiz when no target range configured for level
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R012
    - name: should score only sentence quizzes when processing mixed knowledge types
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R001
    - name: should return sentence-length as analyzer name
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R001
    - name: should return QUIZ as audit target
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R001
    - name: should score 1.0 for quiz within A1 range
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R002
    - name: should score 0.75 for quiz 1 token above A1 max
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R002
    - name: should score 0.25 for quiz 3 tokens below A1 min
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R002
    - name: should score 1.0 for quiz exactly at A1 minimum boundary
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R002
    - name: should score 1.0 for quiz exactly at A1 maximum boundary
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R002
    - name: should score 0.0 for quiz 4 tokens above A1 max at tolerance boundary
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R009
    - name: should exclude non-sentence knowledge quiz from results
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R001
    - name: should score 1.0 for B2 level quiz within range
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R012
    - name: should score 0.0 for quiz exactly at tolerance boundary
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R009
    - name: should score 0.5 for quiz 2 tokens above A1 max
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R002
    - name: should complete without error when onTopic is called
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R001
    - name: should complete without error when onCourseComplete is called
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R001
    - name: should produce correct scores for full milestone-knowledge-quiz sequence
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R002
    - name: should exclude non-sentence quizzes from scoring
      traceability:
        feature: FEAT-SLEN
        rule: F-SLEN-R001
    implements:
    - ContentAnalyzer
  - name: IScoreAggregator
    visibility: public
    implements:
    - ScoreAggregator
  patterns:
  - type: Strategy
    implementations:
    - IScoreAggregator
    - CocaTokenAccumulationAggregator
    - LemmaAbsenceScoreAggregator
    suppressed: false
    interface: ScoreAggregator
  scope: internal
  packages:
  - name: coca
    description: "COCA frequency bucket distribution analysis. Classifies NLP tokens\
      \ into frequency bands (K1-K5+), evaluates distribution against configurable\
      \ targets per CEFR level, assesses progression across levels, and generates\
      \ improvement directives."
    visibility: internal
    models:
    - name: FrequencyBand
      type: record
      fields:
      - name: name
        type: String
        description: "Band identifier (e.g. K1, K2, K3, K4, K5_PLUS)"
      - name: lowerBound
        type: int
        description: Inclusive lower frequency rank bound
      - name: upperBound
        type: int
        description: Inclusive upper frequency rank bound (Integer.MAX_VALUE for open-ended)
    - name: BandConfiguration
      type: record
      fields:
      - name: bands
        type: List<FrequencyBand>
        description: Ordered list of frequency bands from most common to least common
      - name: openEnded
        type: boolean
        description: "If true, the last band captures all ranks above its lower bound"
    - name: AssessmentState
      type: enum
      fields:
      - name: OPTIMAL
      - name: ADEQUATE
      - name: DEFICIENT
      - name: EXCESSIVE
    - name: TargetKind
      type: enum
      fields:
      - name: AT_LEAST
      - name: AT_MOST
    - name: BucketTarget
      type: record
      fields:
      - name: bandName
        type: String
        description: Name of the frequency band this target applies to
      - name: targetPercentage
        type: double
        description: Expected percentage of tokens in this band (0.0-1.0)
      - name: kind
        type: TargetKind
        description: Whether the target is a minimum or maximum threshold
    - name: BucketResult
      type: record
      fields:
      - name: bandName
        type: String
        description: Name of the frequency band
      - name: count
        type: int
