        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R001
      - name: "Given a course with quizzes containing content-word tokens in A1, when\
          \ onCourseComplete is called, then present lemmas are collected from all\
          \ quiz tokens in A1"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R002
      - name: "Given EVP expects lemma dog-NOUN in A2 and course has dog-NOUN only\
          \ in B1, when onCourseComplete is called, then dog-NOUN is marked as absent\
          \ in A2 with presentInLevels containing B1"
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R004
      - name: "Given a lemma expected in A2 that does not appear in any level, when\
