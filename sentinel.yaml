        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R031
      - name: should return COURSE as audit target
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R031
      - name: should return description text
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R031
      - name: should return empty results when no data processed
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R031
      - name: should obtain expected lemmas for each CEFR level from EVP catalog
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R001
      - name: should exclude multi-word phrases from expected lemmas
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R005
      - name: should exclude non-content words from expected lemmas
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R001
      - name: should include critical functional pronoun I in A1 expected lemmas despite
          filter rejection
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R016
      - name: should include critical functional auxiliary be in A2 expected lemmas
          despite filter rejection
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R016
      - name: should not apply critical functional override for B1 level
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R016
      - name: should not apply critical functional override for B2 level
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R016
      - name: should include all critical pronouns auxiliaries prepositions and connectors
          in A1
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R016
      - name: should collect present lemmas from quiz tokens per level
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R002
      - name: should collect present lemmas separately for each CEFR level
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R002
      - name: should count a lemma as present only once per level even if it appears
          multiple times
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R002
      - name: should skip null tokens and tokens with null lemma during collection
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R002
      - name: should skip quiz when tokens list is null
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R002
      - name: should skip quiz when current level is null
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R002
