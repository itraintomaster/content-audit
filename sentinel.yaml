- name: audit-cli
  description: CLI entry point for running content audits from the command line
  dependsOn:
  - audit-application
  - audit-domain
  - course-domain
  - course-infrastructure
  - nlp-infrastructure
  - vocabulary-infrastructure
  - audit-infrastructure
  - refiner-domain
  interfaces:
  - name: AnalyzeCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "analyze(String coursePath, String format, String level, String topic,\
        \ String knowledge, List<String> analyzers, boolean detailed): Integer"
  - name: AnalyzerListCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "list(): Integer"
  - name: AnalyzerConfigCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "showConfig(String analyzerName): Integer"
  - name: AnalyzerStatsCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "showStats(String analyzerName, String coursePath): Integer"
  - name: RefinerPlanCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "plan(String auditId): Integer"
  - name: RefinerNextCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "next(String planId): Integer"
  - name: RefinerListCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "listTasks(String planId): Integer"
  patterns:
  - type: Strategy
    implementations:
    - TextReportFormatter
    - JsonReportFormatter
    - TableReportFormatter
    suppressed: false
    interface: ReportFormatter
  scope: public
  packages:
  - name: commands
    description: Public CLI command tree — the only exported API of the audit-cli
      module
    visibility: internal
    implementations:
    - name: Main
      types:
      - Component
    - name: ContentAuditCmd
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
    - name: AnalyzeCmd
      requiresInject:
      - name: auditRunner
        type: AuditRunner
      - name: formatterRegistry
        type: FormatterRegistry
      - name: viewModelTransformer
        type: ReportViewModelTransformer
      - name: rawReportFormatter
        type: RawReportFormatter
      - name: drillDownResolver
        type: DrillDownResolver
      - name: detailedFormatters
        type: "Map<String,DetailedFormatter>"
      - name: auditReportStore
        type: AuditReportStore
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - AnalyzeCommand
    - name: AnalyzerCmd
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
    - name: AnalyzerListCmd
      requiresInject:
      - name: analyzerRegistry
        type: AnalyzerRegistry
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - AnalyzerListCommand
    - name: AnalyzerConfigCmd
      requiresInject:
      - name: analyzerRegistry
        type: AnalyzerRegistry
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - AnalyzerConfigCommand
    - name: AnalyzerStatsCmd
      requiresInject:
      - name: analyzerRegistry
        type: AnalyzerRegistry
      - name: analyzerStatsTransformer
        type: AnalyzerStatsTransformer
      - name: auditRunner
        type: AuditRunner
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - AnalyzerStatsCommand
    - name: RefinerCmd
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
    - name: RefinerPlanCmd
      requiresInject:
      - name: auditReportStore
        type: AuditReportStore
      - name: refinerEngine
