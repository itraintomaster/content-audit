          \ pendingProposalIds, ni como contribuciones a las fotos de fields) — R017"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R017
      - name: "Dado un nodo hoja con un field cuyas tres fotos son identicas y otro\
          \ field cuya foto consolidated difiere de original, cuando build corre,\
          \ entonces el mapa fieldChanges del NodeImpact contiene SOLO la entrada\
          \ del segundo field — R006 invariante 1: solo fields con cambio"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R006
      - name: "Dado un NodeImpact con varios fields cambiados de origenes distintos\
          \ (componente de diagnostico tipado, contenido del nodo, score escalar),\
