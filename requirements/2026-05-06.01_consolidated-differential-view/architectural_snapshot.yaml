        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dada una invocacion de getKeySpec sobre el campo lista de tipo List<QuarterResult>,\
          \ entonces retorna un Optional poblado con un ListIdentityKeySpec cuyos\
          \ fieldNames son ['index'] — R022 seed QuarterResult"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dada una invocacion de getKeySpec sobre el campo lista de tipo List<ImprovementDirective>,\
          \ entonces retorna un Optional poblado con un ListIdentityKeySpec cuyos\
          \ fieldNames son ['type','bandName','levelName'] — R022 seed ImprovementDirective"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      implements:
      - ListIdentityRegistry
      _change: add
    - name: DefaultNodeFieldDifferFactory
      visibility: public
      handwrittenTests:
      - name: "Dada una invocacion de create() sobre la factory, entonces retorna\
          \ un NodeFieldDiffer cuya implementacion es RecursiveNodeFieldDiffer compuesta\
          \ con DefaultFieldExclusionRegistry (para R020) y DefaultListIdentityRegistry\
