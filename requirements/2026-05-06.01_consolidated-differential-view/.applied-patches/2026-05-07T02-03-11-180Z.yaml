        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dada una invocacion de getKeySpec sobre el campo lista de tipo List<QuarterResult>,\
          \ entonces retorna un Optional poblado con un ListIdentityKeySpec cuyos\
