- name: audit-cli
  packages:
  - name: formatting
    implementations:
    - name: DefaultConsolidatedViewFormatter
      handwrittenTests:
      - name: "Dado un StatisticImpact con original, consolidated y acceptedDelta\
          \ poblados (sin pendiente), cuando format corre, entonces los tres valores\
          \ aparecen en la salida con la misma magnitud en escala absoluta y pendingProjection/pendingDelta\
          \ no aparecen como campos numericos"
        _change: delete
      - name: "Dado un StatisticImpact con pendingProjection y pendingDelta no nulos,\
          \ cuando format corre, entonces los cuatro valores numericos (original,\
          \ consolidated, acceptedDelta, pendingDelta) y pendingProjection aparecen\
          \ en la salida"
        _change: delete
      - name: "Dado un StatisticImpact con cualquier valor de original y consolidated,\
          \ cuando format corre, entonces el valor textual de acceptedDelta en la\
          \ salida coincide con consolidated menos original sin conversion porcentual\
          \ relativa"
        _change: delete
      - name: "Dado un ConsolidatedView con availability UNAVAILABLE y un unavailability\
          \ con reason y detail, cuando format corre, entonces la salida incluye consolidatedAvailability=UNAVAILABLE\
          \ con la categoria y el detalle, y nodeImpacts/statisticImpacts no se intentan\
          \ rendererizar como datos validos"
        _change: delete
      - name: "Dado un ConsolidatedView con availability UNAVAILABLE y un unavailability\
          \ con reason y detail, cuando format corre, entonces la salida incluye consolidatedAvailability=UNAVAILABLE\
          \ con la categoria y el detalle, y nodeImpacts no se intenta rendererizar\
          \ como datos validos — R013 (v3 cleanup)"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R013
      - name: "Dado un ConsolidatedView con un NodeImpact que lleva fieldChanges no\
          \ vacio (varias entradas con FieldChange tripleta) mas acceptedProposalIds\
          \ y pendingProposalIds, cuando format corre, entonces la salida emite el\
          \ nodo con su mapa de fieldChanges (cada entrada bajo su clave estable de\
          \ path con sus tres valores) y con las dos listas de proposalIds adjuntas;\
          \ NO emite ningun campo equivalente al deprecado consolidated/pendingProjection\
          \ como CourseElementSnapshot crudo — R006 nueva forma uniforme"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R006
      - name: "Dado un ConsolidatedView con varios nodeImpacts cuyos fieldChanges\
          \ incluyen scores escalares cambiados, cuando format corre, entonces la\
          \ salida NO contiene una seccion paralela 'statisticImpacts' ni equivalente;\
          \ los scores cambiados solo aparecen como entradas del mapa fieldChanges\
          \ del nodo correspondiente — R009"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R009
      - name: "Dado un ConsolidatedView con cualquier conjunto de fieldChanges, cuando\
          \ format corre, entonces la salida NO contiene campos numericos precomputados\
          \ acceptedDelta ni pendingDelta en ningun lugar; cada FieldChange se serializa\
          \ como tripleta (original, consolidated, pendingProjection) sin restas —\
          \ R010"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R010
      - name: "Dado un ConsolidatedView con un NodeImpact cuyo acceptedProposalIds\
          \ y pendingProposalIds estan poblados, cuando format corre, entonces la\
          \ salida del nodo incluye ambas listas con sus proposalIds — R011"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R011
      _change: modify
    _change: modify
  _change: modify
