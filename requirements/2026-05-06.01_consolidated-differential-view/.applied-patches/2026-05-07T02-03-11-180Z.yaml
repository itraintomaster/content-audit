code: FEAT-CDIFF
description: "FEAT-CDIFF v3 (refactor uniforme field → tripleta). NodeImpact deja\
  \ de exponer snapshots crudos por nodo y lleva un mapa dinamico de fields cambiados\
  \ con su tripleta (original, consolidated, pendingProjection). StatisticImpact se\
  \ elimina; los scores son fields del mapa. Se introduce el motor de descubrimiento\
  \ dinamico (NodeFieldDiffer) en un nuevo package fielddiff con sus dos registros\
  \ centrales (FieldExclusionRegistry + ListIdentityRegistry) que materializan R020/R022\
  \ sin contaminar los records existentes. R023 (path) queda capturado en el record\
  \ FieldPath. El builder se refactoriza para invocar el nuevo motor. El formatter\
  \ se adapta a la nueva forma de salida.; FEAT-CDIFF v3 (continuacion del refactor\
  \ field → tripleta): extender ConsolidatedViewBuilderConfig con nodeFieldDiffer\
  \ (la factory lo unpackea para pasarlo al builder), y rehacer DefaultConsolidatedViewFormatter\
  \ para serializar la nueva NodeImpact (mapa de fields + acceptedProposalIds + pendingProposalIds)\
  \ y reflejar la eliminacion de StatisticImpact y de los snapshots crudos. Los handwrittenTests\
  \ del formatter de v2 que asumian StatisticImpact se borran.; FEAT-CDIFF v3: re-add\
  \ carriers en consolidatedview (StatisticImpact delete + FieldChange/FieldPath/FieldExclusionRole\
  \ add) que se perdieron en el merge anterior."
modules:
- name: revision-domain
  description: "Domain module for the revision phase of the refinement pipeline. Consumes\
    \ refiner-domain (task and CorrectionContext), course-domain (course entities\
    \ and the CourseRepository port owned by the caller) and audit-domain (AuditReport\
    \ / AuditEngine / ActiveAnalysisSelectionStore for the eager what-if simulation\
    \ that powers the impact preview and the consolidated view). Exposes Reviser/RevisionValidator/RevisionArtifactStore/CourseElementLocator/ImpactPreviewStore\
    \ ports plus the RevisionEngineFactory seam, the lemmaabsence proposal-strategy\
    \ SPI, the impactpreview SPI (FEAT-PIPRE) and the consolidatedview SPI (FEAT-CDIFF)\
    \ — including the dynamic field-diff engine that powers FEAT-CDIFF v3 (recursive\
    \ walker + central role-based exclusion registry + central list-identity registry,\
    \ all inside the fielddiff package). The bypass baseline, the impact-preview internals,\
    \ the consolidated-view internals and the field-diff internals live behind their\
    \ respective internal packages; external modules only see factories, ports and\
    \ carrier records."
  models:
  - name: ConsolidatedViewBuilderConfig
    type: record
    fields:
    - name: nodeFieldDiffer
      type: NodeFieldDiffer
      description: F-CDIFF v3. Required. Motor de descubrimiento dinamico inyectado
        por la composition root via DefaultNodeFieldDifferFactory.create(). El factory
        de ConsolidatedViewBuilder lo unpackea del config y lo pasa a DefaultConsolidatedViewBuilder.
      _change: add
    visibility: public
    _change: modify
  packages:
  - name: consolidatedview
    description: "FEAT-CDIFF v3. Public SPI for the consolidated structure that combines\
      \ the baseline of an AuditReport with the effects of accepted and pending proposals\
      \ of its active plan. Houses the builder port (ConsolidatedViewBuilder) plus\
      \ its factory (ConsolidatedViewBuilderFactory) and every carrier the CLI rendering\
      \ needs to read: the root document (ConsolidatedView), the per-node impact (NodeImpact\
      \ carrying a uniform map of field-level changes), the field-change carrier (FieldChange\
      \ triple), the field path (FieldPath), the non-applicable pending list (NonApplicablePending),\
      \ the availability tagging (ConsolidatedViewAvailability + ConsolidatedViewUnavailability)\
      \ and the closed taxonomies (ConsolidatedViewUnavailabilityReason, NonApplicablePendingReason).\
      \ The previous StatisticImpact carrier disappeared in v3 (R009: scores are just\
      \ fields of the map)."
    models:
    - name: NodeImpact
      type: record
      fields:
      - name: consolidated
        type: CourseElementSnapshot
        _change: delete
      - name: pendingProjection
        type: CourseElementSnapshot
        _change: delete
      - name: pendingProposalId
        type: String
        _change: delete
      - name: fieldChanges
        type: "Map<String,FieldChange>"
        description: "F-CDIFF-R006/R019/R023. Mapa de hojas escalares con cambio.\
          \ Clave: path estable producido por FieldPath (R023). Valor: tripleta (original,\
          \ consolidated, pendingProjection) producida por NodeFieldDiffer recorriendo\
          \ los tres AuditNode (R007 invariantes 1-3). Vacio si el nodo no tiene fields\
          \ que difieran entre al menos dos fotos modulo R020 — en ese caso el nodo\
          \ no se incluye en ConsolidatedView.nodeImpacts (R006 invariante 3)."
        _change: add
      - name: pendingProposalIds
        type: List<String>
        description: F-CDIFF-R011 invariante 2. Lista de proposalId con veredicto
          PENDING_APPROVAL aplicable del plan activo que afectaron al nodo (al contenido
          propio o al subarbol que contribuye a sus fotos). Vacia o nula si no hay
          pendientes aplicables que toquen este nodo. Reemplaza al campo singular
          pendingProposalId de v2 porque ahora un mismo nodo puede acumular varias
          pendientes aplicables sobre fields distintos.
        _change: add
      visibility: public
      _change: modify
    - name: ConsolidatedView
      type: record
      fields:
      - name: statisticImpacts
        type: List<StatisticImpact>
        _change: delete
      visibility: public
      _change: modify
    - name: StatisticImpact
      type: record
      _change: delete
    - name: FieldChange
      type: record
      fields:
      - name: original
        type: Object
        description: "F-CDIFF-R007.1. Valor de la hoja en el baseline del AuditReport,\
          \ copiado sin transformacion. null si la hoja no existe en el baseline."
      - name: consolidated
        type: Object
        description: "F-CDIFF-R007.2. Valor de la hoja en el AuditReport del subarbol\
          \ con-aceptadas, copiado sin transformacion. null si la hoja no existe en\
          \ el consolidated."
      - name: pendingProjection
        type: Object
        description: "F-CDIFF-R007.3. Valor de la hoja en el AuditReport del subarbol\
          \ con aceptadas+pendientes aplicables, copiado sin transformacion. null\
          \ si la hoja no existe en pendingProjection."
      visibility: public
      _change: add
    - name: FieldPath
      type: record
      fields:
      - name: raw
        type: String
        description: Representacion textual canonica de la clave del field. Es el
          valor que aparece como llave en NodeImpact.fieldChanges.
      visibility: public
      _change: add
    - name: FieldExclusionRole
      type: enum
      fields:
      - name: OPAQUE_PERSISTENCE_ID
        description: "F-CDIFF-R020.1. Identificadores opacos generados por la persistencia\
          \ (_id, $oid, formas equivalentes)."
      - name: STRUCTURAL_REFERENCE
        description: "F-CDIFF-R020.2. Referencias estructurales que el dominio mantiene\
          \ para navegacion (parentId, courseId, milestoneId, topicId, knowledgeId,\
          \ quizId cuando aparecen como referencia dentro de otro nodo, no como identidad\
          \ propia)."
      - name: TIMESTAMP
        description: "F-CDIFF-R020.3. Timestamps de creacion / actualizacion de cualquier\
          \ nivel del modelo (Instant, LocalDateTime sobre campos createdAt/updatedAt\
          \ y similares)."
      - name: INTERNAL_ORDER
        description: "F-CDIFF-R020.4. Ordenes derivados de la posicion en disco /\
          \ serializacion (indices de array de JSON, claves de orden, contadores que\
          \ el almacenamiento gestiona)."
      - name: NON_SEMANTIC
        description: "F-CDIFF-R020.5. Categoria escape: cualquier valor cuya diferencia\
          \ entre versiones no represente un cambio semantico observable y que no\
          \ caiga en las cuatro anteriores."
      visibility: public
      _change: add
    interfaces:
    - name: NodeFieldDiffer
      stereotype: port
      sealed: false
      exposes:
      - signature: "diff(AuditNode original, AuditNode consolidated, AuditNode pendingProjection):\
          \ Map<String,FieldChange>"
      visibility: public
      _change: add
    _change: modify
  - name: engine
    implementations:
    - name: DefaultConsolidatedViewBuilder
      requiresInject:
      - name: nodeFieldDiffer
        type: NodeFieldDiffer
        description: "F-CDIFF-R019/R020/R022/R023: el motor de descubrimiento dinamico\
          \ que reemplaza la logica v2 de snapshots crudos + collectStatisticImpacts.\
          \ El builder le pasa los tres AuditNode (baseline / consolidated / pendingProjection)\
          \ por cada nodeTarget+nodeId tocado, y obtiene el mapa { fieldPath → FieldChange\
          \ } que copia tal cual a NodeImpact.fieldChanges. El builder NO interpreta\
          \ el contenido del mapa; es la frontera entre 'que campos cambiaron' (R019)\
          \ y 'que decisiones del plan los provocaron' (R011)."
        _change: add
      handwrittenTests:
      - name: "Dado un nodo hoja sin aceptadas ni pendientes en el plan activo, cuando\
          \ build corre, entonces ese nodo no aparece en nodeImpacts (la salida solo\
          \ emite nodos afectados)"
        _change: delete
      - name: "Dado un nodo hoja con una pendiente en el plan activo y sin aceptadas,\
          \ cuando build corre, entonces NodeImpact.consolidated coincide con el snapshot\
          \ del baseline y pendingProjection coincide con el snapshot resultante de\
          \ aplicar la pendiente sobre ese baseline"
        _change: delete
      - name: "Dado un nodo hoja con una propuesta aceptada y sin pendientes, cuando\
          \ build corre, entonces NodeImpact.consolidated coincide con el elementAfter\
          \ de la aceptada y pendingProjection es null"
        _change: delete
      - name: "Dado un nodo hoja con una aceptada y una pendiente sobre el mismo nodeId,\
          \ cuando build corre, entonces pendingProjection se calcula aplicando la\
          \ pendiente sobre consolidated (es decir sobre el elementAfter de la aceptada)\
          \ y no sobre el snapshot original del baseline"
        _change: delete
      - name: "Dado un nodo hoja con una pendiente aplicable, cuando build corre,\
          \ entonces NodeImpact.pendingProposalId equivale al proposalId de la pendiente\
          \ que produjo pendingProjection"
        _change: delete
      - name: "Dado un nodo padre cuyo subarbol contiene un quiz afectado por una\
          \ aceptada, cuando build corre, entonces aparece un NodeImpact para ese\
          \ padre y los valores consolidados de sus estadisticas resultan de re-agregar\
          \ el subarbol con la estrategia del analizador (no de sumar deltas individuales)"
        _change: delete
      - name: "Dado un nodo padre cuyo subarbol no contiene aceptadas ni pendientes,\
          \ cuando build corre, entonces ese padre no aparece en nodeImpacts ni en\
          \ statisticImpacts"
        _change: delete
      - name: "Dada una estadistica tocada solo por una aceptada en el plan activo,\
          \ cuando build corre, entonces el StatisticImpact correspondiente expone\
          \ original y consolidated distintos, acceptedDelta no nulo, y pendingProjection\
          \ y pendingDelta nulos"
        _change: delete
      - name: "Dada una estadistica tocada solo por una pendiente en el plan activo,\
          \ cuando build corre, entonces el StatisticImpact correspondiente expone\
          \ consolidated igual a original, acceptedDelta cero, y pendingProjection\
          \ con pendingDelta no nulos"
        _change: delete
      - name: "Dada una estadistica del baseline no tocada por ninguna decision del\
          \ plan activo, cuando build corre, entonces ese par (nivel, dimension) no\
          \ aparece en statisticImpacts"
        _change: delete
      - name: "Dado cualquier StatisticImpact emitido por build, entonces acceptedDelta\
          \ es exactamente consolidated menos original, sin escalado relativo"
        _change: delete
      - name: "Dado un StatisticImpact con pendingProjection no nulo, entonces pendingDelta\
          \ es exactamente pendingProjection menos consolidated, sin escalado relativo"
        _change: delete
      - name: "Dado un AuditReport con pares (nivel, dimension) reportados por el\
          \ motor en el baseline, cuando build corre, entonces statisticImpacts solo\
          \ contiene pares presentes en el baseline (la salida no inventa pares ausentes\
          \ ni reordena la granularidad)"
        _change: delete
      - name: "Dada una pendiente cuyo nodeId no se encuentra en el subarbol vigente,\
          \ cuando build corre, entonces aparece en nonApplicablePendings con reason\
          \ NODE_ABSENT y detail no vacio, y no contribuye a pendingProjection ni\
          \ pendingDelta de ningun nodo o estadistica"
        _change: delete
      - name: "Dadas dos pendientes sobre el mismo nodeId aplicadas en orden createdAt\
          \ ascendente cuyo elementBefore de la segunda no coincide con el consolidated\
          \ tras aplicar la primera, cuando build corre, entonces la segunda aparece\
          \ en nonApplicablePendings con reason ELEMENT_BEFORE_MISMATCH y no contribuye\
          \ a pendingProjection ni pendingDelta"
        _change: delete
      - name: "Dada una pendiente marcada como NOT_APPLICABLE y otras pendientes aplicables\
          \ en el mismo plan activo, cuando build corre, entonces el resto del consolidado\
          \ se entrega normalmente y solo la pendiente no aplicable queda excluida\
          \ del calculo de proyeccion"
        _change: delete
      - name: "Dada una RevisionProposal cuyo elementBefore y elementAfter referencian\
          \ el mismo nodeId estable, cuando build corre, entonces el NodeImpact resultante\
          \ conserva ese nodeId en consolidated y pendingProjection sin modelar renombres\
          \ ni reubicaciones"
        _change: delete
      - name: "Dado un plan activo con varias aceptadas y varias pendientes que tocan\
          \ distintos nodos del curso, cuando build corre, entonces el ConsolidatedView\
          \ retornado combina baseline + aceptadas + pendientes en una unica estructura\
          \ con nodeImpacts y statisticImpacts agregados"
        _change: delete
      - name: "Dado un AuditReport recien creado cuyo plan activo no tiene propuestas\
          \ aceptadas ni pendientes, cuando build corre, entonces nodeImpacts y statisticImpacts\
          \ quedan vacios y los valores consolidados coinciden con el baseline del\
          \ analisis"
        _change: delete
      - name: "Dado un plan activo de un analisis viejo con propuestas pendientes\
          \ y un analisis mas nuevo cuyo plan no las contiene, cuando build corre\
          \ apuntando al analisis viejo, entonces sus pendientes dormidas aparecen\
          \ en nodeImpacts/statisticImpacts del consolidado"
        _change: delete
      - name: "Dado un RevisionArtifact con verdict REJECTED en el plan activo, cuando\
          \ build corre, entonces ese proposalId no aparece en nodeImpacts, statisticImpacts\
          \ ni nonApplicablePendings y no contribuye a consolidated, acceptedDelta,\
          \ pendingProjection ni pendingDelta"
        _change: delete
      - name: "Dado un nodo hoja con dos propuestas aceptadas que lo afectaron en\
          \ orden createdAt ascendente, cuando build corre, entonces NodeImpact.acceptedProposalIds\
          \ contiene ambos proposalId en orden createdAt ascendente"
        _change: delete
      - name: "Dado que el ActiveAnalysisSelectionStore retorna Optional.empty, cuando\
          \ build corre, entonces ConsolidatedView.availability es UNAVAILABLE con\
          \ reason NO_ACTIVE_ANALYSIS y nodeImpacts/statisticImpacts quedan vacios"
        _change: delete
      - name: "Dado un plan activo asociado a un AuditReport y un plan ajeno con propuestas\
          \ distintas asociadas a otro analisis, cuando build corre, entonces solo\
          \ se consultan los RevisionArtifact via listByPlan(activePlanId) y las propuestas\
          \ del plan ajeno no aparecen en nodeImpacts ni statisticImpacts"
        _change: delete
      - name: "Dado un AuditReport cuyo plan activo no tiene propuestas aceptadas\
          \ ni pendientes, cuando build corre, entonces nodeImpacts queda vacio (no\
          \ hay nodos afectados que reportar) — R003"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R003
      - name: "Dado un plan activo de un analisis viejo con propuestas pendientes\
          \ y un analisis mas nuevo cuyo plan no las contiene, cuando build corre\
          \ apuntando al analisis viejo, entonces sus pendientes dormidas aparecen\
          \ como pendingProposalIds y como contribuciones a la foto pendingProjection\
          \ de los fields tocados en nodeImpacts — R004"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R004
      - name: "Dado un RevisionArtifact con verdict REJECTED en el plan activo, cuando\
          \ build corre, entonces ese proposalId no aparece en nodeImpacts (ni en\
          \ acceptedProposalIds ni en pendingProposalIds de ningun nodo) ni en nonApplicablePendings,\
          \ y no contribuye a las fotos original/consolidated/pendingProjection de\
          \ ningun field — R005"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R005
      - name: "Dado que el ActiveAnalysisSelectionStore retorna Optional.empty, cuando\
          \ build corre, entonces ConsolidatedView.availability es UNAVAILABLE con\
          \ reason NO_ACTIVE_ANALYSIS y nodeImpacts queda vacio — R013"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R013
      - name: "Dado un plan activo asociado a un AuditReport y un plan ajeno con propuestas\
          \ distintas asociadas a otro analisis, cuando build corre, entonces solo\
          \ se consultan los RevisionArtifact via listByPlan(activePlanId) y las propuestas\
          \ del plan ajeno no aparecen en nodeImpacts (ni como acceptedProposalIds,\
          \ pendingProposalIds, ni como contribuciones a las fotos de fields) — R017"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R017
      - name: "Dado un nodo hoja con un field cuyas tres fotos son identicas y otro\
          \ field cuya foto consolidated difiere de original, cuando build corre,\
          \ entonces el mapa fieldChanges del NodeImpact contiene SOLO la entrada\
          \ del segundo field — R006 invariante 1: solo fields con cambio"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R006
      - name: "Dado un NodeImpact con varios fields cambiados de origenes distintos\
          \ (componente de diagnostico tipado, contenido del nodo, score escalar),\
          \ cuando build corre, entonces todas las entradas del mapa fieldChanges\
          \ siguen la misma forma clave-valor con FieldChange(original, consolidated,\
          \ pendingProjection) sin ramas separadas por origen del field — R006 invariante\
          \ 2: forma uniforme"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R006
      - name: "Dado un nodo cuyo subarbol no produce ningun field cambiado entre las\
          \ tres fotos, cuando build corre, entonces ese nodo NO aparece en ConsolidatedView.nodeImpacts\
          \ — R006 invariante 3: nodo sin cambios no aparece"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R006
      - name: "Dado un field cambiado de un nodo hoja, cuando build corre, entonces\
          \ FieldChange.original es identico al valor que el AuditReport baseline\
          \ expone para ese field y ese nodo (sin recomputar, sin redondear, sin derivar)\
          \ — R007 invariante 1: fidelidad de original"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      - name: "Dado un escenario donde el AuditEngine es invocado dos veces (una sobre\
          \ el arbol con-aceptadas y otra sobre el arbol con-aceptadas-y-pendientes),\
          \ cuando build corre, entonces FieldChange.consolidated coincide identicamente\
          \ con el valor que el AuditReport del primer runAudit dejo en el AuditNode\
          \ correspondiente, sin que el builder lo recompute o transforme — R007 invariante\
          \ 2: determinacion de consolidated"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      - name: "Dado un escenario donde el AuditEngine es invocado dos veces (una sobre\
          \ el arbol con-aceptadas y otra sobre el arbol con-aceptadas-y-pendientes),\
          \ cuando build corre, entonces FieldChange.pendingProjection coincide identicamente\
          \ con el valor que el AuditReport del segundo runAudit dejo en el AuditNode\
          \ correspondiente, sin que el builder lo recompute o derive desde consolidated\
          \ — R007 invariante 3: determinacion de pendingProjection"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      - name: "Dado un nodo hoja con una aceptada (que cambia el field) y una pendiente\
          \ sobre el mismo nodeId (que lo cambia de nuevo), cuando build corre, entonces\
          \ el AuditEngine es invocado para pendingProjection sobre el arbol que YA\
          \ tiene la aceptada aplicada (no sobre el original) — R007 invariante 4:\
          \ orden de stacking, pendientes sobre consolidated, no sobre original"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      - name: "Dado un nodo padre cuyo subarbol contiene cambios y para el cual el\
          \ AuditEngine produjo un valor agregado en el AuditReport del arbol con-aceptadas,\
          \ cuando build corre, entonces FieldChange.consolidated del field del padre\
          \ es identico a ese valor leido del AuditReport y NO el resultado de re-agregar\
          \ deltas de hijos en el builder — R007 invariante 5: las tres fotos provienen\
          \ del motor"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      - name: "Dado un escenario donde varias dimensiones de score cambian por aceptadas\
          \ o pendientes, cuando build corre, entonces ConsolidatedView devuelto NO\
          \ expone ningun campo statisticImpacts ni ninguna lista paralela de estadisticas\
          \ afectadas; los scores cambiados solo aparecen como entradas del mapa fieldChanges\
          \ del nodo correspondiente — R009"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R009
      - name: "Dado cualquier ConsolidatedView producido por build, entonces ningun\
          \ NodeImpact expone campos acceptedDelta o pendingDelta precomputados; el\
          \ contrato emitido contiene exclusivamente las tripletas (original, consolidated,\
          \ pendingProjection) por field — R010"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R010
      - name: "Dada una propuesta APPROVED del plan activo que cambia el contenido\
          \ de un nodo y otra APPROVED del plan activo que NO afecta a ese nodo, cuando\
          \ build corre, entonces NodeImpact.acceptedProposalIds del nodo afectado\
          \ contiene SOLO el proposalId de la primera (R011 invariante 1: cobertura\
          \ accepted, recíproca incluida)"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R011
      - name: "Dada una propuesta PENDING_APPROVAL aplicable del plan activo que cambia\
          \ un nodo y otra PENDING_APPROVAL aplicable que NO afecta a ese nodo, cuando\
          \ build corre, entonces NodeImpact.pendingProposalIds del nodo afectado\
          \ contiene SOLO el proposalId de la primera (R011 invariante 2: cobertura\
          \ pending, recíproca incluida)"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R011
      - name: "Dado un nodo hoja con dos propuestas aceptadas que lo afectaron en\
          \ orden createdAt ascendente, cuando build corre, entonces NodeImpact.acceptedProposalIds\
          \ contiene ambos proposalId en orden createdAt ascendente — R011 invariante\
          \ 3: orden estable"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R011
      - name: "Dado un nodo afectado con varias aceptadas y varias pendientes que\
          \ tocan distintos fields, cuando build corre, entonces NodeImpact expone\
          \ acceptedProposalIds y pendingProposalIds a nivel del NODO (no asocia un\
          \ proposalId a un field especifico dentro de fieldChanges) — R011 invariante\
          \ 4: trazabilidad por nodo, no por field"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R011
      - name: "Dado un plan activo con multiples propuestas (varias APPROVED y varias\
          \ PENDING_APPROVAL) que tocan distintos nodos, cuando build corre una sola\
          \ vez, entonces ConsolidatedView retornado expone los efectos de TODAS esas\
          \ propuestas en una unica salida (acceptadas en las fotos consolidated y\
          \ pendientes aplicables en las fotos pendingProjection) sin requerir invocaciones\
          \ adicionales del builder — R016 invariante 1: combinacion en un documento"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R016
      _change: modify
    _change: modify
  - name: fielddiff
    description: "F-CDIFF v3. Motor interno del descubrimiento dinamico de fields\
      \ cambiados que NodeFieldDiffer expone en su contrato publico. Aloja la implementacion\
      \ recursiva (RecursiveNodeFieldDiffer), los dos registros centrales que materializan\
      \ R020 y R022 sin contaminar los records de audit-domain / course-domain (FieldExclusionRegistry,\
      \ ListIdentityRegistry) y los carriers internos del recorrido (FieldExclusionRule,\
      \ ListIdentityRule, ListIdentityKeySpec). Solo la factory publica del motor\
      \ cruza la frontera; el resto es package-private. Empaquetado aparte de consolidatedview\
      \ porque la mecanica de diff es reutilizable: un futuro consumidor (p.ej. un\
      \ validador estructural de cursos, otro analizador) puede pedir el mismo NodeFieldDiffer\
      \ sin arrastrar la maquinaria del consolidado entero. El nombre fielddiff describe\
      \ el concepto (diferenciacion a nivel de field) y no un patron GoF."
    visibility: internal
    models:
    - name: FieldExclusionRule
      type: record
      fields:
      - name: declaringTypeName
        type: String
        description: "Nombre simple del tipo Java que declara el campo (p.ej. 'AuditableQuiz',\
          \ 'AuditNode', 'MisplacedLemma'). El motor matchea por nombre simple para\
          \ no acoplar el registry al package layout."
      - name: fieldName
        type: String
        description: "Nombre del campo a excluir (p.ej. 'id', 'parentId', 'createdAt')."
      - name: role
        type: FieldExclusionRole
        description: Rol funcional asignado. Sirve a tooling de auditoria del registry
          para revisar la coherencia de las exclusiones; el motor solo pregunta 'esta
          excluido?'.
      visibility: internal
      _change: add
    - name: ListIdentityKeySpec
      type: record
      fields:
      - name: fieldNames
        type: List<String>
        description: "Nombres de los campos que conforman la identidad natural del\
          \ elemento. Si la lista es vacia, el match no aplica y el motor cae en diff\
          \ posicional (R022 caso 2)."
      visibility: internal
      _change: add
    - name: ListIdentityRule
      type: record
      fields:
      - name: declaringTypeName
        type: String
        description: "Nombre simple del tipo Java que declara el campo lista (p.ej.\
          \ 'LemmaAbsenceLevelDiagnosis', 'CocaBucketsLevelDiagnosis')."
      - name: fieldName
        type: String
        description: "Nombre del campo lista (p.ej. 'absentLemmas', 'buckets', 'progressionAssessments')."
      - name: keySpec
        type: ListIdentityKeySpec
        description: Definicion de la clave natural a usar para diff por elemento.
      visibility: internal
      _change: add
    interfaces:
    - name: FieldExclusionRegistry
      stereotype: port
      sealed: false
      exposes:
      - signature: "isExcluded(String declaringTypeName, String fieldName): boolean"
      - signature: "getRole(String declaringTypeName, String fieldName): Optional<FieldExclusionRole>"
      visibility: internal
      _change: add
    - name: ListIdentityRegistry
      stereotype: port
      sealed: false
      exposes:
      - signature: "getKeySpec(String declaringTypeName, String fieldName): Optional<ListIdentityKeySpec>"
      visibility: internal
      _change: add
    - name: NodeFieldDifferFactory
      stereotype: factory
      sealed: false
      exposes:
      - signature: "create(): NodeFieldDiffer"
      visibility: public
      _change: add
    implementations:
    - name: RecursiveNodeFieldDiffer
      requiresInject:
      - name: exclusionRegistry
        type: FieldExclusionRegistry
        description: Consultado para cada hoja antes de emitirla. R020.
      - name: identityRegistry
        type: ListIdentityRegistry
        description: Consultado al alcanzar cada lista para decidir entre diff por
          elemento o posicional. R022.
      visibility: internal
      handwrittenTests:
      - name: "Dados tres AuditNode donde una hoja escalar accesible por el recorrido\
          \ recursivo tiene valores distintos entre la foto original y la foto consolidated,\
          \ cuando diff corre, entonces el mapa retornado contiene una entrada cuya\
          \ clave codifica el path a esa hoja y cuyo FieldChange lleva los tres valores\
          \ — R019 invariante 1: cobertura por construccion, sin enumeracion previa"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R019
      - name: "Dados tres AuditNode donde una de las hojas escalares pertenece a un\
          \ tipo de diagnostico no enumerado en seed alguna del exclusionRegistry,\
          \ cuando diff corre y los valores de esa hoja difieren entre fotos, entonces\
          \ la hoja aparece como field del mapa SIN requerir registro previo en ningun\
          \ catalogo — R019 invariante 2: aparicion automatica de cosas nuevas"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R019
      - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
          \ cuyo nombre el exclusionRegistry clasifica como OPAQUE_PERSISTENCE_ID,\
          \ cuando diff corre, entonces el mapa retornado esta vacio: la hoja no se\
          \ emite aunque difiera — R020 categoria 1"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
          \ cuyo nombre el exclusionRegistry clasifica como STRUCTURAL_REFERENCE,\
          \ cuando diff corre, entonces el mapa retornado esta vacio: la referencia\
          \ estructural no se emite aunque difiera — R020 categoria 2"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
          \ cuyo nombre el exclusionRegistry clasifica como TIMESTAMP, cuando diff\
          \ corre, entonces el mapa retornado esta vacio: el timestamp no se emite\
          \ aunque difiera — R020 categoria 3"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
          \ cuyo nombre el exclusionRegistry clasifica como INTERNAL_ORDER, cuando\
          \ diff corre, entonces el mapa retornado esta vacio: el orden interno no\
          \ se emite aunque difiera — R020 categoria 4"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
          \ cuyo nombre el exclusionRegistry clasifica como NON_SEMANTIC, cuando diff\
          \ corre, entonces el mapa retornado esta vacio: el campo no semantico no\
          \ se emite aunque difiera — R020 categoria 5"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dados tres AuditNode con una lista cuyo tipo de elemento tiene identidad\
          \ declarada en identityRegistry (p.ej. List<AbsentLemma> con clave (lemma,pos)),\
          \ donde un elemento existe en la foto original con propiedades no-clave\
          \ distintas a las de la foto consolidated, cuando diff corre, entonces el\
          \ mapa retornado contiene fields derivados con clave estable basada en la\
          \ identidad del elemento (no en su indice posicional) — R022 invariante\
          \ 1: lista con identidad"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dados tres AuditNode con una lista cuyo tipo de elemento NO tiene identidad\
          \ declarada en identityRegistry y donde el elemento en el indice i de la\
          \ foto original tiene una hoja escalar distinta al elemento en el indice\
          \ i de la foto consolidated, cuando diff corre, entonces el mapa retornado\
          \ contiene fields con clave de path posicional ([i]) — R022 invariante 2:\
          \ diff posicional sin identidad"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dados tres AuditNode donde la misma hoja escalar profunda es alcanzable\
          \ por la misma secuencia de campos anidados en las tres fotos con valores\
          \ distintos, cuando diff corre, entonces el mapa retornado contiene UNA\
          \ SOLA entrada cuya clave codifica esa secuencia y cuyo FieldChange agrupa\
          \ los tres valores (no tres entradas separadas, una por foto) — R023 invariante\
          \ 1: estabilidad entre fotos"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R023
      - name: "Dadas dos invocaciones independientes de diff sobre dos pares de AuditNode\
          \ del mismo tipo donde la misma hoja anidada cambia bajo el mismo path,\
          \ cuando diff corre en cada par, entonces ambos mapas retornados contienen\
          \ la MISMA clave para identificar el field correspondiente (sin variantes\
          \ del path por nodo) — R023 invariante 2: estabilidad entre nodos del mismo\
          \ tipo"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R023
      implements:
      - NodeFieldDiffer
      _change: add
    - name: DefaultFieldExclusionRegistry
      visibility: internal
      handwrittenTests:
      - name: "Dada una invocacion de isExcluded sobre un campo seed del registry\
          \ cuyo rol funcional es OPAQUE_PERSISTENCE_ID, entonces retorna true y getRole\
          \ retorna OPAQUE_PERSISTENCE_ID — R020 categoria 1: seed de identificadores\
          \ opacos de persistencia"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dada una invocacion de isExcluded sobre un campo seed del registry\
          \ cuyo rol funcional es STRUCTURAL_REFERENCE (parentId, courseId, milestoneId,\
          \ topicId, knowledgeId o quizId como referencia dentro de otro nodo), entonces\
          \ retorna true y getRole retorna STRUCTURAL_REFERENCE — R020 categoria 2:\
          \ seed de referencias estructurales"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dada una invocacion de isExcluded sobre un campo seed del registry\
          \ cuyo rol funcional es TIMESTAMP (createdAt, updatedAt sobre cualquier\
          \ nivel del modelo), entonces retorna true y getRole retorna TIMESTAMP —\
          \ R020 categoria 3: seed de timestamps"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dada una invocacion de isExcluded sobre un campo seed del registry\
          \ cuyo rol funcional es INTERNAL_ORDER (indice de orden de insercion gestionado\
          \ por el almacenamiento), entonces retorna true y getRole retorna INTERNAL_ORDER\
          \ — R020 categoria 4: seed de ordenes internos"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dada una invocacion de isExcluded sobre un campo seed del registry\
          \ cuyo rol funcional cae en la categoria escape NON_SEMANTIC, entonces retorna\
          \ true y getRole retorna NON_SEMANTIC — R020 categoria 5: seed de la categoria\
          \ escape"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      implements:
      - FieldExclusionRegistry
      _change: add
    - name: DefaultListIdentityRegistry
      visibility: internal
      handwrittenTests:
      - name: "Dada una invocacion de getKeySpec sobre el campo lista de tipo List<AbsentLemma>\
          \ dentro de LemmaAbsenceLevelDiagnosis (declaringTypeName='LemmaAbsenceLevelDiagnosis',\
          \ fieldName='absentLemmas'), entonces retorna un Optional poblado con un\
          \ ListIdentityKeySpec cuyos fieldNames son ['lemma','pos'] — R022 seed AbsentLemma"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dada una invocacion de getKeySpec sobre el campo lista de tipo List<MisplacedLemma>\
