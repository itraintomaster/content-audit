        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R002
      - name: Given a course where the same lemma appears in multiple topics within A1, when onCourseComplete is called, then
          the lemma is counted as present only once for A1
        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R002
      - name: Given the four absence types, when their values are enumerated, then they are COMPLETELY_ABSENT and APPEARS_TOO_LATE
