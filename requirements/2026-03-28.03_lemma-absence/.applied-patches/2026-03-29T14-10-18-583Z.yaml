        target: LemmaByLevelAbsenceAnalyzer
        type: unit
        traceability:
          feature: FEAT-LABS
          rule: F-LABS-R001
      - name: Given a course with quizzes across A1 and A2, when onCourseComplete is called, then present lemmas are collected
