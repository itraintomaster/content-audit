    rationale: null
  - id: "F-COCA-R022"
    name: "Progresion evalua solo niveles con datos"
    severity: "major"
    description: "La evaluacion de progresion solo considera los niveles CEFR que\
      \ tienen tokens clasificados. Si un nivel no tiene datos (por ejemplo, no hay\
      \ quizzes con tokens en B1), se omite de la evaluacion de progresion. La progresion\
      \ se evalua entre los niveles restantes en su orden natural (A1, A2, B2). Si\
      \ menos de 2 niveles tienen datos, la progresion no puede evaluarse y se reporta\
      \ como ESTATICA."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-R023"
    name: "Margen de cambio significativo en progresion"
    severity: "minor"
    description: "Al evaluar si el porcentaje de una banda sube o baja entre dos niveles\
      \ consecutivos, se utiliza un margen para evitar que fluctuaciones insignificantes\
      \ se interpreten como cambios reales. Solo los cambios que superan este margen\
      \ se contabilizan como incrementos o decrementos. [ASSUMPTION] Se asume que\
      \ existe un margen de cambio significativo, aunque la documentacion de analisis\
      \ no especifica su valor exacto. Este margen evita que diferencias de decimas\
      \ de punto porcentual afecten la evaluacion de progresion. El valor exacto del\
      \ margen requiere confirmacion."
    errorMessage: null
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-COCA-R024"
    name: "Resultado de la evaluacion de progresion"
    severity: "major"
    description: "El resultado de la evaluacion de progresion incluye, para cada banda\
      \ con progresion configurada: - Nombre de la banda - Progresion esperada (ASCENDENTE\
      \ o DESCENDENTE, segun configuracion) - Progresion real (ASCENDENTE, DESCENDENTE,\
      \ ESTATICA o IRREGULAR, segun evaluacion) - Indicador de si la progresion real\
      \ coincide con la esperada Este resultado permite al creador de contenido identificar\
      \ si la distribucion de vocabulario evoluciona correctamente a lo largo del\
      \ curso. Por ejemplo, si top1k deberia ser DESCENDENTE pero la progresion real\
      \ es IRREGULAR, indica que hay niveles donde se introdujo demasiado vocabulario\
      \ frecuente cuando deberia haberse reducido."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-R025"
    name: "Resultados jerarquicos por nivel"
    severity: "critical"
    description: "El resultado del analisis de distribucion COCA se estructura de\
      \ manera jerarquica: para cada nivel CEFR, se presenta la distribucion de bandas,\
      \ las puntuaciones, y los nodos hijos (topics). Cada topic a su vez contiene\
      \ la distribucion de bandas de sus tokens y sus nodos hijos (knowledges). Esta\
      \ jerarquia permite al usuario navegar desde el nivel general hacia los detalles\
      \ mas finos. La estructura jerarquica es: **Nivel -> (Trimestres, si aplica)\
      \ -> Topic -> Knowledge -> (Bandas de frecuencia)**."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-R026"
    name: "Puntuacion por topic (agregacion de la plataforma)"
    severity: "critical"
    description: "La puntuacion de distribucion COCA de un topic se calcula a partir\
      \ de las puntuaciones de sus knowledges. La plataforma agrega las puntuaciones\
      \ a traves de la jerarquia utilizando el mecanismo generico de agregacion. Los\
      \ topics sin knowledges con datos no participan en la agregacion del nivel padre."
    errorMessage: "Error al calcular la puntuacion del topic {topicId}: {detalle}"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-R027"
    name: "Distribucion de bandas por nodo de la jerarquia"
    severity: "major"
    description: "Cada nodo de la jerarquia (nivel, topic, knowledge) tiene asociada\
      \ su propia distribucion de bandas de frecuencia, calculada a partir de los\
      \ tokens de todos los quizzes que pertenecen a ese nodo. Esto permite al usuario\
      \ ver no solo la puntuacion agregada sino tambien la distribucion real de vocabulario\
      \ en cada segmento del curso. Por ejemplo, un topic especifico podria tener\
      \ 70% de tokens en top1k y 15% en top4k, mientras que otro topic del mismo nivel\
      \ podria tener 85% en top1k y 2% en top4k. Esta informacion es valiosa para\
      \ localizar donde se concentran los problemas de distribucion."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-R028"
    name: "Informacion por banda en cada nodo"
    severity: "major"
    description: "Para cada banda de frecuencia en cada nodo de la jerarquia, el resultado\
      \ incluye: - Nombre de la banda - Cantidad de tokens en la banda - Porcentaje\
      \ respecto al total de tokens clasificados del nodo - Porcentaje objetivo (si\
      \ aplica al nivel del nodo) - Puntuacion de la banda (si aplica) - Estado de\
      \ evaluacion (OPTIMO, ADECUADO, DEFICIENTE, EXCESIVO, si aplica) Los campos\
      \ de objetivo, puntuacion y estado solo aplican a los nodos que tienen objetivos\
      \ definidos (generalmente niveles y trimestres). Los topics y knowledges tienen\
      \ la distribucion y el conteo pero no necesariamente una evaluacion contra objetivos\
      \ propios."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-R029"
    name: "Puntuaciones disponibles en cada nivel de la jerarquia"
    severity: "major"
    description: "El resultado del analisis debe hacer disponible la puntuacion de\
      \ distribucion COCA en cada nivel de la jerarquia del curso. La plataforma construye\
      \ un arbol de resultados donde cada nodo tiene asociada la puntuacion de cada\
      \ analizador ejecutado. Esto permite al creador de contenido navegar la jerarquia\
      \ y localizar exactamente donde se concentran los problemas de distribucion\
      \ de vocabulario."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-R030"
    name: "Generacion de directivas de mejora"
    severity: "major"
    description: "Para cada nivel (o trimestre, segun la estrategia) donde la distribucion\
      \ no alcanza los objetivos, el sistema genera directivas de mejora que indican\
      \ al creador de contenido que acciones tomar. Las directivas se dividen en dos\
      \ categorias: - **bucketsToEnrich**: Bandas donde faltan tokens. Indica que\
      \ el nivel/trimestre necesita **mas** palabras de esa frecuencia. - **bucketsToReduce**:\
      \ Bandas donde sobran tokens. Indica que el nivel/trimestre necesita **menos**\
      \ palabras de esa frecuencia. Cada directiva incluye la banda afectada y el\
      \ rango de frecuencia correspondiente para facilitar la busqueda de palabras\
      \ de reemplazo."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-R031"
    name: "Rango de frecuencia en directivas"
    severity: "major"
    description: "Cada directiva de mejora incluye el rango de frecuencia (from/to)\
      \ de la banda afectada, para que el creador de contenido sepa en que franja\
      \ de frecuencia buscar palabras: - Si la directiva dice \"enriquecer top2k\"\
      , incluye el rango 1001-2000 para que el creador sepa que debe buscar palabras\
      \ con ranking entre 1001 y 2000. - Si la directiva dice \"reducir top4k\", incluye\
      \ el rango 3001+ (o 3001-4000) para que el creador sepa que palabras de esa\
      \ franja estan sobrando. Para la banda abierta (top4k), el rango superior se\
      \ indica como abierto o se utiliza el valor limite de la banda como referencia."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-R032"
    name: "Directivas se generan solo para bandas fuera de rango"
    severity: "major"
    description: "Las directivas de mejora se generan unicamente para las bandas que\
      \ tienen estado DEFICIENTE o EXCESIVO. Las bandas con estado OPTIMO o ADECUADO\
      \ no generan directivas. Esto evita sobrecargar al creador de contenido con\
      \ sugerencias innecesarias cuando la distribucion ya es aceptable. - Una banda\
      \ DEFICIENTE genera una directiva de tipo **bucketsToEnrich** (necesita mas\
      \ palabras). - Una banda EXCESIVA genera una directiva de tipo **bucketsToReduce**\
      \ (necesita menos palabras)."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-R033"
    name: "Directivas a nivel de trimestre (estrategia quarters)"
    severity: "minor"
    description: "Cuando se usa la estrategia quarters, las directivas de mejora se\
      \ generan por trimestre, no solo por nivel. Esto permite al creador de contenido\
      \ saber no solo que un nivel tiene problemas, sino en que segmento especifico\
      \ del nivel debe actuar. [ASSUMPTION] Se asume que las directivas se generan\
      \ tanto a nivel de nivel como de trimestre cuando se usa la estrategia quarters.\
      \ Esto es consistente con la granularidad del analisis por trimestres. Si las\
      \ directivas solo se generan a nivel de nivel, la informacion por trimestre\
      \ se pierde y el creador de contenido tendria menos precision para localizar\
      \ los problemas."
    errorMessage: null
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-COCA-R034"
    name: "Contenido de las directivas de mejora"
    severity: "minor"
    description: "Cada directiva de mejora contiene la siguiente informacion: - Tipo\
      \ de accion (enriquecer o reducir) - Banda de frecuencia afectada (nombre y\
      \ rango) - Porcentaje real de la banda - Porcentaje objetivo de la banda - Diferencia\
      \ entre real y objetivo [ASSUMPTION] Se asume que las directivas contienen suficiente\
      \ informacion para que el creador de contenido pueda actuar sin necesidad de\
      \ consultar otros datos del analisis. El contenido exacto y formato de las directivas\
      \ puede refinarse segun las necesidades del equipo de contenido."
