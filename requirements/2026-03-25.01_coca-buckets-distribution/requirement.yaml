    code: null
    rationale: null
  journeys:
  - id: "F-COCA-J001"
    name: "Auditar la distribucion de vocabulario de un curso completo"
    steps:
    - "El usuario inicia una auditoria de un curso previamente cargado en el sistema\
      \ ContentAudit"
    - "El sistema recorre la jerarquia del curso: para cada nivel (milestone), sus\
      \ topics, sus knowledges, y los quizzes de cada knowledge"
    - "Para cada quiz, el analizador obtiene los tokens con su `frequencyRank` (proveniente\
      \ del procesamiento linguistico previo)"
    - "El analizador clasifica cada token en su banda de frecuencia correspondiente\
      \ (top1k, top2k, top3k, top4k) segun R001"
    - "Para cada nivel (o trimestre si se usa la estrategia quarters), el analizador\
      \ calcula la distribucion porcentual de tokens por banda (R005)"
    - "El analizador compara la distribucion real contra los objetivos configurados\
      \ para cada banda y genera puntuaciones (R007, R010)"
    - "Si se usa la estrategia quarters, los objetivos de los trimestres intermedios\
      \ se calculan por interpolacion lineal (R015)"
    - "La plataforma agrega las puntuaciones a traves de la jerarquia del curso, construyendo\
      \ el arbol de resultados con distribucion de bandas en cada nodo (R025-R029)"
    - "El sistema evalua la progresion por banda de frecuencia entre niveles (R021)"
    - "El sistema genera directivas de mejora para los niveles/trimestres que no alcanzan\
      \ sus objetivos (R030)"
    - "El usuario recibe un informe con la puntuacion general, la puntuacion y distribucion\
      \ por nivel, el estado de progresion por banda, y las directivas de mejora"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-J002"
    name: "Consultar la distribucion de vocabulario de un nivel especifico"
    steps:
    - "El usuario ha ejecutado la auditoria de distribucion COCA (J001)"
    - "El usuario selecciona un nivel CEFR especifico (por ejemplo, A2)"
    - "El sistema muestra para el nivel seleccionado:"
    - "El sistema muestra la lista de topics del nivel con su distribucion de bandas,\
      \ permitiendo identificar que topics tienen distribucion problematica"
    - "El usuario puede profundizar en topics y knowledges para localizar donde se\
      \ concentran las palabras de frecuencia inadecuada"
    - "Si hay directivas de mejora para este nivel, el sistema las muestra indicando\
      \ que bandas necesitan mas o menos palabras"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-J003"
    name: "Evaluar la progresion de vocabulario entre niveles"
    steps:
    - "El usuario ha ejecutado la auditoria de distribucion COCA (J001)"
    - "El usuario consulta el estado de progresion por banda de frecuencia"
    - "Para la banda top1k, el usuario verifica si la progresion es DESCENDENTE (lo\
      \ esperado): que el porcentaje de palabras de alta frecuencia disminuya al avanzar\
      \ de A1 a B2"
    - "Para la banda top4k, el usuario verifica si la progresion es ASCENDENTE (lo\
      \ esperado): que el porcentaje de palabras de baja frecuencia aumente al avanzar\
      \ de A1 a B2"
    - "Si la progresion de alguna banda es IRREGULAR o ESTATICA, el usuario identifica\
      \ en que transicion entre niveles se rompe el patron esperado"
    - "El usuario revisa los porcentajes reales por nivel para localizar donde el\
      \ vocabulario no evoluciona como se espera pedagogicamente"
    - "El usuario puede tomar acciones correctivas sobre el contenido de los niveles\
      \ afectados, guiado por las directivas de mejora (J004)"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-J004"
    name: "Usar las directivas de mejora para corregir el contenido"
    steps:
    - "El usuario ha ejecutado la auditoria y encontrado que un nivel/trimestre tiene\
      \ bandas con estado DEFICIENTE o EXCESIVO"
    - "El usuario consulta las directivas de mejora generadas para ese nivel/trimestre"
    - "Para cada directiva de tipo \"enriquecer\" (bucketsToEnrich), el usuario identifica\
      \ que debe agregar mas palabras de la franja de frecuencia indicada. Por ejemplo:\
      \ \"Enriquecer top2k: agregar palabras con ranking 1001-2000\""
    - "Para cada directiva de tipo \"reducir\" (bucketsToReduce), el usuario identifica\
      \ que debe reemplazar palabras de la franja de frecuencia indicada por palabras\
      \ de otras franjas. Por ejemplo: \"Reducir top4k: reemplazar palabras con ranking\
      \ 3001+ por palabras mas frecuentes\""
    - "El usuario localiza los quizzes afectados navegando la jerarquia (nivel ->\
      \ topic -> knowledge -> quiz)"
    - "El usuario modifica el contenido de los quizzes segun las directivas"
    - "El usuario re-ejecuta la auditoria para verificar que los cambios mejoraron\
      \ la distribucion"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-J005"
    name: "Navegar la jerarquia para localizar problemas de vocabulario"
    steps:
    - "El usuario ha ejecutado la auditoria de distribucion COCA (J001)"
    - "El usuario observa que el nivel B1 tiene una puntuacion baja (por ejemplo,\
      \ 0.6)"
    - "El usuario profundiza en los trimestres de B1 (si se usa la estrategia quarters)\
      \ y encuentra que Q3 tiene la puntuacion mas baja (0.4)"
    - "El usuario profundiza en los topics del Q3 de B1 y encuentra que el topic \"\
      Travel Vocabulary\" tiene 40% de tokens en top4k (cuando el objetivo es 21.67%\
      \ atMost)"
    - "El usuario profundiza en los knowledges de \"Travel Vocabulary\" y encuentra\
      \ que el knowledge \"Airport Procedures\" tiene una concentracion inusual de\
      \ vocabulario tecnico de baja frecuencia"
    - "El usuario identifica que varias oraciones de \"Airport Procedures\" usan vocabulario\
      \ especializado (boarding, customs, luggage carousel) que infla la banda top4k"
    - "El usuario decide si simplificar el vocabulario o aceptar la desviacion como\
      \ apropiada para el contexto tematico"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-COCA-J006"
    name: "Comparar resultados entre estrategia levels y quarters"
    steps:
    - "El usuario ejecuta la auditoria con la estrategia LEVELS"
    - "El usuario observa que el nivel A2 tiene estado OPTIMO con puntuacion 0.95"
    - "El usuario cambia la configuracion a la estrategia QUARTERS y re-ejecuta la\
      \ auditoria"
    - "El usuario descubre que si bien A2 en promedio es adecuado, Q1 de A2 tiene\
      \ exceso de vocabulario frecuente (top1k al 85% cuando el objetivo Q1 es 75%\
      \ atLeast) y Q4 tiene deficit de vocabulario variado (top4k al 5% cuando el\
      \ objetivo Q4 es 15% atMost)"
    - "El usuario concluye que la estrategia quarters proporciona informacion mas\
      \ granular y util para mejorar el contenido dentro de cada nivel"
    validation: "ASSUMPTION"
    code: null
    rationale: null
