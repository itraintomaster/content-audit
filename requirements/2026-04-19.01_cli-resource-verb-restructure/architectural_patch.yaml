code: FEAT-CLIRV
description: "Restructure audit-cli to kubectl-style verb-resource grammar (FEAT-CLIRV).\
  \ Remove the refiner/analyzer subcommand groups and their interfaces; introduce\
  \ flat verb-shaped command interfaces (GetCommand, DeleteCommand, PruneCommand,\
  \ PlanCommand, ReviseCommand, plus renamed ConfigAnalyzerCommand and StatsAnalyzerCommand);\
  \ add a workdir resolver in a new bootstrap package so Main can construct FileSystem*Store\
  \ instances with a resolved baseDir. ReviseCommand carries an optional planId because\
  \ task ids are sequential per plan and not unique across plans. Late additions:\
  \ target/diagnosisKind on GetTasksFilter (R008 filter restoration); correctionContextResolver\
  \ on GetCmd (FEAT-RCSL/FEAT-RCLA correction-context enrichment)."
modules:
- name: audit-cli
  description: CLI entry point for running content audits from the command line
  models:
  - name: GetTasksFilter
    type: record
    fields:
    - name: planId
      type: Optional<String>
      description: "Restrict to tasks belonging to this plan id; if empty, the most\
        \ recent plan is used (R012)"
    - name: status
      type: Optional<String>
      description: "Restrict to tasks whose status matches this value, case-insensitive\
        \ (pending/completed/skipped) — R008"
    - name: sortByPriority
      type: boolean
      description: "If true, order results by ascending task priority — R008"
    - name: limit
      type: Optional<Integer>
      description: Cap the result count after filter+sort; 0 yields empty (R009);
        negative is rejected
    - name: target
      type: Optional<AuditTarget>
      description: Restrict to tasks whose nodeTarget matches this AuditTarget enum
        value; absent = no filter (R008)
    - name: diagnosisKind
      type: Optional<DiagnosisKind>
      description: Restrict to tasks whose diagnosisKind matches this DiagnosisKind
        enum value; absent = no filter (R008)
    _change: add
  interfaces:
  - name: AnalyzerListCommand
    sealed: false
    _change: delete
  - name: AnalyzerConfigCommand
    sealed: false
    _change: delete
  - name: AnalyzerStatsCommand
    sealed: false
    _change: delete
  - name: RefinerPlanCommand
    sealed: false
    _change: delete
  - name: RefinerNextCommand
    sealed: false
    _change: delete
  - name: RefinerListCommand
    sealed: false
    _change: delete
  - name: RefinerReviseCommand
    sealed: false
    _change: delete
  - name: GetCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "get(String resource, String name, GetTasksFilter filter): Integer"
    _change: add
  - name: DeleteCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "delete(String resource, String id): Integer"
    _change: add
  - name: PruneCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "prune(String resource, int keep): Integer"
    _change: add
  - name: PlanCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "plan(String auditId): Integer"
    _change: add
  - name: ReviseCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "revise(String taskId, String planId): Integer"
    _change: add
  - name: ConfigAnalyzerCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "showConfig(String analyzerName): Integer"
    _change: add
  - name: StatsAnalyzerCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "showStats(String analyzerName, String coursePath): Integer"
    _change: add
  implementations:
  - name: AnalyzeCmd
    handwrittenTests:
    - name: "should be registered as a top-level subcommand of content-audit (verb\
        \ relocated, semantics unchanged)"
      traceability:
        feature: FEAT-CLIRV
        rule: F-CLIRV-R013
  packages:
  - name: commands
    visibility: internal
    implementations:
    - name: GetCmd
      requiresInject:
      - name: auditReportStore
        type: AuditReportStore
      - name: refinementPlanStore
        type: RefinementPlanStore
      - name: analyzerRegistry
        type: AnalyzerRegistry
      - name: correctionContextResolver
        type: CorrectionContextResolver
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - GetCommand
      _change: add
    - name: DeleteCmd
      requiresInject:
      - name: auditReportStore
        type: AuditReportStore
      - name: refinementPlanStore
        type: RefinementPlanStore
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - DeleteCommand
      _change: add
    - name: PruneCmd
      requiresInject:
      - name: auditReportStore
        type: AuditReportStore
      - name: refinementPlanStore
        type: RefinementPlanStore
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - PruneCommand
      _change: add
    - name: PlanCmd
      requiresInject:
      - name: auditReportStore
        type: AuditReportStore
      - name: refinerEngine
        type: RefinerEngine
      - name: refinementPlanStore
        type: RefinementPlanStore
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - PlanCommand
      _change: add
    - name: ReviseCmd
      requiresInject:
      - name: revisionEngine
        type: RevisionEngine
      - name: refinementPlanStore
        type: RefinementPlanStore
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - ReviseCommand
      _change: add
    - name: ConfigAnalyzerCmd
      requiresInject:
      - name: analyzerRegistry
        type: AnalyzerRegistry
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - ConfigAnalyzerCommand
      _change: add
    - name: StatsAnalyzerCmd
      requiresInject:
      - name: analyzerRegistry
        type: AnalyzerRegistry
      - name: analyzerStatsTransformer
        type: AnalyzerStatsTransformer
      - name: auditRunner
        type: AuditRunner
      types:
      - Component
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - StatsAnalyzerCommand
      _change: add
    _change: modify
  - name: bootstrap
    description: "CLI bootstrap concerns — workdir resolution from --workdir flag,\
      \ CONTENT_AUDIT_HOME env var, or user.dir fallback (R017). Public package because\
      \ Main (in the commands package) and external test launchers both need to resolve\
      \ a workdir before constructing the persistence stores."
    visibility: internal
    models:
    - name: InvalidWorkdirException
      type: exception
      fields:
      - name: path
        type: String
        description: The override value that failed validation
      message: The configured workdir override '%s' is not a writable directory
      extends: RuntimeException
    interfaces:
    - name: WorkdirResolver
      stereotype: port
      sealed: true
      exposes:
      - signature: "resolve(String flagValue): Path"
    implementations:
    - name: DefaultWorkdirResolver
      visibility: public
      implements:
      - WorkdirResolver
    _change: add
  _change: modify
