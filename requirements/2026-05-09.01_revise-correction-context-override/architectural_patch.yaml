code: FEAT-REVCTX
modules:
  - name: revision-domain
    packages:
      - name: contextoverride
        implementations:
          - name: DefaultCorrectionContextOverrideParser
            handwrittenTests:
              - name: "should accept payload when nodeId and diagnosisKind match the expected task identity"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R003
              - name: "should reject payload with OverrideRejectedException when nodeId does not match the expected task identity"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R003
              - name: "should reject payload with OverrideRejectedException when diagnosisKind does not match the expected task identity"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R003
              - name: "should parse payload mirroring the get task output for a LEMMA_ABSENCE context and return a CorrectionContextOverride whose rawPayload is the literal JSON received"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R008
              - name: "should reject payload whose JSON shape does not mirror the get task output even when its core structural fields are individually valid"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R008
          - name: LemmaAbsenceContextStructuralValidator
            handwrittenTests:
              - name: "should throw OverrideRejectedException when the LEMMA_ABSENCE payload misses a required structural field or has an invalid value"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R003
          - name: SentenceLengthContextStructuralValidator
            handwrittenTests:
              - name: "should throw OverrideRejectedException when the SENTENCE_LENGTH payload misses a required structural field or has an out-of-domain value"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R003
      - name: engine
        implementations:
          - name: DefaultRevisionEngine
            handwrittenTests:
              - name: "should bypass contextResolver and consume the override payload as the strategy input when overridePayload is provided"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R002
              - name: "should not perform any AuditReport-derived context construction for the revised task when overridePayload is provided"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R002
              - name: "should produce OVERRIDE_INVALID outcome without persisting an artifact and without modifying the course when the parser rejects the override payload"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R003
              - name: "should produce OVERRIDE_NOT_APPLICABLE outcome without persisting an artifact and without modifying the course when the task diagnosisKind has no context contract"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R004
              - name: "should resolve the revised task from the persisted plan identified by planId and pass the override to the strategy regardless of any task identity hint embedded in the payload"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R005
              - name: "should preserve the human approval flow and emit a PENDING_APPROVAL artifact when human approval mode is active and an override is provided"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R006
              - name: "should persist the RevisionArtifact with contextSource=OVERRIDE and contextOverridePayload equal to the literal raw JSON received when an override is provided"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R007
              - name: "should persist the RevisionArtifact with contextSource=DERIVED and a null contextOverridePayload when no override is provided"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R007
  - name: refiner-domain
    implementations:
      - name: DispatchingCorrectionContextResolver
        handwrittenTests:
          - name: "should report supports=true for diagnosisKinds with a registered resolver and supports=false for kinds without one"
            traceability:
              feature: FEAT-REVCTX
              rule: F-REVCTX-R004
  - name: audit-cli
    packages:
      - name: commands
        implementations:
          - name: ReviseCmd
            handwrittenTests:
              - name: "should reject the invocation with a clear error before invoking the engine when both --correction-context and --correction-context-file are provided"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R001
              - name: "should invoke the engine overload with the inline JSON payload when --correction-context is provided"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R001
              - name: "should invoke the engine overload with the JSON payload read from disk when --correction-context-file is provided"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R001
              - name: "should invoke the engine without overridePayload and preserve the historical revise behavior when neither override flag is provided"
                traceability:
                  feature: FEAT-REVCTX
                  rule: F-REVCTX-R001
features:
  - id: FEAT-REVCTX
    journeys:
      - id: F-REVCTX-J001
        testModule: audit-cli
        testPackage: com.learney.contentaudit.auditcli.commands
      - id: F-REVCTX-J002
        testModule: audit-cli
        testPackage: com.learney.contentaudit.auditcli.commands
      - id: F-REVCTX-J003
        testModule: audit-cli
        testPackage: com.learney.contentaudit.auditcli.commands
      - id: F-REVCTX-J004
        testModule: audit-cli
        testPackage: com.learney.contentaudit.auditcli.commands
