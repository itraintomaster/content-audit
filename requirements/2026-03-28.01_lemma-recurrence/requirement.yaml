  doubts:
  - id: "DOUBT-GRADUAL-SCORING"
    question: "El scoring deberia ser gradual en lugar de binario?"
    options:
    - label: "Opcion A: Mantener el scoring binario (simplicidad, alineado con la\
        \ implementacion de referencia) -- para la primera version es suficiente y\
        \ permite validar el concepto"
      description: null
    - label: "Opcion B: Implementar scoring gradual basado en la distancia al centro\
        \ del rango normal -- mayor precision, mejor discriminacion entre lemas"
      description: null
    - label: "Opcion C: Implementar scoring gradual como mejora futura, documentando\
        \ la limitacion del scoring binario actual"
      description: null
    answer: "No entiendo qué son cada cosa."
  - id: "DOUBT-STDDEV-SCORING"
    question: "La desviacion estandar deberia participar en el scoring?"
    options:
    - label: "Opcion A: Mantener la desviacion estandar como dato informativo unicamente\
        \ (simplicidad, alineado con la referencia)"
      description: null
    - label: "Opcion B: Usar el coeficiente de variacion como factor de penalizacion\
        \ en el scoring -- un lema \"normal\" con alta variabilidad podria recibir\
        \ una puntuacion reducida"
      description: null
    - label: "Opcion C: Agregar una segunda clasificacion independiente (distribucion\
        \ regular / irregular) sin afectar el scoring principal"
      description: null
    answer: "No sé bien qué representa la desviación estándar y por qué debería afectar\
      \ al scoring o no. Me explicas?"
  - id: "DOUBT-TOP-N-VALUE"
    question: "El valor top=2000 es adecuado para todos los cursos?"
    options:
    - label: "Opcion A: Mantener top=2000 como esta (configurable, adecuado para el\
        \ curso actual)"
      description: null
    - label: "Opcion B: Hacer el valor dinamico: analizar todos los lemas con al menos\
        \ N apariciones (por ejemplo, al menos 3) independientemente de un tope fijo"
      description: null
    - label: "Opcion C: Mantener top=2000 como default pero reportar la cantidad de\
        \ lemas excluidos que tienen pocas apariciones, para visibilidad"
      description: null
    answer: "Opcion B: Hacer el valor dinamico: analizar todos los lemas con al menos\
      \ N apariciones (por ejemplo, al menos 3) independientemente de un tope fijo"
  - id: "DOUBT-SINGLE-OCCURRENCE"
    question: "Como tratar los lemas con una unica aparicion?"
    options:
    - label: "Opcion A: Excluir del analisis principal como esta actualmente (no se\
        \ pueden calcular intervalos, mantener simplicidad)"
      description: null
    - label: "Opcion B: Incluir en el conteo como sub-expuestos (el lema se reporta\
        \ con meanInterval=infinito o con un valor convencional alto)"
      description: null
    - label: "Opcion C: Reportarlos en una seccion separada del resultado sin incluirlos\
        \ en el scoring principal, para que el usuario tenga visibilidad"
      description: null
    answer: "Me inclino por incluirlos, pero además está lemma absence, que es otra\
      \ métrica, y no sé si no se pisaría."
  - id: "DOUBT-PER-LEVEL-ANALYSIS"
    question: "Se deberia agregar analisis de recurrencia por nivel CEFR?"
    options:
    - label: "Opcion A: Mantener solo el analisis global (suficiente para esta primera\
        \ version, menor complejidad)"
      description: null
    - label: "Opcion B: Agregar analisis por nivel como funcionalidad adicional --\
        \ cada nivel tendria su propio overallScore de recurrencia"
      description: null
    - label: "Opcion C: Agregar analisis por nivel como mejora futura, documentando\
        \ la limitacion del analisis global actual"
      description: null
    answer: "Opcion B: Agregar analisis por nivel como funcionalidad adicional --\
      \ cada nivel tendria su propio overallScore de recurrencia"
  - id: "DOUBT-POS-AMBIGUITY"
    question: "Como manejar lemas que aparecen con diferentes etiquetas POS?"
    options:
    - label: "Opcion A: Agrupar por lema independientemente del POS (como en la referencia)\
        \ -- pedagogicamente correcto, el estudiante reconoce la misma raiz"
      description: null
    - label: "Opcion B: Tratar cada combinacion lema+POS como una entrada distinta\
        \ (\"run/NOUN\" y \"run/VERB\") -- mas precision linguistica, pero fragmenta\
        \ los datos y reduce los conteos"
      description: null
    - label: "Opcion C: Agrupar por lema pero reportar el POS predominante (el que\
        \ aparece con mayor frecuencia)"
      description: null
    answer: "Opcion A: Agrupar por lema independientemente del POS (como en la referencia)\
      \ -- pedagogicamente correcto, el estudiante reconoce la misma raiz"
