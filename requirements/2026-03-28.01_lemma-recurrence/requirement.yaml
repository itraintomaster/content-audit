---
features:
- id: "FEAT-LREC"
  name: "Analisis de Recurrencia de Lemas por Repeticion Espaciada"
  description: "Evaluar la **distribucion espacial de los lemas** a lo largo del curso\
    \ para determinar si las palabras de contenido se repiten a intervalos regulares,\
    \ aplicando el principio pedagogico de repeticion espaciada (spaced repetition).\
    \ Un lema que aparece concentrado en una seccion del curso y luego desaparece\
    \ es menos efectivo para la retencion que uno que se distribuye uniformemente.\
    \ El analizador produce un resultado global a nivel de curso (no por oracion ni\
    \ por nivel), con estadisticas individuales por lema y una puntuacion general\
    \ que refleja la proporcion de lemas con recurrencia adecuada."
  code: "F-LREC"
  rules:
  - id: "F-LREC-R001"
    name: "Asignacion de posicion global a cada palabra"
    severity: "critical"
    description: "Cada palabra (token) del curso recibe una posicion global secuencial\
      \ que refleja su orden de aparicion en el material completo. Las oraciones se\
      \ procesan en el siguiente orden determinista: 1. Se recorren los niveles CEFR\
      \ en orden ascendente: A1, A2, B1, B2 2. Dentro de cada nivel, se recorren los\
      \ topics en su orden natural dentro del nivel 3. Dentro de cada topic, se recorren\
      \ los knowledges en su orden natural 4. Dentro de cada knowledge, se recorren\
      \ los quizzes en su orden natural 5. Dentro de cada quiz, se recorren los tokens\
      \ en orden de aparicion en la oracion La posicion global se incrementa en 1\
      \ por cada token procesado, comenzando desde la posicion 1. Todos los tokens\
      \ participan en el conteo de posicion global, no solo las palabras de contenido.\
      \ Esto asegura que las distancias reflejen la separacion real entre apariciones\
      \ de un lema en el texto."
    errorMessage: "Error al construir las posiciones globales: el curso no contiene\
      \ oraciones procesables"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R002"
    name: "Orden de procesamiento determinista"
    severity: "critical"
    description: "El orden en que se procesan las oraciones debe ser determinista:\
      \ dado el mismo curso con el mismo contenido, la secuencia de posiciones globales\
      \ debe ser siempre identica. Esto es fundamental porque los intervalos calculados\
      \ dependen directamente de las posiciones, y un cambio en el orden de procesamiento\
      \ alteraria todos los intervalos y por lo tanto el resultado del analisis. El\
      \ orden determinista se garantiza procesando los niveles en el orden CEFR fijo\
      \ (A1, A2, B1, B2) y los topics, knowledges y quizzes dentro de cada nivel en\
      \ su orden natural de definicion en el curso."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R003"
    name: "Filtrado de palabras de contenido"
    severity: "critical"
    description: "Solo las **palabras de contenido** se incluyen en el analisis de\
      \ recurrencia. Una palabra de contenido es un token cuya etiqueta POS (part-of-speech)\
      \ corresponde a una de las siguientes categorias gramaticales: sustantivo (NOUN),\
      \ verbo (VERB), adjetivo (ADJ) o adverbio (ADV). Todas las demas categorias\
      \ (determinantes, preposiciones, pronombres, conjunciones, puntuacion, simbolos,\
      \ etc.) se excluyen del analisis de recurrencia. Estos tokens SI participan\
      \ en el conteo de posicion global (R001), pero NO se registran en el mapa de\
      \ posiciones por lema. El filtrado se aplica usando la etiqueta POS del token\
      \ enriquecido proveniente del procesamiento linguistico (FEAT-NLP). Los tokens\
      \ sin etiqueta POS o con etiqueta desconocida se excluyen del analisis."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R004"
    name: "Registro de posiciones por lema"
    severity: "critical"
    description: "Para cada token que pasa el filtro de palabras de contenido (R003),\
      \ se registra su posicion global en un mapa que asocia cada lema con la lista\
      \ de posiciones donde aparece. La clave del mapa es la **forma lematizada**\
      \ del token (el lema), no la forma flexionada que aparece en el texto. Por ejemplo,\
      \ las formas \"running\", \"ran\" y \"runs\" se lematizan a \"run\" y sus posiciones\
      \ se registran bajo el lema \"run\". Esto asegura que el analisis de recurrencia\
      \ mida la repeticion del concepto lexical, no de una forma gramatical especifica.\
      \ Las posiciones se mantienen ordenadas de menor a mayor para cada lema."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R005"
    name: "Seleccion de los lemas mas frecuentes (top N)"
    severity: "critical"
    description: "De todos los lemas registrados (R004), se seleccionan los **top\
      \ N lemas** con mayor numero de apariciones (count) para el analisis de recurrencia.\
      \ El valor N es configurable (actualmente 2000). Los lemas se ordenan por cantidad\
      \ de apariciones de mayor a menor, y se toman los primeros N. En caso de empate\
      \ en el conteo de apariciones, el orden entre lemas con el mismo conteo es indistinto.\
      \ Los lemas no seleccionados (los menos frecuentes) se excluyen del analisis.\
      \ Esta exclusion es practica: lemas con muy pocas apariciones no tienen suficientes\
      \ datos para calcular intervalos estadisticamente significativos. Sin embargo,\
      \ esta exclusion implica que lemas con una unica aparicion (que por definicion\
      \ son sub-expuestos) no se reportan."
    errorMessage: "No se encontraron lemas de contenido en el curso. El analisis de\
      \ recurrencia no puede ejecutarse."
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R006"
    name: "Exclusion de lemas con menos de 2 apariciones"
    severity: "major"
    description: "Los lemas con menos de 2 apariciones se excluyen del analisis porque\
      \ no es posible calcular un intervalo entre apariciones consecutivas sin al\
      \ menos 2 posiciones. Esta exclusion opera de facto a traves de la seleccion\
      \ de top N (R005): los lemas con una unica aparicion naturalmente quedan fuera\
      \ del top ya que tienen el conteo mas bajo posible. Si despues de la seleccion\
      \ del top N algun lema tuviera exactamente 1 aparicion (posible en cursos muy\
      \ pequenos con vocabulario limitado), se excluye del calculo de intervalos."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R007"
    name: "Calculo de intervalo medio y desviacion estandar"
    severity: "critical"
    description: "Para cada lema seleccionado con al menos 2 apariciones, se calcula:\
      \ 1. **Intervalos entre apariciones consecutivas**: dada la lista ordenada de\
      \ posiciones [p1, p2, p3, ..., pn], los intervalos son [p2-p1, p3-p2, ..., pn-pn-1].\
      \ 2. **Intervalo medio (meanInterval)**: el promedio aritmetico de los intervalos\
      \ calculados. - meanInterval = suma(intervalos) / cantidad(intervalos) 3. **Desviacion\
      \ estandar del intervalo (stdDevInterval)**: la desviacion estandar poblacional\
      \ de los intervalos. - stdDevInterval = sqrt(suma((intervalo_i - meanInterval)^2)\
      \ / cantidad(intervalos)) Ejemplo para el lema \"cat\" con posiciones [10, 45,\
      \ 120, 500]: - Intervalos: [35, 75, 380] - meanInterval: (35 + 75 + 380) / 3\
      \ = 163.3 - stdDevInterval: sqrt(((35-163.3)^2 + (75-163.3)^2 + (380-163.3)^2)\
      \ / 3) = 154.7 El uso de desviacion estandar poblacional (dividiendo por N,\
      \ no por N-1) es consistente con la implementacion de referencia."
    errorMessage: "Error al calcular intervalos para el lema '{lema}': la lista de\
      \ posiciones esta vacia o tiene un solo elemento"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R008"
    name: "Clasificacion de exposicion de cada lema"
    severity: "critical"
    description: "Cada lema analizado se clasifica en uno de tres estados de exposicion\
      \ segun su intervalo medio (meanInterval) y los umbrales configurados: | Estado\
      \ | Condicion | Umbral actual | |--------|-----------|---------------| | over-exposed\
      \ | meanInterval <= overExposed | meanInterval <= 50 | | normal | overExposed\
      \ < meanInterval <= subExposed | 50 < meanInterval <= 1000 | | sub-exposed |\
      \ meanInterval > subExposed | meanInterval > 1000 | Las condiciones se evaluan\
      \ en el siguiente orden de prioridad: 1. Si meanInterval <= overExposed: el\
      \ lema esta **sobre-expuesto** 2. Si meanInterval > subExposed: el lema esta\
      \ **sub-expuesto** 3. En cualquier otro caso: el lema tiene exposicion **normal**\
      \ Los umbrales `overExposed` y `subExposed` son configurables y definen el rango\
      \ de recurrencia considerado adecuado. El rango \"normal\" es abierto por abajo\
      \ y cerrado por arriba: no incluye el valor exacto de overExposed, pero si incluye\
      \ el valor exacto de subExposed."
    errorMessage: "Configuracion de umbrales invalida: overExposed ({overExposed})\
      \ debe ser menor que subExposed ({subExposed})"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R009"
    name: "Resumen de exposicion"
    severity: "major"
    description: "El resultado incluye un resumen de exposicion que contabiliza cuantos\
      \ lemas caen en cada estado: - **normalCount**: cantidad de lemas con estado\
      \ \"normal\" - **subExposedCount**: cantidad de lemas con estado \"sub-exposed\"\
      \ - **overExposedCount**: cantidad de lemas con estado \"over-exposed\" La suma\
      \ de los tres contadores debe ser igual al total de lemas analizados."
    errorMessage: "Inconsistencia en el resumen de exposicion: normalCount ({normal})\
      \ + subExposedCount ({sub}) + overExposedCount ({over}) != totalCount ({total})"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R010"
    name: "Puntuacion general del analisis (overall score)"
    severity: "critical"
    description: "La puntuacion general del analisis de recurrencia se calcula como\
      \ la proporcion de lemas con exposicion normal respecto al total de lemas analizados:\
      \ overallScore = normalCount / totalCount Donde: - normalCount = cantidad de\
      \ lemas con estado \"normal\" (R008) - totalCount = total de lemas analizados\
      \ (los seleccionados en R005 que tienen al menos 2 apariciones) El resultado\
      \ se redondea a 2 decimales. Si no hay lemas analizados (totalCount = 0), la\
      \ puntuacion es 0.0. Ejemplo: si de 2000 lemas analizados, 1500 tienen exposicion\
      \ normal, 350 son sub-expuestos y 150 son sobre-expuestos: - overallScore =\
      \ 1500 / 2000 = 0.75 El scoring es **binario a nivel de lema**: un lema con\
      \ estado \"normal\" aporta 1 al conteo de normales, mientras que un lema \"\
      sub-exposed\" o \"over-exposed\" aporta 0. No hay penalizacion gradual: un lema\
      \ con meanInterval=51 (apenas normal) contribuye lo mismo que uno con meanInterval=200\
      \ (excelente). Ver Doubt[DOUBT-GRADUAL-SCORING] para una discusion sobre scoring\
      \ gradual."
    errorMessage: "Error al calcular la puntuacion general: totalCount es cero, no\
      \ hay lemas analizados"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R011"
    name: "La desviacion estandar es informativa, no participa en el scoring"
    severity: "major"
    description: "La desviacion estandar del intervalo (stdDevInterval) se calcula\
      \ y se incluye en el resultado para cada lema (R007), pero **no participa**\
      \ en la clasificacion de exposicion (R008) ni en el calculo de la puntuacion\
      \ general (R010). Su funcion es exclusivamente informativa: permite al usuario\
      \ identificar lemas con distribucion irregular. Un lema con buen intervalo medio\
      \ pero alta desviacion estandar tiene repeticiones concentradas en una parte\
      \ del curso y ausentes en otra. Esta informacion es valiosa para el creador\
      \ de contenido, aunque el scoring actual no la penaliza. Ver Doubt[DOUBT-STDDEV-SCORING]\
      \ para una discusion sobre incorporar la desviacion estandar al scoring."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R012"
    name: "Estructura del resultado por lema"
    severity: "major"
    description: "El resultado del analisis incluye, para cada lema analizado, la\
      \ siguiente informacion: | Campo | Descripcion | |-------|-------------| | lemma\
      \ | La forma lematizada de la palabra (ej: \"run\", \"cat\") | | pos | La etiqueta\
      \ POS predominante del lema (NOUN, VERB, ADJ, ADV) | | count | Cantidad total\
      \ de apariciones del lema en el curso | | meanInterval | Intervalo medio entre\
      \ apariciones consecutivas (R007) | | stdDevInterval | Desviacion estandar del\
      \ intervalo (R007) | | exposureStatus | Estado de exposicion: \"normal\", \"\
      sub-exposed\" o \"over-exposed\" (R008) | | occurrencePositions | Lista de todas\
      \ las posiciones globales donde aparece el lema | La inclusion de las posiciones\
      \ exactas (occurrencePositions) permite al creador de contenido localizar donde\
      \ aparece cada lema en el curso y evaluar visualmente su distribucion."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R013"
    name: "Estructura del resultado global"
    severity: "major"
    description: "El resultado global del analisis de recurrencia contiene: 1. **lemmaStats**:\
      \ lista de estadisticas individuales por lema (R012), ordenada por cantidad\
      \ de apariciones de mayor a menor. 2. **exposureSummary**: resumen de conteos\
      \ por estado de exposicion (R009): - normal: cantidad de lemas con exposicion\
      \ normal - sub-exposed: cantidad de lemas sub-expuestos - over-exposed: cantidad\
      \ de lemas sobre-expuestos 3. **overallScore**: puntuacion general del analisis\
      \ (R010), valor entre 0.0 y 1.0. Este resultado se agrega al informe de auditoria\
      \ del curso como un resultado global. No se integra en la jerarquia de agregacion\
      \ por nodo (knowledge -> topic -> nivel) de la plataforma, ya que no produce\
      \ puntuaciones individuales por oracion o knowledge."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R014"
    name: "Parametros configurables del analisis"
    severity: "major"
    description: "El analisis de recurrencia de lemas utiliza tres parametros configurables:\
      \ | Parametro | Valor actual | Descripcion | |-----------|-------------|-------------|\
      \ | top | 2000 | Cantidad de lemas mas frecuentes a analizar | | subExposed\
      \ | 1000 | Umbral de sub-exposicion: si meanInterval > subExposed, el lema esta\
      \ sub-expuesto | | overExposed | 50 | Umbral de sobre-exposicion: si meanInterval\
      \ <= overExposed, el lema esta sobre-expuesto | **Restricciones de validez:**\
      \ - `top` debe ser un entero positivo mayor a 0 - `overExposed` debe ser un\
      \ numero positivo mayor a 0 - `subExposed` debe ser un numero positivo mayor\
      \ que `overExposed` - La relacion debe cumplirse: 0 < overExposed < subExposed"
    errorMessage: "Configuracion de recurrencia de lemas invalida: {detalle de la\
      \ violacion}"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-LREC-R015"
    name: "Nombre del analizador en el informe"
    severity: "major"
    description: "El analizador de recurrencia de lemas se identifica con el nombre\
      \ **\"lemma-recurrence\"** en el informe de auditoria. Este nombre aparece en\
      \ el resultado global del curso y permite al usuario identificar la puntuacion\
      \ correspondiente a este analisis dentro del informe general."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  journeys:
  - id: "F-LREC-J001"
    name: "Auditar la recurrencia de vocabulario de un curso completo"
    steps: []
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
    flow:
    - id: "iniciar_auditoria"
      action: "El usuario inicia una auditoria de recurrencia de un curso previamente\
        \ cargado en ContentAudit"
      then: "asignar_posiciones"
      outcomes: []
      result: null
      gate: []
    - id: "asignar_posiciones"
      action: "El sistema recorre la jerarquia del curso en orden CEFR (A1, A2, B1,\
        \ B2) y asigna una posicion global secuencial a cada token"
      then: null
      outcomes:
      - when: "El curso contiene oraciones procesables"
        then: "filtrar_contenido"
      - when: "El curso no contiene oraciones procesables"
        then: "error_sin_oraciones"
      result: null
      gate:
      - "F-LREC-R001"
      - "F-LREC-R002"
    - id: "filtrar_contenido"
      action: "El sistema filtra las palabras de contenido (sustantivos, verbos, adjetivos,\
        \ adverbios) y registra sus posiciones globales bajo su forma lematizada"
      then: "seleccionar_top_lemas"
      outcomes: []
      result: null
      gate:
      - "F-LREC-R003"
      - "F-LREC-R004"
    - id: "seleccionar_top_lemas"
      action: "El sistema selecciona los 2000 lemas de contenido mas frecuentes del\
        \ curso"
      then: null
      outcomes:
      - when: "Se encontraron lemas de contenido suficientes para el analisis"
        then: "calcular_intervalos"
      - when: "No se encontraron lemas de contenido en el curso"
        then: "error_sin_lemas"
      result: null
      gate:
      - "F-LREC-R005"
      - "F-LREC-R006"
    - id: "calcular_intervalos"
      action: "El sistema calcula el intervalo medio y la desviacion estandar entre\
        \ apariciones consecutivas para cada lema seleccionado"
      then: "clasificar_exposicion"
      outcomes: []
      result: null
      gate:
      - "F-LREC-R007"
    - id: "clasificar_exposicion"
      action: "El sistema clasifica cada lema como normal, sub-exposed u over-exposed\
        \ segun su intervalo medio y los umbrales configurados"
      then: "calcular_puntuacion"
      outcomes: []
      result: null
      gate:
      - "F-LREC-R008"
      - "F-LREC-R014"
    - id: "calcular_puntuacion"
      action: "El sistema calcula la puntuacion general como la proporcion de lemas\
        \ con exposicion normal sobre el total analizado"
      then: "entregar_resultado"
      outcomes: []
      result: null
      gate:
      - "F-LREC-R009"
      - "F-LREC-R010"
    - id: "entregar_resultado"
      action: "El usuario recibe el resultado global con la puntuacion, el resumen\
        \ de exposicion (normal, sub-exposed, over-exposed) y las estadisticas detalladas\
        \ por lema"
      then: null
      outcomes: []
      result: "success"
      gate:
      - "F-LREC-R012"
      - "F-LREC-R013"
      - "F-LREC-R015"
    - id: "error_sin_oraciones"
      action: "El sistema informa al usuario que el curso no contiene oraciones procesables\
        \ y el analisis no puede ejecutarse"
      then: null
      outcomes: []
      result: "failure"
      gate: []
    - id: "error_sin_lemas"
      action: "El sistema informa al usuario que no se encontraron lemas de contenido\
        \ y el analisis de recurrencia no puede ejecutarse"
      then: null
      outcomes: []
      result: "failure"
      gate: []
  - id: "F-LREC-J002"
    name: "Identificar lemas sub-expuestos que el estudiante podria olvidar"
    steps: []
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
    flow:
    - id: "revisar_puntuacion"
      action: "El usuario revisa el resultado de la auditoria de recurrencia y observa\
        \ que la puntuacion general es baja (por ejemplo, 0.65)"
      then: "consultar_resumen"
      outcomes: []
      result: null
      gate: []
    - id: "consultar_resumen"
      action: "El usuario consulta el resumen de exposicion y observa una cantidad\
        \ significativa de lemas sub-expuestos (por ejemplo, 350 de 2000)"
      then: null
      outcomes:
      - when: "Hay lemas sub-expuestos que investigar"
        then: "filtrar_sub_expuestos"
      - when: "No hay lemas sub-expuestos, la puntuacion baja se debe a sobre-exposicion"
        then: "sin_sub_expuestos"
      result: null
      gate: []
    - id: "filtrar_sub_expuestos"
      action: "El usuario filtra las estadisticas por lema para ver solo los lemas\
        \ con estado sub-exposed"
      then: "identificar_lemas_criticos"
      outcomes: []
      result: null
      gate: []
    - id: "identificar_lemas_criticos"
      action: "El usuario identifica lemas importantes para el nivel del curso que\
        \ aparecen muy esporadicamente (por ejemplo, 'achieve' con intervalo medio\
        \ de 2500 palabras)"
      then: "revisar_posiciones"
      outcomes: []
      result: null
      gate: []
    - id: "revisar_posiciones"
      action: "El usuario revisa las posiciones de aparicion del lema y evalua su\
        \ distribucion a lo largo del curso"
      then: null
      outcomes:
      - when: "El lema esta concentrado en una unica seccion del curso"
        then: "decidir_redistribuir"
      - when: "El lema tiene pocas apariciones repartidas pero con brechas muy grandes"
        then: "decidir_agregar_apariciones"
      result: null
      gate: []
    - id: "decidir_redistribuir"
      action: "El usuario decide redistribuir el lema agregando oraciones que lo utilicen\
        \ en otras secciones del curso"
      then: null
      outcomes: []
      result: "success"
      gate: []
    - id: "decidir_agregar_apariciones"
      action: "El usuario decide agregar mas oraciones con este lema en las zonas\
        \ del curso donde esta ausente"
      then: null
      outcomes: []
      result: "success"
      gate: []
    - id: "sin_sub_expuestos"
      action: "El usuario concluye que no hay lemas sub-expuestos y redirige su atencion\
        \ a otros aspectos del resultado"
      then: null
      outcomes: []
      result: "success"
      gate: []
  - id: "F-LREC-J003"
    name: "Identificar lemas sobre-expuestos que saturan al estudiante"
    steps: []
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
    flow:
    - id: "revisar_resultado"
      action: "El usuario revisa el resultado de la auditoria de recurrencia y consulta\
        \ las estadisticas por lema"
      then: "filtrar_sobre_expuestos"
      outcomes: []
      result: null
      gate: []
    - id: "filtrar_sobre_expuestos"
      action: "El usuario filtra los lemas con estado over-exposed e identifica lemas\
        \ que aparecen con demasiada frecuencia (por ejemplo, 'make' con intervalo\
        \ medio de 15 palabras)"
      then: null
      outcomes:
      - when: "Hay lemas sobre-expuestos que investigar"
        then: "evaluar_causa"
      - when: "No hay lemas sobre-expuestos"
        then: "sin_sobre_expuestos"
      result: null
      gate: []
    - id: "evaluar_causa"
      action: "El usuario evalua si la sobre-exposicion es inherente al contenido\
