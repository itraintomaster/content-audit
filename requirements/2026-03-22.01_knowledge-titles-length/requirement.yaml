---
features:
- id: "FEAT-KTLEN"
  name: "Analisis de Longitud de Titulos e Instrucciones de Knowledge"
  description: "Evaluar si la longitud de los titulos (labels) y las instrucciones\
    \ de cada knowledge (ejercicio) del curso cumple con los limites establecidos\
    \ para garantizar una buena experiencia de usuario. Los titulos deben ser concisos\
    \ para caber en elementos de navegacion e interfaz, y las instrucciones deben\
    \ ser lo suficientemente breves para que el estudiante las lea antes de comenzar\
    \ el ejercicio. Se producen puntuaciones individuales por knowledge que se agregan\
    \ a traves de la jerarquia del curso mediante el motor de agregacion generico\
    \ de la plataforma ContentAudit."
  code: "F-KTLEN"
  rules:
  - id: "F-KTLEN-R001"
    name: "Limite maximo de longitud de titulo"
    severity: "critical"
    description: "El titulo de cada knowledge se evalua contra un limite maximo de\
      \ longitud ponderada de 28 caracteres. La longitud se calcula usando el sistema\
      \ de pesos por caracter (R002), no la longitud simple del string. Si la longitud\
      \ ponderada del titulo es menor o igual a 28, se considera adecuado. Si excede\
      \ 28, se penaliza proporcionalmente segun la formula de puntuacion (R003). El\
      \ valor de 28 caracteres ponderados proviene de la implementacion de referencia\
      \ y refleja el espacio disponible en los elementos de interfaz del sistema de\
      \ aprendizaje."
    errorMessage: "El titulo del knowledge {knowledgeId} excede el limite maximo de\
      \ longitud ponderada: {longitudPonderada} > 28"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-KTLEN-R002"
    name: "Sistema de pesos por caracter para titulos"
    severity: "critical"
    description: "La longitud de un titulo se calcula como la suma de los pesos de\
      \ cada caracter individual. Los pesos reflejan el ancho visual tipico de cada\
      \ caracter en una fuente proporcional: | Peso | Caracteres | Razon | |------|-----------|-------|\
      \ | 0.0 | `$`, `*` | Caracteres de formato que no ocupan espacio visual significativo\
      \ | | 0.5 | `i`, `,`, `.` | Caracteres visualmente estrechos | | 0.7 | `f`,\
      \ `t`, `\"` | Caracteres de ancho medio-estrecho | | 1.0 | Todos los demas |\
      \ Ancho estandar | Ejemplo: el titulo \"fitting\" se calcula como: f(0.7) +\
      \ i(0.5) + t(0.7) + t(0.7) + i(0.5) + n(1.0) + g(1.0) = 5.1 caracteres ponderados.\
      \ Los caracteres que no estan listados explicitamente en la tabla reciben el\
      \ peso por defecto de 1.0. Esto incluye letras mayusculas, numeros, espacios,\
      \ y caracteres Unicode fuera del rango ASCII basico."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-KTLEN-R003"
    name: "Puntuacion de longitud de titulo"
    severity: "critical"
    description: "Cada knowledge recibe una puntuacion entre 0.0 y 1.0 que refleja\
      \ la adecuacion de la longitud de su titulo. Las condiciones se evaluan en el\
      \ siguiente orden de prioridad: 1. **Titulo nulo o vacio**: la puntuacion es\
      \ 0.0. Todo knowledge debe tener un titulo; la ausencia de titulo se considera\
      \ un defecto grave. Esta condicion se evalua antes que cualquier calculo de\
      \ longitud ponderada. 2. **Longitud ponderada dentro del limite** (menor o igual\
      \ a 28): la puntuacion es 1.0. 3. **Longitud ponderada excede el limite**: la\
      \ puntuacion disminuye linealmente: - `score = max(0.0, 1.0 - (longitudPonderada\
      \ - limiteMaximo) / limiteMaximo)` - Esto significa que un titulo con el doble\
      \ del limite maximo (56 caracteres ponderados) recibe puntuacion 0.0. Ejemplo\
      \ para limite maximo de 28: | Longitud ponderada | 0 (vacio) | 15  | 28  | 35\
      \   | 42   | 56  | |--------------------|-----------|-----|-----|------|------|-----|\
      \ | Puntuacion         | 0.0       | 1.0 | 1.0 | 0.75 | 0.50 | 0.0 |"
    errorMessage: "Puntuacion fuera de rango [0.0, 1.0] calculada para el titulo del\
      \ knowledge {knowledgeId}: {puntuacion}"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-KTLEN-R004"
    name: "Los pesos de caracteres no son configurables"
    severity: "minor"
    description: "Los pesos por caracter definidos en R002 estan fijos y no son configurables\
      \ por el usuario. Fueron calibrados para la fuente proporcional utilizada en\
      \ la interfaz del sistema de aprendizaje. [ASSUMPTION] Se asume que los pesos\
      \ de la implementacion de referencia son adecuados para la interfaz actual.\
      \ Si la interfaz de destino usa una fuente con proporciones significativamente\
      \ diferentes, los pesos deberian recalibrarse. Se mantienen fijos por simplicidad."
    errorMessage: null
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-KTLEN-R005"
    name: "Limites de longitud de instrucciones"
    severity: "critical"
    description: "Las instrucciones de cada knowledge se evaluan contra dos umbrales\
      \ de longitud medida en caracteres simples (no ponderada): | Parametro | Valor\
      \ | Significado | |-----------|-------|-------------| | Limite suave (soft limit)\
      \ | 70 caracteres | Las instrucciones empiezan a ser largas | | Limite duro\
      \ (hard limit) | 100 caracteres | Las instrucciones son definitivamente demasiado\
      \ largas | La longitud se mide como la cantidad de caracteres del string de\
      \ instrucciones (length del string). A diferencia de los titulos, no se usa\
      \ longitud ponderada porque las instrucciones se muestran en bloques de texto\
      \ donde el truncamiento no es un problema visual critico; lo que importa es\
      \ la cantidad total de texto que el estudiante debe procesar."
    errorMessage: "Configuracion de limites de instrucciones invalida: el limite suave\
      \ ({soft}) debe ser menor que el limite duro ({hard})"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-KTLEN-R006"
    name: "Puntuacion de longitud de instrucciones"
    severity: "critical"
    description: "Cada knowledge recibe una puntuacion entre 0.0 y 1.0 para la longitud\
      \ de sus instrucciones, basada en un sistema de tres niveles: | Condicion |\
      \ Puntuacion | Significado | |-----------|-----------|-------------| | Instrucciones\
      \ nulas o vacias | 1.0 | No se penaliza la ausencia de instrucciones | | Longitud\
      \ <= limite suave (70) | 1.0 | Instrucciones adecuadas | | Longitud > limite\
      \ suave (70) y <= limite duro (100) | 0.5 | Instrucciones aceptables pero largas\
      \ | | Longitud > limite duro (100) | 0.0 | Instrucciones demasiado largas |\
      \ El scoring discreto (tres niveles) en lugar de lineal refleja la naturaleza\
      \ de la evaluacion: no hay una diferencia gradual entre \"adecuado\" y \"largo\"\
      , sino umbrales claros donde la legibilidad cambia. 70 caracteres es aproximadamente\
      \ una linea de texto en la interfaz; 100 caracteres fuerza al texto a ocupar\
      \ multiples lineas en la mayoria de dispositivos."
    errorMessage: "Puntuacion fuera de rango [0.0, 1.0] calculada para las instrucciones\
      \ del knowledge {knowledgeId}: {puntuacion}"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-KTLEN-R007"
    name: "Los limites de instrucciones no son configurables"
    severity: "minor"
    description: "Los limites suave (70) y duro (100) para instrucciones estan fijos\
      \ y no son configurables por el usuario. Provienen de la implementacion de referencia\
      \ y reflejan restricciones de la interfaz del sistema de aprendizaje. [ASSUMPTION]\
      \ Se asume que los limites de la referencia son adecuados para la interfaz actual.\
      \ Si en el futuro se requiere ajustar estos valores para diferentes tipos de\
      \ cursos o interfaces, deberia considerarse hacerlos configurables. Se mantienen\
      \ fijos por simplicidad, alineado con el alcance de esta primera version."
    errorMessage: null
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-KTLEN-R008"
    name: "Nombres de los analizadores en el informe"
    severity: "major"
    description: "Cada uno de los dos analizadores de esta funcionalidad se identifica\
      \ con un nombre unico en el informe de auditoria, de modo que el usuario pueda\
      \ distinguir las puntuaciones de longitud de titulos de las puntuaciones de\
      \ longitud de instrucciones: | Analizador | Nombre en el informe | Que evalua\
      \ | |------------|---------------------|------------| | Longitud de titulos\
      \ | `knowledge-title-length` | Longitud ponderada del titulo de cada knowledge\
      \ (R001-R003) | | Longitud de instrucciones | `knowledge-instructions-length`\
      \ | Longitud simple de las instrucciones de cada knowledge (R005-R006) | Estos\
      \ nombres aparecen en las puntuaciones por nodo de la jerarquia y permiten al\
      \ usuario filtrar y comparar resultados de ambos analisis de forma independiente."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  journeys:
  - id: "F-KTLEN-J001"
    name: "Auditar la longitud de titulos e instrucciones de un curso completo"
    steps:
    - "El usuario inicia una auditoria de un curso previamente cargado en el sistema"
    - "El sistema recorre la jerarquia del curso de arriba hacia abajo: para cada\
      \ nivel (milestone), sus topics, y sus knowledges"
    - "Para cada knowledge, el analizador de titulos calcula la longitud ponderada\
      \ del titulo usando el sistema de pesos por caracter (R002) y produce una puntuacion\
      \ individual (R003)"
    - "Para cada knowledge, el analizador de instrucciones mide la longitud simple\
      \ de las instrucciones y produce una puntuacion basada en los umbrales suave\
      \ y duro (R006)"
    - "La plataforma agrega las puntuaciones de ambos analizadores por separado a\
      \ traves de la jerarquia: para cada topic calcula el promedio de sus knowledges,\
      \ para cada nivel el promedio de sus topics, y para el curso el promedio de\
      \ sus niveles"
    - "El usuario recibe un informe con las puntuaciones de longitud de titulos y\
      \ de instrucciones en cada nivel de la jerarquia, permitiendo identificar donde\
      \ se concentran los problemas"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-KTLEN-J002"
    name: "Identificar knowledges con titulos demasiado largos"
    steps:
    - "El usuario ha ejecutado la auditoria de un curso (J001)"
    - "El usuario observa que la puntuacion del analizador \"knowledge-title-length\"\
      \ en un topic es baja (por ejemplo, 0.6)"
    - "El usuario profundiza en los knowledges del topic"
    - "El usuario identifica los knowledges cuyo titulo excede los 28 caracteres ponderados\
      \ y tienen puntuacion menor a 1.0"
    - "El usuario revisa los titulos afectados y los acorta o reformula para que se\
      \ ajusten al limite, priorizando los que tienen puntuacion mas baja (titulos\
      \ mas excedidos)"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-KTLEN-J003"
    name: "Identificar knowledges con instrucciones excesivamente largas"
    steps:
    - "El usuario ha ejecutado la auditoria de un curso (J001)"
    - "El usuario observa que la puntuacion del analizador \"knowledge-instructions-length\"\
      \ en un nivel es baja"
    - "El usuario profundiza en los topics y knowledges del nivel"
    - "El usuario identifica los knowledges cuyas instrucciones tienen puntuacion\
      \ 0.0 (mas de 100 caracteres) o 0.5 (entre 70 y 100 caracteres)"
    - "El usuario prioriza las instrucciones con puntuacion 0.0 (las mas criticas)\
      \ y las sintetiza para reducir su longitud por debajo de los 70 caracteres"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-KTLEN-J004"
    name: "Comparar problemas de titulos vs instrucciones por nivel"
    steps:
    - "El usuario ha ejecutado la auditoria de un curso (J001)"
    - "El usuario consulta las puntuaciones por nivel para ambos analizadores"
    - "El usuario compara las puntuaciones de \"knowledge-title-length\" y \"knowledge-instructions-length\"\
      \ en cada nivel"
    - "El usuario identifica si los problemas de longitud se concentran en los titulos,\
      \ en las instrucciones, o en ambos"
    - "Esta comparacion permite al usuario priorizar acciones correctivas: si solo\
      \ los titulos son problematicos, puede enfocarse en reformularlos sin revisar\
      \ las instrucciones, y viceversa"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  doubts:
  - id: "DOUBT-WEIGHTED-CHARS"
    question: "Se debe usar el sistema de caracteres ponderados para titulos?"
    options:
    - label: "Opcion A: Usar longitud ponderada con los pesos de la referencia (0.0,\
        \ 0.5, 0.7, 1.0) — mayor precision visual, mayor complejidad"
      description: null
    - label: "Opcion B: Usar longitud simple (todos los caracteres pesan 1.0) — mas\
        \ simple, menos preciso visualmente"
      description: null
    - label: "Opcion C: Usar longitud ponderada pero recalibrar los pesos para la\
        \ fuente de la interfaz actual"
      description: null
    answer: null
  - id: "DOUBT-TITLE-MAX-LENGTH"
    question: "Cual es el limite maximo correcto para titulos?"
    options:
    - label: "Opcion A: 28 caracteres (ponderados o simples), como en la referencia\
        \ original"
      description: null
    - label: "Opcion B: 80 caracteres simples, como en la implementacion provisional"
      description: null
    - label: "Opcion C: Otro valor que se determine segun los elementos de interfaz\
        \ donde se muestran los titulos"
      description: null
    answer: null
  - id: "DOUBT-INSTRUCTIONS-LIMITS"
    question: "Cuales son los limites correctos para instrucciones?"
    options:
    - label: "Opcion A: Limites 70/100 con scoring de tres niveles, como en la referencia\
        \ — mas estricto, refleja restricciones reales de UI"
      description: null
    - label: "Opcion B: Limite unico de 300 con scoring lineal, como en la implementacion\
        \ provisional — mas permisivo, penalizacion gradual"
      description: null
    - label: "Opcion C: Limites configurables que se determinen segun las necesidades\
        \ del equipo de contenido"
      description: null
    answer: null
  - id: "DOUBT-TITLE-MIN-LENGTH"
    question: "Se debe evaluar un largo minimo para titulos?"
    options:
    - label: "Opcion A: No evaluar minimo, solo importa que no excedan el maximo —\
        \ simplicidad, alineado con la referencia"
      description: null
    - label: "Opcion B: Establecer un minimo de 3 caracteres, titulos mas cortos reciben\
        \ puntuacion 0.0 — protege contra titulos no descriptivos"
      description: null
    - label: "Opcion C: Establecer un minimo pero con penalizacion gradual en lugar\
        \ de puntuacion 0.0"
      description: null
    answer: null
  - id: "DOUBT-EMPTY-INSTRUCTIONS"
    question: "Como puntuar knowledges sin instrucciones?"
    options:
    - label: "Opcion A: 1.0 — no penalizar, las instrucciones son opcionales y su\
        \ ausencia no afecta la experiencia"
      description: null
    - label: "Opcion B: 0.0 — penalizar, todos los knowledges deberian tener instrucciones\
        \ para guiar al estudiante"
      description: null
    - label: "Opcion C: No producir puntuacion — excluir del analisis los knowledges\
        \ sin instrucciones, similar a como FEAT-SLEN excluye quizzes que no son oraciones"
      description: null
    answer: null
