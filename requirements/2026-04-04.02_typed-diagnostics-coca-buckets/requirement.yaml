  doubts:
  - id: "DOUBT-BUCKET-SUMMARY"
    question: "Tipo separado para buckets de topic vs BucketResult reutilizado"
    options:
    - label: "Opcion A: Crear `BucketSummary` con solo `bandName`, `count` y `percentage`.\
        \ Mas preciso semanti camente: deja claro que a nivel topic no hay evaluacion\
        \ contra objetivos. Introduce un tipo nuevo pero simple."
      description: null
    - label: "Opcion B: Reutilizar `BucketResult` en todos los niveles. A nivel topic,\
        \ los campos `targetPercentage`, `score` y `assessment` tendrian valores por\
        \ defecto. Menos tipos, pero la semanti ca es menos clara: un consumidor podria\
        \ interpretar incorrectamente que el score 0.0 significa una evaluacion deficiente."
      description: null
    answer: null
