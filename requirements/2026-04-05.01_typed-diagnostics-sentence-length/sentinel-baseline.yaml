dependencies:
- alias: langchain4j-openai
  artifact: dev.langchain4j:langchain4j-open-ai:0.36.2
  scope: compile
  provides:
  - type: OpenAiChatModel
    package: dev.langchain4j.model.openai
  - type: OpenAiChatModel.OpenAiChatModelBuilder
    package: dev.langchain4j.model.openai
- alias: langchain4j-core
  artifact: dev.langchain4j:langchain4j-core:0.36.2
  scope: compile
  provides:
  - type: ChatLanguageModel
    package: dev.langchain4j.model.chat
  - type: ChatMessage
    package: dev.langchain4j.data.message
  - type: SystemMessage
    package: dev.langchain4j.data.message
  - type: UserMessage
    package: dev.langchain4j.data.message
  - type: AiMessage
    package: dev.langchain4j.data.message
  - type: Response
    package: dev.langchain4j.model.output
- alias: jackson-databind
  artifact: com.fasterxml.jackson.core:jackson-databind:2.17.2
  scope: compile
  provides:
  - type: ObjectMapper
    package: com.fasterxml.jackson.databind
  - type: JsonNode
    package: com.fasterxml.jackson.databind
  - type: JsonProcessingException
    package: com.fasterxml.jackson.core
language:
  name: java
  version: 17
quality:
  enabled: true
  enforcement: warn
  tools:
    coverage:
      enabled: true
    crap:
      enabled: true
      hotspotThreshold: 30
    mutation:
      enabled: true
      history:
        enabled: true
        path: .sentinel/pit-history
      operators: DEFAULTS
      timeoutMinutes: 10
  thresholds:
    global:
      lineCoverage: 70
      branchCoverage: 60
      mutationScore: 60
      crapHotspotsMax: 5
