      implements:
      - ContentAnalyzer
- name: course-domain
  description: "Domain module for course structure. Contains entity models representing\
    \ the 5-level hierarchy (Course > ROOT > Milestone > Topic > Knowledge > QuizTemplate),\
    \ ports for persistence and validation, and domain exceptions. All models are\
    \ Java records with defensive copying. This module has no infrastructure dependencies."
  models:
  - name: NodeKind
    type: enum
    fields:
    - name: ROOT
    - name: MILESTONE
    - name: TOPIC
    - name: KNOWLEDGE
  - name: SentencePartKind
    type: enum
    fields:
    - name: TEXT
    - name: CLOZE
  - name: CourseEntity
    type: record
    fields:
    - name: id
      type: String
      description: MongoDB ObjectId as 24-char hex string
    - name: title
      type: String
      description: "Course name, e.g. english-course"
    - name: knowledgeIds
      type: List<String>
      description: Ordered list of all knowledge IDs in the course (R002)
    - name: root
      type: RootNodeEntity
      description: Explicit ROOT node (R001)
    - name: slug
      type: String
      description: "Directory name on disk, preserved for idempotency (R003/R016)"
  - name: RootNodeEntity
    type: record
    fields:
    - name: id
      type: String
      description: MongoDB ObjectId as 24-char hex string
    - name: code
      type: String
      description: Always root
    - name: kind
      type: NodeKind
      description: Always ROOT
    - name: label
      type: String
      description: Always empty string
    - name: children
      type: List<String>
      description: Ordered milestone IDs defining milestone order (R002/R013)
    - name: milestones
      type: List<MilestoneEntity>
      description: Resolved milestone entities in order
  - name: MilestoneEntity
    type: record
    fields:
    - name: id
      type: String
      description: MongoDB ObjectId as 24-char hex string
    - name: code
      type: String
      description: "Entity code, currently matches id"
    - name: kind
      type: NodeKind
      description: Always MILESTONE
    - name: label
      type: String
      description: "Visible name, e.g. A1, B2"
    - name: oldId
      type: String
      description: Legacy UUID identifier
    - name: parentId
      type: String
      description: References the ROOT node id (R008)
    - name: children
      type: List<String>
      description: Ordered topic IDs defining topic order (R002/R013)
    - name: order
      type: int
      description: "Ordinal position within course, 1-based, derived from ROOT children\
        \ (R013)"
    - name: slug
      type: String
      description: "Directory name on disk, preserved for idempotency (R003/R016)"
    - name: topics
      type: List<TopicEntity>
      description: Resolved topic entities in order
  - name: TopicEntity
    type: record
    fields:
    - name: id
      type: String
      description: MongoDB ObjectId as 24-char hex string
    - name: code
      type: String
      description: "Entity code, currently matches id"
    - name: kind
      type: NodeKind
      description: Always TOPIC
    - name: label
      type: String
      description: "Visible name, e.g. Present Simple"
    - name: oldId
      type: String
      description: Legacy UUID identifier
    - name: parentId
      type: String
      description: References the parent milestone id (R008)
    - name: children
      type: List<String>
      description: "Always null in current data, preserved for idempotency (R010)"
    - name: ruleIds
      type: List<String>
      description: Ordered knowledge IDs defining knowledge order (R002/R013)
    - name: order
      type: int
      description: "Ordinal position within milestone, 1-based, derived from milestone\
        \ children (R013)"
    - name: slug
      type: String
      description: "Directory name on disk, preserved for idempotency (R003/R016)"
    - name: knowledges
      type: List<KnowledgeEntity>
      description: Resolved knowledge entities in order
  - name: KnowledgeEntity
    type: record
    fields:
    - name: id
      type: String
      description: MongoDB ObjectId as 24-char hex string
    - name: code
      type: String
      description: "Entity code, currently matches id"
    - name: kind
      type: NodeKind
      description: Always KNOWLEDGE
    - name: label
      type: String
      description: "Visible name, e.g. Affirmative sentences in the present simple"
    - name: oldId
      type: String
      description: Legacy UUID identifier
    - name: parentId
      type: String
      description: References the parent topic id (R008)
    - name: isRule
      type: boolean
      description: Always true in current data
    - name: instructions
      type: String
      description: "Exercise instructions in Spanish, may be null in exceptional cases\
        \ (R009)"
    - name: order
      type: int
      description: "Ordinal position within topic, 1-based, derived from topic ruleIds\
        \ (R013)"
    - name: slug
      type: String
      description: "Directory name on disk, preserved for idempotency (R003/R016)"
    - name: quizTemplates
      type: List<QuizTemplateEntity>
      description: "Associated quiz templates, at least 1 required (R004)"
  - name: QuizTemplateEntity
    type: record
    fields:
    - name: id
      type: String
      description: Plain string ObjectId (R011)
    - name: oidId
      type: String
      description: "Same value as id, serialized as $oid wrapper in JSON (R011)"
    - name: kind
      type: String
      description: "Quiz type, currently always CLOZE"
    - name: knowledgeId
      type: String
      description: References parent knowledge id (R008)
    - name: title
      type: String
      description: "Quiz title, usually matches knowledge label"
    - name: instructions
      type: String
      description: "Instructions in Spanish, may be empty"
    - name: translation
      type: String
      description: Spanish translation of the sentence
    - name: theoryId
      type: String
      description: Theory reference in format milestone.number.theory_name
    - name: topicName
      type: String
      description: Redundant topic label
    - name: form
      type: FormEntity
      description: Exercise form structure
    - name: difficulty
      type: double
      description: "Difficulty level, currently always 0.0 (R012: stored as $numberDouble)"
    - name: retries
      type: double
      description: "Allowed retries, currently always 0.0 (R012: stored as $numberDouble)"
    - name: noScoreRetries
      type: double
      description: "No-score retries, currently always 0.0 (R012: stored as $numberDouble)"
    - name: code
      type: String
      description: "Auxiliary code, currently always empty"
    - name: audioUrl
      type: String
      description: "Exercise audio URL, currently always empty"
    - name: imageUrl
      type: String
      description: "Exercise image URL, currently always empty"
    - name: answerAudioUrl
      type: String
      description: Answer audio reference in format Milestone.section.subsection.number
    - name: answerImageUrl
      type: String
      description: "Answer image URL, currently always empty"
    - name: miniTheory
      type: String
      description: "Inline brief theory, currently always empty"
    - name: successMessage
      type: String
      description: "Success message, currently always empty"
  - name: FormEntity
    type: record
    fields:
    - name: kind
      type: String
      description: "Form type, currently always CLOZE"
    - name: incidence
      type: double
      description: "Weight/frequency, currently always 1.0 (R012: stored as $numberDouble)"
    - name: label
      type: String
      description: "Form label, currently always empty"
    - name: name
      type: String
      description: "Form name, currently always empty"
    - name: sentenceParts
      type: List<SentencePartEntity>
      description: Ordered sentence parts composing the exercise (R002)
  - name: SentencePartEntity
    type: record
    fields:
    - name: kind
      type: SentencePartKind
      description: "TEXT for fixed text, CLOZE for fill-in-the-blank"
    - name: text
      type: String
      description: "Visible text for TEXT parts, empty for CLOZE"
    - name: options
      type: List<String>
      description: "Answer options for CLOZE parts, null for TEXT parts"
  - name: CourseValidationException
    type: exception
    fields:
    - name: path
      type: String
    - name: detail
      type: String
    message: "Error al cargar el curso desde '%s': %s. La carga fue abortada."
    extends: RuntimeException
  interfaces:
  - name: CourseRepository
    stereotype: port
    sealed: false
    exposes:
    - signature: "load(Path path): CourseEntity"
    - signature: "save(CourseEntity course, Path path): void"
  - name: CourseValidator
    stereotype: service
    sealed: false
    exposes:
    - signature: "validate(CourseEntity course): void"
  scope: internal
  packages:
  - name: quizsentence
    description: "Public contract of the quizSentence DSL. Exposes the converter service\
      \ and the domain exceptions raised when the DSL grammar or the sentenceParts\
      \ convention is violated. The conversion engine itself is hidden in the sibling\
      \ 'quizsentenceengine' internal package (Public Port, Hidden Adapter)."
    visibility: public
    models:
    - name: QuizSentenceSerializationException
      type: exception
      fields:
      - name: reason
        type: String
        description: "Human-readable cause (R013, R024)."
      - name: position
        type: String
        description: Index of the offending sentencePart or 'n/a'.
      message: "No es posible serializar a quizSentence: %s (posicion %s)"
      extends: RuntimeException
    - name: QuizSentenceParseException
      type: exception
      fields:
      - name: reason
        type: String
        description: "Human-readable cause (R016, R024)."
      - name: position
        type: int
        description: Character offset in the input where the grammar violation was
          detected.
      message: "No es posible parsear el quizSentence: %s (posicion %d)"
      extends: RuntimeException
    interfaces:
    - name: QuizSentenceConverter
      stereotype: service
      sealed: false
      exposes:
      - signature: "serialize(FormEntity form): String"
      - signature: "parse(String quizSentence): FormEntity"
      - signature: "toPlainSentences(FormEntity form): List<String>"
      visibility: public
  - name: quizsentenceengine
    description: "Internal engine implementing the quizSentence DSL conversions. The\
      \ public class DefaultQuizSentenceConverter is instantiated once by the composition\
      \ root (audit-cli bootstrap); all collaborators (QuizSentenceSerializer, QuizSentenceParser,\
      \ PlainSentenceDeriver, WhitespaceNormalizer) stay package-private so external\
      \ modules cannot bypass the port."
    visibility: internal
    implementations:
    - name: DefaultQuizSentenceConverter
      requiresInject:
      - name: serializer
        type: QuizSentenceSerializer
      - name: parser
        type: QuizSentenceParser
      - name: plainDeriver
        type: PlainSentenceDeriver
      visibility: public
      handwrittenTests:
      - name: should treat multi-entry options and pipe-splits as equivalent variants
          of the same answer
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R001
      - name: should treat the pipe character as separator of equivalent variants
          inside an options entry
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R002
      - name: should fail atomically when a TEXT part has options populated
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R003
      - name: should fail atomically when a CLOZE part has null or empty options
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R004
      - name: should reject an underscore run of length other than four as a blank
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R005
      - name: should reject a blank that is not followed by an answer block in brackets
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R006
      - name: should recognize parenthesized segments as pedagogical hints inside
          plain-text positions
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R007
      - name: should reject a quizSentence that does not alternate text and blank+block
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R008
      - name: should fail explicitly when reserved characters appear unescaped in
          TEXT content
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R009
      - name: should emit a single canonical space between text and DSL markers on
          serialize
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R010
      - name: should tolerate runs of whitespace on parse and normalize them
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R010
      - name: should serialize each TEXT preserving its hints with canonical whitespace
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R011
      - name: should serialize each CLOZE as four underscores followed by bracketed
          pipe-joined variants
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R012
      - name: should fail atomically when serializing an invalid FormEntity without
          producing partial output
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R013
      - name: should reconstruct alternating TEXT and CLOZE parts by scanning blank+block
          occurrences
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R014
      - name: should preserve hints inside the reconstructed TEXT text field and not
          extract them to the model
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R015
      - name: should fail atomically when parsing a malformed quizSentence without
          producing partial output
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R016
      - name: should return a list with one plain sentence per equivalent variant
          of the answer
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R017
      - name: should place the first sub-variant of the first options entry at index
          0 as the canonical variant
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R018
      - name: should strip pedagogical hints from every emitted plain sentence
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R019
      - name: should normalize whitespace in every emitted plain sentence after hint
          stripping
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R019
      - name: should produce the same plain sentences list whether derived directly
          from sentenceParts or via quizSentence
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R020
      - name: should fail atomically when toPlainSentences is called on an invalid
          FormEntity
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R024
      - name: should preserve semantics on round-trip sentenceParts to quizSentence
          to sentenceParts under whitespace-normalized equivalence
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R021
      - name: should preserve the quizSentence string on round-trip through sentenceParts
          under whitespace-normalized equivalence
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R022
      - name: should expose only the three forward conversions and no inverse reconstruction
          from a plain sentence
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R023
      - name: should round-trip every real CLOZE in db english-course quizzes json
          fixtures without error
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R028
      - name: should be consumable as a public course-domain service from another
          module
        traceability:
          feature: FEAT-QSENT
          rule: F-QSENT-R025
      implements:
      - QuizSentenceConverter
    - name: QuizSentenceSerializer
    - name: QuizSentenceParser
    - name: PlainSentenceDeriver
      requiresInject:
      - name: whitespaceNormalizer
        type: WhitespaceNormalizer
        description: "Helper de normalizacion de whitespace (collapse runs, trim)\
          \ usado al final de buildSentenceFromParts para cumplir R019 sobre la oracion\
          \ derivada."
    - name: WhitespaceNormalizer
- name: refiner-domain
  description: Refinement engine
  dependsOn:
  - audit-domain
  models:
  - name: DiagnosisKind
    type: enum
    fields:
    - name: SENTENCE_LENGTH
    - name: LEMMA_ABSENCE
    - name: COCA_BUCKETS
    - name: LEMMA_RECURRENCE
    - name: KNOWLEDGE_TITLE_LENGTH
    - name: KNOWLEDGE_INSTRUCTIONS_LENGTH
  - name: RefinementTaskStatus
    type: enum
    fields:
    - name: PENDING
    - name: COMPLETED
    - name: SKIPPED
  - name: RefinementTask
    type: record
    fields:
    - name: id
      type: String
      description: Unique task identifier
    - name: nodeTarget
      type: AuditTarget
      description: "The hierarchy level of the node (QUIZ, KNOWLEDGE, TOPIC, MILESTONE,\
        \ COURSE)"
    - name: nodeId
      type: String
      description: Identifier of the target entity
    - name: nodeLabel
      type: String
      description: Human-readable label for display
    - name: diagnosisKind
      type: DiagnosisKind
      description: Which analyzer flagged the problem
    - name: priority
      type: int
      description: Priority rank (1 = highest)
    - name: status
      type: RefinementTaskStatus
      description: Current status
  - name: RefinementPlan
    type: record
    fields:
    - name: id
      type: String
      description: Unique plan identifier
    - name: sourceAuditId
      type: String
      description: ID of the AuditReport this plan was derived from
    - name: createdAt
      type: Instant
      description: When this plan was created
    - name: tasks
      type: List<RefinementTask>
      description: Prioritized list of refinement tasks
  - name: SuggestedLemma
    type: record
    fields:
    - name: lemma
      type: String
    - name: pos
      type: String
    - name: reason
      type: String
    - name: cocaRank
      type: Integer
  - name: SentenceLengthCorrectionContext
    type: record
    fields:
    - name: taskId
      type: String
    - name: sentence
      type: String
    - name: translation
      type: String
    - name: knowledgeTitle
      type: String
    - name: knowledgeInstructions
      type: String
    - name: topicLabel
      type: String
    - name: cefrLevel
      type: CefrLevel
    - name: tokenCount
      type: int
    - name: targetMin
      type: int
    - name: targetMax
      type: int
    - name: delta
      type: int
    - name: suggestedLemmas
      type: List<SuggestedLemma>
    implements:
    - CorrectionContext
  - name: MisplacedLemmaContext
    type: record
    fields:
    - name: lemma
      type: String
      description: Base form of the misplaced word
    - name: pos
      type: String
      description: "Part of speech (e.g., VERB, NOUN)"
    - name: expectedLevel
      type: CefrLevel
      description: CEFR level where this word belongs per EVP (always higher than
        quizLevel)
    - name: quizLevel
      type: CefrLevel
      description: CEFR level of the quiz where the word was found
    - name: cocaRank
      type: Integer
      description: COCA frequency ranking (nullable)
  - name: LemmaAbsenceCorrectionContext
    type: record
    fields:
    - name: taskId
      type: String
      description: Identifier of the refinement task
    - name: sentence
      type: String
      description: Current quiz sentence as plain text
    - name: translation
      type: String
      description: Spanish translation of the sentence
    - name: knowledgeTitle
      type: String
      description: Title of the parent knowledge
    - name: knowledgeInstructions
      type: String
      description: Instructions of the exercise
    - name: topicLabel
      type: String
      description: Label of the parent topic
    - name: cefrLevel
      type: CefrLevel
      description: CEFR level determined by milestone ancestor
    - name: misplacedLemmas
      type: List<MisplacedLemmaContext>
      description: Words in the quiz whose expected CEFR level is higher than the
        quiz level
    - name: suggestedLemmas
      type: List<SuggestedLemma>
      description: Absent lemmas from the level that could serve as replacements (reuses
        existing SuggestedLemma model)
    - name: quizSentence
      type: String
      description: FEAT-QSENT DSL of the original quiz (R001). Copied verbatim from
        AuditableQuiz.quizSentence by LemmaAbsenceContextResolver; never recomputed
        in this module. Coexists with `sentence` (plain) per R001 — both correspond
        to the same quiz and the same derivation step (R003). Null when the upstream
        AuditableQuiz was built before FEAT-QSENT was shipped.
    - name: tokenCount
      type: Integer
      description: |
        Cantidad actual de tokens en la oracion del quiz, copiada de SentenceLengthDiagnosis.tokenCount sobre el mismo nodo quiz (F-RCLALEN-R001, F-RCLALEN-R003). Nullable cuando no hay diagnostico de longitud disponible (F-RCLALEN-R004); reusa nombre y semantica de F-RCSL-R001.
    - name: targetMin
      type: Integer
      description: |
        Minimo de tokens esperados para el nivel CEFR del quiz, copiado de SentenceLengthDiagnosis.targetMin (F-RCLALEN-R001). Nullable cuando no hay diagnostico (F-RCLALEN-R004).
    - name: targetMax
      type: Integer
      description: |
        Maximo de tokens esperados para el nivel CEFR del quiz, copiado de SentenceLengthDiagnosis.targetMax (F-RCLALEN-R001). Nullable cuando no hay diagnostico (F-RCLALEN-R004).
    - name: delta
      type: Integer
      description: |
        Desviacion respecto al rango: 0 si esta dentro, positivo si excede el maximo, negativo si esta por debajo del minimo (F-RCLALEN-R001). Nullable cuando no hay diagnostico (F-RCLALEN-R004). Misma convencion de signo que F-RCSL-R001.
    - name: lengthDirection
      type: LengthDirection
      description: |
        Direccion accionable derivada del signo de delta por el resolver (F-RCLALEN-R002). Cuando no hay SentenceLengthDiagnosis se establece a UNKNOWN (F-RCLALEN-R004), nunca null. Pre-calculado del lado del sistema para que el prompt LLM sea deterministico y la salida CLI tenga una etiqueta legible para humanos.
    implements:
    - CorrectionContext
  - name: LengthDirection
    type: enum
    fields:
    - name: SHORTEN
      description: La oracion excede el rango (delta > 0); el LLM debe acortarla mientras
        reemplaza vocabulario.
    - name: LENGTHEN
      description: La oracion esta por debajo del rango (delta < 0); el LLM tiene
        margen para incorporar mas vocabulario sugerido.
    - name: KEEP_SAME
      description: La oracion esta dentro del rango (delta == 0); el LLM debe mantener
        una longitud similar al reemplazar.
    - name: UNKNOWN
      description: No hay SentenceLengthDiagnosis disponible para el nodo quiz (F-RCLALEN-R004);
        el LLM solo se gua por las reglas existentes de FEAT-RCLA.
    visibility: public
    glossarySuggestions:
    - name: Length Direction
      technicalName: LengthDirection
      kind: value-object-candidate
      basedOn: refiner-domain/LengthDirection
      rationale: |
        Etiqueta accionable y enumerable que el contexto de correccion expone al LLM. Si surge la necesidad de razonarla en otros contextos (revision, refinement, reportes), promover a termino canonico del glosario.
  interfaces:
  - name: RefinerEngine
    stereotype: port
    sealed: false
    exposes:
    - signature: "plan(AuditReport report, String auditId): RefinementPlan"
    - signature: "nextTask(RefinementPlan plan): Optional<RefinementTask>"
  - name: RefinementPlanStore
    stereotype: port
    sealed: false
    exposes:
    - signature: "save(RefinementPlan plan): String"
    - signature: "load(String id): Optional<RefinementPlan>"
    - signature: "loadLatest(): Optional<RefinementPlan>"
  - name: CorrectionContextResolver
    stereotype: port
    sealed: false
    exposes:
    - signature: "resolve(AuditReport report, RefinementTask task): Optional<T>"
    - signature: "resolveWithIndex(AuditNodeIndex nodeIndex, AuditReport report, RefinementTask\
        \ task): Optional<T>"
    - signature: "supports(DiagnosisKind kind): boolean"
    typeParameters:
    - T extends CorrectionContext
  - name: CorrectionContext
    stereotype: port
    sealed: false
  implementations:
  - name: SentenceLengthContextResolver
    visibility: public
    handwrittenTests:
    - name: should resolve context with all fields populated from quiz diagnosis and
        ancestor entities
      traceability:
        feature: FEAT-RCSL
        rule: F-RCSL-R001
      _change: add
    - name: should populate sentence and translation from AuditableQuiz entity on
        the quiz node
      traceability:
        feature: FEAT-RCSL
        rule: F-RCSL-R001
      _change: add
    - name: should populate knowledgeTitle and knowledgeInstructions from AuditableKnowledge
        on knowledge ancestor
      traceability:
        feature: FEAT-RCSL
        rule: F-RCSL-R001
      _change: add
    - name: should populate topicLabel from AuditableTopic on topic ancestor
      traceability:
        feature: FEAT-RCSL
        rule: F-RCSL-R001
      _change: add
    - name: should populate cefrLevel tokenCount targetMin targetMax and delta from
        SentenceLengthDiagnosis
      traceability:
        feature: FEAT-RCSL
        rule: F-RCSL-R001
      _change: add
    - name: should return empty when quiz node is not found in the audit tree
      traceability:
        feature: FEAT-RCSL
        rule: F-RCSL-R002
      _change: add
    - name: should return empty when task nodeTarget does not match any node target
        in the tree
      traceability:
        feature: FEAT-RCSL
        rule: F-RCSL-R002
      _change: add
    - name: should locate the correct quiz node when multiple quiz nodes exist in
        the tree
      traceability:
        feature: FEAT-RCSL
        rule: F-RCSL-R002
      _change: add
    - name: should include only COMPLETELY_ABSENT and APPEARS_TOO_LATE lemmas and
        exclude APPEARS_TOO_EARLY
      traceability:
        feature: FEAT-RCSL
        rule: F-RCSL-R003
      _change: add
    - name: should order suggested lemmas by COCA rank ascending with lowest rank
        first
      traceability:
        feature: FEAT-RCSL
