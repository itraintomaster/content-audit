          \ el plan calculado es el mismo modulo dispatch del resultado"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado un auditId valido y storageMode EPHEMERAL, cuando plan se invoca,\
