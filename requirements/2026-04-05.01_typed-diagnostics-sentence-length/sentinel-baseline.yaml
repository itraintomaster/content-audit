          \ elementBefore (non-identity proposal)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R001
      - name: "Given an elementBefore and a candidate, when derive is called, then\
          \ elementAfter replaces the entire quiz form and translation in one step\
          \ rather than splicing word-by-word changes onto the original"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R003
      - name: "Given an elementBefore with a specific quizId, nodeIds, instructions\
          \ and order, and any candidate, when derive is called, then those fields\
          \ on elementAfter are bit-for-bit identical to elementBefore"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R014
      - name: "Given a candidate whose translation differs from elementBefore.translation,\
          \ when derive is called, then elementAfter.translation equals the candidate.translation\
          \ verbatim"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R013
      - name: "Given a candidate whose quizSentence changes the correct answer and\
          \ accepted variants of a CLOZE, when derive is called, then elementAfter.quizForm\
          \ reflects those new answers and variants parsed from the candidate's DSL"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R013
      - name: "Given the same elementBefore and the same candidate, when derive is\
          \ called twice, then both invocations return equal elementAfter snapshots\
          \ (determinism)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R012
      - name: "Given a candidate whose quizSentence is malformed according to the\
          \ FEAT-QSENT grammar, when derive is called, then it throws ProposalDerivationException\
          \ and does not return a partial elementAfter"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R012
      - name: "Given a candidate that carries only quizSentence and translation, when\
          \ derive is called, then the deriver never asks the candidate for plain\
          \ sentence text or quizForm fields (the strategy emits only those two pieces)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R019
      implements:
      - LemmaAbsenceProposalDeriver
    - name: DefaultImpactPreviewComputer
      requiresInject:
      - name: courseMapper
        type: CourseMapper
        description: "Pure transformation CourseEntity -> AuditableCourse. The mapper\
          \ relies on NlpTokenizer (CPU-only via the spaCy adapter) and QuizSentenceConverter\
          \ (pure); it does NOT touch disk, which is what makes it valid for the in-memory\
          \ simulation."
      - name: auditEngine
        type: AuditEngine
        description: Pure function AuditableCourse -> AuditReport. Re-running it on
          the simulated course produces the 'after' tree without writing any official
          AuditReport (F-PIPRE-R002).
      - name: elementLocator
        type: CourseElementLocator
        description: "Used to apply the proposal in memory: replace(currentCourse,\
          \ proposal.elementAfter) and snapshot(simulatedCourse, ...) for the absence\
          \ check (F-PIPRE-R009 case 1)."
      - name: auditReportStore
        type: AuditReportStore
        description: Loads the latest AuditReport of the current course as the 'before'
          baseline. Failure to retrieve it maps to BASE_AUDIT_UNAVAILABLE (F-PIPRE-R009
          case 2).
      handwrittenTests:
      - name: "Dado un currentCourse y una RevisionProposal, cuando compute corre,\
          \ entonces no se invoca AuditReportStore.save y no se persiste ningun AuditReport\
          \ nuevo"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R002
      - name: "Dado un currentCourse y una RevisionProposal, cuando compute corre,\
          \ entonces el ScoreDelta.before de cada LevelImpact se calcula contra el\
          \ AuditReport baseline del curso recibido y no contra una version posterior"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R003
      - name: "Dada una RevisionProposal sobre un quiz contenido en knowledge, milestone,\
          \ topic y curso, cuando compute corre, entonces el ImpactPreview.levelImpacts\
          \ cubre la cadena jerarquica QUIZ -> KNOWLEDGE -> TOPIC -> MILESTONE ->\
          \ COURSE en orden de hoja a raiz"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R004
      - name: "Dada una RevisionProposal sobre un nodo cuyo arbol no contiene algun\
          \ nivel intermedio, cuando compute corre, entonces los niveles ausentes\
          \ se omiten en lugar de reportarse como cero en levelImpacts"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R004
      - name: "Dada una RevisionProposal cuyo elementAfter afecta multiples analyzers,\
          \ cuando compute corre, entonces el LevelImpact correspondiente expone un\
          \ DimensionDelta por cada analyzer evaluado en ese nivel"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R005
      - name: "Dado un nivel donde un analyzer no aporta diagnosticos, cuando compute\
          \ corre, entonces ese analyzer se omite de dimensionDeltas en lugar de reportarse\
          \ con delta cero"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R005
      - name: "Dado un ScoreDelta producido por compute para cualquier (nivel, dimension),\
          \ entonces los tres campos before, after y difference estan presentes y\
          \ difference es exactamente after menos before"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R006
      - name: "Dada una RevisionProposal cuyo nodeId no se localiza en el currentCourse\
          \ al simular, cuando compute corre, entonces retorna un ImpactPreview con\
          \ availability UNAVAILABLE, reason TARGET_NODE_ABSENT y detail no vacio\
          \ identificando el nodeId ausente"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R009
      - name: "Dado que AuditReportStore no puede recuperar la auditoria base del\
          \ curso actual, cuando compute corre, entonces retorna un ImpactPreview\
          \ con availability UNAVAILABLE, reason BASE_AUDIT_UNAVAILABLE y detail no\
          \ vacio explicando la causa"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R009
      - name: "Dado que AuditEngine falla al recomputar scores sobre el curso simulado,\
          \ cuando compute corre, entonces retorna un ImpactPreview con availability\
          \ UNAVAILABLE, reason SIMULATION_FAILED y detail no vacio explicando la\
          \ causa"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R009
      - name: "Dadas dos RevisionProposal distintas con el mismo currentCourse, cuando\
          \ compute corre dos veces, entonces produce dos ImpactPreview independientes\
          \ con proposalId distinto y sin compartir levelImpacts entre ambos"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R011
      - name: "Dada una RevisionProposal cuyo elementBefore y elementAfter referencian\
          \ el mismo nodeId estable, cuando compute corre, entonces el LevelImpact\
          \ del nodo objetivo conserva ese nodeId en before y after sin modelar renombres\
          \ ni reubicaciones"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R012
      implements:
      - ImpactPreviewComputer
    - name: DefaultConsolidatedViewBuilderFactory
      types:
      - Component
      visibility: public
      implements:
      - ConsolidatedViewBuilderFactory
    - name: DefaultConsolidatedViewBuilder
      requiresInject:
      - name: revisionArtifactStore
        type: RevisionArtifactStore
        description: "listByPlan(activePlanId) y particionado por verdict: APPROVED\
          \ se aplica como aceptada (contribuye a consolidated y a NodeImpact.acceptedProposalIds);\
          \ PENDING_APPROVAL se aplica como pendiente sobre el consolidated (contribuye\
          \ a pendingProjection y a NodeImpact.pendingProposalId, o cae en NonApplicablePending\
          \ si choca); REJECTED se descarta y no contribuye a ningun campo de la salida\
          \ (F-CDIFF-R005)."
      - name: activeAnalysisSelectionStore
        type: ActiveAnalysisSelectionStore
        description: "Lee el par activo (auditId, planId). Si retorna Optional.empty,\
          \ el builder produce ConsolidatedView con availability=UNAVAILABLE/reason=NO_ACTIVE_ANALYSIS\
          \ y nodeImpacts/statisticImpacts vacios (F-CDIFF-R013)."
      - name: auditReportStore
        type: AuditReportStore
        description: "Carga el AuditReport baseline correspondiente al activeAuditId.\
          \ NUNCA se invoca .save sobre este store; el builder solo lee (F-CDIFF-R015).\
          \ Si la carga falla por inconsistencia, contribuye a availability=UNAVAILABLE/reason=INCONSISTENT_PROPOSAL\
          \ o REAGGREGATION_FAILED segun la causa."
      - name: refinementPlanStore
        type: RefinementPlanStore
        description: "Resuelve activePlanId dentro del activeAuditId. Si no se ubica,\
          \ availability=UNAVAILABLE/reason=ACTIVE_PLAN_UNAVAILABLE (F-CDIFF-R013).\
          \ NUNCA se invoca .save sobre este store (F-CDIFF-R015)."
      - name: courseRepository
        type: CourseRepository
        description: Carga CourseEntity desde coursePath para que courseElementLocator
          pueda resolver snapshots y replaces sobre el subarbol vigente.
      - name: courseElementLocator
        type: CourseElementLocator
        description: "snapshot(courseEntity, nodeId) y replace(courseEntity, elementAfter)\
          \ para aplicar aceptadas y simular pendientes en memoria. Si snapshot retorna\
          \ empty para un nodeId referenciado por una pendiente, esa pendiente cae\
          \ en NonApplicablePending con reason=NODE_ABSENT (F-CDIFF-R012)."
      - name: courseMapper
        type: CourseMapper
        description: "Pure transformation CourseEntity -> AuditableCourse, requerido\
          \ como input al re-correr AuditEngine sobre el subarbol modificado para\
          \ re-agregar metricas de padres con la estrategia del analizador (F-CDIFF-R008)."
      - name: auditEngine
        type: AuditEngine
        description: "Re-corre runAudit sobre AuditableCourse derivado del curso post-aceptadas\
          \ (consolidated) y post-pendientes (pendingProjection). Si la re-agregacion\
          \ falla, availability=UNAVAILABLE/reason=REAGGREGATION_FAILED (F-CDIFF-R013)."
      - name: nodeFieldDiffer
        type: NodeFieldDiffer
        description: "F-CDIFF-R019/R020/R022/R023: el motor de descubrimiento dinamico\
          \ que reemplaza la logica v2 de snapshots crudos + collectStatisticImpacts.\
          \ El builder le pasa los tres AuditNode (baseline / consolidated / pendingProjection)\
          \ por cada nodeTarget+nodeId tocado, y obtiene el mapa { fieldPath → FieldChange\
          \ } que copia tal cual a NodeImpact.fieldChanges. El builder NO interpreta\
          \ el contenido del mapa; es la frontera entre 'que campos cambiaron' (R019)\
          \ y 'que decisiones del plan los provocaron' (R011)."
      types:
      - Component
      handwrittenTests:
      - name: "Dada una seleccion activa con auditId y planId resolubles, cuando build\
          \ corre, entonces ConsolidatedView.activeAuditId y activePlanId coinciden\
          \ con los identificadores leidos del ActiveAnalysisSelectionStore"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R001
      - name: "Dado un par activo cuyo planId no se puede ubicar dentro del analisis\
          \ (RefinementPlanStore retorna empty), cuando build corre, entonces ConsolidatedView.availability\
          \ es UNAVAILABLE con reason ACTIVE_PLAN_UNAVAILABLE"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R013
      - name: "Dada una propuesta aceptada que referencia un nodeId no encontrado\
          \ por CourseElementLocator al re-agregar, cuando build corre, entonces ConsolidatedView.availability\
          \ es UNAVAILABLE con reason INCONSISTENT_PROPOSAL"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R013
      - name: "Dado que AuditEngine falla al recomputar agregaciones sobre el subarbol\
          \ modificado, cuando build corre, entonces ConsolidatedView.availability\
          \ es UNAVAILABLE con reason REAGGREGATION_FAILED"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R013
      - name: "Dada cualquier invocacion de build (exitosa, UNAVAILABLE o con pendientes\
          \ no aplicables), entonces no se invoca AuditReportStore.save, RefinementPlanStore.save\
          \ ni RevisionArtifactStore.save sobre los stores inyectados"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R015
      - name: "Dado un AuditReport cuyo plan activo no tiene propuestas aceptadas\
          \ ni pendientes, cuando build corre, entonces nodeImpacts queda vacio (no\
          \ hay nodos afectados que reportar) — R003"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R003
      - name: "Dado un plan activo de un analisis viejo con propuestas pendientes\
          \ y un analisis mas nuevo cuyo plan no las contiene, cuando build corre\
          \ apuntando al analisis viejo, entonces sus pendientes dormidas aparecen\
          \ como pendingProposalIds y como contribuciones a la foto pendingProjection\
          \ de los fields tocados en nodeImpacts — R004"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R004
      - name: "Dado un RevisionArtifact con verdict REJECTED en el plan activo, cuando\
          \ build corre, entonces ese proposalId no aparece en nodeImpacts (ni en\
          \ acceptedProposalIds ni en pendingProposalIds de ningun nodo) ni en nonApplicablePendings,\
          \ y no contribuye a las fotos original/consolidated/pendingProjection de\
          \ ningun field — R005"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R005
      - name: "Dado que el ActiveAnalysisSelectionStore retorna Optional.empty, cuando\
          \ build corre, entonces ConsolidatedView.availability es UNAVAILABLE con\
          \ reason NO_ACTIVE_ANALYSIS y nodeImpacts queda vacio — R013"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R013
      - name: "Dado un plan activo asociado a un AuditReport y un plan ajeno con propuestas\
          \ distintas asociadas a otro analisis, cuando build corre, entonces solo\
          \ se consultan los RevisionArtifact via listByPlan(activePlanId) y las propuestas\
          \ del plan ajeno no aparecen en nodeImpacts (ni como acceptedProposalIds,\
          \ pendingProposalIds, ni como contribuciones a las fotos de fields) — R017"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R017
      - name: "Dado un nodo hoja con un field cuyas tres fotos son identicas y otro\
          \ field cuya foto consolidated difiere de original, cuando build corre,\
          \ entonces el mapa fieldChanges del NodeImpact contiene SOLO la entrada\
          \ del segundo field — R006 invariante 1: solo fields con cambio"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R006
      - name: "Dado un NodeImpact con varios fields cambiados de origenes distintos\
          \ (componente de diagnostico tipado, contenido del nodo, score escalar),\
          \ cuando build corre, entonces todas las entradas del mapa fieldChanges\
          \ siguen la misma forma clave-valor con FieldChange(original, consolidated,\
          \ pendingProjection) sin ramas separadas por origen del field — R006 invariante\
          \ 2: forma uniforme"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R006
      - name: "Dado un nodo cuyo subarbol no produce ningun field cambiado entre las\
          \ tres fotos, cuando build corre, entonces ese nodo NO aparece en ConsolidatedView.nodeImpacts\
          \ — R006 invariante 3: nodo sin cambios no aparece"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R006
      - name: "Dado un field cambiado de un nodo hoja, cuando build corre, entonces\
          \ FieldChange.original es identico al valor que el AuditReport baseline\
          \ expone para ese field y ese nodo (sin recomputar, sin redondear, sin derivar)\
          \ — R007 invariante 1: fidelidad de original"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      - name: "Dado un escenario donde el AuditEngine es invocado dos veces (una sobre\
          \ el arbol con-aceptadas y otra sobre el arbol con-aceptadas-y-pendientes),\
          \ cuando build corre, entonces FieldChange.consolidated coincide identicamente\
          \ con el valor que el AuditReport del primer runAudit dejo en el AuditNode\
          \ correspondiente, sin que el builder lo recompute o transforme — R007 invariante\
          \ 2: determinacion de consolidated"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      - name: "Dado un escenario donde el AuditEngine es invocado dos veces (una sobre\
          \ el arbol con-aceptadas y otra sobre el arbol con-aceptadas-y-pendientes),\
          \ cuando build corre, entonces FieldChange.pendingProjection coincide identicamente\
          \ con el valor que el AuditReport del segundo runAudit dejo en el AuditNode\
          \ correspondiente, sin que el builder lo recompute o derive desde consolidated\
          \ — R007 invariante 3: determinacion de pendingProjection"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      - name: "Dado un nodo hoja con una aceptada (que cambia el field) y una pendiente\
          \ sobre el mismo nodeId (que lo cambia de nuevo), cuando build corre, entonces\
          \ el AuditEngine es invocado para pendingProjection sobre el arbol que YA\
          \ tiene la aceptada aplicada (no sobre el original) — R007 invariante 4:\
          \ orden de stacking, pendientes sobre consolidated, no sobre original"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      - name: "Dado un nodo padre cuyo subarbol contiene cambios y para el cual el\
          \ AuditEngine produjo un valor agregado en el AuditReport del arbol con-aceptadas,\
          \ cuando build corre, entonces FieldChange.consolidated del field del padre\
          \ es identico a ese valor leido del AuditReport y NO el resultado de re-agregar\
          \ deltas de hijos en el builder — R007 invariante 5: las tres fotos provienen\
          \ del motor"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      - name: "Dado un escenario donde varias dimensiones de score cambian por aceptadas\
          \ o pendientes, cuando build corre, entonces ConsolidatedView devuelto NO\
          \ expone ningun campo statisticImpacts ni ninguna lista paralela de estadisticas\
          \ afectadas; los scores cambiados solo aparecen como entradas del mapa fieldChanges\
          \ del nodo correspondiente — R009"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R009
      - name: "Dado cualquier ConsolidatedView producido por build, entonces ningun\
          \ NodeImpact expone campos acceptedDelta o pendingDelta precomputados; el\
          \ contrato emitido contiene exclusivamente las tripletas (original, consolidated,\
          \ pendingProjection) por field — R010"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R010
      - name: "Dada una propuesta APPROVED del plan activo que cambia el contenido\
          \ de un nodo y otra APPROVED del plan activo que NO afecta a ese nodo, cuando\
          \ build corre, entonces NodeImpact.acceptedProposalIds del nodo afectado\
          \ contiene SOLO el proposalId de la primera (R011 invariante 1: cobertura\
          \ accepted, recíproca incluida)"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R011
      - name: "Dada una propuesta PENDING_APPROVAL aplicable del plan activo que cambia\
          \ un nodo y otra PENDING_APPROVAL aplicable que NO afecta a ese nodo, cuando\
          \ build corre, entonces NodeImpact.pendingProposalIds del nodo afectado\
          \ contiene SOLO el proposalId de la primera (R011 invariante 2: cobertura\
          \ pending, recíproca incluida)"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R011
      - name: "Dado un nodo hoja con dos propuestas aceptadas que lo afectaron en\
          \ orden createdAt ascendente, cuando build corre, entonces NodeImpact.acceptedProposalIds\
          \ contiene ambos proposalId en orden createdAt ascendente — R011 invariante\
          \ 3: orden estable"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R011
      - name: "Dado un nodo afectado con varias aceptadas y varias pendientes que\
          \ tocan distintos fields, cuando build corre, entonces NodeImpact expone\
          \ acceptedProposalIds y pendingProposalIds a nivel del NODO (no asocia un\
          \ proposalId a un field especifico dentro de fieldChanges) — R011 invariante\
          \ 4: trazabilidad por nodo, no por field"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R011
      - name: "Dado un plan activo con multiples propuestas (varias APPROVED y varias\
          \ PENDING_APPROVAL) que tocan distintos nodos, cuando build corre una sola\
          \ vez, entonces ConsolidatedView retornado expone los efectos de TODAS esas\
          \ propuestas en una unica salida (acceptadas en las fotos consolidated y\
          \ pendientes aplicables en las fotos pendingProjection) sin requerir invocaciones\
          \ adicionales del builder — R016 invariante 1: combinacion en un documento"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R016
      - name: "Given an APPROVED quiz proposal whose KNOWLEDGE ancestor has an aggregate\
          \ score that differs across the baseline, consolidated and pending AuditReports,\
          \ when build runs, then nodeImpacts contains a NodeImpact with nodeTarget=KNOWLEDGE\
          \ whose fieldChanges carries the tripleta (original, consolidated, pendingProjection)\
          \ read verbatim from the KNOWLEDGE AuditNode of each AuditReport — R007\
          \ invariante 5: la foto del padre proviene del motor, FEAT-CDIFF la copia\
          \ del AuditNode correspondiente sin recomputar"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R007
      implements:
      - ConsolidatedViewBuilder
  - name: lemmaabsence
    description: "Proposal-strategy SPI for LEMMA_ABSENCE. Public so the composition\
      \ root and revision-infrastructure can both instantiate strategies and the canned\
      \ generator and pass them into the registry builder. Houses: the candidate-generator\
      \ port (LemmaAbsenceQuizCandidateGenerator) plus its raw response carrier (LemmaAbsenceGeneratorResponse),\
      \ the MVP strategy that delegates to the port (LemmaAbsenceMvpStrategy) and\
      \ stamps the providerId injected at construction onto every StrategyId it emits\
      \ (F-LAGEN-R009), and the canned generator kept as an offline fallback for CONTENT_AUDIT_LAGEN_MODE=canned\
      \ (DOUBT-CANNED-MODE-AVAILABILITY -> Option B, CannedLemmaAbsenceQuizCandidateGenerator).\
      \ Renamed from 'strategy' to 'lemmaabsence' so the package name describes the\
      \ sub-domain it encapsulates instead of a GoF pattern label. The LlmGenerationFailureCategory\
      \ enum lives in revision-infrastructure.lagen because revision-domain has zero\
      \ consumers of it (no port mentions it; ProposalStrategyFailedException.reason\
      \ is a free String that the adapter prefixes with the enum name)."
    visibility: public
    models:
    - name: LemmaAbsenceGeneratorResponse
      type: record
      fields:
      - name: quizSentence
        type: String
        description: Candidate expressed in the FEAT-QSENT quizSentence DSL; raw generator
          output before wrapping.
      - name: translation
        type: String
        description: Spanish translation of the candidate.
      visibility: public
    interfaces:
    - name: LemmaAbsenceQuizCandidateGenerator
      stereotype: port
      sealed: false
      exposes:
      - signature: "generate(LemmaAbsenceCorrectionContext context): LemmaAbsenceGeneratorResponse"
      visibility: public
    implementations:
    - name: LemmaAbsenceMvpStrategy
      requiresInject:
      - name: generator
        type: LemmaAbsenceQuizCandidateGenerator
        description: "Candidate generator the strategy delegates to. The composition\
          \ root supplies either the canned generator (CONTENT_AUDIT_LAGEN_MODE=canned)\
          \ or an LLM-backed generator built by LemmaAbsenceLlmGeneratorFactory (default\
          \ mode, F-LAGEN-R013)."
      - name: providerId
        type: String
        description: "Provider identifier stamped onto every StrategyId this strategy\
          \ emits (F-LAGEN-R009). Supplied by the composition root: in LLM mode it\
          \ is LemmaAbsenceLlmGeneratorFactory.providerIdFor(LagenConfig) (format\
          \ 'providerName:modelId' per DOUBT-PROVIDER-ID-FORMAT Option B); in canned\
          \ mode the operator picks a stable string. Required (the strategy never\
          \ invents a default) so the provenance recorded on every persisted RevisionProposal\
          \ matches what the operator configured."
      types:
      - Component
      visibility: public
      handwrittenTests:
      - name: should stamp StrategyId.name = 'lemma-absence-llm' on every produced
          proposal
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R001
      - name: should stamp StrategyId.providerId from the injected generator's provider
          on every proposal
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R009
      implements:
      - LemmaAbsenceProposalStrategy
    - name: CannedLemmaAbsenceQuizCandidateGenerator
      requiresInject:
      - name: cannedQuizSentence
        type: String
        description: "Fixed quizSentence in the FEAT-QSENT DSL returned for every\
          \ invocation. Used in offline/test mode (CONTENT_AUDIT_LAGEN_MODE=canned)\
          \ where no LLM provider is available. DOUBT-CANNED-MODE-AVAILABILITY ->\
          \ Option B (kept as opt-in, never default)."
      - name: cannedTranslation
        type: String
        description: Fixed Spanish translation paired with cannedQuizSentence.
      types:
      - Component
      visibility: public
      handwrittenTests:
      - name: "generate returns the same (cannedQuizSentence, cannedTranslation) pair\
          \ on every invocation"
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R012
      - name: generate returns the injected cannedQuizSentence and cannedTranslation
          verbatim with no transformation
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R012
      - name: "generate returns the same response regardless of differences in the\
          \ LemmaAbsenceCorrectionContext (quizSentence, cefrLevel, misplacedLemmas,\
          \ suggestedLemmas)"
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R012
      - name: generate performs no I/O and never contacts an external provider
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R012
      implements:
      - LemmaAbsenceQuizCandidateGenerator
  - name: impactpreview
    description: "Public SPI for the impact preview of a RevisionProposal (FEAT-PIPRE).\
      \ Houses the eager what-if contract (ImpactPreviewComputer port) and every carrier\
      \ the operator-facing rendering needs to read: the diff tree (ImpactPreview,\
      \ LevelImpact, DimensionDelta, ScoreDelta), the availability tagging (ImpactPreviewAvailability,\
      \ ImpactPreviewUnavailability) and the closed taxonomy of unavailability causes\
      \ (ImpactPreviewUnavailabilityReason). The persistence port (ImpactPreviewStore)\
      \ lives at the module root next to RevisionArtifactStore so the audit-infrastructure\
      \ adapter can target it with the same Public Port + Hidden Adapter shape it\
      \ already uses for revision artifacts. Public so audit-cli can render the preview\
      \ alongside each proposal. Kept inside revision-domain because every carrier\
      \ is pure data over revision-domain types (AuditTarget, RevisionProposal) and\
      \ the computer only needs the audit engine that revision-domain already accepts\
      \ via dependsOn."
    visibility: public
    models:
    - name: ImpactPreviewAvailability
      type: enum
      fields:
      - name: AVAILABLE
        description: "The computer succeeded; deltas at every reported (level,dimension)\
          \ pair are populated (F-PIPRE-R004, F-PIPRE-R005, F-PIPRE-R006)."
      - name: UNAVAILABLE
        description: "The computer could not produce deltas; ImpactPreview.unavailability\
          \ carries the explicit cause (F-PIPRE-R009). NOT the same as 'no change\
          \ detected', which is AVAILABLE with all-zero differences (F-PIPRE-R009\
          \ detail 2)."
      visibility: public
    - name: ImpactPreviewUnavailabilityReason
      type: enum
      fields:
      - name: TARGET_NODE_ABSENT
        description: "The proposal's nodeId could not be located in the course at\
          \ preview time (F-PIPRE-R009 case 1, F-PIPRE-J003)."
      - name: BASE_AUDIT_UNAVAILABLE
        description: The AuditReport corresponding to the current course state could
          not be obtained as the 'before' baseline (F-PIPRE-R009 case 2).
      - name: SIMULATION_FAILED
        description: "Producing the simulated course (replace + map + audit) failed\
          \ for any reason other than the two above: AuditEngine threw, the mapper\
          \ rejected the simulated entity, or the simulated tree is structurally inconsistent\
          \ (F-PIPRE-R009 case 3)."
      - name: OTHER
        description: Any other unanticipated failure during preview computation. Detail
          string carries the human-readable cause.
      visibility: public
    - name: ImpactPreviewUnavailability
      type: record
      fields:
      - name: reason
        type: ImpactPreviewUnavailabilityReason
        description: "Closed-set category, mirroring how F-LAGEN-R006 / LlmGenerationFailureCategory\
          \ carry filterable taxonomies."
      - name: detail
        type: String
        description: "Free-text human-readable explanation suitable for stderr / archived\
          \ logs (F-PIPRE-R009 detail 4: 'la causa registrada es texto legible para\
          \ el operador')."
      visibility: public
    - name: ScoreDelta
      type: record
      fields:
      - name: before
        type: double
        description: Score on the current course (domain scale 0..1 per F-PIPRE-R006
          detail 2).
      - name: after
        type: double
        description: Score on the simulated course with elementAfter applied (domain
          scale 0..1).
      - name: difference
        type: double
        description: "after minus before. Carried explicitly so consumers do not re-derive\
          \ the sign (F-PIPRE-R006 detail 1). Operator-facing percentage rendering\
          \ (F-PIPRE-R013) is the formatter's responsibility, not the model's."
      visibility: public
    - name: DimensionDelta
      type: record
      fields:
      - name: dimension
        type: String
        description: "Analyzer name (the same key used in AuditNode.scores, e.g. 'lemma-absence',\
          \ 'sentence-length', 'coca-buckets-distribution'). F-PIPRE-R005 'discrimina\
          \ por dimension'. Open-ended String rather than enum because dimensions\
          \ are analyzer-defined and grow with each FEAT-D* / new analyzer."
      - name: delta
        type: ScoreDelta
        description: "before/after/difference for this analyzer at the enclosing level\
          \ (F-PIPRE-R005, F-PIPRE-R006)."
      visibility: public
    - name: LevelImpact
      type: record
      fields:
      - name: nodeTarget
        type: AuditTarget
        description: "Hierarchy level: COURSE/MILESTONE/TOPIC/KNOWLEDGE/QUIZ (F-PIPRE-R004)."
      - name: nodeId
        type: String
        description: Identifier of the reported node. For COURSE level the AuditReport's
          root id is used.
      - name: aggregateDelta
        type: ScoreDelta
        description: "before/after/difference of the level's aggregate score (the\
          \ same aggregate the auditor reports at this node, e.g. AuditReportSummary.overallScore\
          \ for the course root)."
      - name: dimensionDeltas
        type: List<DimensionDelta>
        description: "One entry per analyzer that produces a score at this level.\
          \ F-PIPRE-R005 detail 3: levels where a dimension is not evaluated must\
          \ omit it, not fabricate a zero delta."
      visibility: public
    - name: ImpactPreview
      type: record
      fields:
      - name: proposalId
        type: String
        description: 1:1 association with the originating RevisionProposal.proposalId
          (F-PIPRE-R001 detail 2). Stable across reads; never reused across proposals
          (DOUBT-PROPOSAL-LIFECYCLE -> Option A).
      - name: computedAt
        type: Instant
        description: Timestamp when the preview was computed. Mirrors the eager 'one
          shot at proposal time' contract of F-PIPRE-R001 detail 1.
      - name: availability
        type: ImpactPreviewAvailability
        description: "AVAILABLE -> levelImpacts populated, unavailability null. UNAVAILABLE\
          \ -> levelImpacts empty, unavailability populated (F-PIPRE-R009)."
      - name: unavailability
        type: ImpactPreviewUnavailability
        description: Populated when availability=UNAVAILABLE; null when AVAILABLE.
          Carries the closed-set reason plus a human-readable detail (F-PIPRE-R009).
      - name: levelImpacts
        type: List<LevelImpact>
        description: "Ordered chain from leaf (proposal's nodeTarget) up to COURSE\
          \ root (F-PIPRE-R004). Intermediate levels that do not exist for the targeted\
          \ node are omitted, not zero-padded (F-PIPRE-R004 detail). Empty list when\
          \ availability=UNAVAILABLE."
      visibility: public
    interfaces:
    - name: ImpactPreviewComputer
      stereotype: port
      sealed: false
      exposes:
      - signature: "compute(CourseEntity currentCourse, RevisionProposal proposal):\
          \ ImpactPreview"
      visibility: public
      glossarySuggestions:
      - name: Impact Preview
        technicalName: ImpactPreview
        kind: domain-service-candidate
        basedOn: revision-domain/impactpreview/ImpactPreviewComputer
        derivedFrom:
        - Revision Proposal
        - Audit Report
        rationale: |
          FEAT-PIPRE introduces the simulated 'what-if' projection of a proposal as a first-class capability of the revision domain. Worth adopting as a canonical term once the analyst has reviewed the language.
  - name: consolidatedview
    description: "FEAT-CDIFF v3. Public SPI for the consolidated structure that combines\
      \ the baseline of an AuditReport with the effects of accepted and pending proposals\
      \ of its active plan. Houses the builder port (ConsolidatedViewBuilder) plus\
      \ its factory (ConsolidatedViewBuilderFactory) and every carrier the CLI rendering\
      \ needs to read: the root document (ConsolidatedView), the per-node impact (NodeImpact\
      \ carrying a uniform map of field-level changes), the field-change carrier (FieldChange\
      \ triple), the field path (FieldPath), the non-applicable pending list (NonApplicablePending),\
      \ the availability tagging (ConsolidatedViewAvailability + ConsolidatedViewUnavailability)\
      \ and the closed taxonomies (ConsolidatedViewUnavailabilityReason, NonApplicablePendingReason).\
      \ The previous StatisticImpact carrier disappeared in v3 (R009: scores are just\
      \ fields of the map)."
    visibility: public
    models:
    - name: ConsolidatedViewAvailability
      type: enum
      fields:
      - name: AVAILABLE
        description: Construccion exitosa; nodeImpacts/statisticImpacts pueden estar
          vacios si ninguna propuesta afecta nada.
      - name: UNAVAILABLE
        description: "Construccion fallida; unavailability carga (categoria, detalle)\
          \ explicita. F-CDIFF-R013."
      visibility: public
    - name: ConsolidatedViewUnavailabilityReason
      type: enum
      fields:
      - name: NO_ACTIVE_ANALYSIS
        description: El curso no tiene par activo seleccionado o el auditId activo
          no existe.
      - name: ACTIVE_PLAN_UNAVAILABLE
        description: "El planId activo no se puede ubicar dentro del analisis (referencia\
          \ rota, archivo ausente)."
      - name: INCONSISTENT_PROPOSAL
        description: Una propuesta aceptada referencia un nodeId que no se encuentra
          en el subarbol al momento de re-agregar.
      - name: REAGGREGATION_FAILED
        description: El motor no puede recomputar el agregado sobre el subarbol modificado
          por las propuestas.
      - name: OTHER
        description: "Cualquier otra causa, con detalle textual obligatorio en ConsolidatedViewUnavailability.detail."
      visibility: public
    - name: ConsolidatedViewUnavailability
      type: record
      fields:
      - name: reason
        type: ConsolidatedViewUnavailabilityReason
        description: Categoria cerrada de la causa.
      - name: detail
        type: String
        description: "Texto legible para el operador. F-CDIFF-R013 message: 'Estructura\
          \ consolidada no disponible para el analisis <auditId>: <categoria> - <detalle>'."
      visibility: public
    - name: NonApplicablePendingReason
      type: enum
      fields:
      - name: NODE_ABSENT
        description: El nodeId de la pendiente no se encuentra en el subarbol vigente
          al momento de aplicar.
      - name: ELEMENT_BEFORE_MISMATCH
        description: El elementBefore de la pendiente ya no coincide con el consolidated
          del nodo (otra aceptada lo desplazo).
      - name: OTHER
        description: "Cualquier otra causa de no-aplicabilidad, con detalle textual."
      visibility: public
    - name: NonApplicablePending
      type: record
      fields:
      - name: proposalId
        type: String
        description: Id de la propuesta pendiente.
      - name: reason
        type: NonApplicablePendingReason
        description: Categoria cerrada de la causa.
      - name: detail
        type: String
        description: Texto legible explicativo.
      visibility: public
    - name: NodeImpact
      type: record
      fields:
      - name: nodeTarget
        type: AuditTarget
        description: "Nivel jerarquico del nodo: QUIZ (hoja), KNOWLEDGE/TOPIC/MILESTONE/COURSE\
          \ (padre)."
      - name: nodeId
        type: String
        description: Identificador del nodo afectado.
      - name: acceptedProposalIds
        type: List<String>
        description: "F-CDIFF-R007 detail 1. Lista de proposalId aceptados que afectaron\
          \ al nodo, ordenados por createdAt ascendente. Vacia si no hay aceptadas\
          \ sobre el nodo."
      - name: fieldChanges
        type: "Map<String,FieldChange>"
        description: "F-CDIFF-R006/R019/R023. Mapa de hojas escalares con cambio.\
          \ Clave: path estable producido por FieldPath (R023). Valor: tripleta (original,\
          \ consolidated, pendingProjection) producida por NodeFieldDiffer recorriendo\
          \ los tres AuditNode (R007 invariantes 1-3). Vacio si el nodo no tiene fields\
          \ que difieran entre al menos dos fotos modulo R020 — en ese caso el nodo\
          \ no se incluye en ConsolidatedView.nodeImpacts (R006 invariante 3)."
      - name: pendingProposalIds
        type: List<String>
        description: F-CDIFF-R011 invariante 2. Lista de proposalId con veredicto
          PENDING_APPROVAL aplicable del plan activo que afectaron al nodo (al contenido
          propio o al subarbol que contribuye a sus fotos). Vacia o nula si no hay
          pendientes aplicables que toquen este nodo. Reemplaza al campo singular
          pendingProposalId de v2 porque ahora un mismo nodo puede acumular varias
          pendientes aplicables sobre fields distintos.
      visibility: public
    - name: ConsolidatedView
      type: record
      fields:
      - name: activeAuditId
        type: String
        description: F-CDIFF-R001 detail 2. Id del AuditReport resuelto por ActiveAnalysisSelectionStore.read().
          null cuando availability=UNAVAILABLE con reason=NO_ACTIVE_ANALYSIS.
      - name: activePlanId
        type: String
        description: "F-CDIFF-R001 detail 2. Id del RefinementPlan activo. null cuando\
          \ availability=UNAVAILABLE con reason in {NO_ACTIVE_ANALYSIS, ACTIVE_PLAN_UNAVAILABLE}."
      - name: availability
        type: ConsolidatedViewAvailability
        description: AVAILABLE / UNAVAILABLE.
      - name: unavailability
        type: ConsolidatedViewUnavailability
        description: F-CDIFF-R013. Poblado cuando availability=UNAVAILABLE; null cuando
          AVAILABLE.
      - name: computedAt
        type: Instant
        description: "Timestamp de construccion (auditoria del documento, no afecta\
          \ semantica). Util para que el consumidor distinga lecturas sucesivas."
      - name: nodeImpacts
        type: List<NodeImpact>
        description: F-CDIFF-R006/R008. Un entry por nodo del curso afectado por al
          menos una aceptada o pendiente del plan activo. Vacio cuando availability=UNAVAILABLE;
          vacio tambien (pero AVAILABLE) cuando hay par activo pero ninguna propuesta
          afecta nodos.
      - name: nonApplicablePendings
        type: List<NonApplicablePending>
        description: "F-CDIFF-R012. Lista de pendientes que no se pudieron aplicar;\
          \ cada una con (proposalId, reason, detail). Se entrega aunque availability=AVAILABLE:\
          \ la presencia de pendientes no aplicables NO degrada la salida a UNAVAILABLE."
      visibility: public
    - name: FieldChange
      type: record
      fields:
      - name: original
        type: Object
        description: "F-CDIFF-R007.1. Valor de la hoja en el baseline del AuditReport,\
          \ copiado sin transformacion. null si la hoja no existe en el baseline."
      - name: consolidated
        type: Object
        description: "F-CDIFF-R007.2. Valor de la hoja en el AuditReport del subarbol\
          \ con-aceptadas, copiado sin transformacion. null si la hoja no existe en\
          \ el consolidated."
      - name: pendingProjection
        type: Object
        description: "F-CDIFF-R007.3. Valor de la hoja en el AuditReport del subarbol\
          \ con aceptadas+pendientes aplicables, copiado sin transformacion. null\
          \ si la hoja no existe en pendingProjection."
      visibility: public
    - name: FieldPath
      type: record
      fields:
      - name: raw
        type: String
        description: Representacion textual canonica de la clave del field. Es el
          valor que aparece como llave en NodeImpact.fieldChanges.
      visibility: public
    - name: FieldExclusionRole
      type: enum
      fields:
      - name: OPAQUE_PERSISTENCE_ID
        description: "F-CDIFF-R020.1. Identificadores opacos generados por la persistencia\
          \ (_id, $oid, formas equivalentes)."
      - name: STRUCTURAL_REFERENCE
        description: "F-CDIFF-R020.2. Referencias estructurales que el dominio mantiene\
          \ para navegacion (parentId, courseId, milestoneId, topicId, knowledgeId,\
          \ quizId cuando aparecen como referencia dentro de otro nodo, no como identidad\
          \ propia)."
      - name: TIMESTAMP
        description: "F-CDIFF-R020.3. Timestamps de creacion / actualizacion de cualquier\
          \ nivel del modelo (Instant, LocalDateTime sobre campos createdAt/updatedAt\
          \ y similares)."
      - name: INTERNAL_ORDER
        description: "F-CDIFF-R020.4. Ordenes derivados de la posicion en disco /\
          \ serializacion (indices de array de JSON, claves de orden, contadores que\
          \ el almacenamiento gestiona)."
      - name: NON_SEMANTIC
        description: "F-CDIFF-R020.5. Categoria escape: cualquier valor cuya diferencia\
          \ entre versiones no represente un cambio semantico observable y que no\
          \ caiga en las cuatro anteriores."
      visibility: public
    interfaces:
    - name: ConsolidatedViewBuilder
      stereotype: port
      sealed: false
      exposes:
      - signature: "build(Path coursePath): ConsolidatedView"
      visibility: public
    - name: ConsolidatedViewBuilderFactory
      stereotype: factory
      sealed: false
      exposes:
      - signature: "create(ConsolidatedViewBuilderConfig config): ConsolidatedViewBuilder"
      visibility: public
    - name: NodeFieldDiffer
      stereotype: port
      sealed: false
      exposes:
      - signature: "diff(AuditNode original, AuditNode consolidated, AuditNode pendingProjection):\
          \ Map<String,FieldChange>"
      visibility: public
  - name: fielddiff
    description: "F-CDIFF v3. Motor interno del descubrimiento dinamico de fields\
      \ cambiados que NodeFieldDiffer expone en su contrato publico. Aloja la implementacion\
      \ recursiva (RecursiveNodeFieldDiffer), los dos registros centrales que materializan\
      \ R020 y R022 sin contaminar los records de audit-domain / course-domain (FieldExclusionRegistry,\
      \ ListIdentityRegistry) y los carriers internos del recorrido (FieldExclusionRule,\
      \ ListIdentityRule, ListIdentityKeySpec). Solo la factory publica del motor\
      \ cruza la frontera; el resto es package-private. Empaquetado aparte de consolidatedview\
      \ porque la mecanica de diff es reutilizable: un futuro consumidor (p.ej. un\
      \ validador estructural de cursos, otro analizador) puede pedir el mismo NodeFieldDiffer\
      \ sin arrastrar la maquinaria del consolidado entero. El nombre fielddiff describe\
      \ el concepto (diferenciacion a nivel de field) y no un patron GoF."
    visibility: internal
    models:
    - name: FieldExclusionRule
      type: record
      fields:
      - name: declaringTypeName
        type: String
        description: "Nombre simple del tipo Java que declara el campo (p.ej. 'AuditableQuiz',\
          \ 'AuditNode', 'MisplacedLemma'). El motor matchea por nombre simple para\
          \ no acoplar el registry al package layout."
      - name: fieldName
        type: String
        description: "Nombre del campo a excluir (p.ej. 'id', 'parentId', 'createdAt')."
      - name: role
        type: FieldExclusionRole
        description: Rol funcional asignado. Sirve a tooling de auditoria del registry
          para revisar la coherencia de las exclusiones; el motor solo pregunta 'esta
          excluido?'.
      visibility: internal
    - name: ListIdentityKeySpec
      type: record
      fields:
      - name: fieldNames
        type: List<String>
        description: "Nombres de los campos que conforman la identidad natural del\
          \ elemento. Si la lista es vacia, el match no aplica y el motor cae en diff\
          \ posicional (R022 caso 2)."
      visibility: internal
    - name: ListIdentityRule
      type: record
      fields:
      - name: declaringTypeName
        type: String
        description: "Nombre simple del tipo Java que declara el campo lista (p.ej.\
          \ 'LemmaAbsenceLevelDiagnosis', 'CocaBucketsLevelDiagnosis')."
      - name: fieldName
        type: String
        description: "Nombre del campo lista (p.ej. 'absentLemmas', 'buckets', 'progressionAssessments')."
      - name: keySpec
        type: ListIdentityKeySpec
        description: Definicion de la clave natural a usar para diff por elemento.
      visibility: internal
    interfaces:
    - name: FieldExclusionRegistry
      stereotype: port
      sealed: false
      exposes:
      - signature: "isExcluded(String declaringTypeName, String fieldName): boolean"
      - signature: "getRole(String declaringTypeName, String fieldName): Optional<FieldExclusionRole>"
      visibility: internal
    - name: ListIdentityRegistry
      stereotype: port
      sealed: false
      exposes:
      - signature: "getKeySpec(String declaringTypeName, String fieldName): Optional<ListIdentityKeySpec>"
      visibility: internal
    - name: NodeFieldDifferFactory
      stereotype: factory
      sealed: false
      exposes:
      - signature: "create(): NodeFieldDiffer"
      visibility: public
    implementations:
    - name: RecursiveNodeFieldDiffer
      requiresInject:
      - name: exclusionRegistry
        type: FieldExclusionRegistry
        description: Consultado para cada hoja antes de emitirla. R020.
      - name: identityRegistry
        type: ListIdentityRegistry
        description: Consultado al alcanzar cada lista para decidir entre diff por
          elemento o posicional. R022.
      visibility: internal
      handwrittenTests:
      - name: "Dados tres AuditNode donde una hoja escalar accesible por el recorrido\
          \ recursivo tiene valores distintos entre la foto original y la foto consolidated,\
          \ cuando diff corre, entonces el mapa retornado contiene una entrada cuya\
          \ clave codifica el path a esa hoja y cuyo FieldChange lleva los tres valores\
          \ — R019 invariante 1: cobertura por construccion, sin enumeracion previa"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R019
      - name: "Dados tres AuditNode donde una de las hojas escalares pertenece a un\
          \ tipo de diagnostico no enumerado en seed alguna del exclusionRegistry,\
          \ cuando diff corre y los valores de esa hoja difieren entre fotos, entonces\
          \ la hoja aparece como field del mapa SIN requerir registro previo en ningun\
          \ catalogo — R019 invariante 2: aparicion automatica de cosas nuevas"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R019
      - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
          \ cuyo nombre el exclusionRegistry clasifica como OPAQUE_PERSISTENCE_ID,\
          \ cuando diff corre, entonces el mapa retornado esta vacio: la hoja no se\
          \ emite aunque difiera — R020 categoria 1"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
          \ cuyo nombre el exclusionRegistry clasifica como STRUCTURAL_REFERENCE,\
          \ cuando diff corre, entonces el mapa retornado esta vacio: la referencia\
          \ estructural no se emite aunque difiera — R020 categoria 2"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
          \ cuyo nombre el exclusionRegistry clasifica como TIMESTAMP, cuando diff\
          \ corre, entonces el mapa retornado esta vacio: el timestamp no se emite\
          \ aunque difiera — R020 categoria 3"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
          \ cuyo nombre el exclusionRegistry clasifica como INTERNAL_ORDER, cuando\
          \ diff corre, entonces el mapa retornado esta vacio: el orden interno no\
          \ se emite aunque difiera — R020 categoria 4"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
          \ cuyo nombre el exclusionRegistry clasifica como NON_SEMANTIC, cuando diff\
          \ corre, entonces el mapa retornado esta vacio: el campo no semantico no\
          \ se emite aunque difiera — R020 categoria 5"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dados tres AuditNode con una lista cuyo tipo de elemento tiene identidad\
          \ declarada en identityRegistry (p.ej. List<AbsentLemma> con clave (lemma,pos)),\
          \ donde un elemento existe en la foto original con propiedades no-clave\
          \ distintas a las de la foto consolidated, cuando diff corre, entonces el\
          \ mapa retornado contiene fields derivados con clave estable basada en la\
          \ identidad del elemento (no en su indice posicional) — R022 invariante\
          \ 1: lista con identidad"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dados tres AuditNode con una lista cuyo tipo de elemento NO tiene identidad\
          \ declarada en identityRegistry y donde el elemento en el indice i de la\
          \ foto original tiene una hoja escalar distinta al elemento en el indice\
          \ i de la foto consolidated, cuando diff corre, entonces el mapa retornado\
          \ contiene fields con clave de path posicional ([i]) — R022 invariante 2:\
          \ diff posicional sin identidad"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dados tres AuditNode donde la misma hoja escalar profunda es alcanzable\
          \ por la misma secuencia de campos anidados en las tres fotos con valores\
          \ distintos, cuando diff corre, entonces el mapa retornado contiene UNA\
          \ SOLA entrada cuya clave codifica esa secuencia y cuyo FieldChange agrupa\
          \ los tres valores (no tres entradas separadas, una por foto) — R023 invariante\
          \ 1: estabilidad entre fotos"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R023
      - name: "Dadas dos invocaciones independientes de diff sobre dos pares de AuditNode\
          \ del mismo tipo donde la misma hoja anidada cambia bajo el mismo path,\
          \ cuando diff corre en cada par, entonces ambos mapas retornados contienen\
          \ la MISMA clave para identificar el field correspondiente (sin variantes\
          \ del path por nodo) — R023 invariante 2: estabilidad entre nodos del mismo\
          \ tipo"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R023
      implements:
      - NodeFieldDiffer
    - name: DefaultFieldExclusionRegistry
      visibility: internal
      handwrittenTests:
      - name: "Dada una invocacion de isExcluded sobre un campo seed del registry\
          \ cuyo rol funcional es OPAQUE_PERSISTENCE_ID, entonces retorna true y getRole\
          \ retorna OPAQUE_PERSISTENCE_ID — R020 categoria 1: seed de identificadores\
          \ opacos de persistencia"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dada una invocacion de isExcluded sobre un campo seed del registry\
          \ cuyo rol funcional es STRUCTURAL_REFERENCE (parentId, courseId, milestoneId,\
          \ topicId, knowledgeId o quizId como referencia dentro de otro nodo), entonces\
          \ retorna true y getRole retorna STRUCTURAL_REFERENCE — R020 categoria 2:\
          \ seed de referencias estructurales"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dada una invocacion de isExcluded sobre un campo seed del registry\
          \ cuyo rol funcional es TIMESTAMP (createdAt, updatedAt sobre cualquier\
          \ nivel del modelo), entonces retorna true y getRole retorna TIMESTAMP —\
          \ R020 categoria 3: seed de timestamps"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dada una invocacion de isExcluded sobre un campo seed del registry\
          \ cuyo rol funcional es INTERNAL_ORDER (indice de orden de insercion gestionado\
          \ por el almacenamiento), entonces retorna true y getRole retorna INTERNAL_ORDER\
          \ — R020 categoria 4: seed de ordenes internos"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      - name: "Dada una invocacion de isExcluded sobre un campo seed del registry\
          \ cuyo rol funcional cae en la categoria escape NON_SEMANTIC, entonces retorna\
          \ true y getRole retorna NON_SEMANTIC — R020 categoria 5: seed de la categoria\
          \ escape"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R020
      implements:
      - FieldExclusionRegistry
    - name: DefaultListIdentityRegistry
      visibility: internal
      handwrittenTests:
      - name: "Dada una invocacion de getKeySpec sobre el campo lista de tipo List<AbsentLemma>\
          \ dentro de LemmaAbsenceLevelDiagnosis (declaringTypeName='LemmaAbsenceLevelDiagnosis',\
          \ fieldName='absentLemmas'), entonces retorna un Optional poblado con un\
          \ ListIdentityKeySpec cuyos fieldNames son ['lemma','pos'] — R022 seed AbsentLemma"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dada una invocacion de getKeySpec sobre el campo lista de tipo List<MisplacedLemma>\
          \ dentro de su record contenedor, entonces retorna un Optional poblado con\
          \ un ListIdentityKeySpec cuyos fieldNames son ['lemma','pos'] — R022 seed\
          \ MisplacedLemma"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dada una invocacion de getKeySpec sobre el campo lista de tipo List<BucketResult>\
          \ (p.ej. dentro de CocaBucketsLevelDiagnosis), entonces retorna un Optional\
          \ poblado con un ListIdentityKeySpec cuyos fieldNames son ['bandName'] —\
          \ R022 seed BucketResult"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dada una invocacion de getKeySpec sobre el campo lista de tipo List<QuarterResult>,\
          \ entonces retorna un Optional poblado con un ListIdentityKeySpec cuyos\
          \ fieldNames son ['index'] — R022 seed QuarterResult"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      - name: "Dada una invocacion de getKeySpec sobre el campo lista de tipo List<ImprovementDirective>,\
          \ entonces retorna un Optional poblado con un ListIdentityKeySpec cuyos\
          \ fieldNames son ['type','bandName','levelName'] — R022 seed ImprovementDirective"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R022
      implements:
      - ListIdentityRegistry
    - name: DefaultNodeFieldDifferFactory
      visibility: public
      handwrittenTests:
      - name: "Dada una invocacion de create() sobre la factory, entonces retorna\
          \ un NodeFieldDiffer cuya implementacion es RecursiveNodeFieldDiffer compuesta\
          \ con DefaultFieldExclusionRegistry (para R020) y DefaultListIdentityRegistry\
          \ (para R022); el motor producido honra ambas politicas en una invocacion\
          \ de diff sobre AuditNode con cambios en hojas excluibles y en listas con\
          \ identidad — composicion del motor"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R019
      implements:
      - NodeFieldDifferFactory
  - name: contextoverride
    description: "Encapsulamiento del parsing y validacion del correctionContext provisto\
      \ externamente por el cliente (FEAT-REVCTX). Aloja la implementacion del CorrectionContextOverrideParser,\
      \ un mapper Jackson dedicado y los validadores estructurales por DiagnosisKind."
    visibility: internal
    interfaces:
    - name: CorrectionContextStructuralValidator
      stereotype: port
      sealed: false
      exposes:
      - signature: "validateAndBuild(JsonNode payload, String expectedNodeId): CorrectionContext"
    implementations:
    - name: DefaultCorrectionContextOverrideParser
      requiresInject:
      - name: objectMapper
        type: ObjectMapper
      - name: validators
        type: "Map<DiagnosisKind,CorrectionContextStructuralValidator>"
      visibility: public
      handwrittenTests:
      - name: should accept payload when nodeId and diagnosisKind match the expected
          task identity
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R003
      - name: should reject payload with OverrideRejectedException when nodeId does
          not match the expected task identity
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R003
      - name: should reject payload with OverrideRejectedException when diagnosisKind
          does not match the expected task identity
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R003
      - name: should parse payload mirroring the get task output for a LEMMA_ABSENCE
          context and return a CorrectionContextOverride whose rawPayload is the literal
          JSON received
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R008
      - name: should reject payload whose JSON shape does not mirror the get task
          output even when its core structural fields are individually valid
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R008
      - name: should expose a static withDefaultValidators factory that wires both
          LEMMA_ABSENCE and SENTENCE_LENGTH validators so the audit-cli composition
          root can construct the parser without breaking the package-private encapsulation
          of the per-kind validators
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R002
      implements:
      - CorrectionContextOverrideParser
    - name: LemmaAbsenceContextStructuralValidator
      requiresInject:
      - name: objectMapper
        type: ObjectMapper
      handwrittenTests:
      - name: should throw OverrideRejectedException when the LEMMA_ABSENCE payload
          misses a required structural field or has an invalid value
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R003
      implements:
      - CorrectionContextStructuralValidator
    - name: SentenceLengthContextStructuralValidator
      requiresInject:
      - name: objectMapper
        type: ObjectMapper
      handwrittenTests:
      - name: should throw OverrideRejectedException when the SENTENCE_LENGTH payload
          misses a required structural field or has an out-of-domain value
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R003
      implements:
      - CorrectionContextStructuralValidator
- name: revision-infrastructure
  description: "Infrastructure adapter for the revision phase. Provides the LLM-backed\
    \ implementation of LemmaAbsenceQuizCandidateGenerator (revision-domain.lemmaabsence\
    \ port) using LangChain4j against any OpenAI-compatible HTTP endpoint (LM Studio,\
    \ vLLM, OpenAI cloud, Ollama via openai compat, etc.). Exposes a single Factory\
    \ Seam (LemmaAbsenceLlmGeneratorFactory + LagenConfig carrier + LlmGenerationFailureCategory\
    \ enum) so the composition root wires the adapter with one call. The factory is\
    \ the only piece that consumes LagenConfig: it reads the knobs, builds a ChatLanguageModel\
    \ via the LangChain4j OpenAI builder, and passes that model directly into LemmaAbsenceLlmGenerator.\
    \ The generator therefore depends on a chat-model abstraction (not on the LagenConfig\
    \ record), keeping the inner adapter agnostic of how the model was configured.\
    \ The adapter uses LangChain4j's legacy chat-message API flavor, generate(List<ChatMessage>),\
    \ because F-LAGEN needs explicit system/user messages and a simple text response\
    \ without exposing ChatRequest/ChatResponse in the architectural surface. The\
    \ adapter, prompt builder, response parser and error classifier all live in an\
    \ internal package; only the factory class is public. allowedClients=[audit-cli]\
    \ enforces that this module is an implementation detail of the CLI composition\
    \ root only (P8 Qualified Export)."
  dependsOn:
  - revision-domain
  - refiner-domain
  allowedClients:
  - audit-cli
  patterns:
  - type: Factory
    implementations:
    - DefaultLemmaAbsenceLlmGeneratorFactory
    suppressed: false
    interface: LemmaAbsenceLlmGeneratorFactory
  uses:
  - langchain4j-openai
  - langchain4j-core
  packages:
  - name: lagen
    description: "Public contract of the LangChain4j-backed candidate generator. Exposes\
      \ the factory port + the LagenConfig carrier (knobs from F-LAGEN-R008) + the\
      \ LlmGenerationFailureCategory enum (categories surfaced through the adapter,\
      \ F-LAGEN-R006). Implementations of the factory and all collaborators live in\
      \ the sibling 'lagenopenai' internal package."
    visibility: public
    models:
    - name: LagenConfig
      type: record
      fields:
      - name: providerName
        type: String
        description: "Short, stable identifier of the provider family (e.g. 'lmstudio',\
          \ 'openai', 'anthropic-via-openai'). Used as the prefix of the providerId\
          \ emitted into StrategyId.providerId (F-LAGEN-R009, DOUBT-PROVIDER-ID-FORMAT\
          \ -> Option B). Required."
      - name: modelId
        type: String
        description: "Model identifier within the provider, e.g. 'gemma-3-4b-it',\
          \ 'gpt-4o-mini'. Joined with providerName as 'provider:model' to form StrategyId.providerId\
          \ (F-LAGEN-R009). Required."
      - name: endpoint
        type: String
        description: "OpenAI-compatible chat/completions base URL, e.g. 'http://localhost:1234/v1'\
          \ for the LM Studio default. Required."
      - name: apiKey
        type: String
        description: "Bearer credential. Nullable: when absent, the adapter sends\
          \ no Authorization header (covers local providers without auth — see Assumption\
          \ 3). When the provider rejects the request because of auth, the adapter\
          \ raises ProposalStrategyFailedException with reason prefixed LLM_AUTH_FAILED\
          \ (F-LAGEN-R006)."
      - name: temperature
        type: Double
        description: "Sampling temperature; controls output variability (F-LAGEN-R008).\
          \ Nullable: when null the factory applies a non-zero default (Assumption\
          \ 4)."
      - name: maxTokens
        type: Integer
        description: "Upper bound on response token count (F-LAGEN-R008). Nullable:\
          \ when null the factory applies a sensible default."
      - name: timeout
        type: Duration
        description: "Per-request budget; once exceeded the adapter raises ProposalStrategyFailedException\
          \ with reason prefixed LLM_TIMEOUT (F-LAGEN-R006). Nullable: when null the\
          \ factory applies a default budget."
      visibility: public
    - name: LlmGenerationFailureCategory
      type: enum
      fields:
      - name: LLM_UNREACHABLE
        description: "Communication with the provider could not be established (connection\
          \ refused, host unreachable, DNS error, misconfigured endpoint). F-LAGEN-R006."
      - name: LLM_TIMEOUT
        description: "The query exceeded the configured time budget without returning\
          \ a response. F-LAGEN-R006, F-LAGEN-R008."
      - name: LLM_AUTH_FAILED
        description: The provider rejected the request because credentials were invalid
          or absent. F-LAGEN-R006.
      - name: LLM_RESPONSE_EMPTY
        description: "The query completed successfully but the model returned no content\
          \ (empty string, no text). F-LAGEN-R006."
      - name: LLM_RESPONSE_MALFORMED
        description: "The model returned content that does not satisfy F-LAGEN-R005\
          \ (not parseable JSON, missing quizSentence/translation, or either field\
          \ empty/non-string). F-LAGEN-R006."
      - name: LLM_OTHER
        description: Any other generation-time failure not covered by the categories
          above. F-LAGEN-R006.
      visibility: public
    - name: LagenDefaults
      type: record
      fields:
      - name: temperature
        type: double
        description: "Default temperature applied by the factory when LagenConfig.temperature\
          \ is null. Pinned to 0.7 (Asuncion 4: non-zero / non-deterministic)."
      - name: maxTokens
        type: int
        description: Default maxTokens applied by the factory when LagenConfig.maxTokens
          is null. Pinned to 2048 (sized for one cloze quizSentence + translation
          pair).
      - name: timeout
        type: Duration
        description: Default timeout applied by the factory when LagenConfig.timeout
          is null. Pinned to Duration.ofSeconds(30) (alineado con el ejemplo LLM_TIMEOUT
          en REQUIREMENT.md R006).
      visibility: public
    - name: InvalidProviderIdException
      type: exception
      fields:
      - name: providerName
        type: String
      - name: modelId
        type: String
      message: "providerName and modelId must not contain ':' (got providerName='%s',\
        \ modelId='%s'). The ':' is reserved as the providerId separator (provider:model)."
      visibility: public
      extends: RuntimeException
    interfaces:
    - name: LemmaAbsenceLlmGeneratorFactory
      stereotype: factory
      sealed: false
      exposes:
      - signature: "create(LagenConfig config): LemmaAbsenceQuizCandidateGenerator"
      - signature: "providerIdFor(LagenConfig config): String"
      visibility: public
  - name: lagenopenai
    description: "Internal LangChain4j-OpenAI engine. Only DefaultLemmaAbsenceLlmGeneratorFactory\
      \ is public (the seam — instantiated once by audit-cli.bootstrap); every collaborator\
      \ (LemmaAbsenceLlmGenerator, LemmaAbsencePromptBuilder, LemmaAbsenceResponseParser,\
      \ LangChainErrorClassifier) is package-private so other modules cannot bypass\
      \ the factory port. The generator depends on a ChatLanguageModel that the factory\
      \ builds from LagenConfig — the engine never sees the LagenConfig itself, only\
      \ the configured chat-model abstraction. Replacing the LLM client implementation\
      \ never changes this module's public surface."
    visibility: internal
    models:
    - name: LemmaAbsenceLlmRawResponse
      type: record
      fields:
      - name: rawText
        type: String
        description: Raw text content returned by the model before JSON parsing. Empty
          string represents LLM_RESPONSE_EMPTY (F-LAGEN-R006).
    interfaces:
    - name: LemmaAbsencePromptBuilder
      stereotype: service
      sealed: false
      exposes:
      - signature: "buildSystemPrompt(): String"
      - signature: "buildUserPrompt(LemmaAbsenceCorrectionContext context): String"
      visibility: internal
    - name: LemmaAbsenceResponseParser
      stereotype: service
      sealed: false
      exposes:
      - signature: "parse(LemmaAbsenceLlmRawResponse raw, String taskId, String strategyName):\
          \ LemmaAbsenceGeneratorResponse"
      visibility: internal
    - name: LangChainErrorClassifier
      stereotype: service
      sealed: false
      exposes:
      - signature: "classify(Throwable cause): LlmGenerationFailureCategory"
      visibility: internal
    implementations:
    - name: DefaultLemmaAbsenceLlmGeneratorFactory
      types:
      - Component
      visibility: public
      handwrittenTests:
      - name: create returns a generator whose strategyName is 'lemma-absence-llm'
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R001
      - name: providerIdFor yields different values for two LagenConfigs that differ
          in providerName
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R009
      - name: providerIdFor yields different values for two LagenConfigs that differ
          in modelId
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R009
      - name: "create propagates explicit endpoint, modelId and apiKey from LagenConfig\
          \ into the configured generator"
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R008
      - name: "create propagates explicit temperature, maxTokens and timeout from\
          \ LagenConfig into the configured generator"
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R008
      - name: create sends no Authorization header when LagenConfig.apiKey is null
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R008
      - name: providerIdFor returns 'providerName:modelId' joining the two LagenConfig
          fields with a literal ':'
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R009
      - name: providerIdFor preserves the case of providerName and modelId verbatim
          (no lowercasing)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R009
      - name: providerIdFor preserves leading and trailing whitespace inside providerName
          and modelId verbatim (no trimming)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R009
      - name: providerIdFor raises InvalidProviderIdException when LagenConfig.providerName
          contains ':'
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R009
      - name: providerIdFor raises InvalidProviderIdException when LagenConfig.modelId
          contains ':'
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R009
      - name: create applies LagenDefaults.temperature (0.7) when LagenConfig.temperature
          is null
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R011
      - name: create applies LagenDefaults.maxTokens (2048) when LagenConfig.maxTokens
          is null
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R008
      - name: create applies LagenDefaults.timeout (Duration.ofSeconds(30)) when LagenConfig.timeout
          is null
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R008
      implements:
      - LemmaAbsenceLlmGeneratorFactory
    - name: LemmaAbsenceLlmGenerator
      requiresInject:
      - name: config
        type: LagenConfig
      - name: promptBuilder
        type: LemmaAbsencePromptBuilder
      - name: responseParser
        type: LemmaAbsenceResponseParser
      - name: errorClassifier
        type: LangChainErrorClassifier
      - name: strategyName
        type: String
        description: Strategy name embedded in any ProposalStrategyFailedException
          raised by this adapter. Wired to 'lemma-absence-llm' (F-LAGEN-R001) by the
          factory.
      - name: chatModel
        type: ChatLanguageModel
        description: "LangChain4j chat-model abstraction the generator calls via generate(List<ChatMessage>).\
          \ Built once by DefaultLemmaAbsenceLlmGeneratorFactory from a LagenConfig\
          \ (endpoint + modelId + apiKey + temperature + maxTokens + timeout). The\
          \ generator never sees the LagenConfig itself, keeping it agnostic of how\
          \ the model was configured."
      types:
      - Component
      handwrittenTests:
      - name: generate returns a LemmaAbsenceGeneratorResponse parsed from the model
          output on the happy path
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R005
      - name: generate sends both the system prompt and the user prompt produced from
          the context to the model
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: generate issues exactly one round-trip to the model per invocation (no
          automatic retry)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R007
      - name: generate raises ProposalStrategyFailedException without persisting any
          partial response when the parser rejects the raw text
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R007
      - name: generate prefixes the failure reason with the LlmGenerationFailureCategory
          name returned by the classifier
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: generate embeds the strategyName 'lemma-absence-llm' inside the message
          of any ProposalStrategyFailedException it raises
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R001
      - name: generate raises ProposalStrategyFailedException with reason prefixed
          LLM_RESPONSE_EMPTY when the model returns empty text
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: generate raises ProposalStrategyFailedException with reason prefixed
          LLM_RESPONSE_MALFORMED when the model returns text the parser cannot interpret
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: generate raises ProposalStrategyFailedException with reason prefixed
          LLM_OTHER when the model client throws a Throwable not matched by any specific
          category
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: generate raises ProposalStrategyFailedException with reason prefixed
          LLM_UNREACHABLE when the model client throws ConnectException
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: generate raises ProposalStrategyFailedException with reason prefixed
          LLM_TIMEOUT when the model client throws SocketTimeoutException
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: generate raises ProposalStrategyFailedException with reason prefixed
          LLM_AUTH_FAILED when the model client throws an OpenAiHttpException with
          status 401
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      implements:
      - LemmaAbsenceQuizCandidateGenerator
    - name: DefaultLemmaAbsencePromptBuilder
      types:
      - Component
      handwrittenTests:
      - name: buildSystemPrompt instructs the model to return a JSON object with exactly
          the fields quizSentence and translation
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R004
      - name: "buildSystemPrompt instructs the model to produce one single candidate,\
          \ not a list of alternatives"
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R004
      - name: "buildSystemPrompt instructs the model to express quizSentence in the\
          \ same DSL of the input quiz, replacing misplacedLemmas with options from\
          \ suggestedLemmas when applicable"
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R004
      - name: buildUserPrompt includes quizSentence from the context
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: buildUserPrompt includes sentence from the context
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: buildUserPrompt includes translation from the context
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: buildUserPrompt includes knowledgeTitle from the context
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: buildUserPrompt includes knowledgeInstructions from the context
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: buildUserPrompt includes topicLabel from the context
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: buildUserPrompt includes cefrLevel from the context
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: buildUserPrompt includes every misplacedLemma from the context
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: buildUserPrompt includes every suggestedLemma from the context
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: buildUserPrompt omits a context field that is null without consulting
          any external source
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R003
      - name: buildUserPrompt should include a length section with tokenCount targetMin
          targetMax delta and lengthDirection when the context exposes a known length
          direction
        traceability:
          feature: FEAT-RCLALEN
          rule: F-RCLALEN-R001
      - name: buildUserPrompt should omit the length section when lengthDirection
          is UNKNOWN
        traceability:
          feature: FEAT-RCLALEN
          rule: F-RCLALEN-R004
      implements:
      - LemmaAbsencePromptBuilder
    - name: DefaultLemmaAbsenceResponseParser
      types:
      - Component
      handwrittenTests:
      - name: "parse returns LemmaAbsenceGeneratorResponse(quizSentence, translation)\
          \ when the raw text is a JSON object with both fields non-empty"
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R005
      - name: parse ignores extra JSON fields beyond quizSentence and translation
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R005
      - name: parse raises ProposalStrategyFailedException with reason prefixed LLM_RESPONSE_EMPTY
          when the raw text is empty
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: parse raises ProposalStrategyFailedException with reason prefixed LLM_RESPONSE_MALFORMED
          when the raw text is not parseable as JSON
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R005
      - name: parse raises ProposalStrategyFailedException with reason prefixed LLM_RESPONSE_MALFORMED
          when the JSON object lacks the quizSentence field
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R005
      - name: parse raises ProposalStrategyFailedException with reason prefixed LLM_RESPONSE_MALFORMED
          when the JSON object lacks the translation field
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R005
      - name: parse raises ProposalStrategyFailedException with reason prefixed LLM_RESPONSE_MALFORMED
          when quizSentence is an empty string
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R005
      - name: parse raises ProposalStrategyFailedException with reason prefixed LLM_RESPONSE_MALFORMED
          when translation is an empty string
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R005
      - name: parse raises ProposalStrategyFailedException with reason prefixed LLM_RESPONSE_MALFORMED
          when quizSentence is not a JSON string
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R005
      - name: parse raises ProposalStrategyFailedException with reason prefixed LLM_RESPONSE_MALFORMED
          when translation is not a JSON string
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R005
      - name: parse embeds the taskId in the message of any ProposalStrategyFailedException
          it raises
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: parse embeds the strategyName in the message of any ProposalStrategyFailedException
          it raises
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: "parse accepts a quizSentence whose plain-text length looks unusually\
          \ short or long: only structural validation applies"
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R010
      - name: parse accepts a response without re-checking that misplacedLemmas were
          replaced or that new words come from suggestedLemmas
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R010
      - name: parse accepts a response without re-tokenizing the quizSentence to verify
          its CEFR level
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R010
      - name: "parse accepts a quizSentence regardless of whether it parses as the\
          \ FEAT-QSENT DSL: grammar validation is delegated downstream"
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R010
      implements:
      - LemmaAbsenceResponseParser
    - name: DefaultLangChainErrorClassifier
      types:
      - Component
      handwrittenTests:
      - name: classify returns LLM_OTHER for a Throwable not matched by any specific
          category
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: classify never returns null for any non-null Throwable
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: classify returns LLM_UNREACHABLE for a ConnectException anywhere in
          the cause chain
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: classify returns LLM_UNREACHABLE for an UnknownHostException anywhere
          in the cause chain
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: classify returns LLM_UNREACHABLE for a NoRouteToHostException anywhere
          in the cause chain
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: classify returns LLM_TIMEOUT for a SocketTimeoutException anywhere in
          the cause chain
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: classify returns LLM_TIMEOUT for a java.util.concurrent.TimeoutException
          anywhere in the cause chain
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: classify returns LLM_AUTH_FAILED for an OpenAiHttpException whose statusCode
          is 401
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: classify returns LLM_AUTH_FAILED for an OpenAiHttpException whose statusCode
          is 403
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      - name: classify returns LLM_AUTH_FAILED when the root cause message matches
          the auth heuristic regex (case-insensitive 'unauthorized' / 'forbidden'
          / '401' / '403' / 'invalid api key')
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R006
      implements:
      - LangChainErrorClassifier
