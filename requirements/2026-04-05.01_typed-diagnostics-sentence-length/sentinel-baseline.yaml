  patterns:
  - type: Factory
    implementations:
    - DefaultAuditNodeIndexFactory
    suppressed: false
    interface: AuditNodeIndexFactory
  scope: internal
  packages:
  - name: coca
    description: "COCA frequency bucket distribution analysis. Classifies NLP tokens\
      \ into frequency bands (K1-K5+), evaluates distribution against configurable\
      \ targets per CEFR level, assesses progression across levels, and generates\
      \ improvement directives."
    visibility: internal
    models:
    - name: FrequencyBand
      type: record
      fields:
      - name: name
        type: String
        description: "Band identifier (e.g. K1, K2, K3, K4, K5_PLUS)"
      - name: lowerBound
        type: int
        description: Inclusive lower frequency rank bound
      - name: upperBound
        type: int
        description: Inclusive upper frequency rank bound (Integer.MAX_VALUE for open-ended)
    - name: BandConfiguration
      type: record
      fields:
      - name: bands
        type: List<FrequencyBand>
        description: Ordered list of frequency bands from most common to least common
      - name: openEnded
        type: boolean
        description: "If true, the last band captures all ranks above its lower bound"
    - name: AssessmentState
      type: enum
      fields:
      - name: OPTIMAL
      - name: ADEQUATE
      - name: DEFICIENT
      - name: EXCESSIVE
    - name: TargetKind
      type: enum
      fields:
      - name: AT_LEAST
      - name: AT_MOST
    - name: BucketTarget
      type: record
      fields:
      - name: bandName
        type: String
        description: Name of the frequency band this target applies to
      - name: targetPercentage
        type: double
        description: Expected percentage of tokens in this band (0.0-1.0)
      - name: kind
        type: TargetKind
        description: Whether the target is a minimum or maximum threshold
    - name: BucketResult
      type: record
      fields:
      - name: bandName
        type: String
        description: Name of the frequency band
      - name: count
        type: int
        description: Number of tokens classified into this band
      - name: percentage
        type: double
        description: Actual percentage of tokens in this band (0.0-1.0)
      - name: targetPercentage
        type: double
        description: Expected percentage for this band (0.0-1.0)
      - name: score
        type: double
        description: Score for this bucket (0.0-1.0) based on proximity to target
      - name: assessment
        type: AssessmentState
        description: Qualitative assessment of this bucket result
    - name: QuarterBucketTargets
      type: record
      fields:
      - name: targets
        type: List<BucketTarget>
        description: Bucket targets for a specific quarter of a level
    - name: QuarterResult
      type: record
      fields:
      - name: index
        type: int
        description: Quarter index (0-based) within the level
      - name: bucketResults
        type: List<BucketResult>
        description: Distribution results per band for this quarter
      - name: score
        type: double
        description: Aggregated score for this quarter (0.0-1.0)
    - name: LevelBucketDistribution
      type: record
      fields:
      - name: levelName
        type: String
        description: "CEFR level name (e.g. A1, A2, B1, B2)"
      - name: score
        type: double
        description: Aggregated score for this level (0.0-1.0)
      - name: bucketResults
        type: List<BucketResult>
        description: Overall distribution results per band for this level
      - name: quarterResults
        type: List<QuarterResult>
        description: Quarter-by-quarter breakdown within this level
      - name: topicDistributions
        type: List<TopicBucketDistribution>
        description: Per-topic breakdown within this level
    - name: TopicBucketDistribution
      type: record
      fields:
      - name: topicId
        type: String
        description: Topic identifier
      - name: score
        type: double
        description: Aggregated score for this topic (0.0-1.0)
      - name: bucketResults
        type: List<BucketResult>
        description: Distribution results per band for this topic
      - name: topicLabel
        type: String
        description: Human-readable topic name for COCA distribution reports
    - name: ProgressionState
      type: enum
      fields:
      - name: ASCENDING
      - name: DESCENDING
      - name: STATIC
      - name: IRREGULAR
    - name: ProgressionExpectation
      type: record
      fields:
      - name: bandName
        type: String
        description: The frequency band whose progression is being specified
      - name: expectedProgression
        type: ProgressionState
        description: Expected progression pattern across levels for this band
    - name: ProgressionAssessment
      type: record
      fields:
      - name: bandName
        type: String
        description: The frequency band assessed
      - name: actualProgression
        type: ProgressionState
        description: Observed progression pattern across levels
      - name: expectedProgression
        type: ProgressionState
        description: Expected progression pattern from configuration
      - name: matches
        type: boolean
        description: Whether actual matches expected progression
    - name: ImprovementDirectiveType
      type: enum
      fields:
      - name: ENRICH
      - name: REDUCE
    - name: ImprovementDirective
      type: record
      fields:
      - name: type
        type: ImprovementDirectiveType
        description: Whether to enrich or reduce tokens in the target range
      - name: bandName
        type: String
        description: The frequency band this directive targets
      - name: levelName
        type: String
        description: The CEFR level this directive applies to
      - name: frequencyRangeFrom
        type: int
        description: Lower bound of the COCA frequency range
      - name: frequencyRangeTo
        type: int
        description: Upper bound of the COCA frequency range
      - name: actualPercentage
        type: double
        description: Current percentage of tokens in this band (0.0-1.0)
      - name: targetPercentage
        type: double
        description: Desired percentage of tokens in this band (0.0-1.0)
    - name: CocaBucketsDistributionResult
      type: record
      fields:
      - name: levels
        type: List<LevelBucketDistribution>
        description: Per-level distribution results
      - name: progressionAssessments
        type: List<ProgressionAssessment>
        description: Progression assessments across levels for each band
      - name: overallScore
        type: double
        description: Weighted overall score across all levels (0.0-1.0)
      - name: improvementDirectives
        type: List<ImprovementDirective>
        description: Actionable improvement directives for levels not meeting targets
    - name: AnalysisStrategy
      type: enum
      fields:
      - name: LEVELS
      - name: QUARTERS
    - name: CocaProgressionDiagnosis
      type: record
      fields:
      - name: overallScore
        type: double
        description: Global COCA distribution analysis score (0.0-1.0)
      - name: progressionAssessments
        type: List<ProgressionAssessment>
        description: Progression evaluation per frequency band across levels
      - name: improvementDirectives
        type: List<ImprovementDirective>
        description: Directives indicating which bands need adjustments in which levels
    - name: CocaBucketsLevelDiagnosis
      type: record
      fields:
      - name: totalTokens
        type: int
        description: Total number of classified tokens in this level
      - name: buckets
        type: List<BucketResult>
        description: "Distribution results per frequency band with count, percentage,\
          \ target, score and assessment"
      - name: quarters
        type: List<QuarterResult>
        description: "Distribution results per quarter with index, score and internal\
          \ buckets"
    - name: CocaBucketsTopicDiagnosis
      type: record
      fields:
      - name: totalTokens
        type: int
        description: Total number of classified tokens in this topic
      - name: buckets
        type: List<BucketSummary>
        description: Informational distribution summary per band without evaluation
          against targets
    - name: BucketSummary
      type: record
      fields:
      - name: bandName
        type: String
        description: "Name of the frequency band (e.g., top1k, top2k)"
      - name: count
        type: int
        description: Number of tokens classified into this band
      - name: percentage
        type: double
        description: Percentage of tokens in this band relative to topic total (0.0-1.0)
    interfaces:
    - name: TokenClassifier
      stereotype: port
      sealed: false
      exposes:
      - signature: "classify(int frequencyRank,BandConfiguration bandConfig): FrequencyBand"
    - name: ProgressionEvaluator
      stereotype: port
      sealed: false
      exposes:
      - signature: "evaluate(List<LevelBucketDistribution> levels,List<ProgressionExpectation>\
          \ expectations): List<ProgressionAssessment>"
    - name: ImprovementPlanner
      stereotype: port
      sealed: false
      exposes:
      - signature: "plan(List<LevelBucketDistribution> levels,BandConfiguration bandConfig,CocaBucketsConfig\
          \ config): List<ImprovementDirective>"
    implementations:
    - name: CocaBucketsAnalyzer
      requiresInject:
      - name: nlpTokenizer
        type: NlpTokenizer
      - name: cocaBucketsConfig
        type: CocaBucketsConfig
      - name: tokenClassifier
        type: TokenClassifier
      - name: progressionEvaluator
        type: ProgressionEvaluator
      - name: improvementPlanner
        type: ImprovementPlanner
      visibility: public
      implements:
      - ContentAnalyzer
    - name: CocaTokenAccumulationAggregator
      implements:
      - ScoreAggregator
    - name: DefaultTokenClassifier
      visibility: public
      implements:
      - TokenClassifier
    - name: DefaultProgressionEvaluator
      visibility: public
      implements:
      - ProgressionEvaluator
    - name: DefaultImprovementPlanner
      visibility: public
      implements:
      - ImprovementPlanner
  - name: lrec
    description: "Lemma recurrence analysis by spaced repetition. Tracks global word\
      \ positions across the course, calculates mean intervals between consecutive\
      \ lemma occurrences, classifies exposure status (normal, sub-exposed, over-exposed),\
      \ and produces a course-level recurrence score."
    visibility: internal
    models:
    - name: ExposureStatus
      type: enum
      fields:
      - name: NORMAL
        type: String
      - name: SUB_EXPOSED
        type: String
      - name: OVER_EXPOSED
        type: String
    - name: LemmaStats
      type: record
      fields:
      - name: lemma
        type: String
        description: Lemmatized form of the word
      - name: pos
        type: String
        description: "Predominant POS tag (NOUN, VERB, ADJ, ADV)"
      - name: count
        type: int
        description: Total number of occurrences in the course
      - name: meanInterval
        type: double
        description: Mean interval between consecutive occurrences (in global positions)
      - name: stdDevInterval
        type: double
        description: Population standard deviation of intervals
      - name: exposureStatus
        type: ExposureStatus
        description: "Exposure classification: NORMAL, SUB_EXPOSED, or OVER_EXPOSED"
      - name: occurrencePositions
        type: List<Integer>
        description: All global positions where this lemma appears
    - name: ExposureSummary
      type: record
      fields:
      - name: normalCount
        type: int
        description: Count of lemmas with NORMAL exposure
      - name: subExposedCount
        type: int
        description: Count of lemmas with SUB_EXPOSED exposure
      - name: overExposedCount
        type: int
        description: Count of lemmas with OVER_EXPOSED exposure
    - name: LemmaRecurrenceResult
      type: record
      fields:
      - name: lemmaStats
        type: List<LemmaStats>
        description: "Per-lemma statistics, ordered by count descending"
      - name: exposureSummary
        type: ExposureSummary
        description: Aggregate counts by exposure status
      - name: overallScore
        type: double
        description: Proportion of lemmas with NORMAL exposure (0.0 to 1.0)
    interfaces:
    - name: IntervalCalculator
      stereotype: port
      sealed: false
      exposes:
      - signature: "calculateMeanInterval(List<Integer> positions): double"
      - signature: "calculateStdDevInterval(List<Integer> positions,double meanInterval):\
          \ double"
    - name: ExposureClassifier
      stereotype: port
      sealed: false
      exposes:
      - signature: "classify(double meanInterval,LemmaRecurrenceConfig config): ExposureStatus"
    implementations:
    - name: LemmaRecurrenceAnalyzer
      requiresInject:
      - name: contentWordFilter
        type: ContentWordFilter
      - name: lemmaRecurrenceConfig
        type: LemmaRecurrenceConfig
      - name: intervalCalculator
        type: IntervalCalculator
      - name: exposureClassifier
        type: ExposureClassifier
      visibility: public
      handwrittenTests:
      - name: "Given a LemmaRecurrenceAnalyzer, when getName is called, then returns\
          \ lemma-recurrence"
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R015
      - name: "Given a LemmaRecurrenceAnalyzer, when getTarget is called, then returns\
          \ COURSE"
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R013
      implements:
      - ContentAnalyzer
    - name: DefaultContentWordFilter
      tests:
      - name: "Given a NOUN token, when isContentWord is called, then returns true"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:nounToken
        fixtures:
        - id: nounToken
          type: NlpToken
          construct:
            text: cat
            lemma: cat
            posTag: NOUN
            frequencyRank: 100
            isStop: false
            isPunct: false
        type: unit
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R003
        assert:
          returns: true
      - name: "Given a VERB token, when isContentWord is called, then returns true"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:verbToken
        fixtures:
        - id: verbToken
          type: NlpToken
          construct:
            text: running
            lemma: run
            posTag: VERB
            frequencyRank: 50
            isStop: false
            isPunct: false
        type: unit
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R003
        assert:
          returns: true
      - name: "Given an ADJ token, when isContentWord is called, then returns true"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:adjToken
        fixtures:
        - id: adjToken
          type: NlpToken
          construct:
            text: big
            lemma: big
            posTag: ADJ
            frequencyRank: 200
            isStop: false
            isPunct: false
        type: unit
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R003
        assert:
          returns: true
      - name: "Given an ADV token, when isContentWord is called, then returns true"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:advToken
        fixtures:
        - id: advToken
          type: NlpToken
          construct:
            text: quickly
            lemma: quickly
            posTag: ADV
            frequencyRank: 300
            isStop: false
            isPunct: false
        type: unit
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R003
        assert:
          returns: true
      - name: "Given a DET token, when isContentWord is called, then returns false"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:detToken
        fixtures:
        - id: detToken
          type: NlpToken
          construct:
            text: the
            lemma: the
            posTag: DET
            frequencyRank: 1
            isStop: true
            isPunct: false
        type: unit
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R003
        assert:
          returns: false
      - name: "Given a PUNCT token, when isContentWord is called, then returns false"
        target: DefaultContentWordFilter
        invoke:
          method: isContentWord
          args:
          - ref:punctToken
        fixtures:
        - id: punctToken
          type: NlpToken
          construct:
            text: .
            lemma: .
            posTag: PUNCT
            frequencyRank: 0
            isStop: false
            isPunct: true
        type: unit
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R003
        assert:
          returns: false
      visibility: public
      implements:
      - ContentWordFilter
    - name: DefaultIntervalCalculator
      tests:
      - name: "Given positions [10, 110], when calculateMeanInterval is called, then\
          \ returns 100.0"
        target: DefaultIntervalCalculator
        invoke:
          method: calculateMeanInterval
          args:
          - "[10, 110]"
        type: unit
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R007
        assert:
          returns: 100
      - name: "Given positions [0, 100, 200, 300], when calculateMeanInterval is called,\
          \ then returns 100.0"
        target: DefaultIntervalCalculator
        invoke:
          method: calculateMeanInterval
          args:
          - "[0, 100, 200, 300]"
        type: unit
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R007
        assert:
          returns: 100
      - name: "Given positions [10, 110] and mean 100.0, when calculateStdDevInterval\
          \ is called, then returns 0.0"
        target: DefaultIntervalCalculator
        invoke:
          method: calculateStdDevInterval
          args:
          - "[10, 110]"
          - 100
        type: unit
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R007
        assert:
          returns: 0
      - name: "Given positions [0, 100, 200, 300] and mean 100.0, when calculateStdDevInterval\
          \ is called, then returns 0.0"
        target: DefaultIntervalCalculator
        invoke:
          method: calculateStdDevInterval
          args:
          - "[0, 100, 200, 300]"
          - 100
        type: unit
        traceability:
          feature: FEAT-LREC
          rule: F-LREC-R007
        assert:
          returns: 0
      visibility: public
      implements:
      - IntervalCalculator
    - name: DefaultExposureClassifier
      visibility: public
      implements:
      - ExposureClassifier
  - name: labs
    description: "Lemma absence analysis by CEFR level. Compares course vocabulary\
      \ against the EVP catalog to detect absent, misplaced, or scattered lemmas.\
      \ Classifies absence type, assigns priority by COCA frequency, computes per-level\
      \ metrics, and generates actionable recommendations."
    visibility: internal
    models:
    - name: AbsenceType
      type: enum
      fields:
      - name: COMPLETELY_ABSENT
        type: double
        description: Lemma not found in any level — impact 1.0
      - name: APPEARS_TOO_LATE
        type: double
        description: Lemma only in levels after expected — impact 0.8
      - name: APPEARS_TOO_EARLY
        type: double
        description: Lemma found in at least one level before expected — impact 0.6
    - name: PriorityLevel
      type: enum
      fields:
      - name: HIGH
      - name: MEDIUM
      - name: LOW
    - name: LemmaAndPos
      type: record
      fields:
      - name: lemma
        type: String
        description: Base form of the word
      - name: pos
        type: String
        description: Part-of-speech tag
    - name: AbsentLemma
      type: record
      fields:
      - name: lemmaAndPos
        type: LemmaAndPos
        description: The absent lemma-POS pair
      - name: expectedLevel
        type: CefrLevel
        description: CEFR level where the lemma is expected per EVP
      - name: absenceType
        type: AbsenceType
        description: Classification of the absence
      - name: presentInLevels
        type: List<CefrLevel>
        description: Levels where the lemma does appear (may be empty)
      - name: priorityLevel
        type: PriorityLevel
        description: Priority based on COCA frequency rank
      - name: cocaRank
        type: Integer
        description: COCA frequency ranking (null if unavailable)
      - name: semanticCategory
        type: String
        description: Semantic topic from EVP catalog (nullable)
    - name: AbsenceAssessment
      type: enum
      fields:
      - name: OPTIMAL
        description: All levels within tolerance thresholds
      - name: ACCEPTABLE
        description: Some levels exceed thresholds but no critical level (A1/A2) exceeds
      - name: NEEDS_IMPROVEMENT
        description: At least one critical level (A1/A2) exceeds its threshold
    - name: LevelAbsenceMetrics
      type: record
      fields:
      - name: level
        type: CefrLevel
        description: CEFR level being measured
      - name: totalExpected
        type: int
        description: Number of EVP lemmas expected for this level
      - name: totalAbsent
        type: int
        description: Number of expected lemmas not found in this level
      - name: absencePercentage
        type: double
        description: "Percentage of absence: (absent/expected)*100"
      - name: absentLemmas
        type: List<AbsentLemma>
        description: Detailed list of absent lemmas with enrichment
      - name: score
        type: double
        description: "Level score: 1.0 - (absencePercentage/100) weighted by impact"
    - name: RecommendationAction
      type: enum
      fields:
      - name: ADD_VOCABULARY
        description: Add sentences containing completely absent lemmas
      - name: INTRODUCE_EARLIER
        description: Introduce lemmas in earlier levels where they are expected
      - name: REMOVE_FROM_LEVEL
        description: Remove or replace lemmas from levels where they appear too early
    - name: EffortLevel
      type: enum
      fields:
      - name: LOW
        description: 1-5 affected lemmas
      - name: MEDIUM
        description: 6-15 affected lemmas
      - name: HIGH
        description: 16+ affected lemmas
    - name: AbsenceRecommendation
      type: record
      fields:
      - name: action
        type: RecommendationAction
        description: Type of corrective action
      - name: description
        type: String
        description: Human-readable explanation of the problem and proposed fix
      - name: priority
        type: PriorityLevel
        description: "Recommendation priority (HIGH for A1/A2, varies for B1/B2)"
      - name: affectedLemmas
        type: List<AbsentLemma>
        description: Lemmas this recommendation addresses
      - name: effortLevel
        type: EffortLevel
        description: Estimated effort to implement
      - name: expectedImpact
        type: double
        description: Estimated score improvement if implemented
      - name: targetLevel
        type: CefrLevel
        description: CEFR level this recommendation targets
    - name: LemmaAbsenceCourseDiagnosis
      type: record
      fields:
      - name: assessment
        type: AbsenceAssessment
        description: "Global absence assessment for the course: OPTIMAL, ACCEPTABLE,\
          \ or NEEDS_IMPROVEMENT"
    - name: LemmaAbsenceLevelDiagnosis
      type: record
      fields:
      - name: level
        type: CefrLevel
        description: The CEFR level this diagnosis describes
      - name: totalExpected
        type: int
        description: Total lemmas expected at this CEFR level per EVP catalog
      - name: totalAbsent
        type: int
        description: Total lemmas absent from this level
      - name: absencePercentage
        type: double
        description: Percentage of expected lemmas that are absent
      - name: coverageTarget
        type: double
        description: Configured coverage target threshold for this level
      - name: completelyAbsentScore
        type: double
        description: Weighted score contribution from completely absent lemmas
      - name: tooLateScore
        type: double
        description: Weighted score contribution from lemmas appearing too late
      - name: tooEarlyScore
        type: double
        description: Weighted score contribution from lemmas appearing too early
      - name: assessment
        type: AbsenceAssessment
        description: Absence assessment for this specific level
      - name: absentLemmas
        type: List<AbsentLemma>
        description: Detailed list of each absent lemma with classification and priority
      - name: misplacedLemmas
        type: List<MisplacedLemma>
        description: Lemmas found at wrong levels relative to this level
      - name: highPriorityCount
        type: int
        description: Count of HIGH priority absent lemmas
      - name: mediumPriorityCount
        type: int
        description: Count of MEDIUM priority absent lemmas
      - name: lowPriorityCount
        type: int
        description: Count of LOW priority absent lemmas
    - name: LemmaPlacementDiagnosis
      type: record
      fields:
      - name: misplacedLemmaCount
        type: int
        description: Number of misplaced lemmas at this node
      - name: misplacedLemmas
        type: List<MisplacedLemma>
        description: Detailed list of each misplaced lemma
    - name: MisplacedLemma
      type: record
      fields:
      - name: lemmaAndPos
        type: LemmaAndPos
        description: The misplaced lemma-POS pair
      - name: expectedLevel
        type: CefrLevel
        description: CEFR level where the lemma should appear per EVP
      - name: foundInLevel
        type: CefrLevel
        description: CEFR level where the lemma was actually found
