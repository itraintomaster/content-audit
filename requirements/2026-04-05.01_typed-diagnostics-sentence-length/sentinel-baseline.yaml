- name: audit-cli
  description: CLI entry point
  dependsOn:
  - audit-application
  - audit-domain
  - course-domain
  - course-infrastructure
  - nlp-infrastructure
  - vocabulary-infrastructure
  - audit-infrastructure
  - refiner-domain
  - revision-domain
  - revision-infrastructure
  models:
  - name: GetTasksFilter
    type: record
    fields:
    - name: planId
      type: Optional<String>
      description: "Restrict to tasks belonging to this plan id; if empty, the most\
        \ recent plan is used (R012)"
    - name: status
      type: Optional<String>
      description: "Restrict to tasks whose status matches this value, case-insensitive\
        \ (pending/completed/skipped) — R008"
    - name: sortByPriority
      type: boolean
      description: "If true, order results by ascending task priority — R008"
    - name: limit
      type: Optional<Integer>
      description: Cap the result count after filter+sort; 0 yields empty (R009);
        negative is rejected
    - name: target
      type: Optional<AuditTarget>
      description: Restrict to tasks whose nodeTarget matches this AuditTarget enum
        value; absent = no filter (R008)
    - name: diagnosisKind
      type: Optional<DiagnosisKind>
      description: Restrict to tasks whose diagnosisKind matches this DiagnosisKind
        enum value; absent = no filter (R008)
  - name: LagenMode
    type: enum
    fields:
    - name: LLM
      description: Default. The CLI wires the LangChain4j-backed generator from revision-infrastructure
        (F-LAGEN-R013).
    - name: CANNED
      description: "Opt-in offline mode. The CLI wires CannedLemmaAbsenceQuizCandidateGenerator\
        \ from revision-domain.lemmaabsence with fixed quizSentence/translation. DOUBT-CANNED-MODE-AVAILABILITY\
        \ -> Option B (kept as opt-in, never default)."
    visibility: public
  - name: PlanStorageMode
    type: enum
    fields:
    - name: DISK
      description: "Persistent path: el plan se guarda via RefinementPlanStore en\
        \ .content-audit/refinement-plans/. Comportamiento previo a F-PLANEF, sigue\
        \ siendo el default cuando el operador no pasa --storage."
    - name: EPHEMERAL
      description: "Modo efimero (F-PLANEF-R001). El comando plan calcula el plan,\
        \ NO lo persiste, y emite la representacion JSON completa por stdout. Mensajes\
        \ informativos van a stderr."
    visibility: public
  - name: EphemeralRenderOptions
    type: record
    fields:
    - name: withCorrectionContext
      type: boolean
      description: "F-PLANEF-R002: si true, cada task del plan emitido lleva inline\
        \ su correctionContext (o correctionContext=null + correctionContextError\
        \ si no es construible). Default OFF (DOUBT-CTX-DEFAULT opcion A)."
    visibility: public
  interfaces:
  - name: AnalyzeCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "analyze(String coursePath, String format, String level, String topic,\
        \ String knowledge, List<String> analyzers, boolean detailed): Integer"
  - name: GetCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "get(String resource, String name, GetTasksFilter filter): Integer"
  - name: DeleteCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "delete(String resource, String id): Integer"
  - name: PruneCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "prune(String resource, int keep): Integer"
  - name: PlanCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "plan(String auditId, PlanStorageMode storageMode, boolean withCorrectionContext):\
        \ Integer"
  - name: ReviseCommand
    stereotype: port
    sealed: false
    exposes:
    - signature: "revise(String taskId, String planId, String correctionContextJson,\
        \ String correctionContextFilePath): Integer"
  - name: ConfigAnalyzerCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "showConfig(String analyzerName): Integer"
  - name: StatsAnalyzerCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "showStats(String analyzerName, String coursePath): Integer"
  - name: ApproveCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "approve(String resource, String proposalId, String planId, String\
        \ note): Integer"
  - name: RejectCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "reject(String resource, String proposalId, String planId, String\
        \ reason): Integer"
  - name: GetConsolidatedCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "getConsolidated(String coursePath, String format): Integer"
  - name: SetActiveAnalysisCommand
    stereotype: port
    sealed: true
    exposes:
    - signature: "setActive(String auditId, String planId): Integer"
  patterns:
  - type: Strategy
    implementations:
    - TextReportFormatter
    - JsonReportFormatter
    - TableReportFormatter
    suppressed: false
    interface: ReportFormatter
  scope: public
  packages:
  - name: commands
    description: Public CLI command tree — the only exported API of the audit-cli
      module
    visibility: internal
    interfaces:
    - name: EphemeralPlanRenderer
      stereotype: port
      sealed: false
      exposes:
      - signature: "render(RefinementPlan plan, AuditReport report, EphemeralRenderOptions\
          \ options): Integer"
      visibility: internal
    - name: CorrectionContextJsonMapper
      stereotype: port
      sealed: false
      exposes:
      - signature: "toJsonMap(CorrectionContext context): Map<String,Object>"
      visibility: internal
    implementations:
    - name: Main
      types:
      - Component
    - name: ContentAuditCmd
      types:
      - Component
      handwrittenTests:
      - name: should fail with picocli 'unknown subcommand' when invoked with the
          removed 'refiner' subcommand
        traceability:
          feature: FEAT-CLIRV
          rule: F-CLIRV-R020
      - name: should fail with picocli 'unknown subcommand' when invoked with the
          removed 'analyzer' subcommand
        traceability:
          feature: FEAT-CLIRV
          rule: F-CLIRV-R020
      externalImplements:
      - java.util.concurrent.Callable<Integer>
    - name: AnalyzeCmd
      requiresInject:
      - name: auditRunner
        type: AuditRunner
      - name: formatterRegistry
        type: FormatterRegistry
      - name: viewModelTransformer
        type: ReportViewModelTransformer
      - name: rawReportFormatter
        type: RawReportFormatter
      - name: drillDownResolver
        type: DrillDownResolver
      - name: detailedFormatters
        type: "Map<String,DetailedFormatter>"
      - name: auditReportStore
        type: AuditReportStore
      types:
      - Component
      handwrittenTests:
      - name: "should be registered as a top-level subcommand of content-audit (verb\
          \ relocated, semantics unchanged)"
        traceability:
          feature: FEAT-CLIRV
          rule: F-CLIRV-R013
      externalImplements:
