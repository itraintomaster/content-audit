    - name: DefaultEphemeralPlanRenderer
      requiresInject:
      - name: auditNodeIndexFactory
        type: AuditNodeIndexFactory
        description: Construye el indice del report una vez por invocacion del renderer
          cuando se pide contexto inline.
      - name: correctionContextResolver
        type: CorrectionContextResolver
        description: "Inyectado en su forma dispatching; se llama via resolveWithIndex(index,\
          \ report, task)."
      - name: correctionContextJsonMapper
        type: CorrectionContextJsonMapper
        description: "Misma instancia que GetCmd usa, garantizando que el JSON emitido\
          \ por plan efimero y por get task tengan la misma forma."
      visibility: internal
      handwrittenTests:
      - name: "Dado un RefinementPlan con tasks no vacias, cuando render se invoca,\
          \ entonces el JSON emitido tiene las mismas claves top-level (id, sourceAuditId,\
          \ createdAt, tasks) y dentro de cada task las mismas claves (id, nodeTarget,\
          \ nodeId, nodeLabel, diagnosisKind, priority, status) que el JSON producido\
          \ por FileSystemRefinementPlanStore.save sobre el mismo plan — R001 invariante\
          \ 2: schema-equivalencia con el plan persistido"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado un RefinementPlan, cuando render escribe a stdout y el JSON emitido\
          \ se vuelve a deserializar con el ObjectMapper estandar (JavaTimeModule),\
          \ entonces el RefinementPlan deserializado es igual al original (mismo id,\
          \ sourceAuditId, createdAt y tasks) — R001 invariante 2: round-trip JSON,\
          \ un cliente que parsea planes persistidos parsea planes efimeros sin cambios"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado un RefinementPlan, cuando render se invoca, entonces el JSON se\
          \ emite por la salida estandar (stdout) y stderr permanece vacio — R001\
          \ invariante 2: el canal del plan es stdout, no stderr"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado un RefinementPlan con tasks no vacias y EphemeralRenderOptions.withCorrectionContext=false,\
          \ cuando render se invoca, entonces el JSON emitido no contiene la clave\
          \ correctionContext en ninguna task y ni el resolver ni el mapper son invocados\
          \ — R002 invariante #3: opt-in default OFF preserva R001 y no se cambia\
          \ silenciosamente"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R002
      - name: "Dado un RefinementPlan con tasks y EphemeralRenderOptions.withCorrectionContext=true,\
          \ cuando render se invoca y el resolver retorna contexto para cada task,\
          \ entonces cada task del JSON emitido tiene un campo correctionContext igual\
          \ al mapa producido por CorrectionContextJsonMapper.toJsonMap aplicado al\
          \ contexto resuelto via resolveWithIndex con el indice construido a partir\
          \ del AuditReport — R002 invariante #1: contexto inline por tarea con la\
          \ misma estructura/semantica que get task"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R002
      - name: "Dado un RefinementPlan y una unica instancia de CorrectionContextJsonMapper\
          \ inyectada en GetCmd y en DefaultEphemeralPlanRenderer, cuando ambos comandos\
          \ serializan el correctionContext de la misma task derivada del mismo AuditReport,\
          \ entonces el campo correctionContext que emite plan efimero es estructuralmente\
          \ igual al que emite get task (mismas claves, mismos valores) — R002 invariante\
          \ #2: equivalencia funcional con get task garantizada por compartir el mapper"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R002
      - name: "Dado un RefinementPlan con tasks y EphemeralRenderOptions.withCorrectionContext=true,\
          \ cuando render se invoca y el resolver retorna Optional.empty para una\
          \ task (contexto no construible), entonces esa task del JSON emitido tiene\
          \ correctionContext en null y un campo descriptivo del motivo, con la misma\
          \ semantica que F-RCLA-R008 define para get task — R002 invariante #4: tareas\
          \ sin contexto construible llevan correctionContext ausente o nulo + motivo"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R002
      - name: "Dado un RefinementPlan con tasks mixtas y EphemeralRenderOptions.withCorrectionContext=true,\
          \ cuando render se invoca y el resolver retorna contexto para algunas tasks\
          \ y Optional.empty para otras, entonces el comando retorna codigo 0, el\
          \ JSON emitido contiene todas las tasks, las tasks resueltas llevan correctionContext\
          \ con valor y las no resueltas llevan correctionContext en null + motivo\
          \ — R002 invariante #4: el comando no falla globalmente, emite el plan completo\
          \ con la falla por tarea visible para el cliente"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R002
      implements:
      - EphemeralPlanRenderer
    - name: DefaultCorrectionContextJsonMapper
      visibility: internal
      implements:
      - CorrectionContextJsonMapper
  - name: formatting
    description: "Internal formatting infrastructure — report transformers, view models,\
      \ formatters, drill-down resolution, and proposal/preview rendering."
    visibility: internal
    models:
    - name: ReportViewModel
      type: record
      fields:
      - name: overallScore
        type: double
        description: Course-level overall score
      - name: analyzerNames
        type: List<String>
        description: Ordered list of all analyzer names present in the report
      - name: analyzerScores
        type: "Map<String,Double>"
        description: Course-level score per analyzer
      - name: milestoneScores
        type: List<MilestoneScoreRow>
        description: Per-milestone breakdown of analyzer scores
    - name: MilestoneScoreRow
      type: record
      fields:
      - name: milestoneId
        type: String
      - name: analyzerScores
        type: "Map<String,Double>"
        description: Score per analyzer for this milestone
      - name: overallScore
        type: double
        description: Average score across all analyzers at milestone level
      - name: topicScores
        type: List<TopicScoreRow>
        description: Per-topic breakdown of analyzer scores
      - name: entity
        type: AuditableEntity
        description: "Reference to the auditable entity carrying identity (id, label,\
          \ code)"
      extends: ScoreRow
    - name: QuizScoreRow
      type: record
      fields:
      - name: quizId
        type: String
        description: Quiz identifier
      - name: overallScore
        type: double
        description: Average score across all analyzers at quiz level
      - name: analyzerScores
        type: "Map<String,Double>"
        description: Score per analyzer for this quiz
      - name: entity
        type: AuditableEntity
        description: "Reference to the auditable entity carrying identity (id, label,\
          \ code)"
      extends: ScoreRow
    - name: KnowledgeScoreRow
      type: record
      fields:
      - name: knowledgeId
        type: String
        description: Knowledge identifier
      - name: overallScore
        type: double
        description: Average score across all analyzers at knowledge level
      - name: analyzerScores
        type: "Map<String,Double>"
        description: Score per analyzer for this knowledge
      - name: quizScores
        type: List<QuizScoreRow>
        description: Per-quiz breakdown of analyzer scores
      - name: entity
        type: AuditableEntity
        description: "Reference to the auditable entity carrying identity (id, label,\
          \ code)"
      extends: ScoreRow
    - name: TopicScoreRow
      type: record
      fields:
      - name: topicId
        type: String
        description: Topic identifier
      - name: overallScore
        type: double
        description: Average score across all analyzers at topic level
      - name: analyzerScores
        type: "Map<String,Double>"
        description: Score per analyzer for this topic
      - name: knowledgeScores
        type: List<KnowledgeScoreRow>
        description: Per-knowledge breakdown of analyzer scores
      - name: entity
        type: AuditableEntity
        description: "Reference to the auditable entity carrying identity (id, label,\
          \ code)"
      extends: ScoreRow
    - name: ChildScoreRow
      type: record
      fields:
      - name: id
        type: String
        description: Child node identifier
      - name: overallScore
        type: double
        description: Child overall score
      - name: analyzerScores
        type: "Map<String,Double>"
        description: Child per-analyzer scores
      - name: entity
        type: AuditableEntity
        description: "Reference to the auditable entity carrying identity (id, label,\
          \ code)"
      extends: ScoreRow
    - name: DrillDownScope
      type: record
      fields:
      - name: level
        type: Optional<String>
        description: Selected milestone/level to drill into (e.g. A1)
      - name: topic
        type: Optional<String>
        description: Selected topic within the level
      - name: knowledge
        type: Optional<String>
        description: Selected knowledge within the topic
    - name: DrillDownLevel
      type: enum
      fields:
      - name: COURSE
      - name: MILESTONE
      - name: TOPIC
      - name: KNOWLEDGE
    - name: DrillDownView
      type: record
      fields:
      - name: depth
        type: DrillDownLevel
        description: The resolved depth of the drill-down
      - name: nodeName
        type: String
        description: "Display name of the focused node (course title, level id, topic\
          \ id, or knowledge id)"
      - name: overallScore
        type: double
        description: Overall score of the focused node
      - name: analyzerScores
        type: "Map<String,Double>"
        description: Per-analyzer scores of the focused node
      - name: analyzerNames
        type: List<String>
        description: Ordered analyzer names for column headers
      - name: childRows
        type: List<ScoreRow>
        description: One level of children detail rows
    - name: AnalyzerStatsView
      type: record
      fields:
      - name: analyzerName
        type: String
        description: Name of the analyzer
      - name: analyzerDescription
        type: String
        description: Description of the analyzer
      - name: courseScore
        type: double
        description: Course-level score for this analyzer
      - name: levelScores
        type: "Map<String,Double>"
        description: Per-milestone/level score breakdown
      - name: worstItems
        type: List<ScoredItemRow>
        description: Worst-scoring items sorted ascending
      - name: scoreDistribution
        type: "Map<String,Integer>"
        description: Histogram buckets (e.g. 0.0-0.2 -> count)
      - name: subMetricsByLevel
        type: "Map<String,Map<String,Double>>"
        description: Sub-metric scores per level (e.g. level -> quarter -> score)
      - name: itemCount
        type: int
        description: Total number of scored items for this analyzer
    - name: ScoredItemRow
      type: record
      fields:
      - name: id
        type: String
        description: Item identifier
      - name: label
        type: String
        description: Display label for the item
      - name: score
        type: double
        description: Score value for the item
      - name: level
        type: String
        description: CEFR level the item belongs to
    - name: ImpactPreviewView
      type: record
      fields:
      - name: availability
        type: ImpactPreviewAvailability
        description: Mirrors the model field; lets the formatter branch between 'show
          levels' and 'show unavailability text'.
      - name: unavailabilityText
        type: String
        description: "Empty when availability=AVAILABLE; '<reason category>: <detail>'\
          \ when UNAVAILABLE (F-PIPRE-R009 + F-PIPRE-R013 detail 4)."
      - name: levels
        type: List<LevelImpactView>
        description: Hierarchy from leaf (proposal's nodeTarget) up to course; same
          ordering as ImpactPreview.levelImpacts (F-PIPRE-R004).
    - name: LevelImpactView
      type: record
      fields:
      - name: nodeTarget
        type: AuditTarget
      - name: nodeId
        type: String
      - name: aggregateText
        type: String
        description: "Pre-formatted aggregate delta, e.g. '72% -> 81% (+9 pp)' (F-PIPRE-R013)."
      - name: dimensionRows
        type: List<DimensionDeltaView>
        description: One row per analyzer reported at this level (F-PIPRE-R005).
    - name: DimensionDeltaView
      type: record
      fields:
      - name: dimension
        type: String
      - name: deltaText
        type: String
        description: "Pre-formatted, e.g. '+2 pp' or '54% -> 56% (+2 pp)' (F-PIPRE-R013\
          \ detail 3 — sign is explicit)."
    interfaces:
    - name: ReportFormatter
      stereotype: port
      sealed: false
      exposes:
      - signature: "format(ReportViewModel viewModel,DrillDownScope scope): String"
    - name: FormatterRegistry
      stereotype: port
      sealed: false
      exposes:
      - signature: "getFormatter(String formatName): ReportFormatter"
    - name: ReportViewModelTransformer
      stereotype: port
      sealed: false
      exposes:
      - signature: "transform(AuditReport report): ReportViewModel"
    - name: RawReportFormatter
      stereotype: port
      sealed: false
      exposes:
      - signature: "format(AuditReport report): String"
    - name: DrillDownResolver
      stereotype: port
      sealed: true
      exposes:
      - signature: "resolve(ReportViewModel viewModel,DrillDownScope scope): DrillDownView"
    - name: AnalyzerStatsTransformer
      stereotype: port
      sealed: false
      exposes:
      - signature: "transform(AuditReport report,String analyzerName,AnalyzerRegistry\
          \ registry): AnalyzerStatsView"
    - name: ScoreRow
      stereotype: port
      sealed: false
      exposes:
      - signature: "getEntity(): AuditableEntity"
      - signature: "getOverallScore(): double"
      - signature: "getAnalyzerScores(): Map<String,Double>"
    - name: DetailedFormatter
      stereotype: formatter
      sealed: false
      exposes:
      - signature: "format(String analyzerName,AuditNode rootNode,String outputFormat):\
          \ String"
    - name: ImpactPreviewFormatter
      stereotype: port
      sealed: false
      exposes:
      - signature: "format(ImpactPreview preview): ImpactPreviewView"
      visibility: public
    - name: ConsolidatedViewFormatter
      stereotype: service
      sealed: false
      exposes:
      - signature: "format(ConsolidatedView view, String format): String"
      visibility: public
    implementations:
    - name: TextReportFormatter
      requiresInject:
      - name: drillDownResolver
        type: DrillDownResolver
      visibility: public
      implements:
      - ReportFormatter
    - name: JsonReportFormatter
      requiresInject:
      - name: drillDownResolver
        type: DrillDownResolver
      visibility: public
      implements:
      - ReportFormatter
    - name: TableReportFormatter
      requiresInject:
      - name: drillDownResolver
        type: DrillDownResolver
      visibility: public
      implements:
      - ReportFormatter
    - name: DefaultFormatterRegistry
      requiresInject:
      - name: formatters
        type: "Map<String, ReportFormatter>"
        description: Mapa formato -> formatter (text / json / table). Lo construye
          la composition root (audit-cli.Main:256-260) y lo inyecta como un solo argumento.
      types:
      - Component
      visibility: public
      implements:
      - FormatterRegistry
    - name: DefaultReportViewModelTransformer
      visibility: public
      implements:
      - ReportViewModelTransformer
    - name: RawJsonReportFormatter
      visibility: public
      implements:
      - RawReportFormatter
    - name: DefaultDrillDownResolver
      types:
      - Component
      visibility: public
      implements:
      - DrillDownResolver
    - name: DefaultAnalyzerStatsTransformer
      types:
      - Component
      visibility: public
      implements:
      - AnalyzerStatsTransformer
    - name: LemmaAbsenceDetailedFormatter
      types:
      - Component
      visibility: public
      implements:
      - DetailedFormatter
    - name: CocaBucketsDetailedFormatter
      types:
      - Component
      visibility: public
      implements:
      - DetailedFormatter
    - name: DefaultImpactPreviewFormatter
      visibility: public
      handwrittenTests:
      - name: "Dado un ScoreDelta(before=0.72, after=0.81, difference=0.09) en un\
          \ LevelImpact, cuando format corre, entonces aggregateText es '72% -> 81%\
          \ (+9 pp)' con signo explicito"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R013
      - name: "Dado un ScoreDelta con difference negativa, cuando format corre, entonces\
          \ el texto de la diferencia incluye signo '-' explicito en puntos porcentuales"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R013
      - name: "Dado un ImpactPreview UNAVAILABLE con reason y detail, cuando format\
          \ corre, entonces unavailabilityText contiene la causa legible y levels\
          \ queda vacio (no se intenta convertir a porcentaje)"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R013
      implements:
      - ImpactPreviewFormatter
    - name: DefaultConsolidatedViewFormatter
      types:
      - Component
      visibility: public
      handwrittenTests:
      - name: "Dado un ConsolidatedView con activeAuditId y activePlanId no nulos,\
          \ cuando format corre, entonces ambos identificadores aparecen en la cadena\
          \ de salida en una posicion identificable como raiz del documento"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R001
      - name: "Dado un ConsolidatedView con nonApplicablePendings no vacio, cuando\
          \ format corre, entonces cada NonApplicablePending aparece en la salida\
          \ con su proposalId, su reason categorica y su detail"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R012
      - name: "Dado un ConsolidatedView con availability UNAVAILABLE y un unavailability\
          \ con reason y detail, cuando format corre, entonces la salida incluye consolidatedAvailability=UNAVAILABLE\
          \ con la categoria y el detalle, y nodeImpacts no se intenta rendererizar\
          \ como datos validos — R013 (v3 cleanup)"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R013
      - name: "Dado un ConsolidatedView con un NodeImpact que lleva fieldChanges no\
          \ vacio (varias entradas con FieldChange tripleta) mas acceptedProposalIds\
          \ y pendingProposalIds, cuando format corre, entonces la salida emite el\
          \ nodo con su mapa de fieldChanges (cada entrada bajo su clave estable de\
          \ path con sus tres valores) y con las dos listas de proposalIds adjuntas;\
          \ NO emite ningun campo equivalente al deprecado consolidated/pendingProjection\
          \ como CourseElementSnapshot crudo — R006 nueva forma uniforme"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R006
      - name: "Dado un ConsolidatedView con varios nodeImpacts cuyos fieldChanges\
          \ incluyen scores escalares cambiados, cuando format corre, entonces la\
          \ salida NO contiene una seccion paralela 'statisticImpacts' ni equivalente;\
          \ los scores cambiados solo aparecen como entradas del mapa fieldChanges\
          \ del nodo correspondiente — R009"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R009
      - name: "Dado un ConsolidatedView con cualquier conjunto de fieldChanges, cuando\
          \ format corre, entonces la salida NO contiene campos numericos precomputados\
          \ acceptedDelta ni pendingDelta en ningun lugar; cada FieldChange se serializa\
          \ como tripleta (original, consolidated, pendingProjection) sin restas —\
          \ R010"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R010
      - name: "Dado un ConsolidatedView con un NodeImpact cuyo acceptedProposalIds\
          \ y pendingProposalIds estan poblados, cuando format corre, entonces la\
          \ salida del nodo incluye ambas listas con sus proposalIds — R011"
        traceability:
          feature: FEAT-CDIFF
          rule: F-CDIFF-R011
      implements:
      - ConsolidatedViewFormatter
  - name: bootstrap
    description: "Env-var -> domain-object parsing plus composition-root helpers translating\
      \ external inputs (workdir, approval mode, proposal strategy selection, LAGEN\
      \ mode + LLM config) into typed values consumed by the engine factories."
    visibility: internal
    models:
    - name: InvalidWorkdirException
      type: exception
      fields:
      - name: path
        type: String
        description: The override value that failed validation
      message: The configured workdir override '%s' is not a writable directory
      extends: RuntimeException
    - name: InvalidApprovalModeException
      type: exception
      fields:
      - name: value
        type: String
        description: The raw env-var value that failed parsing
      message: "Invalid value for CONTENT_AUDIT_APPROVAL_MODE: '%s'. Allowed: auto,\
        \ human"
      extends: RuntimeException
    - name: InvalidProposalStrategyException
      type: exception
      fields:
      - name: value
        type: String
        description: The raw env-var value that failed parsing.
      - name: registered
        type: String
        description: Comma-separated list of registered strategy names (LemmaAbsenceProposalStrategyRegistry.listAll()).
      message: "Invalid value for CONTENT_AUDIT_LAPS_STRATEGY: '%s'. Registered: %s"
      extends: RuntimeException
    - name: InvalidLagenModeException
      type: exception
      fields:
      - name: value
        type: String
        description: The raw env-var value that failed parsing.
      message: "Invalid value for CONTENT_AUDIT_LAGEN_MODE: '%s'. Allowed: llm, canned"
      extends: RuntimeException
    - name: InvalidLagenConfigException
      type: exception
      fields:
      - name: key
        type: String
        description: Env-var name whose value was invalid (e.g. 'CONTENT_AUDIT_LAGEN_TEMPERATURE').
      - name: detail
        type: String
        description: "Why the value failed to parse (e.g. 'expected number in [0,2],\
          \ got abc')."
      message: "Invalid LAGEN configuration (%s): %s"
      extends: RuntimeException
    interfaces:
    - name: WorkdirResolver
      stereotype: port
      sealed: true
      exposes:
      - signature: "resolve(String flagValue): Path"
    - name: ApprovalModeResolver
      stereotype: port
      sealed: true
      exposes:
      - signature: "resolve(String envValue): ApprovalMode"
    - name: ProposalStrategySelector
      stereotype: port
      sealed: true
      exposes:
      - signature: "select(String envValue, LemmaAbsenceProposalStrategyRegistry registry):\
          \ String"
    - name: LagenModeResolver
      stereotype: port
      sealed: true
      exposes:
      - signature: "resolve(String envValue): LagenMode"
    - name: LagenConfigResolver
      stereotype: port
      sealed: true
      exposes:
      - signature: "resolve(Map<String,String> env): LagenConfig"
    implementations:
    - name: DefaultWorkdirResolver
      visibility: public
      handwrittenTests:
      - name: should return the flag value when --workdir is provided and points to
          an existing writable directory
        traceability:
          feature: FEAT-CLIRV
          rule: F-CLIRV-R017
      - name: "should ignore CONTENT_AUDIT_HOME and use the flag value when both are\
          \ set, validating flag-over-env precedence"
        traceability:
          feature: FEAT-CLIRV
          rule: F-CLIRV-R017
      - name: should fall back to user.dir when neither --workdir nor CONTENT_AUDIT_HOME
          is set
        traceability:
          feature: FEAT-CLIRV
          rule: F-CLIRV-R017
      - name: should throw InvalidWorkdirException naming the override path when --workdir
          points to a non-existent directory
        traceability:
          feature: FEAT-CLIRV
          rule: F-CLIRV-R017
      - name: should throw InvalidWorkdirException naming the override path when --workdir
          points to a regular file (not a directory)
        traceability:
          feature: FEAT-CLIRV
          rule: F-CLIRV-R017
      - name: should not validate or interfere with the course content folder path
          (workdir override is decoupled from course path)
        traceability:
          feature: FEAT-CLIRV
          rule: F-CLIRV-R018
      implements:
      - WorkdirResolver
    - name: DefaultApprovalModeResolver
      visibility: public
      handwrittenTests:
      - name: "Given a null env value, when resolve is called, then it returns AUTO"
        traceability:
          feature: FEAT-REVAPR
          rule: F-REVAPR-R005
      - name: "Given an empty-string env value, when resolve is called, then it returns\
          \ AUTO"
        traceability:
          feature: FEAT-REVAPR
          rule: F-REVAPR-R005
      - name: "Given env value 'auto', when resolve is called, then it returns AUTO"
        traceability:
          feature: FEAT-REVAPR
          rule: F-REVAPR-R005
      - name: "Given env value 'AUTO' in any casing, when resolve is called, then\
          \ it returns AUTO (case-insensitive)"
        traceability:
          feature: FEAT-REVAPR
          rule: F-REVAPR-R005
      - name: "Given env value 'human', when resolve is called, then it returns HUMAN"
        traceability:
          feature: FEAT-REVAPR
          rule: F-REVAPR-R005
      - name: "Given env value 'HUMAN' in any casing, when resolve is called, then\
          \ it returns HUMAN (case-insensitive)"
        traceability:
          feature: FEAT-REVAPR
          rule: F-REVAPR-R005
      - name: "Given an unrecognized env value, when resolve is called, then it throws\
          \ InvalidApprovalModeException listing the allowed values"
        traceability:
          feature: FEAT-REVAPR
          rule: F-REVAPR-R005
      implements:
      - ApprovalModeResolver
    - name: DefaultProposalStrategySelector
      visibility: public
      handwrittenTests:
      - name: "Given CONTENT_AUDIT_LAPS_STRATEGY unset (null or blank), when select\
          \ is called with any registry, then it returns the default strategy name\
          \ 'lemma-absence-mvp'"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      - name: "Given CONTENT_AUDIT_LAPS_STRATEGY set to the name of a registered strategy,\
          \ when select is called, then it returns that exact name (picking one among\
          \ several registered)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      - name: "Given CONTENT_AUDIT_LAPS_STRATEGY set to a name that no registered\
          \ strategy reports via listAll, when select is called, then it throws InvalidProposalStrategyException\
          \ whose message lists the registered strategy names"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      implements:
      - ProposalStrategySelector
    - name: DefaultLagenModeResolver
      types:
      - Component
      visibility: public
      handwrittenTests:
      - name: resolve returns LagenMode.LLM when the env value is null (default per
          R013)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R013
      - name: resolve returns LagenMode.LLM when the env value is an empty or whitespace-only
          string (default per R013)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R013
      - name: resolve returns LagenMode.LLM when the env value is 'llm' (explicit
          dynamic mode opt-in per R013)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R013
      - name: resolve returns LagenMode.CANNED when the env value is 'canned' (explicit
          fixed-mode opt-in per R013)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R013
      - name: "resolve accepts the mode value case-insensitively ('LLM', 'CANNED',\
          \ 'CaNnEd' all parse) per R013"
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R013
      - name: resolve raises InvalidLagenModeException carrying the offending value
          when the env value is not a recognised mode (fail-fast per R014)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R014
      - name: InvalidLagenModeException raised by resolve has a message that identifies
          the unrecognised mode value declared by the operator (per R014)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R014
      implements:
      - LagenModeResolver
    - name: DefaultLagenConfigResolver
      types:
      - Component
      visibility: public
      handwrittenTests:
      - name: resolve returns a LagenConfig populated from every CONTENT_AUDIT_LAGEN_*
          env entry when all required keys are present and valid
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R008
      - name: resolve returns LagenConfig with apiKey=null when the apiKey env entry
          is absent (knob nullable per R008)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R008
      - name: resolve returns LagenConfig with temperature=null when the temperature
          env entry is absent (factory will substitute LagenDefaults.temperature)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R008
      - name: resolve returns LagenConfig with maxTokens=null when the maxTokens env
          entry is absent (factory will substitute LagenDefaults.maxTokens)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R008
      - name: resolve returns LagenConfig with timeout=null when the timeout env entry
          is absent (factory will substitute LagenDefaults.timeout)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R008
      - name: resolve raises InvalidLagenConfigException identifying the temperature
          env key when its value is not a parseable number (fail-fast per R014)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R014
      - name: resolve raises InvalidLagenConfigException identifying the timeout env
          key when its value is not a positive duration (fail-fast per R014)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R014
      - name: resolve raises InvalidLagenConfigException identifying the maxTokens
          env key when its value is not a positive integer (fail-fast per R014)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R014
      - name: InvalidLagenConfigException raised by resolve carries both the offending
          env-var key and a parse-failure detail per R014
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R014
      - name: resolve raises InvalidLagenConfigException identifying the providerName
          env key when its value is missing or empty (fail-fast per R014)
        traceability:
          feature: FEAT-LAGEN
          rule: F-LAGEN-R014
      implements:
      - LagenConfigResolver
- name: nlp-infrastructure
  description: "Infrastructure module for NLP processing. Provides SpaCy-backed tokenization\
    \ behind a factory, with internal caching. Only the factory and configuration\
    \ model are public; all processing internals are package-private."
  dependsOn:
  - audit-domain
  models:
  - name: NlpTokenizerConfig
    type: record
    fields:
    - name: pythonScriptPath
      type: String
      description: Path to the SpaCy Python processing script
    - name: cocaDataPath
      type: String
      description: Path to the COCA frequency data file
    - name: timeoutSeconds
      type: int
      description: Maximum seconds to wait for SpaCy process completion
  interfaces:
  - name: NlpTokenizerFactory
    stereotype: factory
    sealed: false
    exposes:
    - signature: "create(NlpTokenizerConfig config): NlpTokenizer"
  patterns:
  - type: Factory
    implementations:
    - SpacyNlpTokenizerFactory
    suppressed: false
    interface: NlpTokenizerFactory
  packages:
  - name: spacy
    description: SpaCy-backed NLP tokenization internals. Only the factory is public;
      all processing classes are package-private.
    visibility: public
    implementations:
    - name: SpacyNlpTokenizerFactory
      types:
      - Component
      visibility: public
      implements:
      - NlpTokenizerFactory
    - name: SpacyNlpTokenizer
      requiresInject:
      - name: processRunner
        type: SpacyProcessRunner
      - name: resultParser
        type: SpacyResultParser
      visibility: package-private
      implements:
      - NlpTokenizer
    - name: SpacyProcessRunner
      requiresInject:
      - name: config
        type: NlpTokenizerConfig
      visibility: package-private
    - name: SpacyResultParser
      visibility: package-private
    - name: CachedNlpTokenizer
      requiresInject:
      - name: delegate
        type: NlpTokenizer
      visibility: package-private
      implements:
      - NlpTokenizer
- name: vocabulary-infrastructure
  description: "Infrastructure module for linguistic reference catalogs (EVP vocabulary\
    \ profiles, COCA frequency data). Provides static lookup data for vocabulary analysis.\
    \ Separate from NLP processing (which handles runtime tokenization)."
  dependsOn:
  - audit-domain
  packages:
  - name: evp
    description: "EVP catalog access — expected lemmas by CEFR level, semantic categories"
    visibility: internal
    implementations:
    - name: FileSystemEvpCatalog
      visibility: public
      implements:
      - EvpCatalogPort
  - name: coca
    description: COCA frequency ranking lookups
    visibility: internal
- name: audit-infrastructure
  description: "Filesystem persistence adapters for audit reports, refinement plans,\
    \ revision artifacts, impact previews and the active analysis selection. Hosts\
    \ the five adapters that the CLI composition root wires into the corresponding\
    \ ports (AuditReportStore, RefinementPlanStore, RevisionArtifactStore, ImpactPreviewStore,\
    \ ActiveAnalysisSelectionStore). The active-analysis-selection adapter writes\
    \ a single dotfile under .content-audit/ so cualquier consumidor del CLI lo lee\
    \ con la misma simetria que los demas stores filesystem."
  dependsOn:
  - audit-domain
  - refiner-domain
  - revision-domain
  implementations:
  - name: FileSystemAuditReportStore
    requiresInject:
    - name: baseDir
      type: Path
      description: Directorio raiz bajo el cual se resuelve .content-audit/audits/.
        Lo provee la composition root (audit-cli.Main) tipicamente como Path.of(System.getProperty("user.dir"))
        o el path del flag --course.
    types:
    - Repository
    visibility: public
    handwrittenTests:
    - name: should save an AuditReport and load it back with identical content
      _change: delete
    implements:
    - AuditReportStore
  - name: FileSystemRefinementPlanStore
    requiresInject:
    - name: baseDir
      type: Path
      description: Directorio raiz bajo el cual se resuelve .content-audit/refinement-plans/.
        Lo provee la composition root (audit-cli.Main).
    types:
    - Repository
    visibility: public
    implements:
    - RefinementPlanStore
  - name: FileSystemRevisionArtifactStore
    requiresInject:
    - name: baseDir
      type: Path
      description: Directorio raiz bajo el cual se resuelve .content-audit/revisions/<planId>/.
        Lo provee la composition root (audit-cli.Main).
    types:
    - Repository
    visibility: public
    handwrittenTests:
    - name: "Given a RevisionArtifact, when save is called, then a file is written\
        \ under .content-audit/revisions/"
      traceability:
        feature: FEAT-REVBYP
        rule: F-REVBYP-R008
    - name: "Given an artifact for plan P1 and proposal PR1, when save is called,\
        \ then the file path is .content-audit/revisions/P1/PR1.<ext>"
      traceability:
        feature: FEAT-REVBYP
        rule: F-REVBYP-R009
    - name: "Given a persisted artifact, when load is called, then all RevisionProposal\
        \ fields plus verdict and rejectionReason are recoverable"
      traceability:
        feature: FEAT-REVBYP
        rule: F-REVBYP-R010
    - name: "Given artifacts saved under multiple plan directories, when findByProposalId(id,\
        \ Optional.empty()) is called, then it scans subdirectories and returns the\
        \ matching artifact"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R002
    - name: "Given no artifact matches the id, when findByProposalId(id, Optional.empty())\
        \ is called, then it returns Optional.empty"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R002
    - name: "Given an artifact saved under plan P1, when findByProposalId(id, Optional.of(P1))\
        \ is called, then it takes the direct path and returns the artifact"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R002
    - name: "Given no artifact under plan P1 with that id, when findByProposalId(id,\
        \ Optional.of(P1)) is called, then it returns Optional.empty"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R002
    - name: "Given a PENDING_APPROVAL artifact whose taskId matches, when hasPendingProposalForTask\
        \ is called, then it returns true"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R009
    - name: "Given only an APPROVED artifact exists for the task, when hasPendingProposalForTask\
        \ is called, then it returns false"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R009
    - name: "Given only a REJECTED artifact exists for the task, when hasPendingProposalForTask\
        \ is called, then it returns false"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R009
    - name: "Given no artifact exists for the task, when hasPendingProposalForTask\
        \ is called, then it returns false"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R009
    - name: "Given artifacts saved under multiple plan directories, when list() is\
        \ called, then it returns all of them across all plans"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R002
    - name: "Given the revisions directory is empty or missing, when list() is called,\
        \ then it returns an empty list"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R002
    - name: "Given the store is constructed with a non-default baseDir, when save\
        \ is called, then the artifact file lands under <baseDir>/.content-audit/revisions/<planId>/<proposalId>.*\
        \ and NOT under System.getProperty('user.dir')"
      traceability:
        feature: FEAT-REVAPR
        rule: F-REVAPR-R017
    implements:
    - RevisionArtifactStore
  - name: FileSystemImpactPreviewStore
    requiresInject:
    - name: baseDir
      type: Path
      description: Directorio raiz bajo el cual se resuelve .content-audit/revisions/<planId>/<proposalId>.preview.json.
        Lo provee la composition root (audit-cli.Main).
    types:
    - Repository
    visibility: public
    handwrittenTests:
    - name: "Dado un ImpactPreview ya persistido bajo un proposalId, cuando save se\
        \ invoca por segunda vez con otro ImpactPreview con el mismo proposalId, entonces\
        \ findByProposalId retorna el preview persistido originalmente y no el nuevo"
      traceability:
        feature: FEAT-PIPRE
        rule: F-PIPRE-R008
    - name: "Dado un ImpactPreview persistido en disco, cuando findByProposalId se\
        \ invoca con su proposalId, entonces retorna el ImpactPreview con todos sus\
        \ levelImpacts, availability y unavailability intactos"
      traceability:
        feature: FEAT-PIPRE
        rule: F-PIPRE-R008
    implements:
    - ImpactPreviewStore
  - name: FileSystemActiveAnalysisSelectionStore
    types:
    - Repository
    visibility: public
    handwrittenTests:
    - name: "Dado un ActiveAnalysisSelection escrito previamente con write, cuando\
        \ read corre, entonces retorna un Optional con esa misma seleccion (auditId\
        \ y planId)"
      traceability:
        feature: FEAT-CDIFF
        rule: F-CDIFF-R001
    - name: "Dado un store sin seleccion previa (archivo ausente), cuando read corre,\
        \ entonces retorna Optional.empty"
      traceability:
        feature: FEAT-CDIFF
        rule: F-CDIFF-R001
    - name: "Dado un store con una seleccion ya escrita, cuando write se invoca con\
        \ la misma seleccion, entonces el archivo no se reescribe (write idempotente\
        \ y no destructivo a nivel observable)"
      traceability:
        feature: FEAT-CDIFF
        rule: F-CDIFF-R002
    - name: "Dado un store con una seleccion escrita, cuando clear corre, entonces\
        \ read posterior retorna Optional.empty"
      traceability:
        feature: FEAT-CDIFF
        rule: F-CDIFF-R001
    - name: "Dado un courseRoot con AuditReports y RefinementPlans persistidos, cuando\
        \ write y clear se invocan sobre el ActiveAnalysisSelectionStore, entonces\
        \ ningun AuditReport, RefinementPlan, RevisionArtifact ni archivo del curso\
        \ se modifica"
      traceability:
        feature: FEAT-CDIFF
        rule: F-CDIFF-R002
    implements:
    - ActiveAnalysisSelectionStore
  scope: internal
- name: revision-domain
  description: "Domain module for the revision phase of the refinement pipeline. Consumes\
    \ refiner-domain (task and CorrectionContext), course-domain (course entities\
    \ and the CourseRepository port owned by the caller) and audit-domain (AuditReport\
    \ / AuditEngine / ActiveAnalysisSelectionStore for the eager what-if simulation\
    \ that powers the impact preview and the consolidated view). Exposes Reviser/RevisionValidator/RevisionArtifactStore/CourseElementLocator/ImpactPreviewStore\
    \ ports plus the RevisionEngineFactory seam, the lemmaabsence proposal-strategy\
    \ SPI, the impactpreview SPI (FEAT-PIPRE) and the consolidatedview SPI (FEAT-CDIFF)\
    \ — including the dynamic field-diff engine that powers FEAT-CDIFF v3 (recursive\
    \ walker + central role-based exclusion registry + central list-identity registry,\
    \ all inside the fielddiff package). The bypass baseline, the impact-preview internals,\
    \ the consolidated-view internals and the field-diff internals live behind their\
    \ respective internal packages; external modules only see factories, ports and\
    \ carrier records."
  dependsOn:
  - audit-domain
  - refiner-domain
  - course-domain
  models:
  - name: RevisionVerdict
    type: enum
    fields:
    - name: APPROVED
    - name: REJECTED
    - name: PENDING_APPROVAL
      description: The validator has deferred the decision to a human operator (R007).
        The artifact is persisted but the course is not written.
  - name: RevisionOutcomeKind
    type: enum
    fields:
    - name: APPROVED_APPLIED
      description: Proposal approved and course rewritten (R011)
    - name: APPROVED_APPLY_FAILED
      description: "Proposal approved, artifact persisted, course write failed (R014,\
        \ DOUBT-ATOMICITY)"
    - name: REJECTED
      description: Proposal rejected by validator; course untouched (R012)
    - name: NO_REVISER
      description: No Reviser accepts the DiagnosisKind (R005)
    - name: CONTEXT_UNAVAILABLE
      description: CorrectionContext could not be resolved from the audit report
    - name: ELEMENT_NOT_FOUND
      description: Target element (nodeTarget+nodeId) not present in the loaded course
    - name: PENDING_APPROVAL_PERSISTED
      description: Proposal persisted with PENDING_APPROVAL; course untouched (R008)
    - name: ALREADY_PENDING_DECISION
      description: revise rejected because the task already has a pending proposal
        (R010)
    - name: NO_ACTIVE_STRATEGY
      description: "A LEMMA_ABSENCE task reached the dispatcher but no LemmaAbsenceProposalStrategy\
        \ was active. No artifact, no course write, task unchanged (F-LAPS-R006, F-LAPS-J004)."
    - name: STRATEGY_FAILED
      description: "The active strategy could not produce a candidate (empty output,\
        \ provider down, uninterpretable response) or its candidate could not be derived.\
        \ No artifact, no course write, task unchanged (F-LAPS-R015, F-LAPS-R016,\
        \ F-LAPS-J003)."
    - name: OVERRIDE_INVALID
      description: "El correctionContext provisto externamente no respeta el contrato\
        \ estructural (R003) o no es coherente con la tarea persistida (sanity check\
        \ de nodeId+diagnosisKind, DOUBT-OVERRIDE-COHERENCE). No se persiste artefacto,\
        \ no se modifica curso ni tarea."
    - name: OVERRIDE_NOT_APPLICABLE
      description: La tarea revisada es de un DiagnosisKind para el cual no existe
        contrato de correctionContext (R004). El override no tiene como afectar al
        bypass; se rechaza la invocacion sin persistir artefacto.
  - name: CourseElementSnapshot
    type: record
    fields:
    - name: nodeTarget
      type: AuditTarget
      description: QUIZ/KNOWLEDGE/TOPIC/MILESTONE/COURSE
    - name: nodeId
      type: String
      description: Identifier of the targeted node
    - name: quiz
      type: QuizTemplateEntity
      description: Full quiz snapshot when nodeTarget=QUIZ; null otherwise
  - name: RevisionProposal
    type: record
    fields:
    - name: proposalId
      type: String
      description: "Unique id, convention <taskId>-<timestamp> (R009)"
    - name: taskId
      type: String
      description: Originating RefinementTask id
    - name: planId
      type: String
      description: Owning RefinementPlan id
    - name: sourceAuditId
      type: String
      description: AuditReport that produced the plan
    - name: diagnosisKind
      type: DiagnosisKind
      description: Diagnosis that drove the revision
    - name: nodeTarget
      type: AuditTarget
    - name: nodeId
      type: String
    - name: elementBefore
      type: CourseElementSnapshot
      description: Element state before the revision (R001)
    - name: elementAfter
      type: CourseElementSnapshot
      description: Proposed element state; equals elementBefore in bypass (R002)
    - name: rationale
      type: String
      description: "Human-readable justification; 'bypass: identity revision' in bypass\
        \ (R004)"
    - name: reviserKind
      type: String
      description: Reviser identifier; 'bypass' in this iteration
    - name: createdAt
      type: Instant
    - name: strategyId
      type: StrategyId
      description: Identity of the strategy that produced this proposal (F-LAPS-R005);
        null when produced by the bypass reviser for non-LEMMA_ABSENCE diagnostics
        (FEAT-REVBYP).
  - name: RevisionArtifact
    type: record
    fields:
    - name: proposal
      type: RevisionProposal
    - name: verdict
      type: RevisionVerdict
      description: APPROVED/REJECTED (R006)
    - name: rejectionReason
      type: String
      description: Populated when verdict=REJECTED; null when APPROVED (R010)
    - name: outcome
      type: RevisionOutcomeKind
      description: Final flow outcome including course-write failures (R014)
    - name: decidedAt
      type: Instant
      description: Timestamp when the verdict transitioned from PENDING_APPROVAL to
        APPROVED/REJECTED; null while pending or for auto-mode artifacts that never
        passed through PENDING_APPROVAL
    - name: decisionNote
      type: String
      description: "Free-text note attached by the operator on approve/reject (R011\
        \ --note, R012 --reason); null if not provided"
    - name: contextSource
      type: CorrectionContextSource
      description: "Origen del correctionContext consumido por la estrategia (FEAT-REVCTX\
        \ R002 #3). DERIVED para artefactos pre-FEAT-REVCTX o invocaciones sin override;\
        \ OVERRIDE cuando el cliente provee el contexto via revise --correction-context(-file)."
    - name: contextOverridePayload
      type: String
      description: Snapshot crudo del JSON entregado por el cliente como override
        (DOUBT-OVERRIDE-AUDITABILITY Opcion A). Null cuando contextSource=DERIVED.
        Se persiste literal para que la auditoria del artefacto sea reconstruible
        a posteriori.
  - name: RevisionOutcome
    type: record
    fields:
    - name: kind
      type: RevisionOutcomeKind
    - name: artifact
      type: RevisionArtifact
      description: Persisted artifact; null for pre-proposal aborts
    - name: errorMessage
      type: String
      description: Human-readable message for failure outcomes
  - name: RevisionEngineConfig
    type: record
    fields:
    - name: revisers
      type: "Map<DiagnosisKind,Reviser>"
      description: Per-DiagnosisKind Revisers (R003). May be empty; factory adds IdentityReviser
        as the catch-all fallback (R004).
    - name: validator
      type: RevisionValidator
      description: Optional; factory uses AutoApproveValidator when null (R007)
    - name: artifactStore
      type: RevisionArtifactStore
      description: Required; no default (needs filesystem root)
    - name: courseRepository
      type: CourseRepository
      description: Required; caller owns course IO wiring
    - name: elementLocator
      type: CourseElementLocator
      description: Optional; factory uses DefaultCourseElementLocator when null
    - name: refinementPlanStore
      type: RefinementPlanStore
      description: Required; needed to load/save the task
    - name: auditReportStore
      type: AuditReportStore
      description: Required; needed to resolve the CorrectionContext
    - name: contextResolver
      type: CorrectionContextResolver<CorrectionContext>
      description: Required; caller owns the resolver registry
    - name: lemmaAbsenceStrategyRegistry
      type: LemmaAbsenceProposalStrategyRegistry
      description: "Registry of registered LEMMA_ABSENCE strategies. Nullable -> the\
        \ factory wires an empty registry, in which case every LEMMA_ABSENCE task\
        \ resolves to NO_ACTIVE_STRATEGY (F-LAPS-R006)."
    - name: lemmaAbsenceProposalDeriver
      type: LemmaAbsenceProposalDeriver
      description: Deterministic deriver used when a LEMMA_ABSENCE candidate must
        be converted into a CourseElementSnapshot (F-LAPS-R012). Nullable -> the factory
        wires DefaultLemmaAbsenceProposalDeriver.
    - name: courseMapper
      type: CourseMapper
      description: "FEAT-PIPRE. Pure CourseEntity -> AuditableCourse mapper used by\
        \ the impact-preview computer to map the simulated course in memory. Required\
        \ (no default): the engine cannot fabricate one because it would have to know\
        \ about NlpTokenizer / QuizSentenceConverter wiring that lives outside revision-domain.\
        \ The CLI passes the same instance it already wires for AuditRunner."
    - name: auditEngine
      type: AuditEngine
      description: "FEAT-PIPRE. Re-runs the audit on the simulated AuditableCourse\
        \ to produce the 'after' AuditReport without persisting any official report\
        \ (F-PIPRE-R002). Required (no default): like courseMapper, lives in audit-domain\
        \ whose IAuditEngine wiring is the CLI's responsibility."
    - name: impactPreviewStore
      type: ImpactPreviewStore
      description: "FEAT-PIPRE. Filesystem (or future) sidecar store for the per-proposal\
        \ preview. Required (no default): the persistence root is a CLI-level concern."
    - name: correctionContextOverrideParser
      type: CorrectionContextOverrideParser
      description: FEAT-REVCTX. Parser de overrides JSON usado por el engine cuando
        recibe la invocacion con override (revise(...) overload). Nullable -> la factory
        wirea DefaultCorrectionContextOverrideParser. La unica responsabilidad del
        parser es traducir el JSON crudo a un CorrectionContextOverride o lanzar OverrideRejectedException;
        el engine sigue siendo el que decide si invocar al parser segun el overload
        usado.
  - name: ApprovalMode
    type: enum
    fields:
    - name: AUTO
      description: "Bypass validator — auto-approves every proposal (R005, inherited\
        \ from FEAT-REVBYP R007)"
    - name: HUMAN
      description: Human validator — every proposal becomes PENDING_APPROVAL (R005/R007)
  - name: ProposalDecisionOutcomeKind
    type: enum
    fields:
    - name: APPROVED_APPLIED
      description: Proposal approved and course rewritten (R011)
    - name: APPROVED_APPLY_FAILED
      description: "Proposal approved and artifact rewritten, but course write failed\
        \ (R011 step 6, DOUBT-ATOMICITY)"
    - name: REJECTED
      description: Proposal rejected; course untouched (R012)
    - name: NOT_FOUND
      description: No proposal matches the supplied id (R002/R011/R012)
    - name: ALREADY_DECIDED
      description: Proposal exists but its verdict is not PENDING_APPROVAL (R013)
  - name: ProposalDecisionOutcome
    type: record
    fields:
    - name: kind
      type: ProposalDecisionOutcomeKind
    - name: artifact
      type: RevisionArtifact
      description: The artifact after the decision (APPROVED/REJECTED); null for NOT_FOUND
    - name: errorMessage
      type: String
      description: Human-readable message for NOT_FOUND/ALREADY_DECIDED/APPROVED_APPLY_FAILED
  - name: StrategyId
    type: record
    fields:
    - name: name
      type: String
      description: "Symbolic identifier, e.g. 'lemma-absence-mvp' (F-LAPS-R005)."
    - name: version
      type: String
      description: "Version string, e.g. '1.0.0'; distinguishes revisions of the same\
        \ name over time (F-LAPS-R005)."
    - name: providerId
      type: String
      description: "Opaque provider id for the underlying candidate generator, e.g.\
        \ 'llm:anthropic', 'fixture:golden'. Nullable when the strategy has no external\
        \ provider. Resolves DOUBT-STRATEGY-METADATA as the minimum-beyond-name+version\
        \ metadata."
  - name: LemmaAbsenceQuizCandidate
    type: record
    fields:
    - name: quizSentence
      type: String
      description: "Candidate exercise expressed in the FEAT-QSENT quizSentence DSL\
        \ (blanks '____', answer blocks '[variant1|variant2]', hints inline in parentheses).\
        \ One formal string encodes the sentence stem + blanks + correct answers +\
        \ accepted variants (F-LAPS-R009, R011, R019). Parsed by QuizSentenceConverter.parse\
        \ at derivation time (F-LAPS-R012). The strategy MAY but is not required to\
        \ reuse substrings of the context's quizSentence (FEAT-RCLAQS) — it emits\
        \ a fresh candidate."
    - name: translation
      type: String
      description: "Spanish translation of the new exercise (F-LAPS-R009). Copied\
        \ verbatim into elementAfter by the deriver (F-LAPS-R012). May differ from\
        \ elementBefore.translation when the candidate changed the sentence meaning\
        \ (F-LAPS-R013). The DSL of FEAT-QSENT does not cover translations, so this\
        \ is a sibling field, not an additional entry inside quizSentence."
  - name: ProposalStrategyFailedException
    type: exception
    fields:
    - name: strategyName
      type: String
      description: Name of the strategy that failed (F-LAPS-R015).
    - name: taskId
      type: String
      description: Id of the task the strategy was attempting.
    - name: reason
      type: String
      description: "Human-readable cause (empty generator response, provider down,\
        \ etc.)."
    message: "La estrategia de propuesta '%s' no pudo generar un candidato de quiz\
      \ para la tarea '%s': %s"
    extends: RuntimeException
  - name: ProposalDerivationException
    type: exception
    fields:
    - name: strategyName
      type: String
      description: Name of the strategy whose candidate was rejected by the deriver.
    - name: taskId
      type: String
      description: Id of the task.
    - name: reason
      type: String
      description: "Human-readable cause (invalid quizSentence grammar, empty translation,\
        \ etc.)."
    message: "No se pudo derivar elementAfter desde el candidato de la estrategia\
      \ '%s' en la tarea '%s': %s"
    extends: RuntimeException
  - name: ConsolidatedViewBuilderConfig
    type: record
    fields:
    - name: activeAnalysisSelectionStore
      type: ActiveAnalysisSelectionStore
      description: "Required. Lee/escribe el par activo. Adapter recomendado: FileSystemActiveAnalysisSelectionStore\
        \ en audit-infrastructure."
    - name: auditReportStore
      type: AuditReportStore
      description: Required. Lee el AuditReport baseline.
    - name: refinementPlanStore
      type: RefinementPlanStore
      description: Required. Lee el RefinementPlan activo.
    - name: revisionArtifactStore
      type: RevisionArtifactStore
      description: Required. listByPlan(activePlanId) para obtener aceptadas y pendientes.
    - name: courseRepository
      type: CourseRepository
      description: Required. Carga CourseEntity desde coursePath.
    - name: courseElementLocator
      type: CourseElementLocator
      description: Required. snapshot/replace de elementos del curso.
    - name: courseMapper
      type: CourseMapper
      description: Required. CourseEntity -> AuditableCourse.
    - name: auditEngine
      type: AuditEngine
      description: "Required. AuditableCourse -> AuditReport (in-memory, no persistido)."
    - name: nodeFieldDiffer
      type: NodeFieldDiffer
      description: F-CDIFF v3. Required. Motor de descubrimiento dinamico inyectado
        por la composition root via DefaultNodeFieldDifferFactory.create(). El factory
        de ConsolidatedViewBuilder lo unpackea del config y lo pasa a DefaultConsolidatedViewBuilder.
    visibility: public
  - name: CorrectionContextSource
    type: enum
    fields:
    - name: DERIVED
      description: El contexto fue derivado por el sistema desde el AuditReport y
        el plan persistente (camino historico de FEAT-REVBYP / FEAT-RCLA / FEAT-RCSL).
    - name: OVERRIDE
      description: El contexto fue provisto externamente por el cliente via revise
        --correction-context (FEAT-REVCTX R001).
  - name: CorrectionContextOverride
    type: record
    fields:
    - name: context
      type: CorrectionContext
      description: "Contexto ya parseado y validado estructuralmente (R003) y por\
        \ coherencia minima con la tarea persistida (nodeId + diagnosisKind, DOUBT-OVERRIDE-COHERENCE\
        \ Opcion B). Es el mismo tipo que produce el CorrectionContextResolver; la\
        \ estrategia activa lo consume sin saber su origen."
    - name: rawPayload
      type: String
      description: "JSON crudo entregado por el cliente, conservado verbatim para\
        \ auditabilidad (R002 #3, DOUBT-OVERRIDE-AUDITABILITY Opcion A). Viaja al\
        \ RevisionArtifact y se persiste tal cual."
  - name: OverrideRejectedException
    type: exception
    fields:
    - name: reason
      type: String
      description: "Mensaje accionable que identifica el motivo del rechazo (R003:\
        \ campo faltante, tipo invalido, valor fuera de dominio; o sanity check fallido:\
        \ nodeId/diagnosisKind no coinciden con la tarea persistida)."
    message: "correctionContext override rejected: %s"
    extends: RuntimeException
  interfaces:
  - name: Reviser
    stereotype: port
    sealed: false
    exposes:
    - signature: "propose(RefinementTask task, CorrectionContext context, CourseElementSnapshot\
        \ before): RevisionProposal"
    - signature: "handles(DiagnosisKind kind): boolean"
    - signature: "reviserKind(): String"
  - name: RevisionValidator
    stereotype: port
    sealed: false
    exposes:
    - signature: "validate(RevisionProposal proposal): RevisionValidatorResult"
  - name: RevisionValidatorResult
    sealed: false
    exposes:
    - signature: "verdict(): RevisionVerdict"
    - signature: "rejectionReason(): Optional<String>"
  - name: RevisionArtifactStore
    stereotype: port
    sealed: false
    exposes:
    - signature: "save(RevisionArtifact artifact): String"
    - signature: "load(String planId, String proposalId): Optional<RevisionArtifact>"
    - signature: "listByPlan(String planId): List<RevisionArtifact>"
    - signature: "findByProposalId(String proposalId, Optional<String> planId): Optional<RevisionArtifact>"
    - signature: "hasPendingProposalForTask(String planId, String taskId): boolean"
    - signature: "list(): List<RevisionArtifact>"
  - name: CourseElementLocator
    stereotype: port
    sealed: false
    exposes:
    - signature: "snapshot(CourseEntity course, AuditTarget target, String nodeId):\
        \ Optional<CourseElementSnapshot>"
    - signature: "replace(CourseEntity course, CourseElementSnapshot replacement):\
        \ CourseEntity"
  - name: RevisionEngine
    stereotype: port
    sealed: false
    exposes:
    - signature: "revise(String planId, String taskId, Path coursePath, String overridePayload):\
        \ RevisionOutcome"
  - name: RevisionEngineFactory
    stereotype: factory
    sealed: false
    exposes:
    - signature: "create(RevisionEngineConfig config): RevisionEngine"
  - name: RevisionValidatorFactory
    stereotype: factory
    sealed: false
    exposes:
    - signature: "create(ApprovalMode mode): RevisionValidator"
  - name: ProposalDecisionService
    stereotype: port
    sealed: false
    exposes:
    - signature: "approve(String proposalId, Optional<String> planId, Optional<String>\
        \ note, Path coursePath): ProposalDecisionOutcome"
    - signature: "reject(String proposalId, Optional<String> planId, Optional<String>\
        \ reason): ProposalDecisionOutcome"
  - name: ProposalDecisionServiceFactory
    stereotype: factory
    sealed: false
    exposes:
    - signature: "create(RevisionEngineConfig config): ProposalDecisionService"
  - name: LemmaAbsenceProposalStrategy
    stereotype: port
    sealed: false
    exposes:
    - signature: "id(): StrategyId"
    - signature: "handles(DiagnosisKind kind): boolean"
    - signature: "propose(RefinementTask task, LemmaAbsenceCorrectionContext context):\
        \ LemmaAbsenceQuizCandidate"
  - name: LemmaAbsenceProposalStrategyRegistry
    stereotype: service
    sealed: true
    exposes:
    - signature: "active(): Optional<LemmaAbsenceProposalStrategy>"
    - signature: "byName(String name): Optional<LemmaAbsenceProposalStrategy>"
    - signature: "listAll(): List<StrategyId>"
  - name: LemmaAbsenceProposalDeriver
    stereotype: service
    sealed: true
    exposes:
    - signature: "derive(CourseElementSnapshot before, LemmaAbsenceQuizCandidate candidate):\
        \ CourseElementSnapshot"
  - name: ImpactPreviewStore
    stereotype: port
    sealed: false
    exposes:
    - signature: "save(ImpactPreview preview): void"
    - signature: "findByProposalId(String proposalId): Optional<ImpactPreview>"
    visibility: public
  - name: CorrectionContextOverrideParser
    stereotype: port
    sealed: false
    exposes:
    - signature: "parse(String rawJson, DiagnosisKind expectedDiagnosisKind, String\
        \ expectedNodeId): CorrectionContextOverride"
  patterns:
  - type: Strategy
    implementations:
    - LemmaAbsenceMvpStrategy
    suppressed: false
    interface: LemmaAbsenceProposalStrategy
  uses:
  - jackson-databind
  packages:
  - name: engine
    description: "Revision engine internals. Only DefaultRevisionEngineFactory, DefaultRevisionValidatorFactory,\
      \ DefaultProposalDecisionServiceFactory, DefaultLemmaAbsenceProposalStrategyRegistry,\
      \ DefaultLemmaAbsenceProposalDeriver and DefaultConsolidatedViewBuilderFactory\
      \ are public; every other class (DispatchingReviser, IdentityReviser, AutoApproveValidator,\
      \ DefaultRevisionValidatorResult, DefaultCourseElementLocator, DefaultRevisionEngine,\
      \ DefaultProposalDecisionService, HumanApprovalValidator, DefaultImpactPreviewComputer,\
      \ DefaultConsolidatedViewBuilder) is package-private. External modules wire\
      \ a RevisionEngine by calling factory.create(config); a ConsolidatedViewBuilder\
      \ by calling consolidatedViewBuilderFactory.create(config)."
    visibility: internal
    models:
    - name: LemmaAbsenceProposalStrategyRegistryConfig
      type: record
      fields:
      - name: registered
        type: List<LemmaAbsenceProposalStrategy>
        description: All strategies known to the registry (F-LAPS-R004).
      - name: activeName
        type: String
        description: Name of the active strategy; resolved via byName(). Nullable
          -> active() returns empty -> dispatcher returns NO_ACTIVE_STRATEGY for LEMMA_ABSENCE
          (F-LAPS-R006).
    implementations:
    - name: DefaultRevisionEngineFactory
      types:
      - Component
      visibility: public
      handwrittenTests:
      - name: "Given a RevisionEngineConfig with an empty revisers map, when create\
          \ is called, then the produced engine uses IdentityReviser as fallback"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R004
      implements:
      - RevisionEngineFactory
    - name: IdentityReviser
      types:
      - Component
      handwrittenTests:
      - name: "Given a CorrectionContext, when propose is called, then it returns\
          \ a RevisionProposal with all R001 fields populated"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R001
      - name: "Given any before snapshot, when propose is called, then elementAfter\
          \ equals elementBefore"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R002
      - name: "Given any DiagnosisKind, when handles is called, then it returns true"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R004
      - name: "Given a proposal generated by IdentityReviser, then rationale equals\
          \ 'bypass: identity revision' and reviserKind equals 'bypass'"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R004
      implements:
      - Reviser
    - name: AutoApproveValidator
      types:
      - Component
      handwrittenTests:
      - name: "Given any RevisionProposal, when validate is called, then it returns\
          \ a RevisionValidatorResult with verdict APPROVED"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R007
      - name: "Given an approved result, when rejectionReason is queried, then it\
          \ returns Optional.empty"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R006
      implements:
      - RevisionValidator
    - name: DefaultRevisionValidatorResult
      requiresInject:
      - name: verdict
        type: RevisionVerdict
        description: Verdict resultante de evaluar la proposal (APPROVED / REJECTED
          / PENDING_APPROVAL).
      - name: rejectionReason
        type: Optional<String>
        description: Detalle textual cuando verdict=REJECTED; Optional.empty() cuando
          APPROVED o PENDING_APPROVAL.
      implements:
      - RevisionValidatorResult
    - name: DispatchingReviser
      requiresInject:
      - name: byKind
        type: "Map<DiagnosisKind,Reviser>"
        description: Revisers registered per DiagnosisKind (FEAT-REVBYP R003). Preserved
          for non-LEMMA_ABSENCE kinds.
      - name: fallback
        type: IdentityReviser
        description: "Bypass fallback for unmatched DiagnosisKinds OTHER THAN LEMMA_ABSENCE\
          \ (F-LAPS-R002, R006)."
      - name: strategyRegistry
        type: LemmaAbsenceProposalStrategyRegistry
        description: Resolves the active LemmaAbsenceProposalStrategy; LEMMA_ABSENCE
          tasks route here instead of to fallback (F-LAPS-R002).
      - name: deriver
        type: LemmaAbsenceProposalDeriver
        description: Derives elementAfter deterministically from a LemmaAbsenceQuizCandidate
          (F-LAPS-R012).
      types:
      - Component
      handwrittenTests:
      - name: "Given a Reviser registered for SENTENCE_LENGTH, when propose is called\
          \ with a SENTENCE_LENGTH task, then the registered Reviser handles it"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R003
      - name: "Given no Reviser registered for a DiagnosisKind, when propose is called,\
          \ then the IdentityReviser fallback handles it"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R004
      - name: "Given neither a registered Reviser nor a fallback, when handles is\
          \ queried for an unknown DiagnosisKind, then it returns false"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R005
      - name: "Given a task whose diagnosisKind is LEMMA_ABSENCE and a registry with\
          \ an active strategy, when propose is called, then the DispatchingReviser\
          \ routes to the strategy+deriver pipeline and NOT to the IdentityReviser\
          \ fallback"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R002
      - name: "Given a task whose diagnosisKind is LEMMA_ABSENCE and a registry with\
          \ no active strategy, when propose is called, then it returns an outcome\
          \ with kind NO_ACTIVE_STRATEGY (no fallback to bypass)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R006
      - name: "Given a LEMMA_ABSENCE task and an active strategy that throws ProposalStrategyFailedException,\
          \ when propose is called, then it returns an outcome with kind STRATEGY_FAILED\
          \ and no RevisionProposal is built"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R015
      - name: "Given a LEMMA_ABSENCE task and an active strategy whose candidate fails\
          \ derivation with ProposalDerivationException, when propose is called, then\
          \ it returns an outcome with kind STRATEGY_FAILED and no RevisionProposal\
          \ is built"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R015
      - name: "Given a STRATEGY_FAILED outcome, when its RevisionArtifact is inspected,\
