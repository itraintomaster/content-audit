      - name: "Dado un ConsolidatedView con availability UNAVAILABLE producido por\
          \ el builder, cuando getConsolidated corre, entonces el comando termina\
          \ con exit code cero y la salida formateada lleva la marca consolidatedAvailability=UNAVAILABLE\
          \ con su unavailabilityReason (no rellena con valores arbitrarios)"
        traceability:
