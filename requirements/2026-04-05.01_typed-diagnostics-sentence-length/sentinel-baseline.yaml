    - name: DefaultRevisionEngine
      requiresInject:
      - name: refinementPlanStore
        type: RefinementPlanStore
      - name: auditReportStore
        type: AuditReportStore
      - name: contextResolver
        type: CorrectionContextResolver<CorrectionContext>
      - name: reviser
        type: Reviser
        description: Normally a DispatchingReviser
      - name: validator
        type: RevisionValidator
      - name: artifactStore
        type: RevisionArtifactStore
      - name: courseRepository
        type: CourseRepository
      - name: elementLocator
        type: CourseElementLocator
      - name: impactPreviewComputer
        type: ImpactPreviewComputer
        description: "FEAT-PIPRE. Invoked exactly once per generated RevisionProposal,\
          \ after the proposal is constructed and before/around the artifact save\
          \ (F-PIPRE-R001). Failures of the computer are NEVER propagated up; the\
          \ engine treats the returned ImpactPreview (AVAILABLE or UNAVAILABLE) as\
          \ data and persists it as a sidecar via impactPreviewStore. F-PIPRE-R010:\
          \ a preview failure does not abort proposal persistence."
      - name: impactPreviewStore
        type: ImpactPreviewStore
        description: "FEAT-PIPRE. Persists the ImpactPreview returned by impactPreviewComputer,\
          \ indexed by proposalId. Deliberately separate from RevisionArtifactStore\
          \ so the RevisionArtifact contract stays unchanged and the preview can be\
          \ fetched/listed independently in future iterations (DOUBT-BATCH-PREVIEW)."
      - name: correctionContextOverrideParser
        type: CorrectionContextOverrideParser
      types:
      - Component
      handwrittenTests:
      - name: "Given an APPROVED proposal, when revise runs, then CourseRepository\
          \ saves the updated course"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R011
      - name: "Given a REJECTED proposal, when revise runs, then CourseRepository\
          \ is never asked to save"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R012
      - name: "Given an APPROVED proposal applied successfully, when revise finishes,\
          \ then the RefinementTask transitions to DONE"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R013
      - name: "Given revise succeeds end-to-end, then artifactStore.save is invoked\
          \ before courseRepository.save"
        traceability:
          feature: FEAT-REVBYP
          rule: F-REVBYP-R014
      - name: "Given the human validator emits PENDING_APPROVAL, when revise runs,\
          \ then the artifact is persisted with PENDING_APPROVAL and CourseRepository\
          \ is never asked to save"
        traceability:
          feature: FEAT-REVAPR
          rule: F-REVAPR-R008
      - name: "Given the human validator emits PENDING_APPROVAL, when revise finishes,\
          \ then the outcome kind is PENDING_APPROVAL_PERSISTED and the RefinementTask\
          \ stays PENDING"
        traceability:
          feature: FEAT-REVAPR
          rule: F-REVAPR-R009
      - name: "Given the task already has a PENDING_APPROVAL proposal, when revise\
          \ runs, then the outcome is ALREADY_PENDING_DECISION and no new artifact\
          \ is persisted"
        traceability:
          feature: FEAT-REVAPR
          rule: F-REVAPR-R010
      - name: "Dada una RevisionProposal generada, cuando revise corre, entonces ImpactPreviewComputer.compute\
          \ se invoca exactamente una vez con el curso actual y la propuesta recien\
          \ construida"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R001
      - name: "Dado un ImpactPreview computado, cuando revise corre, entonces el preview\
          \ se persiste via ImpactPreviewStore.save asociado al proposalId de la propuesta\
          \ antes de que el flujo retorne"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R001
      - name: "Dado un ImpactPreview UNAVAILABLE devuelto por el computer, cuando\
          \ revise corre, entonces la RevisionArtifact se persiste igual con su veredicto\
          \ inicial y el outcome no es de error"
        traceability:
          feature: FEAT-PIPRE
          rule: F-PIPRE-R010
      - name: should bypass contextResolver and consume the override payload as the
          strategy input when overridePayload is provided
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R002
      - name: should not perform any AuditReport-derived context construction for
          the revised task when overridePayload is provided
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R002
      - name: should produce OVERRIDE_INVALID outcome without persisting an artifact
          and without modifying the course when the parser rejects the override payload
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R003
      - name: should produce OVERRIDE_NOT_APPLICABLE outcome without persisting an
          artifact and without modifying the course when the task diagnosisKind has
          no context contract
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R004
      - name: should resolve the revised task from the persisted plan identified by
          planId and pass the override to the strategy regardless of any task identity
          hint embedded in the payload
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R005
      - name: should preserve the human approval flow and emit a PENDING_APPROVAL
          artifact when human approval mode is active and an override is provided
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R006
      - name: should persist the RevisionArtifact with contextSource=OVERRIDE and
          contextOverridePayload equal to the literal raw JSON received when an override
          is provided
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R007
      - name: should persist the RevisionArtifact with contextSource=DERIVED and a
          null contextOverridePayload when no override is provided
        traceability:
          feature: FEAT-REVCTX
          rule: F-REVCTX-R007
      implements:
      - RevisionEngine
