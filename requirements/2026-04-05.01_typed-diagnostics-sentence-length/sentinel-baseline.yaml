          rule: F-CDIFF-R013
      - name: "Dada cualquier invocacion de getConsolidated, entonces no se invoca\
          \ AuditReportStore.save, RefinementPlanStore.save ni RevisionArtifactStore.save\
          \ sobre los stores inyectados al builder"
        traceability:
