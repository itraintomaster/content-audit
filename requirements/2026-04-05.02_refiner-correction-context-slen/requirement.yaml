---
features:
- id: "FEAT-RCTX-SLEN"
  name: "Contexto de Correccion para SENTENCE_LENGTH en el Refiner"
  description: "Cuando el refiner identifica una tarea de tipo SENTENCE_LENGTH, actualmente\
    \ muestra **que** hay que corregir (cual quiz, que analizador la detecto, con\
    \ que prioridad) pero no provee el **contexto** necesario para que un LLM pueda\
    \ reescribir la oracion. Este requerimiento agrega la informacion contextual que\
    \ un LLM necesita para generar una correccion informada: la oracion actual, el\
    \ diagnostico de longitud, y una lista de lemas sugeridos que el LLM puede incorporar\
    \ en la nueva oracion."
  code: "F-RCTX-SLEN"
  rules:
  - id: "F-RCTX-SLEN-R001"
    name: "Estructura del contexto de correccion para SENTENCE_LENGTH"
    severity: "critical"
    description: "Para cada tarea de refinamiento de tipo SENTENCE_LENGTH, el sistema\
      \ debe poder construir un contexto de correccion que contiene los siguientes\
      \ datos: | Campo | Tipo | Origen | Descripcion | |-------|------|--------|-------------|\
      \ | taskId | Texto | RefinementTask.id | Identificador de la tarea que se esta\
      \ corrigiendo | | sentence | Texto | AuditableQuiz.sentence | La oracion actual\
      \ del quiz tal como esta escrita | | cefrLevel | Nivel CEFR | SentenceLengthDiagnosis.cefrLevel\
      \ | Nivel CEFR del quiz (A1, A2, B1, B2) | | tokenCount | Entero | SentenceLengthDiagnosis.tokenCount\
      \ | Cantidad actual de tokens en la oracion | | targetMin | Entero | SentenceLengthDiagnosis.targetMin\
      \ | Minimo de tokens esperados para el nivel CEFR | | targetMax | Entero | SentenceLengthDiagnosis.targetMax\
      \ | Maximo de tokens esperados para el nivel CEFR | | delta | Entero | SentenceLengthDiagnosis.delta\
      \ | Desviacion respecto al rango (positivo = exceso, negativo = carencia, 0\
      \ = dentro del rango) | | suggestedLemmas | Lista de lemas sugeridos | Derivado\
      \ de LemmaAbsenceLevelDiagnosis | Lista de lemas ausentes que el LLM podria\
      \ incorporar (ver R003) | Este contexto reune informacion de tres fuentes distintas:\
      \ la tarea de refinamiento, el nodo quiz del arbol de auditoria (con su diagnostico\
      \ de longitud y la entidad AuditableQuiz), y el nodo milestone ancestro (con\
      \ su diagnostico de ausencia de lemas)."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-RCTX-SLEN-R002"
    name: "Resolucion del nodo quiz desde una tarea de refinamiento"
    severity: "critical"
    description: "Para construir el contexto de correccion, el sistema debe poder\
      \ localizar el nodo quiz correspondiente en el arbol de auditoria a partir de\
      \ la tarea de refinamiento. El proceso es: 1. Obtener el `sourceAuditId` del\
      \ plan de refinamiento. 2. Cargar el `AuditReport` correspondiente. 3. Buscar\
      \ en el arbol del reporte el nodo cuyo `nodeId` coincida con el `nodeId` de\
      \ la tarea y cuyo nivel coincida con el `nodeTarget` de la tarea. Una vez localizado\
      \ el nodo quiz, se accede a: - La oracion original a traves de la entidad AuditableQuiz\
      \ asociada al nodo. - El diagnostico de longitud a traves de los diagnosticos\
      \ tipados del nodo (SentenceLengthDiagnosis, definido en FEAT-DSLEN). Si el\
      \ reporte de auditoria no se encuentra (el sourceAuditId es invalido o el reporte\
      \ fue eliminado), el sistema debe indicar que no puede construir el contexto."
    errorMessage: "No se pudo cargar el reporte de auditoria '{sourceAuditId}' necesario\
      \ para construir el contexto de correccion"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-RCTX-SLEN-R003"
    name: "Obtencion de lemas sugeridos desde el milestone ancestro"
    severity: "critical"
    description: "Los lemas sugeridos se obtienen del `LemmaAbsenceLevelDiagnosis`\
      \ del nodo milestone ancestro del quiz. El proceso es: 1. Desde el nodo quiz,\
      \ navegar al nodo milestone ancestro usando el mecanismo de navegacion del arbol\
      \ (FEAT-DLABS R011). 2. Obtener el `LemmaAbsenceLevelDiagnosis` del milestone\
      \ (FEAT-DLABS R005). 3. De la lista `absentLemmas`, filtrar solo los lemas cuyo\
      \ tipo de ausencia sea COMPLETELY_ABSENT o APPEARS_TOO_LATE. Se excluyen los\
      \ APPEARS_TOO_EARLY porque no son candidatos utiles para incorporar: estos lemas\
      \ ya aparecen en niveles anteriores al esperado y su inclusion no resolveria\
      \ una carencia de vocabulario. 4. Ordenar los lemas filtrados por rango COCA\
      \ ascendente (los mas frecuentes primero). Los lemas sin rango COCA se colocan\
      \ al final. [ASSUMPTION] Se asume que ordenar por frecuencia COCA es la heuristica\
      \ mas util para un LLM. Razon: las palabras mas frecuentes del idioma son mas\
      \ versatiles y faciles de incorporar en cualquier oracion. 5. Tomar los primeros\
      \ 10 lemas de la lista ordenada. Cada lema sugerido incluye: | Campo | Tipo\
      \ | Origen | Descripcion | |-------|------|--------|-------------| | lemma |\
      \ Texto | AbsentLemma.lemmaAndPos.lemma | Forma base de la palabra | | pos |\
      \ Texto | AbsentLemma.lemmaAndPos.pos | Parte de la oracion | | reason | Tipo\
      \ de ausencia | AbsentLemma.absenceType | COMPLETELY_ABSENT o APPEARS_TOO_LATE\
      \ | | cocaRank | Entero (opcional) | AbsentLemma.cocaRank | Rango de frecuencia\
      \ COCA (puede no estar disponible) |"
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-RCTX-SLEN-R004"
    name: "Contexto sin lemas sugeridos"
    severity: "major"
    description: "Si no hay lemas sugeridos disponibles (porque no existe diagnostico\
      \ de ausencia de lemas en el milestone, o porque todos los lemas del nivel son\
      \ de tipo APPEARS_TOO_EARLY, o porque el milestone ancestro no se encontro),\
      \ el contexto de correccion se construye igualmente con la lista de lemas sugeridos\
      \ vacia. La informacion de la oracion y el diagnostico de longitud siguen siendo\
      \ suficientes para que un LLM reescriba la oracion ajustando la longitud, aunque\
      \ sin sugerencias de vocabulario."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-RCTX-SLEN-R005"
    name: "Limite de lemas sugeridos"
    severity: "minor"
    description: "La lista de lemas sugeridos se limita a un maximo de 10 elementos.\
      \ Este limite mantiene el contexto manejable para el LLM sin sobrecargarlo con\
      \ opciones. [ASSUMPTION] Se asume que 10 lemas es un limite razonable para la\
      \ primera iteracion. Razon: provee suficiente variedad sin exceder el espacio\
      \ de atencion util del LLM. Este valor podria ajustarse en futuras iteraciones\
      \ basandose en resultados reales."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-RCTX-SLEN-R006"
    name: "El comando refiner next incluye el contexto de correccion para tareas SENTENCE_LENGTH"
    severity: "critical"
    description: "Cuando el comando `refiner next` muestra una tarea de tipo SENTENCE_LENGTH,\
      \ debe incluir el contexto de correccion ademas de los datos basicos de la tarea.\
      \ Esto aplica tanto al formato texto como al formato JSON. Para tareas de otros\
      \ tipos de diagnostico (LEMMA_ABSENCE, COCA_BUCKETS, etc.), el comando continua\
      \ mostrando solo los datos basicos de la tarea como hasta ahora. El contexto\
      \ de correccion es especifico de SENTENCE_LENGTH en esta iteracion."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-RCTX-SLEN-R007"
    name: "Formato JSON del contexto de correccion"
    severity: "critical"
    description: "En formato JSON, el contexto de correccion se incluye como un campo\
      \ adicional `correctionContext` en la salida existente del comando `refiner\
      \ next`. Ejemplo: ``` { \"taskNumber\": 1, \"totalTasks\": 42, \"id\": \"task-014\"\
      , \"target\": \"QUIZ\", \"nodeId\": \"quiz-id-123\", \"nodeLabel\": \"Quiz 14\
      \ - L1.T2.K3\", \"diagnosis\": \"SENTENCE_LENGTH\", \"priority\": 1, \"status\"\
      : \"PENDING\", \"correctionContext\": { \"sentence\": \"She plays tennis every\
      \ afternoon with her friends\", \"cefrLevel\": \"A1\", \"tokenCount\": 15, \"\
      targetRange\": { \"min\": 5, \"max\": 8 }, \"delta\": 7, \"suggestedLemmas\"\
      : [ { \"lemma\": \"like\", \"pos\": \"VERB\", \"reason\": \"COMPLETELY_ABSENT\"\
      , \"cocaRank\": 52 }, { \"lemma\": \"want\", \"pos\": \"VERB\", \"reason\":\
      \ \"APPEARS_TOO_LATE\", \"cocaRank\": 89 }, { \"lemma\": \"big\", \"pos\": \"\
      ADJ\", \"reason\": \"COMPLETELY_ABSENT\", \"cocaRank\": 201 } ] } } ``` Si el\
      \ contexto de correccion no puede construirse (por ejemplo, porque el reporte\
      \ de auditoria no se encuentra), el campo `correctionContext` debe ser nulo\
      \ y se incluye un campo `correctionContextError` con un mensaje descriptivo."
    errorMessage: "No se pudo construir el contexto de correccion: {motivo}"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-RCTX-SLEN-R008"
    name: "Formato texto del contexto de correccion"
    severity: "major"
    description: "En formato texto, el contexto de correccion se muestra debajo de\
      \ los datos basicos de la tarea, separado visualmente. Ejemplo: ``` Next task\
      \ (#1 of 42): Target:    QUIZ Node:      Quiz 14 - L1.T2.K3 (id: quiz-id-123)\
      \ Diagnosis: SENTENCE_LENGTH Priority:  1 Status:    PENDING Correction context:\
      \ Sentence:    She plays tennis every afternoon with her friends CEFR Level:\
      \  A1 Tokens:      15 (target: 5-8, delta: +7) Suggested lemmas: 1. like (VERB)\
      \ - COMPLETELY_ABSENT [COCA #52] 2. want (VERB) - APPEARS_TOO_LATE [COCA #89]\
      \ 3. big (ADJ) - COMPLETELY_ABSENT [COCA #201] ``` Si no hay lemas sugeridos,\
      \ la seccion \"Suggested lemmas\" muestra \"(none available)\". Si el contexto\
      \ no puede construirse, se muestra un aviso en lugar de la seccion de contexto."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-RCTX-SLEN-R009"
    name: "No cruzar con COCA Buckets"
    severity: "minor"
    description: "En esta iteracion, los lemas sugeridos **no** se cruzan con el diagnostico\
      \ de COCA Buckets (CocaBucketsLevelDiagnosis) para balancear bandas de frecuencia.\
      \ La seleccion se basa unicamente en el tipo de ausencia y el rango COCA individual\
      \ del lema. El balanceo por bandas de frecuencia es una optimizacion para una\
      \ iteracion futura."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-RCTX-SLEN-R010"
    name: "No validar compatibilidad semantica"
    severity: "minor"
    description: "Los lemas sugeridos se ofrecen como opciones sin garantia de compatibilidad\
      \ semantica con la oracion actual. El LLM es responsable de elegir cuales usar\
      \ y como integrarlos gramaticalmente. Por ejemplo, si la oracion habla de comida\
      \ y un lema sugerido es \"play\" (VERB), el LLM puede ignorarlo y elegir otro\
      \ mas apropiado."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  journeys:
  - id: "F-RCTX-SLEN-J001"
    name: "LLM recibe contexto para corregir una oracion demasiado larga"
    steps: []
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
    flow:
    - id: "solicitar_tarea"
      action: "El usuario ejecuta 'refiner next' y obtiene una tarea SENTENCE_LENGTH"
      then: "verificar_auditoria"
      outcomes: []
      result: null
      gate: []
    - id: "verificar_auditoria"
      action: "El sistema busca el reporte de auditoria asociado al plan usando el\
        \ sourceAuditId"
      then: null
      outcomes:
      - when: "El reporte de auditoria existe y el nodo quiz se localiza correctamente"
        then: "obtener_diagnostico"
      - when: "El reporte no se encuentra o el nodo quiz no existe en el arbol"
        then: "contexto_no_disponible"
      result: null
      gate:
      - "F-RCTX-SLEN-R002"
    - id: "obtener_diagnostico"
      action: "El sistema extrae la oracion del quiz y el SentenceLengthDiagnosis\
        \ del nodo"
      then: "buscar_lemas"
      outcomes: []
      result: null
      gate:
      - "F-RCTX-SLEN-R001"
    - id: "buscar_lemas"
      action: "El sistema navega al milestone ancestro y obtiene los lemas ausentes\
        \ del nivel CEFR"
      then: null
      outcomes:
      - when: "Hay lemas ausentes de tipo COMPLETELY_ABSENT o APPEARS_TOO_LATE disponibles"
        then: "construir_contexto_completo"
      - when: "No hay lemas sugeridos disponibles"
        then: "construir_contexto_sin_lemas"
      result: null
      gate:
      - "F-RCTX-SLEN-R003"
      - "F-RCTX-SLEN-R005"
    - id: "construir_contexto_completo"
      action: "El sistema construye el contexto con la oracion, el diagnostico (delta\
        \ positivo = oracion demasiado larga) y los top 10 lemas sugeridos ordenados\
        \ por frecuencia COCA"
      then: "presentar_contexto"
      outcomes: []
      result: null
      gate:
      - "F-RCTX-SLEN-R001"
      - "F-RCTX-SLEN-R003"
      - "F-RCTX-SLEN-R005"
    - id: "construir_contexto_sin_lemas"
      action: "El sistema construye el contexto con la oracion y el diagnostico, pero\
        \ sin sugerencias de vocabulario"
      then: "presentar_contexto"
      outcomes: []
      result: null
      gate:
      - "F-RCTX-SLEN-R004"
    - id: "presentar_contexto"
      action: "El comando muestra la tarea junto con el contexto de correccion en\
        \ el formato solicitado (texto o JSON)"
      then: null
      outcomes: []
      result: "success"
      gate:
      - "F-RCTX-SLEN-R006"
      - "F-RCTX-SLEN-R007"
      - "F-RCTX-SLEN-R008"
    - id: "contexto_no_disponible"
      action: "El comando muestra la tarea basica con un aviso de que el contexto\
        \ de correccion no esta disponible"
      then: null
      outcomes: []
      result: "failure"
      gate:
      - "F-RCTX-SLEN-R007"
  - id: "F-RCTX-SLEN-J002"
    name: "LLM recibe contexto para corregir una oracion demasiado corta"
    steps: []
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
    flow:
    - id: "solicitar_tarea"
      action: "El usuario ejecuta 'refiner next' y obtiene una tarea SENTENCE_LENGTH\
        \ cuyo quiz tiene una oracion mas corta que el rango esperado"
      then: "verificar_auditoria"
      outcomes: []
      result: null
      gate: []
    - id: "verificar_auditoria"
      action: "El sistema busca el reporte de auditoria y localiza el nodo quiz en\
        \ el arbol"
      then: null
      outcomes:
      - when: "El reporte y el nodo quiz se localizan correctamente"
        then: "obtener_diagnostico"
      - when: "No se puede localizar el reporte o el nodo"
        then: "contexto_no_disponible"
      result: null
      gate:
      - "F-RCTX-SLEN-R002"
    - id: "obtener_diagnostico"
      action: "El sistema extrae la oracion y el diagnostico. El delta es negativo,\
        \ indicando que la oracion necesita mas tokens para alcanzar el rango minimo"
      then: "buscar_lemas"
      outcomes: []
      result: null
      gate:
      - "F-RCTX-SLEN-R001"
    - id: "buscar_lemas"
      action: "El sistema navega al milestone ancestro y busca lemas ausentes del\
        \ nivel"
      then: null
      outcomes:
      - when: "Hay lemas sugeridos disponibles"
        then: "construir_contexto_con_lemas"
      - when: "No hay lemas sugeridos"
        then: "construir_contexto_sin_lemas"
      result: null
      gate:
      - "F-RCTX-SLEN-R003"
    - id: "construir_contexto_con_lemas"
      action: "El sistema construye el contexto: oracion corta, delta negativo (necesita\
        \ mas tokens), y lemas sugeridos que el LLM puede usar para alargar la oracion\
        \ cubriendo vocabulario faltante"
      then: "presentar_contexto"
      outcomes: []
      result: null
      gate:
      - "F-RCTX-SLEN-R001"
      - "F-RCTX-SLEN-R003"
      - "F-RCTX-SLEN-R005"
    - id: "construir_contexto_sin_lemas"
      action: "El sistema construye el contexto sin sugerencias de vocabulario. El\
        \ LLM debera alargar la oracion por su cuenta"
      then: "presentar_contexto"
      outcomes: []
      result: null
      gate:
      - "F-RCTX-SLEN-R004"
    - id: "presentar_contexto"
      action: "El comando muestra la tarea con el contexto de correccion, incluyendo\
        \ el delta negativo que indica cuantos tokens faltan"
      then: null
      outcomes: []
      result: "success"
      gate:
      - "F-RCTX-SLEN-R006"
    - id: "contexto_no_disponible"
      action: "El comando muestra la tarea sin contexto de correccion, con un aviso\
        \ del motivo"
      then: null
      outcomes: []
      result: "failure"
      gate: []
  - id: "F-RCTX-SLEN-J003"
    name: "Contexto de correccion sin lemas sugeridos disponibles"
    steps: []
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
    flow:
    - id: "solicitar_tarea"
      action: "El usuario ejecuta 'refiner next' y obtiene una tarea SENTENCE_LENGTH"
      then: "localizar_quiz"
      outcomes: []
      result: null
      gate: []
    - id: "localizar_quiz"
      action: "El sistema localiza el nodo quiz en el arbol de auditoria"
      then: "navegar_milestone"
      outcomes: []
      result: null
      gate:
      - "F-RCTX-SLEN-R002"
    - id: "navegar_milestone"
      action: "El sistema navega al milestone ancestro del quiz"
      then: null
      outcomes:
      - when: "El milestone existe pero su LemmaAbsenceLevelDiagnosis indica que todos\
          \ los lemas esperados estan presentes (no hay ausencias)"
        then: "sin_lemas_disponibles"
      - when: "El milestone existe pero todas las ausencias son de tipo APPEARS_TOO_EARLY\
          \ (excluidas por R003)"
        then: "sin_lemas_disponibles"
      - when: "No se encuentra el milestone ancestro (estructura incompleta)"
        then: "sin_lemas_disponibles"
      result: null
      gate: []
    - id: "sin_lemas_disponibles"
      action: "El sistema construye el contexto con la lista de lemas sugeridos vacia.\
        \ El LLM recibe la oracion y el diagnostico de longitud, lo cual es suficiente\
        \ para reescribir la oracion ajustando la cantidad de tokens"
      then: "presentar_contexto"
      outcomes: []
      result: null
      gate:
      - "F-RCTX-SLEN-R004"
    - id: "presentar_contexto"
      action: "El comando muestra la tarea con el contexto de correccion. En formato\
        \ texto, la seccion de lemas sugeridos indica '(none available)'"
      then: null
      outcomes: []
      result: "success"
      gate:
      - "F-RCTX-SLEN-R006"
      - "F-RCTX-SLEN-R008"
  doubts:
  - id: "DOUBT-LIMIT"
    question: "Limite de lemas sugeridos"
    options:
    - label: "Opcion A: 10 lemas (equilibrio entre variedad y concision)"
      description: null
    - label: "Opcion B: 5 lemas (mas conciso, menos opciones para el LLM)"
      description: null
    - label: "Opcion C: 20 lemas (mas opciones, pero potencialmente ruidoso)"
      description: null
    answer: "10 lemas como limite maximo. Provee suficiente variedad para que el LLM\
      \ encuentre al menos uno semanticamente compatible con la oracion, sin sobrecargar\
      \ el contexto. [ASSUMPTION] Razon: es un punto de partida conservador que puede\
      \ ajustarse basandose en resultados reales."
  - id: "DOUBT-COCA-NULL"
    question: "Ordenamiento de lemas sin rango COCA"
    options:
    - label: "Opcion A: Colocarlos al final de la lista (despues de todos los que\
        \ si tienen rango)"
      description: null
    - label: "Opcion B: Excluirlos de las sugerencias"
      description: null
    - label: "Opcion C: Asignarles un rango por defecto muy alto (por ejemplo, 99999)"
      description: null
    answer: "Se colocan al final de la lista. [ASSUMPTION] Razon: un lema sin rango\
      \ COCA puede ser igualmente util; simplemente no se puede priorizar por frecuencia,\
      \ pero no deberia excluirse."
  - id: "DOUBT-SOURCE-AUDIT"
    question: "Propagacion del sourceAuditId"
    options:
    - label: "Opcion A: Corregir como prerequisito independiente antes de implementar\
        \ esta feature. Mantiene la separacion de concerns."
      description: null
    - label: "Opcion B: Corregir como parte de esta feature. Reduce el numero de iteraciones\
        \ pero mezcla un bugfix con una nueva funcionalidad."
      description: null
    answer: null
