---
features:
- id: "FEAT-NLP"
  name: "Evolucion del Tokenizador NLP para Tokenizacion Rica con Datos Linguisticos"
  description: "Evolucionar la interfaz `NlpTokenizer` del sistema ContentAudit para\
    \ que produzca **tokens enriquecidos** con informacion linguistica completa (lema,\
    \ parte de la oracion, ranking de frecuencia, indicadores de stop word y puntuacion),\
    \ reemplazando la tokenizacion actual basada en division por espacios en blanco.\
    \ Esta evolucion es un prerequisito critico para que el analizador de distribucion\
    \ COCA (FEAT-COCA) y futuros analizadores linguisticos puedan funcionar, ya que\
    \ estos requieren datos de frecuencia y categorias gramaticales que la tokenizacion\
    \ actual no provee."
  code: "F-NLP"
  rules:
  - id: "F-NLP-R001"
    name: "Campos obligatorios del token enriquecido"
    severity: "critical"
    description: "Cada token producido por el tokenizador enriquecido debe contener,\
      \ como minimo, los siguientes campos: | Campo | Tipo | Descripcion | Ejemplo\
      \ | |-------|------|-------------|---------| | text | Texto | Texto original\
      \ del token tal como aparece en la oracion | \"running\" | | lemma | Texto |\
      \ Forma base (lematizada) del token | \"run\" | | posTag | Texto | Etiqueta\
      \ de parte de la oracion (Universal Dependencies) | \"VERB\" | | frequencyRank\
      \ | Entero (nullable) | Ranking de frecuencia COCA basado en el lema | 245 |\
      \ | isStop | Booleano | Indica si el token es una stop word | false | | isPunct\
      \ | Booleano | Indica si el token es un signo de puntuacion | false | Estos\
      \ seis campos son el **minimo indispensable** para que los analizadores actuales\
      \ y planeados del sistema puedan funcionar. `frequencyRank` es nullable porque\
      \ no todos los tokens tienen entrada en el corpus COCA (ver R028)."
    errorMessage: "Token incompleto: falta el campo obligatorio '{campo}' para el\
      \ token '{text}'"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R002"
    name: "Campos opcionales del token enriquecido"
    severity: "minor"
    description: "Ademas de los campos obligatorios, el token enriquecido puede incluir\
      \ los siguientes campos opcionales que provee el procesamiento SpaCy: | Campo\
      \ | Tipo | Descripcion | Ejemplo | |-------|------|-------------|---------|\
      \ | tag | Texto | Etiqueta detallada Penn Treebank | \"VBG\" | | isAlpha | Booleano\
      \ | Indica si el token esta compuesto solo por letras | true | | dep | Texto\
      \ | Relacion de dependencia sintactica | \"nsubj\" | Estos campos no son requeridos\
      \ por ninguno de los analizadores actualmente planificados, pero pueden ser\
      \ utiles para futuros analizadores o para diagnostico. Su inclusion es opcional\
      \ y no debe bloquear el funcionamiento del sistema si estan ausentes."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R003"
    name: "Lematizacion produce la forma base del token"
    severity: "critical"
    description: "El campo `lemma` de cada token debe contener la **forma base** (forma\
      \ canonica) de la palabra, normalizada a minusculas. La lematizacion reduce\
      \ las formas flexionadas a su raiz lexica. Ejemplos: | Texto original | Lema\
      \ esperado | Explicacion | |---------------|---------------|-------------| |\
      \ running | run | Forma verbal flexionada -> infinitivo | | was | be | Verbo\
      \ conjugado -> infinitivo | | children | child | Plural irregular -> singular\
      \ | | better | well (o good) | Comparativo -> forma base | | cats | cat | Plural\
      \ regular -> singular | | She | she | Pronombre -> minuscula | | quickly | quickly\
      \ | Adverbio (sin forma base distinta) | La calidad de la lematizacion depende\
      \ del modelo NLP utilizado (SpaCy `en_core_web_sm`). El tokenizador delega esta\
      \ tarea al motor de procesamiento linguistico y retorna el resultado tal como\
      \ lo produce el modelo."
    errorMessage: "Error de lematizacion: el token '{text}' no pudo ser lematizado"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R004"
    name: "Etiquetas POS usan el esquema Universal Dependencies"
    severity: "critical"
    description: "Las etiquetas de parte de la oracion (`posTag`) deben seguir el\
      \ esquema **Universal Dependencies** (UD), que es el esquema que utiliza SpaCy\
      \ por defecto. Las etiquetas validas son: NOUN, VERB, ADJ, ADV, PROPN, NUM,\
      \ ADP, AUX, CCONJ, DET, INTJ, PART, PRON, SCONJ, PUNCT, SYM, SPACE, X Este esquema\
      \ es el estandar en linguistica computacional moderna y es el que esperan los\
      \ analizadores del sistema. Cualquier etiqueta que no pertenezca a este conjunto\
      \ debe reportarse como anomalia. El uso del esquema Universal Dependencies es\
      \ critico porque el ContentWordFilter (que distingue palabras de contenido de\
      \ palabras funcionales) opera directamente sobre estas etiquetas para determinar\
      \ si un token es un sustantivo, verbo, adjetivo o adverbio."
    errorMessage: "Etiqueta POS desconocida '{posTag}' para el token '{text}'. Se\
      \ esperaba una etiqueta del esquema Universal Dependencies"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R005"
    name: "El token enriquecido reemplaza a la representacion de cadena de texto"
    severity: "critical"
    description: "Los tokens enriquecidos reemplazan la representacion actual de tokens\
      \ como cadenas de texto simples. Donde antes el sistema trabajaba con una lista\
      \ de cadenas de texto ([\"She\", \"likes\", \"cats\"]), ahora trabaja con una\
      \ lista de tokens enriquecidos, cada uno con toda la informacion linguistica\
      \ descrita en R001 y R002. Este reemplazo afecta al modelo `AuditableQuiz`,\
      \ que actualmente solo almacena la oracion y un conteo de tokens (entero). Con\
      \ la evolucion, cada quiz debera tener asociada su lista completa de tokens\
      \ enriquecidos. El conteo de tokens sigue siendo derivable (es simplemente la\
      \ cantidad de tokens en la lista)."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R006"
    name: "Nueva operacion de tokenizacion enriquecida"
    severity: "critical"
    description: "La interfaz del tokenizador NLP debe ofrecer una nueva operacion\
      \ que, dada una oracion (texto plano), retorne una lista de tokens enriquecidos\
      \ con toda la informacion linguistica descrita en R001. Esta es la operacion\
      \ principal que usaran los analizadores que requieren datos linguisticos. La\
      \ nueva operacion reemplaza funcionalmente a la operacion `tokenize` actual\
      \ (que retorna cadenas de texto), aunque la operacion anterior podria mantenerse\
      \ temporalmente por compatibilidad."
    errorMessage: "Error al tokenizar la oracion: '{oracion}' - {detalle del error}"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R007"
    name: "Compatibilidad con analizadores existentes que usan conteo de tokens"
    severity: "major"
    description: "El analizador de longitud de oraciones (`SentenceLengthAnalyzer`,\
      \ FEAT-SLENGTH) actualmente utiliza el conteo de tokens (`tokenCount`) que se\
      \ calcula durante el mapeo del curso. Este analizador no necesita tokens enriquecidos;\
      \ solo necesita saber cuantos tokens tiene la oracion. Con la evolucion del\
      \ tokenizador, el conteo de tokens se puede derivar de la lista de tokens enriquecidos\
      \ (contando los elementos de la lista). Por lo tanto, no se requiere mantener\
      \ la operacion `countTokens` como operacion independiente, siempre que el conteo\
      \ siga estando disponible a traves del modelo de datos. Los analizadores existentes\
      \ no deben romperse con la evolucion del tokenizador. Si un analizador solo\
      \ necesita el conteo, debe poder obtenerlo sin procesar la lista completa de\
      \ tokens."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R008"
    name: "Procesamiento de multiples oraciones en lote"
    severity: "major"
    description: "El tokenizador debe soportar el procesamiento de multiples oraciones\
      \ en una sola invocacion (procesamiento en lote). Esto es fundamental por rendimiento:\
      \ un curso tipico tiene aproximadamente 11.500 quizzes, cada uno con al menos\
      \ una oracion. Invocar el procesamiento NLP oracion por oracion seria prohibitivamente\
      \ lento. El procesamiento en lote permite enviar todas las oraciones de un nivel\
      \ (o de todo el curso) al motor NLP en una sola invocacion, reduciendo drasticamente\
      \ el overhead de inicializacion y comunicacion."
    errorMessage: "Error en procesamiento en lote: {cantidad} de {total} oraciones\
      \ fallaron durante la tokenizacion"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R009"
    name: "El tokenizador es un servicio del dominio, no un analizador"
    severity: "major"
    description: "El tokenizador NLP es un **servicio de infraestructura** que provee\
      \ capacidades de procesamiento linguistico a los analizadores. No es un analizador\
      \ en si mismo: no produce puntuaciones ni evaluaciones. Su responsabilidad es\
      \ exclusivamente transformar texto plano en tokens enriquecidos. Los analizadores\
      \ (como el de distribucion COCA o el de longitud de oraciones) consumen los\
      \ tokens producidos por el tokenizador para realizar sus evaluaciones especificas.\
      \ Esta separacion es importante porque permite que multiples analizadores compartan\
      \ el mismo resultado de tokenizacion sin reprocesar."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R010"
    name: "El mapeo del curso debe utilizar la tokenizacion enriquecida"
    severity: "critical"
    description: "El proceso que convierte los datos del curso en datos auditables\
      \ (`CourseToAuditableMapper`) actualmente invoca al tokenizador para obtener\
      \ el conteo de tokens de cada quiz. Con la evolucion, este proceso debe invocar\
      \ la tokenizacion enriquecida para cada oracion y almacenar la lista completa\
      \ de tokens enriquecidos en el modelo `AuditableQuiz`. Esto significa que los\
      \ tokens enriquecidos se generan **una sola vez** durante el mapeo del curso,\
      \ no cada vez que un analizador los necesita. Todos los analizadores trabajan\
      \ sobre los mismos tokens ya enriquecidos. Esto evita reprocesamiento y garantiza\
      \ consistencia entre analizadores."
    errorMessage: "Error al mapear el quiz '{quizId}': la tokenizacion enriquecida\
      \ fallo para la oracion"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R011"
    name: "El ranking de frecuencia se obtiene del lema, no de la forma flexionada"
    severity: "critical"
    description: "El `frequencyRank` de un token se basa en su **lema** (forma base),\
      \ no en la forma flexionada que aparece en la oracion. Esto es porque los datos\
      \ de frecuencia COCA estan organizados por lema: el lema \"run\" tiene un ranking\
      \ unico que aplica a todas sus formas (runs, running, ran). Si se buscara por\
      \ forma flexionada, muchas palabras no se encontrarian o tendrian rankings inconsistentes.\
      \ Ejemplo: la oracion \"She was running quickly\" se procesa asi: - \"She\"\
      \ -> lema \"she\" -> ranking basado en el lema \"she\" - \"was\" -> lema \"\
      be\" -> ranking basado en el lema \"be\" - \"running\" -> lema \"run\" -> ranking\
      \ basado en el lema \"run\" - \"quickly\" -> lema \"quickly\" -> ranking basado\
      \ en el lema \"quickly\""
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R012"
    name: "Mapeo de etiquetas POS para busqueda de frecuencia"
    severity: "critical"
    description: "Para buscar la frecuencia de un token en los datos COCA, primero\
      \ se debe mapear la etiqueta POS de SpaCy (esquema Universal Dependencies) al\
      \ codigo POS del COCA. Los datos COCA usan un esquema propio de codigos de un\
      \ solo caracter: | Etiqueta SpaCy | Codigo COCA | Descripcion | |----------------|-------------|-------------|\
      \ | NOUN | n | Sustantivo | | PROPN | n | Nombre propio (mapeado a sustantivo)\
      \ | | VERB | v | Verbo | | AUX | v | Auxiliar (mapeado a verbo) | | ADJ | j\
      \ | Adjetivo | | ADV | r | Adverbio | | PRON | p | Pronombre | | DET | a | Determinante/Articulo\
      \ | | ADP | i | Preposicion | | CONJ | c | Conjuncion | | CCONJ | c | Conjuncion\
      \ coordinante | | SCONJ | c | Conjuncion subordinante | | NUM | m | Numero |\
      \ | PART | t | Particula | | PRT | t | Particula | | INTJ | u | Interjection\
      \ | | SYM | x | Simbolo | | PUNCT | x | Puntuacion | | SPACE | x | Espacio |\
      \ | X | x | Otro | Si una etiqueta POS de SpaCy no tiene mapeo conocido, se\
      \ asigna el codigo por defecto 'x' (otro)."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R013"
    name: "Estrategia de busqueda de frecuencia en tres niveles"
    severity: "critical"
    description: "La busqueda de frecuencia COCA sigue una estrategia de tres niveles,\
      \ ejecutados en orden hasta encontrar un resultado: 1. **Busqueda por forma\
      \ exacta de la palabra** (prioridad mas alta): se busca la palabra original\
      \ (en minusculas) directamente en los datos COCA. Esto es util para formas que\
      \ aparecen explicitamente en el archivo de frecuencias. 2. **Busqueda por lema\
      \ + codigo POS COCA**: se construye la clave `lema#posCoca` (ejemplo: `run#v`)\
      \ y se busca en los datos. Si hay multiples entradas para la misma clave, se\
      \ retorna la de mejor (menor) ranking. 3. **Busqueda solo por lema** (fallback):\
      \ se busca unicamente por el lema sin considerar el POS. Se retorna la entrada\
      \ con mejor ranking. Esto cubre casos donde el POS mapeado no coincide exactamente\
      \ con el del COCA. Si ninguno de los tres niveles encuentra resultado, el token\
      \ queda con `frequencyRank` nulo (ver R028)."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R014"
    name: "Estructura de los datos de frecuencia COCA"
    severity: "major"
    description: "Los datos de frecuencia COCA provienen del archivo `lemmas_20k_words.txt`,\
      \ un archivo TSV con las 20.000 lemas mas frecuentes del ingles y sus formas.\
      \ El archivo tiene la siguiente estructura: - Las primeras 8 lineas son comentarios/metadatos\
      \ y deben omitirse al procesar - La linea 9 es la cabecera de columnas - A partir\
      \ de la linea 10, cada fila contiene: ranking del lema, lema, codigo POS, frecuencia\
      \ del lema, frecuencia de la forma, forma de la palabra Cada lema puede tener\
      \ multiples filas (una por cada forma flexionada). Al construir el indice de\
      \ busqueda: - Para la clave `lema#pos`: se almacena la entrada con mejor (menor)\
      \ ranking si hay duplicados. - Para la clave solo por lema: se almacena la entrada\
      \ con mejor (menor) ranking si hay duplicados. - Para la clave por forma exacta\
      \ de la palabra: se almacena la entrada con mayor frecuencia de palabra (`wordFreq`)\
      \ si hay duplicados."
    errorMessage: "Error al cargar datos de frecuencia COCA: {detalle}"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R015"
    name: "Los datos de frecuencia se cargan una sola vez al inicio"
    severity: "major"
    description: "El archivo de datos de frecuencia COCA debe cargarse en memoria\
      \ una sola vez al inicio del procesamiento. Las busquedas de frecuencia posteriores\
      \ operan sobre el indice en memoria. Esto es fundamental por rendimiento: con\
      \ ~11.500 quizzes y ~10 tokens por oracion (~115.000 tokens), cada token necesita\
      \ una busqueda de frecuencia. Recargar el archivo para cada busqueda seria prohibitivamente\
      \ lento. El indice en memoria debe soportar las tres estrategias de busqueda\
      \ descritas en R013: por forma exacta, por lema+POS, y solo por lema."
    errorMessage: "No se pudieron cargar los datos de frecuencia COCA al inicio"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R016"
    name: "El ranking de frecuencia retornado es el ranking del lema"
    severity: "major"
    description: "El `frequencyRank` asociado a cada token es el `lemRank` (ranking\
      \ del lema) del dato COCA, no la frecuencia de la forma especifica. Esto significa\
      \ que todas las formas flexionadas de un mismo lema comparten el mismo ranking.\
      \ Por ejemplo: - \"is\", \"was\", \"are\", \"were\", \"been\" -> lema \"be\"\
      \ -> frequencyRank = 2 - \"runs\", \"running\", \"ran\" -> lema \"run\" -> frequencyRank\
      \ = 245 Este comportamiento es consistente con lo que espera el analizador COCA\
      \ (F-COCA-R001): clasifica tokens en bandas de frecuencia usando el `frequencyRank`,\
      \ que debe reflejar la frecuencia del lema, no de la forma individual."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R017"
    name: "SpaCy como motor de procesamiento linguistico"
    severity: "critical"
    description: "El motor de procesamiento linguistico principal es **SpaCy** (version\
      \ 3.7.2) con el modelo **en_core_web_sm** para ingles. SpaCy provee tokenizacion,\
      \ lematizacion, etiquetado POS, deteccion de stop words, y deteccion de puntuacion\
      \ en una sola pasada. SpaCy se ejecuta como un proceso Python externo. El sistema\
      \ ContentAudit (Java) invoca al script Python que carga SpaCy, procesa las oraciones,\
      \ y retorna los resultados. El modelo `en_core_web_sm` es un modelo compacto\
      \ (~12 MB) que ofrece un buen balance entre precision y velocidad."
    errorMessage: "No se pudo iniciar el motor SpaCy: {detalle}"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R018"
    name: "Comunicacion con el proceso Python via archivos JSON"
    severity: "major"
    description: "La comunicacion entre ContentAudit (Java) y el script Python se\
      \ realiza mediante archivos JSON: 1. ContentAudit escribe un archivo JSON de\
      \ entrada con las oraciones a procesar 2. ContentAudit invoca el proceso Python\
      \ pasando las rutas de los archivos de entrada y salida 3. El proceso Python\
      \ lee el archivo de entrada, procesa las oraciones con SpaCy y los datos COCA,\
      \ y escribe un archivo JSON de salida 4. ContentAudit lee el archivo JSON de\
      \ salida y convierte los resultados en tokens enriquecidos El formato del archivo\
      \ de entrada es: ``` { \"sentences\": [\"She likes cats.\", \"He was running\
      \ quickly.\"] } ``` El formato del archivo de salida contiene, para cada oracion,\
      \ la lista de tokens procesados con su informacion linguistica y de frecuencia.\
      \ [ASSUMPTION] Se asume que la comunicacion via archivos JSON es la estrategia\
      \ elegida. Alternativas como stdin/stdout o un servicio persistente podrian\
      \ ofrecer mejor rendimiento para volumenes grandes, pero la comunicacion por\
      \ archivos es la mas simple y es consistente con el script original. Si el rendimiento\
      \ resulta insuficiente, se puede evolucionar a stdin/stdout sin cambiar la logica\
      \ de negocio."
    errorMessage: "Error en la comunicacion con el proceso Python: no se pudo leer/escribir\
      \ el archivo {ruta}"
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-NLP-R019"
    name: "El proceso Python integra lematizacion y busqueda de frecuencia"
    severity: "critical"
    description: "El script Python realiza **todo el procesamiento en un solo paso**:\
      \ tokenizacion, lematizacion, etiquetado POS, deteccion de stop words, y busqueda\
      \ de frecuencia COCA. No hay separacion entre el procesamiento SpaCy y la busqueda\
      \ de frecuencia; ambos ocurren dentro del mismo proceso Python. Esto es importante\
      \ porque la busqueda de frecuencia depende del lema y del POS, que son productos\
      \ del procesamiento SpaCy. Mantener ambas operaciones en el mismo proceso evita\
      \ transferencias intermedias de datos y simplifica la logica. El script carga\
      \ los datos de frecuencia COCA (`lemmas_20k_words.txt`) al inicio y los mantiene\
      \ en memoria durante toda la sesion de procesamiento. El modelo SpaCy tambien\
      \ se carga una sola vez al inicio."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R020"
    name: "Requisitos del entorno de ejecucion"
    severity: "major"
    description: "Para que el tokenizador enriquecido funcione, el entorno de ejecucion\
      \ debe tener instalados: 1. **Python 3.11 o superior**: el runtime necesario\
      \ para ejecutar el script de procesamiento 2. **SpaCy 3.7.2**: la biblioteca\
      \ de procesamiento de lenguaje natural 3. **Modelo en_core_web_sm**: el modelo\
      \ de SpaCy para ingles (se instala via `python -m spacy download en_core_web_sm`)\
      \ 4. **El archivo lemmas_20k_words.txt**: los datos de frecuencia COCA deben\
      \ estar accesibles para el script Python Si alguno de estos componentes no esta\
      \ disponible, el tokenizador no puede producir tokens enriquecidos y debe reportar\
      \ el error de manera clara (ver R029)."
    errorMessage: "Requisito de entorno faltante: {componente}. Consulte la documentacion\
      \ de instalacion."
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R021"
    name: "La ruta del script Python y de los datos COCA es configurable"
    severity: "minor"
    description: "Las rutas del script Python (`sample_processor.py`) y del archivo\
      \ de datos de frecuencia COCA (`lemmas_20k_words.txt`) deben ser configurables,\
      \ no estar hardcodeadas. Esto permite: - Diferentes entornos (desarrollo, CI,\
      \ produccion) con diferentes ubicaciones de archivos - Versionar el script y\
      \ los datos de forma independiente - Facilitar las pruebas con datos o scripts\
      \ alternativos [ASSUMPTION] Se asume que la configuracion se realiza mediante\
      \ parametros de configuracion del sistema. El mecanismo exacto de configuracion\
      \ (archivo de propiedades, variables de entorno, parametros de linea de comandos)\
      \ se definira en la fase de diseno."
    errorMessage: "Ruta del script Python no configurada o no encontrada: {ruta}"
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-NLP-R022"
    name: "El procesamiento es sincrono"
    severity: "minor"
    description: "El procesamiento de tokenizacion enriquecida es sincrono: ContentAudit\
      \ invoca al proceso Python, espera a que termine, y luego procesa los resultados.\
      \ No hay procesamiento asincrono ni paralelo de multiples lotes simultaneos.\
      \ [ASSUMPTION] Se asume que el procesamiento sincrono es suficiente para los\
      \ volumenes actuales del curso (~11.500 quizzes). Si se necesita procesar cursos\
      \ significativamente mas grandes o multiples cursos en paralelo, se podria evolucionar\
      \ a procesamiento asincrono, pero eso queda fuera del alcance de esta funcionalidad."
    errorMessage: null
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-NLP-R023"
    name: "Cache en memoria de tokens enriquecidos por oracion"
    severity: "major"
    description: "Los resultados de la tokenizacion enriquecida deben cachearse en\
      \ memoria por oracion: si la misma oracion se procesa mas de una vez, la segunda\
      \ invocacion retorna los resultados cacheados sin invocar al proceso Python\
      \ nuevamente. Esto es relevante porque un curso puede tener oraciones repetidas\
      \ (el mismo quiz en multiples contextos) y porque el decorador `CachedNlpTokenizer`\
      \ ya implementa este patron para la tokenizacion simple. Con la evolucion, el\
      \ cache debe adaptarse para almacenar tokens enriquecidos en lugar de listas\
      \ de cadenas de texto."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R024"
    name: "El cache usa la oracion completa como clave"
    severity: "minor"
    description: "La clave del cache de tokenizacion es la oracion completa (texto\
      \ exacto). Dos oraciones identicas producen los mismos tokens enriquecidos.\
      \ Si la oracion difiere en un solo caracter (incluyendo mayusculas, espacios\
      \ o puntuacion), se trata como una oracion diferente y se procesa independientemente."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R025"
    name: "Cache persistente opcional en disco"
    severity: "minor"
    description: "El sistema original mantenia un cache persistente en disco de los\
      \ resultados de SpaCy (archivos `spacy-results-{A1,A2,B1,B2}.json`, totalizando\
      \ ~61 MB). Este cache se identificaba por un hash SHA-256 del contenido de las\
      \ oraciones y tenia una expiracion de 30 dias. [ASSUMPTION] Se asume que el\
      \ cache persistente en disco es una optimizacion deseable pero **no es obligatorio**\
      \ para la primera version de esta funcionalidad. El cache en memoria (R023)\
      \ es suficiente para una sesion de auditoria individual. El cache en disco evita\
      \ reprocesar las mismas oraciones en ejecuciones sucesivas, lo cual es valioso\
      \ pero puede implementarse en una iteracion posterior."
    errorMessage: null
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-NLP-R026"
    name: "El cache del CachedNlpTokenizer debe evolucionar"
    severity: "major"
    description: "El decorador `CachedNlpTokenizer` actualmente cachea dos tipos de\
      \ resultados: listas de cadenas de texto (de `tokenize`) y conteos enteros (de\
      \ `countTokens`). Con la evolucion, debe adaptarse para cachear listas de tokens\
      \ enriquecidos producidos por la nueva operacion de tokenizacion. El principio\
      \ del decorador permanece igual: intercepta la llamada al tokenizador, busca\
      \ en el cache, y si no encuentra el resultado, delega al tokenizador real y\
      \ almacena el resultado en cache."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R027"
    name: "Volumetria del cache"
    severity: "minor"
    description: "Un curso tipico tiene ~11.500 quizzes con una oracion por quiz.\
      \ Con ~10 tokens enriquecidos por oracion y ~100 bytes por token enriquecido\
      \ (estimacion conservadora para los campos de R001), el cache en memoria para\
      \ un curso completo ocuparia aproximadamente 11 MB. [ASSUMPTION] Se asume que\
      \ 11 MB es un tamano aceptable para un cache en memoria durante una sesion de\
      \ auditoria. Si los cursos son significativamente mas grandes o si se auditan\
      \ multiples cursos en la misma sesion, podria necesitarse un mecanismo de eviccion\
      \ del cache (como LRU) o un limite de tamano. Para la primera version, se asume\
      \ que el consumo de memoria es manejable."
    errorMessage: null
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-NLP-R028"
    name: "Tokens sin ranking de frecuencia"
    severity: "major"
    description: "Cuando la busqueda de frecuencia COCA no encuentra resultado para\
      \ un token (ninguna de las tres estrategias de R013 encuentra coincidencia),\
      \ el token se crea con `frequencyRank` nulo. El token es valido y contiene el\
      \ resto de su informacion linguistica (lema, POS, isStop, isPunct). Los tokens\
      \ con `frequencyRank` nulo se pasan a los analizadores sin modificacion. Es\
      \ responsabilidad de cada analizador decidir como tratar estos tokens. Segun\
      \ F-COCA-R004, el analizador COCA los excluye del analisis de distribucion.\
      \ Ejemplos de tokens que tipicamente no tendran ranking: nombres propios poco\
      \ comunes, neologismos, errores tipograficos, y palabras extremadamente raras\
      \ no incluidas en las 20.000 lemas del COCA."
    errorMessage: null
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R029"
    name: "Fallo del proceso Python"
    severity: "critical"
    description: "Si el proceso Python falla (no se puede iniciar, termina con error,\
      \ o produce una salida invalida), el tokenizador debe reportar el error de manera\
      \ clara y no retornar tokens parciales o corruptos. Las causas posibles de fallo\
      \ incluyen: - Python no esta instalado o no se encuentra en la ruta del sistema\
      \ - SpaCy no esta instalado o el modelo `en_core_web_sm` no esta descargado\
      \ - El archivo `lemmas_20k_words.txt` no se encuentra o no es legible - El script\
      \ Python tiene un error de ejecucion - El archivo de salida JSON no se puede\
      \ crear o tiene formato invalido - El proceso Python se agota por tiempo (timeout)\
      \ En todos estos casos, la auditoria debe poder continuar con funcionalidad\
      \ reducida si es posible (ver R030), o terminar con un mensaje de error claro\
      \ si el procesamiento NLP es un prerequisito indispensable."
    errorMessage: "El procesamiento NLP fallo: {causa}. Verifique que Python 3.11+,\
      \ SpaCy y el modelo en_core_web_sm estan instalados."
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R030"
    name: "Fallback cuando SpaCy no esta disponible"
    severity: "major"
    description: "Si el motor SpaCy no esta disponible (Python no instalado, SpaCy\
      \ no instalado, etc.), el sistema debe ofrecer un modo de **funcionalidad reducida**\
      \ que permita ejecutar al menos los analizadores que no requieren datos linguisticos\
      \ enriquecidos. [ASSUMPTION] Se asume que el fallback consiste en: (a) el tokenizador\
      \ regresa a la tokenizacion basica por espacios en blanco, (b) los analizadores\
      \ que solo necesitan conteo de tokens (como SentenceLengthAnalyzer) siguen funcionando\
      \ normalmente, y (c) los analizadores que requieren tokens enriquecidos (como\
      \ el analizador COCA) reportan que no pueden ejecutarse por falta de datos linguisticos.\
      \ El usuario recibe un mensaje claro indicando que funcionalidades estan disponibles\
      \ y cuales no. Alternativa: se podria usar el catalogo enriquecido (`enriched_vocabulary_catalog.json`)\
      \ como fuente de datos de fallback para tokens que esten en el catalogo, aunque\
      \ con cobertura limitada."
    errorMessage: "SpaCy no disponible: los analizadores que requieren datos linguisticos\
      \ enriquecidos no se ejecutaran. Los analizadores basicos (longitud de oracion)\
      \ funcionan normalmente."
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-NLP-R031"
    name: "Timeout del proceso Python"
    severity: "major"
    description: "El proceso Python debe tener un timeout configurable. Si el proceso\
      \ no completa dentro del tiempo limite, se termina forzosamente y se reporta\
      \ como error. [ASSUMPTION] Se asume un timeout por defecto de 5 minutos (300\
      \ segundos) para el procesamiento de un lote de oraciones. Este valor es una\
      \ estimacion basada en el volumen del curso actual (~11.500 oraciones) y el\
      \ rendimiento reportado del procesamiento SpaCy (~10-50 oraciones por segundo).\
      \ Un curso completo deberia procesarse en 2-20 minutos dependiendo del hardware.\
      \ El timeout debe ser configurable para adaptarse a diferentes entornos."
    errorMessage: "El procesamiento NLP excedio el tiempo limite de {timeout} segundos.\
      \ Considere procesar en lotes mas pequenos o aumentar el timeout."
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-NLP-R032"
    name: "Errores de tokens individuales no detienen el lote completo"
    severity: "major"
    description: "Si el procesamiento de un token individual falla dentro de SpaCy\
      \ (situacion rara pero posible con caracteres especiales o texto malformado),\
      \ el error se registra pero no detiene el procesamiento del resto de las oraciones\
      \ del lote. El token fallido se crea con datos basicos de fallback: - `text`:\
      \ el texto original del token - `lemma`: el texto original en minusculas (fallback\
      \ simple) - `posTag`: \"X\" (etiqueta de Unknown) - `frequencyRank`: nulo -\
      \ `isStop`: falso - `isPunct`: se determina por inspeccion del caracter Esto\
      \ garantiza que un token problematico no impida la auditoria de todo el curso."
    errorMessage: "Error al procesar el token '{text}' en la oracion '{oracion}':\
      \ {detalle}. Se uso fallback basico."
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-R033"
    name: "Signos de puntuacion y espacios no participan como tokens linguisticos"
    severity: "minor"
    description: "Los signos de puntuacion (comas, puntos, signos de interrogacion,\
      \ etc.) y los espacios producen tokens con `isPunct = true` y/o `posTag = PUNCT/SPACE`.\
      \ Estos tokens se incluyen en la lista de tokens enriquecidos pero los analizadores\
      \ los filtran segun sus necesidades: - El analizador COCA (FEAT-COCA) no cuenta\
      \ tokens de puntuacion para la distribucion de frecuencia (solo cuenta tokens\
      \ con `frequencyRank` valido) - El ContentWordFilter excluye explicitamente\
      \ los tokens con POS \"PUNCT\" y \"SYM\" [ASSUMPTION] Se asume que los tokens\
      \ de puntuacion se incluyen en la salida del tokenizador para mantener la fidelidad\
      \ con el texto original, pero que cada analizador los filtra segun su logica.\
      \ Alternativamente, se podrian excluir desde el tokenizador, pero esto reduciria\
      \ la flexibilidad para futuros analizadores que si necesiten la puntuacion (por\
      \ ejemplo, analisis de complejidad sintactica)."
    errorMessage: null
    validation: "ASSUMPTION"
    code: null
    rationale: null
  journeys:
  - id: "F-NLP-J001"
    name: "Auditar un curso con tokenizacion enriquecida"
    steps:
    - "El usuario inicia una auditoria de un curso en ContentAudit"
    - "El sistema comienza el mapeo del curso: recorre todos los niveles, topics,\
      \ knowledges y quizzes"
    - "Para cada quiz, el sistema extrae la oracion del texto del quiz"
    - "El sistema agrupa las oraciones y las envia al tokenizador NLP enriquecido\
      \ en un lote"
    - "El tokenizador invoca al proceso Python/SpaCy, que procesa todas las oraciones:\
      \ tokeniza, lematiza, asigna etiquetas POS, busca frecuencias COCA, y retorna\
      \ la lista de tokens enriquecidos"
    - "El sistema almacena los tokens enriquecidos en el modelo de cada quiz (AuditableQuiz)"
    - "Los analizadores procesan los quizzes con sus tokens enriquecidos: el analizador\
      \ de longitud de oraciones usa el conteo de tokens, el analizador COCA usa el\
      \ `frequencyRank` y el lema de cada token"
    - "El usuario recibe los resultados de la auditoria con las evaluaciones de todos\
      \ los analizadores"
    validation: "AUTO_VALIDATED"
    code: null
    rationale: null
  - id: "F-NLP-J002"
    name: "El usuario no tiene SpaCy instalado"
    steps:
    - "El usuario inicia una auditoria sin tener Python o SpaCy instalados en su entorno"
    - "El sistema intenta invocar el proceso Python para la tokenizacion enriquecida"
    - "El proceso falla porque Python no esta disponible (o SpaCy no esta instalado)"
    - "El sistema reporta un mensaje claro: \"SpaCy no disponible. Los analizadores\
      \ que requieren datos linguisticos (distribucion COCA) no se ejecutaran.\""
    - "El sistema ejecuta la auditoria con funcionalidad reducida: solo los analizadores\
      \ que no requieren tokens enriquecidos (como el analizador de longitud de oraciones)\
      \ producen resultados"
    - "El usuario recibe los resultados parciales con una nota indicando que analizadores\
      \ no se ejecutaron y por que"
    - "El usuario consulta la documentacion para instalar Python, SpaCy y el modelo\
      \ requerido"
    validation: "ASSUMPTION"
    code: null
    rationale: null
  - id: "F-NLP-J003"
    name: "Diagnosticar problemas de tokenizacion en una oracion especifica"
    steps:
    - "El usuario ejecuta la auditoria y observa resultados inesperados en el analizador\
      \ COCA para un knowledge especifico"
    - "El usuario consulta los tokens enriquecidos de una oracion problematica"
    - "El usuario observa que un token tiene `frequencyRank` nulo cuando esperaba\
      \ un valor"
    - "El usuario verifica el lema y el POS del token para entender por que la busqueda\
      \ COCA fallo"
    - "El usuario descubre que el lema fue asignado incorrectamente por SpaCy (por\
      \ ejemplo, \"lead\" como sustantivo en lugar de verbo) lo que provoco que la\
      \ busqueda por lema+POS no encontrara resultado"
    - "El usuario anota el caso como una limitacion del modelo de SpaCy y decide si\
      \ ajustar el contenido o aceptar la limitacion"
    validation: "ASSUMPTION"
    code: null
    rationale: null
