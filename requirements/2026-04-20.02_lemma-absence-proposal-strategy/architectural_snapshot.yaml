code: FEAT-LAPS
description: "FEAT-LAPS: First real proposal strategy for LEMMA_ABSENCE. Introduces\
  \ LemmaAbsenceProposalStrategy port (versioned), a StrategyId carrier for traceability,\
  \ a structured LemmaAbsenceQuizCandidate + deterministic deriver that maps candidate\
  \ -> elementAfter, an MVP strategy and its candidate-generator port (concrete provider\
  \ TBD by user), a registry + CLI env-var selection, and an explicit no-fallback-to-bypass\
  \ branch for LEMMA_ABSENCE. Generalization across DiagnosisKinds is deferred (YAGNI).\
  \ Consumes QuizSentenceConverter from course-domain (FEAT-QSENT) for candidate DSL\
  \ <-> FormEntity conversion.; FEAT-LAPS re-evolution: align port signatures with\
  \ refined REQUIREMENT (R007, R015, R016). Strategy.propose() declares ProposalStrategyFailedException;\
  \ deriver.derive() declares ProposalDerivationException; generator.generate() declares\
  \ ProposalStrategyFailedException; selector.select() declares InvalidProposalStrategyException.\
  \ Tighten candidate field docs to reference quizSentence consumed from CorrectionContext\
  \ (FEAT-RCLA/FEAT-RCLAQS) and derivation via QuizSentenceConverter.parse + toPlainSentences\
  \ (FEAT-QSENT). The candidate carrier stays as { String quizSentence, String translation\
  \ } — a deliberate 2-field record preserving stamp traceability without collapsing\
  \ into two raw Strings across boundaries."
modules:
- name: revision-domain
  dependsOn:
  - audit-domain
  - refiner-domain
  - course-domain
  models:
  - name: StrategyId
    type: record
    fields:
    - name: name
      type: String
      description: "Symbolic identifier, e.g. 'lemma-absence-mvp' (F-LAPS-R005)."
    - name: version
      type: String
      description: "Version string, e.g. '1.0.0'; distinguishes revisions of the same\
        \ name over time (F-LAPS-R005)."
    - name: providerId
      type: String
      description: "Opaque provider id for the underlying candidate generator, e.g.\
        \ 'llm:anthropic', 'fixture:golden'. Nullable when the strategy has no external\
        \ provider. Resolves DOUBT-STRATEGY-METADATA as the minimum-beyond-name+version\
        \ metadata."
    _change: add
  - name: LemmaAbsenceQuizCandidate
    type: record
    fields:
    - name: quizSentence
      type: String
      description: "Candidate exercise expressed in the FEAT-QSENT quizSentence DSL\
        \ (blanks '____', answer blocks '[variant1|variant2]', hints inline in parentheses).\
        \ One formal string encodes the sentence stem + blanks + correct answers +\
        \ accepted variants (F-LAPS-R009, R011, R019). Parsed by QuizSentenceConverter.parse\
        \ at derivation time (F-LAPS-R012). The strategy MAY but is not required to\
        \ reuse substrings of the context's quizSentence (FEAT-RCLAQS) — it emits\
        \ a fresh candidate."
      _change: modify
    - name: translation
      type: String
      description: "Spanish translation of the new exercise (F-LAPS-R009). Copied\
        \ verbatim into elementAfter by the deriver (F-LAPS-R012). May differ from\
        \ elementBefore.translation when the candidate changed the sentence meaning\
        \ (F-LAPS-R013). The DSL of FEAT-QSENT does not cover translations, so this\
        \ is a sibling field, not an additional entry inside quizSentence."
      _change: modify
    _change: add
  - name: RevisionOutcomeKind
    type: record
    fields:
    - name: NO_ACTIVE_STRATEGY
      description: "A LEMMA_ABSENCE task reached the dispatcher but no LemmaAbsenceProposalStrategy\
        \ was active. No artifact, no course write, task unchanged (F-LAPS-R006, F-LAPS-J004)."
      _change: add
    - name: STRATEGY_FAILED
      description: "The active strategy could not produce a candidate (empty output,\
        \ provider down, uninterpretable response) or its candidate could not be derived.\
        \ No artifact, no course write, task unchanged (F-LAPS-R015, F-LAPS-R016,\
        \ F-LAPS-J003)."
      _change: add
    _change: modify
  - name: RevisionProposal
    type: record
    fields:
    - name: strategyId
      type: StrategyId
      description: Identity of the strategy that produced this proposal (F-LAPS-R005);
        null when produced by the bypass reviser for non-LEMMA_ABSENCE diagnostics
        (FEAT-REVBYP).
      _change: add
    _change: modify
  - name: RevisionEngineConfig
    type: record
    fields:
    - name: lemmaAbsenceStrategyRegistry
      type: LemmaAbsenceProposalStrategyRegistry
      description: "Registry of registered LEMMA_ABSENCE strategies. Nullable -> the\
        \ factory wires an empty registry, in which case every LEMMA_ABSENCE task\
        \ resolves to NO_ACTIVE_STRATEGY (F-LAPS-R006)."
      _change: add
    - name: lemmaAbsenceProposalDeriver
      type: LemmaAbsenceProposalDeriver
      description: Deterministic deriver used when a LEMMA_ABSENCE candidate must
        be converted into a CourseElementSnapshot (F-LAPS-R012). Nullable -> the factory
        wires DefaultLemmaAbsenceProposalDeriver.
      _change: add
    _change: modify
  - name: ProposalStrategyFailedException
    type: exception
    fields:
    - name: strategyName
      type: String
      description: Name of the strategy that failed (F-LAPS-R015).
    - name: taskId
      type: String
      description: Id of the task the strategy was attempting.
    - name: reason
      type: String
      description: "Human-readable cause (empty generator response, provider down,\
        \ etc.)."
    message: "La estrategia de propuesta '%s' no pudo generar un candidato de quiz\
      \ para la tarea '%s': %s"
    _change: add
    extends: RuntimeException
  - name: ProposalDerivationException
    type: exception
    fields:
    - name: strategyName
      type: String
      description: Name of the strategy whose candidate was rejected by the deriver.
    - name: taskId
      type: String
      description: Id of the task.
    - name: reason
      type: String
      description: "Human-readable cause (invalid quizSentence grammar, empty translation,\
        \ etc.)."
    message: "No se pudo derivar elementAfter desde el candidato de la estrategia\
      \ '%s' en la tarea '%s': %s"
    _change: add
    extends: RuntimeException
  interfaces:
  - name: LemmaAbsenceProposalStrategy
    stereotype: port
    sealed: false
    exposes:
    - signature: "id(): StrategyId"
    - signature: "handles(DiagnosisKind kind): boolean"
    - signature: "propose(RefinementTask task, LemmaAbsenceCorrectionContext context):\
        \ LemmaAbsenceQuizCandidate"
    _change: add
  - name: LemmaAbsenceProposalStrategyRegistry
    stereotype: service
    sealed: true
    exposes:
    - signature: "active(): Optional<LemmaAbsenceProposalStrategy>"
    - signature: "byName(String name): Optional<LemmaAbsenceProposalStrategy>"
    - signature: "listAll(): List<StrategyId>"
    _change: add
  - name: LemmaAbsenceProposalDeriver
    stereotype: service
    sealed: true
    exposes:
    - signature: "derive(CourseElementSnapshot before, LemmaAbsenceQuizCandidate candidate):\
        \ CourseElementSnapshot"
    _change: add
  patterns:
  - type: Strategy
    implementations:
    - LemmaAbsenceMvpStrategy
    suppressed: false
    interface: LemmaAbsenceProposalStrategy
  packages:
  - name: strategy
    visibility: internal
    implementations:
    - name: LemmaAbsenceMvpStrategy
      handwrittenTests:
      - name: "Given a LemmaAbsenceCorrectionContext with all eight fields populated,\
          \ when propose is called, then the strategy passes that context to the candidate\
          \ generator without consulting the AuditReport or the diagnosis tree"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R007
      - name: "Given a successful generator response, when propose is called, then\
          \ it returns exactly one LemmaAbsenceQuizCandidate (single-candidate contract,\
          \ one pass)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R008
      - name: "Given a successful generator response, when propose is called, then\
          \ the returned candidate has a non-null quizSentence (FEAT-QSENT DSL) and\
          \ a non-null translation and nothing else (no plain sentence, no quizForm)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R009
      - name: "Given a successful generator response, when propose is called, then\
          \ the returned candidate carries the quizSentence verbatim in the DSL of\
          \ FEAT-QSENT, leaving parsing to the downstream deriver"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R011
      - name: "Given a generator that returns two different responses on two successive\
          \ invocations, when propose is called twice with the same context, then\
          \ both returned candidates reach the caller unchanged (the strategy does\
          \ not stabilize, memoize or reconcile the generator output)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R010
      - name: "Given a generator that throws ProposalStrategyFailedException, when\
          \ propose is called, then the exception propagates out of the strategy without\
          \ being caught or wrapped"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R015
      - name: "Given a generator response whose quizSentence would contain words above\
          \ the context's cefrLevel, when propose is called, then it still returns\
          \ the candidate (the MVP strategy does NOT run a CEFR post-check)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R017
      - name: "Given a generator response whose quizSentence is unusually short or\
          \ long, when propose is called, then it still returns the candidate (the\
          \ MVP strategy does NOT enforce a length budget)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R018
      - name: "Given a successful generator response, when propose is called, then\
          \ the returned object is exactly a LemmaAbsenceQuizCandidate with two fields\
          \ and the strategy does not also return plain sentence text, a quizForm\
          \ or a list of accepted variants"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R019
      _change: add
    _change: add
  - name: engine
    visibility: internal
    implementations:
    - name: DefaultLemmaAbsenceProposalStrategyRegistry
      handwrittenTests:
      - name: "Given a config whose activeName matches a registered strategy, when\
          \ active is called, then it returns that strategy wrapped in Optional"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      - name: "Given a config with activeName null, when active is called, then it\
          \ returns Optional.empty"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      - name: "Given a config with activeName pointing to a name that is not in the\
          \ registered list, when active is called, then it returns Optional.empty"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      - name: "Given multiple registered strategies, when byName is called with the\
          \ name of each registered strategy, then every lookup returns the corresponding\
          \ strategy and byName of an unknown name returns Optional.empty"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      - name: "Given multiple registered strategies, when listAll is called, then\
          \ it returns the StrategyId of every registered strategy without dropping\
          \ or deduplicating entries"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      _change: add
    - name: DefaultLemmaAbsenceProposalDeriver
      handwrittenTests:
      - name: "Given an elementBefore quiz and a candidate whose quizSentence differs\
          \ from the original, when derive is called, then the returned elementAfter\
          \ carries a new sentence plain text and a new quizForm parsed from the candidate's\
          \ quizSentence via QuizSentenceConverter"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R012
      - name: "Given an elementBefore and a candidate with a non-identity quizSentence,\
          \ when derive is called, then elementAfter is not structurally equal to\
          \ elementBefore (non-identity proposal)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R001
      - name: "Given an elementBefore and a candidate, when derive is called, then\
          \ elementAfter replaces the entire quiz form and translation in one step\
          \ rather than splicing word-by-word changes onto the original"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R003
      - name: "Given an elementBefore with a specific quizId, nodeIds, instructions\
          \ and order, and any candidate, when derive is called, then those fields\
          \ on elementAfter are bit-for-bit identical to elementBefore"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R014
      - name: "Given a candidate whose translation differs from elementBefore.translation,\
          \ when derive is called, then elementAfter.translation equals the candidate.translation\
          \ verbatim"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R013
      - name: "Given a candidate whose quizSentence changes the correct answer and\
          \ accepted variants of a CLOZE, when derive is called, then elementAfter.quizForm\
          \ reflects those new answers and variants parsed from the candidate's DSL"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R013
      - name: "Given the same elementBefore and the same candidate, when derive is\
          \ called twice, then both invocations return equal elementAfter snapshots\
          \ (determinism)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R012
      - name: "Given a candidate whose quizSentence is malformed according to the\
          \ FEAT-QSENT grammar, when derive is called, then it throws ProposalDerivationException\
          \ and does not return a partial elementAfter"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R012
      - name: "Given a candidate that carries only quizSentence and translation, when\
          \ derive is called, then the deriver never asks the candidate for plain\
          \ sentence text or quizForm fields (the strategy emits only those two pieces)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R019
      _change: add
    - name: DispatchingReviser
      handwrittenTests:
      - name: "Given a task whose diagnosisKind is LEMMA_ABSENCE and a registry with\
          \ an active strategy, when propose is called, then the DispatchingReviser\
          \ routes to the strategy+deriver pipeline and NOT to the IdentityReviser\
          \ fallback"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R002
      - name: "Given a task whose diagnosisKind is LEMMA_ABSENCE and a registry with\
          \ no active strategy, when propose is called, then it returns an outcome\
          \ with kind NO_ACTIVE_STRATEGY (no fallback to bypass)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R006
      - name: "Given a LEMMA_ABSENCE task and an active strategy that throws ProposalStrategyFailedException,\
          \ when propose is called, then it returns an outcome with kind STRATEGY_FAILED\
          \ and no RevisionProposal is built"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R015
      - name: "Given a LEMMA_ABSENCE task and an active strategy whose candidate fails\
          \ derivation with ProposalDerivationException, when propose is called, then\
          \ it returns an outcome with kind STRATEGY_FAILED and no RevisionProposal\
          \ is built"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R015
      - name: "Given a STRATEGY_FAILED outcome, when its RevisionArtifact is inspected,\
          \ then there is no artifact at all (the outcome carries no REJECTED verdict,\
          \ no PENDING_APPROVAL verdict, no RevisionVerdict enum value)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R016
      - name: "Given a NO_ACTIVE_STRATEGY outcome, when its RevisionArtifact is inspected,\
          \ then there is no artifact at all (the outcome carries no REJECTED verdict,\
          \ no PENDING_APPROVAL verdict, no RevisionVerdict enum value)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R016
      - name: "Given a LEMMA_ABSENCE task and a strategy with id (name, version, providerId),\
          \ when the pipeline produces a RevisionProposal, then the proposal's strategyId\
          \ equals the strategy's id() verbatim (name + version + providerId)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R005
      - name: "Given a LEMMA_ABSENCE task routed to the strategy pipeline, when the\
          \ resulting RevisionProposal is inspected, then its reviserKind reflects\
          \ the strategy name (not the literal 'bypass')"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R005
      _change: modify
    _change: modify
  _change: modify
- name: audit-cli
  dependsOn:
  - audit-application
  - audit-domain
  - course-domain
  - course-infrastructure
  - nlp-infrastructure
  - vocabulary-infrastructure
  - audit-infrastructure
  - refiner-domain
  - revision-domain
  packages:
  - name: bootstrap
    visibility: internal
    implementations:
    - name: DefaultProposalStrategySelector
      handwrittenTests:
      - name: "Given CONTENT_AUDIT_LAPS_STRATEGY unset (null or blank), when select\
          \ is called with any registry, then it returns the default strategy name\
          \ 'lemma-absence-mvp'"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      - name: "Given CONTENT_AUDIT_LAPS_STRATEGY set to the name of a registered strategy,\
          \ when select is called, then it returns that exact name (picking one among\
          \ several registered)"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      - name: "Given CONTENT_AUDIT_LAPS_STRATEGY set to a name that no registered\
          \ strategy reports via listAll, when select is called, then it throws InvalidProposalStrategyException\
          \ whose message lists the registered strategy names"
        traceability:
          feature: FEAT-LAPS
          rule: F-LAPS-R004
      _change: add
    _change: modify
  _change: modify
features:
- id: FEAT-LAPS
  journeys:
  - id: F-LAPS-J001
    validation: AUTO_VALIDATED
    testModule: audit-cli
    testPackage: com.learney.contentaudit.journeys
  - id: F-LAPS-J002
    validation: AUTO_VALIDATED
    testModule: audit-cli
    testPackage: com.learney.contentaudit.journeys
  - id: F-LAPS-J003
    validation: AUTO_VALIDATED
    testModule: audit-cli
    testPackage: com.learney.contentaudit.journeys
  - id: F-LAPS-J004
    validation: AUTO_VALIDATED
    testModule: audit-cli
    testPackage: com.learney.contentaudit.journeys
  - id: F-LAPS-J005
    validation: AUTO_VALIDATED
    testModule: audit-cli
    testPackage: com.learney.contentaudit.journeys
