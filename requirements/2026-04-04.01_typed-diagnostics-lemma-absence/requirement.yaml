  doubts:
  - id: "DOUBT-COEXISTENCE"
    question: "Coexistencia del mapa generico y el mapa de diagnosticos"
    options:
    - label: "Opcion A: Coexistencia temporal — ambos mapas existen en paralelo. Los\
        \ analizadores migrados escriben en el mapa tipado; los no migrados siguen\
        \ escribiendo en el generico. El mapa generico se elimina cuando todos los\
        \ analizadores esten migrados."
      description: null
    - label: "Opcion B: Reemplazo inmediato — el mapa generico se elimina desde el\
        \ inicio. Los analizadores no migrados deben emitir un diagnostico generico\
        \ (por ejemplo, `RawDiagnosis` que envuelve un mapa sin tipo) para cumplir\
        \ con la interfaz. Esto fuerza la migracion de todos los analizadores a corto\
        \ plazo."
      description: null
    - label: "Opcion C: Reemplazo gradual con wrapper — el mapa generico se envuelve\
        \ automaticamente en un `RawDiagnosis` por defecto, y los analizadores migrados\
        \ emiten sus diagnosticos tipados. Funcionalmente equivalente a Opcion B pero\
        \ sin exigir cambios inmediatos en los analizadores no migrados."
      description: null
    answer: null
  - id: "DOUBT-DIAGNOSIS-KEY"
    question: "Clave del mapa de diagnosticos"
    options:
    - label: "Opcion A: Usar el nombre del analizador como clave (alineado con R031\
        \ de FEAT-LABS). Simple, descriptivo, unico por definicion."
      description: null
    - label: "Opcion B: Usar un identificador mas formal (por ejemplo, un enum o constante).\
        \ Mas robusto ante errores tipograficos, pero menos flexible."
      description: null
    answer: null
  - id: "DOUBT-LEVEL-DIAGNOSIS-TYPE"
    question: "Tipo de diagnostico para topic vs knowledge vs quiz"
