code: FEAT-PLANEF
description: "F-PLANEF: modo efimero del comando plan. Agrega un modo de storage explicito\
  \ al verbo plan (DISK por default, EPHEMERAL para el path nuevo). En modo EPHEMERAL:\
  \ PlanCmd no invoca RefinementPlanStore.save (R001 invariante 1), serializa el plan\
  \ completo a stdout en JSON via EphemeralPlanRenderer (R001 invariante 2), y todo\
  \ mensaje informativo del CLI va a stderr para no contaminar el JSON. Ortogonal\
  \ al flag --audit existente (R001 invariante 3). Cambios contenidos en audit-cli;\
  \ sin nuevos modulos, dependencias o boundaries."
modules:
- name: audit-cli
  description: CLI entry point for running content audits from the command line
  models:
  - name: PlanStorageMode
    type: enum
    fields:
    - name: DISK
      description: "Persistent path: el plan se guarda via RefinementPlanStore en\
        \ .content-audit/refinement-plans/. Comportamiento previo a F-PLANEF, sigue\
        \ siendo el default cuando el operador no pasa --storage."
    - name: EPHEMERAL
      description: "Modo efimero (F-PLANEF-R001). El comando plan calcula el plan,\
        \ NO lo persiste, y emite la representacion JSON completa por stdout. Mensajes\
        \ informativos van a stderr."
    visibility: public
    _change: add
  interfaces:
  - name: PlanCommand
    sealed: true
    exposes:
    - signature: "plan(String auditId): Integer"
      _change: delete
    - signature: "plan(String auditId, PlanStorageMode storageMode): Integer"
      _change: add
    _change: modify
  packages:
  - name: commands
    visibility: internal
    interfaces:
    - name: EphemeralPlanRenderer
      stereotype: port
      sealed: false
      exposes:
      - signature: "render(RefinementPlan plan): Integer"
      visibility: internal
      _change: add
    implementations:
    - name: DefaultEphemeralPlanRenderer
      visibility: internal
      handwrittenTests:
      - name: "Dado un RefinementPlan con tasks no vacias, cuando render se invoca,\
          \ entonces el JSON emitido tiene las mismas claves top-level (id, sourceAuditId,\
          \ createdAt, tasks) y dentro de cada task las mismas claves (id, nodeTarget,\
          \ nodeId, nodeLabel, diagnosisKind, priority, status) que el JSON producido\
          \ por FileSystemRefinementPlanStore.save sobre el mismo plan — R001 invariante\
          \ 2: schema-equivalencia con el plan persistido"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado un RefinementPlan, cuando render escribe a stdout y el JSON emitido\
          \ se vuelve a deserializar con el ObjectMapper estandar (JavaTimeModule),\
          \ entonces el RefinementPlan deserializado es igual al original (mismo id,\
          \ sourceAuditId, createdAt y tasks) — R001 invariante 2: round-trip JSON,\
          \ un cliente que parsea planes persistidos parsea planes efimeros sin cambios"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado un RefinementPlan, cuando render se invoca, entonces el JSON se\
          \ emite por la salida estandar (stdout) y stderr permanece vacio — R001\
          \ invariante 2: el canal del plan es stdout, no stderr"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      implements:
      - EphemeralPlanRenderer
      _change: add
    - name: PlanCmd
      requiresInject:
      - name: auditReportStore
        type: AuditReportStore
      - name: refinerEngine
        type: RefinerEngine
      - name: refinementPlanStore
        type: RefinementPlanStore
      - name: ephemeralPlanRenderer
        type: EphemeralPlanRenderer
        description: Renderer que serializa el RefinementPlan a stdout en JSON cuando
          storageMode = EPHEMERAL. Solo se invoca en el path efimero; en el path persistente
          se ignora.
      types:
      - Component
      handwrittenTests:
      - name: "Dado un auditId valido y storageMode EPHEMERAL, cuando plan se invoca,\
          \ entonces RefinementPlanStore.save no se invoca — R001 invariante 1: no\
          \ escribe en disco"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado un auditId valido y storageMode DISK, cuando plan se invoca, entonces\
          \ RefinementPlanStore.save se invoca con el plan derivado por RefinerEngine\
          \ — R001 invariante 1: control negativo, el path persistente sigue persistiendo"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado un auditId valido y storageMode EPHEMERAL, cuando plan se invoca,\
          \ entonces EphemeralPlanRenderer.render se invoca con el plan derivado por\
          \ RefinerEngine — R001 invariante 2: el plan efimero se entrega via el renderer"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado un auditId valido y storageMode DISK, cuando plan se invoca, entonces\
          \ EphemeralPlanRenderer.render no se invoca — R001 invariante 2: control\
          \ negativo, el path persistente no consume el renderer"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado el mismo auditId resuelto al mismo AuditReport, cuando plan se\
          \ invoca primero con storageMode DISK y luego con EPHEMERAL, entonces RefinerEngine.plan\
          \ se invoca en ambos casos con los mismos argumentos (mismo AuditReport\
          \ y mismo auditId) — R001 invariante 3: la opcion es ortogonal al input,\
          \ el plan calculado es el mismo modulo dispatch del resultado"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      - name: "Dado un auditId valido y storageMode EPHEMERAL, cuando plan se invoca,\
          \ entonces stdout contiene unicamente el JSON parseable como RefinementPlan\
          \ (sin lineas adicionales mezcladas que rompan el parseo, los mensajes auxiliares\
          \ van por stderr) — R001 invariante 2: stdout reservado al JSON"
        traceability:
          feature: FEAT-PLANEF
          rule: F-PLANEF-R001
      externalImplements:
      - java.util.concurrent.Callable<Integer>
      implements:
      - PlanCommand
      _change: modify
    _change: modify
  _change: modify
features:
- id: FEAT-PLANEF
  journeys:
  - id: F-PLANEF-J001
    validation: AUTO_VALIDATED
    testModule: audit-cli
    testPackage: com.learney.contentaudit.auditcli.commands
