code: __proposal__
description: "Tests for CocaBucketsAnalyzer - COCA vocabulary distribution analyzer\
  \ (3 tests, getName/getTarget removed as speculative)"
modules:
- name: audit-domain
  packages:
  - name: coca
    visibility: internal
    implementations:
    - name: CocaBucketsAnalyzer
      tests:
      - name: "Given no quizzes processed, when getResults is called, then returns\
          \ empty list"
        target: CocaBucketsAnalyzer
        invoke:
          method: getResults
        type: unit
        traceability:
          feature: F-COCA
          rule: F-COCA-R005
        assert:
          returns: "[]"
      - name: "Given a quiz with classifiable tokens, when onQuiz is called, then\
          \ tokenClassifier classify is invoked for each token"
        target: CocaBucketsAnalyzer
        fixtures:
        - id: band1
          type: FrequencyBand
          construct:
            name: top1k
            lowerBound: 1
            upperBound: 1000
        - id: bandConfig
          type: BandConfiguration
          construct:
            bands: "[ref:band1]"
            openEnded: false
        - id: token1
          type: NlpToken
          construct:
            text: hello
            lemma: hello
            posTag: NOUN
            frequencyRank: 500
            isStop: false
            isPunct: false
        - id: token2
          type: NlpToken
          construct:
            text: world
            lemma: world
            posTag: NOUN
            frequencyRank: 800
            isStop: false
            isPunct: false
        - id: milestone
          type: AuditableMilestone
          construct:
            topics: "[]"
        - id: ctxMilestone
          type: AuditContext
          construct:
            milestoneId: "1"
            topicId: t1
            knowledgeId: k1
            quizId: q1
        - id: knowledge
          type: AuditableKnowledge
          construct:
            title: Greetings
            instructions: Complete
            isSentence: true
            quizzes: "[]"
        - id: ctxKnowledge
          type: AuditContext
          construct:
            milestoneId: "1"
            topicId: t1
            knowledgeId: k1
            quizId: q1
        - id: quiz
          type: AuditableQuiz
          construct:
            sentence: hello world
            tokens: "[ref:token1, ref:token2]"
        - id: ctxQuiz
          type: AuditContext
          construct:
            milestoneId: "1"
            topicId: t1
            knowledgeId: k1
            quizId: q1
        type: integration
        steps:
        - invoke:
            method: onMilestone
            args:
            - ref:milestone
            - ref:ctxMilestone
          mocks:
          - dependency: cocaBucketsConfig
            method: getBandConfiguration
            thenReturn: ref:bandConfig
          - dependency: cocaBucketsConfig
            method: getAnalysisStrategy
            thenReturn: LEVELS
          assert:
            doesNotThrow: true
        - invoke:
            method: onKnowledge
            args:
            - ref:knowledge
            - ref:ctxKnowledge
          assert:
            doesNotThrow: true
        - invoke:
            method: onQuiz
            args:
            - ref:quiz
            - ref:ctxQuiz
          mocks:
          - dependency: tokenClassifier
            method: classify
            thenReturn: ref:band1
            args:
            - match: eq
              value: 500
            - match: any
          - dependency: tokenClassifier
            method: classify
            thenReturn: ref:band1
            args:
            - match: eq
              value: 800
            - match: any
          assert:
            verifyCall:
              dependency: tokenClassifier
              method: classify
              times: 2
        traceability:
          feature: F-COCA
          rule: F-COCA-R001
      - name: "Given a quiz with null frequency rank tokens, when onQuiz is called,\
          \ then only tokens with valid rank are classified"
        target: CocaBucketsAnalyzer
        fixtures:
        - id: band1
          type: FrequencyBand
          construct:
            name: top1k
            lowerBound: 1
            upperBound: 1000
        - id: bandConfig
          type: BandConfiguration
          construct:
            bands: "[ref:band1]"
            openEnded: false
        - id: tokenWithRank
          type: NlpToken
          construct:
            text: hello
            lemma: hello
            posTag: NOUN
            frequencyRank: 500
            isStop: false
            isPunct: false
        - id: tokenNoRank
          type: NlpToken
          construct:
            text: John
            lemma: john
            posTag: PROPN
            isStop: false
            isPunct: false
        - id: milestone
          type: AuditableMilestone
          construct:
            topics: "[]"
        - id: ctxMilestone
          type: AuditContext
          construct:
            milestoneId: "1"
            topicId: t1
            knowledgeId: k1
            quizId: q1
        - id: knowledge
          type: AuditableKnowledge
          construct:
            title: Names
            instructions: Complete
            isSentence: true
            quizzes: "[]"
        - id: ctxKnowledge
          type: AuditContext
          construct:
            milestoneId: "1"
            topicId: t1
            knowledgeId: k1
            quizId: q1
        - id: quiz
          type: AuditableQuiz
          construct:
            sentence: hello John
            tokens: "[ref:tokenWithRank, ref:tokenNoRank]"
        - id: ctxQuiz
          type: AuditContext
          construct:
            milestoneId: "1"
            topicId: t1
            knowledgeId: k1
            quizId: q1
        type: integration
        steps:
        - invoke:
            method: onMilestone
            args:
            - ref:milestone
            - ref:ctxMilestone
          mocks:
          - dependency: cocaBucketsConfig
            method: getBandConfiguration
            thenReturn: ref:bandConfig
          - dependency: cocaBucketsConfig
            method: getAnalysisStrategy
            thenReturn: LEVELS
          assert:
            doesNotThrow: true
        - invoke:
            method: onKnowledge
            args:
            - ref:knowledge
            - ref:ctxKnowledge
          assert:
            doesNotThrow: true
        - invoke:
            method: onQuiz
            args:
            - ref:quiz
            - ref:ctxQuiz
          mocks:
          - dependency: tokenClassifier
            method: classify
            thenReturn: ref:band1
            args:
            - match: eq
              value: 500
            - match: any
          assert:
            verifyCall:
              dependency: tokenClassifier
              method: classify
              times: 1
              message: Only the token with a valid frequencyRank should be classified
        traceability:
          feature: F-COCA
          rule: F-COCA-R004
