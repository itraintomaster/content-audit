code: __proposal__
description: Tests for DefaultTokenClassifier - classifies tokens into COCA frequency
  bands
modules:
- name: audit-domain
  packages:
  - name: coca
    visibility: public
    implementations:
    - name: DefaultTokenClassifier
      tests:
    - name: "Given a token with rank 500, when classify is called, then returns top1k\
        \ band"
      target: DefaultTokenClassifier
      invoke:
        method: classify
        args:
        - 500
        - ref:config
      fixtures:
      - id: band1
        type: FrequencyBand
        construct:
          name: top1k
          lowerBound: 1
          upperBound: 1000
      - id: band2
        type: FrequencyBand
        construct:
          name: top2k
          lowerBound: 1001
          upperBound: 2000
      - id: band3
        type: FrequencyBand
        construct:
          name: top3k
          lowerBound: 2001
          upperBound: 3000
      - id: band4
        type: FrequencyBand
        construct:
          name: top4k
          lowerBound: 3001
          upperBound: 2147483647
      - id: config
        type: BandConfiguration
        construct:
          bands: "[ref:band1, ref:band2, ref:band3, ref:band4]"
          openEnded: true
      type: unit
      traceability:
        feature: F-COCA
        rule: F-COCA-R001
      assert:
        returns: ref:band1
    - name: "Given a token at top1k upper boundary 1000, when classify is called,\
        \ then returns top1k band"
