code: __proposal__
description: Tests for CachedNlpTokenizer - cache decorator for NlpTokenizer
modules:
- name: nlp-infrastructure
  packages:
  - name: spacy
    visibility: internal
    implementations:
    - name: CachedNlpTokenizer
      tests:
      - name: "Given a cache miss, when tokenize is called, then delegates to underlying\
          \ tokenizer and returns result"
        target: CachedNlpTokenizer
        mocks:
        - dependency: delegate
          method: tokenize
          thenReturn: ref:tokenList
          args:
          - match: eq
            value: She likes cats.
        invoke:
          method: tokenize
          args:
          - She likes cats.
        fixtures:
        - id: tokenList
          type: List<String>
          construct:
            values:
            - She
            - likes
            - cats
        type: unit
        traceability:
          feature: F-NLP
          rule: F-NLP-R026
        assert:
          returns: ref:tokenList
      - name: "Given a previous tokenize call, when tokenize is called with same text,\
          \ then returns cached result without re-delegating"
        target: CachedNlpTokenizer
        fixtures:
        - id: tokenList
          type: List<String>
          construct:
            values:
            - She
            - likes
            - cats
        type: integration
        steps:
        - invoke:
            method: tokenize
            args:
            - She likes cats.
          mocks:
          - dependency: delegate
            method: tokenize
            thenReturn: ref:tokenList
            args:
            - match: eq
              value: She likes cats.
          assert:
            returns: ref:tokenList
        - invoke:
            method: tokenize
            args:
            - She likes cats.
          assert:
            returns: ref:tokenList
        traceability:
          feature: F-NLP
          rule: F-NLP-R024
      - name: "Given two different texts, when tokenize is called for each, then delegate\
          \ is called twice"
        target: CachedNlpTokenizer
        fixtures:
        - id: tokenList1
          type: List<String>
          construct:
            values:
            - She
            - likes
            - cats
        - id: tokenList2
          type: List<String>
          construct:
            values:
            - He
            - runs
            - fast
        type: integration
        steps:
        - invoke:
            method: tokenize
            args:
            - She likes cats.
          mocks:
          - dependency: delegate
            method: tokenize
            thenReturn: ref:tokenList1
            args:
            - match: eq
              value: She likes cats.
          assert:
            returns: ref:tokenList1
        - invoke:
            method: tokenize
            args:
            - He runs fast.
          mocks:
          - dependency: delegate
            method: tokenize
            thenReturn: ref:tokenList2
            args:
            - match: eq
              value: He runs fast.
          assert:
            returns: ref:tokenList2
        traceability:
          feature: F-NLP
          rule: F-NLP-R024
      - name: "Given a cache miss, when countTokens is called, then delegates to underlying\
          \ tokenizer and returns count"
        target: CachedNlpTokenizer
        mocks:
        - dependency: delegate
          method: countTokens
          thenReturn: 3
          args:
          - match: eq
            value: She likes cats.
        invoke:
          method: countTokens
          args:
          - She likes cats.
        type: unit
        traceability:
          feature: F-NLP
          rule: F-NLP-R026
        assert:
          returns: 3
      - name: "Given a previous countTokens call, when countTokens is called with\
          \ same text, then returns cached result without re-delegating"
        target: CachedNlpTokenizer
        type: integration
        steps:
        - invoke:
            method: countTokens
            args:
            - She likes cats.
          mocks:
          - dependency: delegate
            method: countTokens
            thenReturn: 3
            args:
            - match: eq
              value: She likes cats.
          assert:
            returns: 3
        - invoke:
            method: countTokens
            args:
            - She likes cats.
          assert:
            returns: 3
        traceability:
          feature: F-NLP
          rule: F-NLP-R024
      - name: "Given a cache miss, when analyzeTokens is called, then delegates to\
          \ underlying tokenizer and returns enriched tokens"
        target: CachedNlpTokenizer
        mocks:
        - dependency: delegate
          method: analyzeTokens
          thenReturn: "[ref:token1, ref:token2]"
          args:
          - match: eq
            value: She likes
        invoke:
          method: analyzeTokens
          args:
          - She likes
        fixtures:
        - id: token1
          type: NlpToken
          construct:
            text: She
            lemma: she
            posTag: PRON
            frequencyRank: 50
            isStop: true
            isPunct: false
        - id: token2
          type: NlpToken
          construct:
            text: likes
            lemma: like
            posTag: VERB
            frequencyRank: 245
            isStop: false
            isPunct: false
        type: unit
        traceability:
          feature: F-NLP
          rule: F-NLP-R023
        assert:
          returns: "[ref:token1, ref:token2]"
      - name: "Given a previous analyzeTokens call, when analyzeTokens is called with\
          \ same text, then returns cached enriched tokens without re-delegating"
        target: CachedNlpTokenizer
        fixtures:
        - id: token1
          type: NlpToken
          construct:
            text: She
            lemma: she
            posTag: PRON
            frequencyRank: 50
            isStop: true
            isPunct: false
        - id: token2
          type: NlpToken
          construct:
            text: likes
            lemma: like
            posTag: VERB
            frequencyRank: 245
            isStop: false
            isPunct: false
        type: integration
        steps:
        - invoke:
            method: analyzeTokens
            args:
            - She likes
          mocks:
          - dependency: delegate
            method: analyzeTokens
            thenReturn: "[ref:token1, ref:token2]"
            args:
            - match: eq
              value: She likes
          assert:
            returns: "[ref:token1, ref:token2]"
        - invoke:
            method: analyzeTokens
            args:
            - She likes
          assert:
            returns: "[ref:token1, ref:token2]"
        traceability:
          feature: F-NLP
          rule: F-NLP-R023
      - name: "Given a cache miss, when analyzeTokensBatch is called, then delegates\
          \ to underlying tokenizer and returns batch result"
        target: CachedNlpTokenizer
        mocks:
        - dependency: delegate
          method: analyzeTokensBatch
          thenReturn: ref:batchResult
          args:
          - match: any
        invoke:
          method: analyzeTokensBatch
          args:
          - ref:batchInput
        fixtures:
        - id: batchInput
          type: List<String>
          construct:
            values:
            - She likes
            - He runs
        - id: batchResult
          type: "Map<String,List<NlpToken>>"
        type: unit
        traceability:
          feature: F-NLP
          rule: F-NLP-R023
        assert:
          returns: ref:batchResult
      - name: "Given tokenize was called for a text, when countTokens is called for\
          \ same text, then delegate countTokens is still called independently"
        target: CachedNlpTokenizer
        fixtures:
        - id: tokenList
          type: List<String>
          construct:
            values:
            - She
            - likes
            - cats
        type: integration
        steps:
        - invoke:
            method: tokenize
            args:
            - She likes cats.
          mocks:
          - dependency: delegate
            method: tokenize
            thenReturn: ref:tokenList
            args:
            - match: eq
              value: She likes cats.
          assert:
            returns: ref:tokenList
        - invoke:
            method: countTokens
            args:
            - She likes cats.
          mocks:
          - dependency: delegate
            method: countTokens
            thenReturn: 3
            args:
            - match: eq
              value: She likes cats.
          assert:
            returns: 3
        traceability:
          feature: F-NLP
          rule: F-NLP-R007
      - name: "Given an empty string, when tokenize is called, then delegates and\
          \ returns result"
        target: CachedNlpTokenizer
        mocks:
        - dependency: delegate
          method: tokenize
          thenReturn: ref:emptyTokenList
          args:
          - match: eq
            value: ""
        invoke:
          method: tokenize
          args:
          - ""
        fixtures:
        - id: emptyTokenList
          type: List<String>
        type: unit
        traceability:
          feature: F-NLP
          rule: F-NLP-R026
        assert:
          returns: ref:emptyTokenList
      - name: "Given delegate throws exception on analyzeTokens, when analyzeTokens\
          \ is called, then exception propagates"
        target: CachedNlpTokenizer
        mocks:
        - dependency: delegate
          method: analyzeTokens
          args:
          - match: eq
            value: bad input
          thenThrow:
            type: RuntimeException
            message: NLP processing failed
        invoke:
          method: analyzeTokens
          args:
          - bad input
        type: unit
        traceability:
          feature: F-NLP
          rule: F-NLP-R023
        assert:
          assertThrows: RuntimeException
      - name: "Given delegate throws exception on countTokens, when countTokens is\
          \ called, then exception propagates"
        target: CachedNlpTokenizer
        mocks:
        - dependency: delegate
          method: countTokens
          args:
          - match: eq
            value: bad input
          thenThrow:
            type: RuntimeException
            message: NLP processing failed
        invoke:
          method: countTokens
          args:
          - bad input
        type: unit
        traceability:
          feature: F-NLP
          rule: F-NLP-R007
        assert:
          assertThrows: RuntimeException
