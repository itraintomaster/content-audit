code: __proposal__
description: Tests for SentenceLengthAnalyzer
modules:
  - name: audit-domain
    implementations:
      - name: SentenceLengthAnalyzer
        tests:
          - name: Given a null milestoneId, when onQuiz is called, then quiz is excluded and getResults is empty
            target: SentenceLengthAnalyzer
            type: integration
            traceability:
              feature: F-SLEN
              rule: F-SLEN-R001
            fixtures:
              - id: milestone
                type: com.learney.contentaudit.audit-domain.AuditableMilestone
                construct:
                  topics: '[]'
              - id: ctxMilestoneNull
                type: com.learney.contentaudit.audit-domain.AuditContext
                construct:
                  topicId: t1
                  knowledgeId: k1
                  quizId: q1
              - id: knowledge
                type: com.learney.contentaudit.audit-domain.AuditableKnowledge
                construct:
                  title: Greetings
                  instructions: Complete
                  isSentence: true
                  quizzes: '[]'
              - id: ctxKnowledge
                type: com.learney.contentaudit.audit-domain.AuditContext
                construct:
                  topicId: t1
                  knowledgeId: k1
                  quizId: q1
              - id: quiz
                type: com.learney.contentaudit.audit-domain.AuditableQuiz
                construct:
                  sentence: Hello world test
                  tokenCount: 3
              - id: ctxQuiz
                type: com.learney.contentaudit.audit-domain.AuditContext
                construct:
                  topicId: t1
                  knowledgeId: k1
                  quizId: q1
            steps:
              - invoke:
                  method: onMilestone
                  args:
                    - ref:milestone
                    - ref:ctxMilestoneNull
                assert:
                  doesNotThrow: true
              - invoke:
                  method: onKnowledge
                  args:
                    - ref:knowledge
                    - ref:ctxKnowledge
                assert:
                  doesNotThrow: true
              - invoke:
                  method: onQuiz
                  args:
                    - ref:quiz
                    - ref:ctxQuiz
                assert:
                  doesNotThrow: true
              - invoke:
                  method: getResults
                  args: []
                assert:
                  returns: '[]'
