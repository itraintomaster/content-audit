                  knowledgeId: k1
                  quizId: q1
              - id: quiz
                type: com.learney.contentaudit.audit-domain.AuditableQuiz
                construct:
                  sentence: The cat sat on the mat
                  tokenCount: 6
              - id: ctxQuiz
                type: com.learney.contentaudit.audit-domain.AuditContext
                construct:
                  milestoneId: "0"
                  topicId: t1
                  knowledgeId: k1
                  quizId: q1
              - id: rangeA1
                type: com.learney.contentaudit.audit-domain.TargetRange
                construct:
                  level: A1
                  minTokens: 5
                  maxTokens: 8
            steps:
              - invoke:
                  method: onMilestone
                  args:
                    - ref:milestone
                    - ref:ctxMilestone
                assert:
                  doesNotThrow: true
              - invoke:
                  method: onKnowledge
                  args:
                    - ref:knowledge
                    - ref:ctxKnowledge
                assert:
                  doesNotThrow: true
              - mocks:
                  - dependency: config
                    method: getTargetRange
                    args:
                      - match: any
                    thenReturn: Optional.of(ref:rangeA1)
                  - dependency: config
                    method: getToleranceMargin
                    thenReturn: 4
                  - dependency: nlpTokenizer
                    method: countTokens
                    args:
                      - match: eq
                        value: The cat sat on the mat
                    thenReturn: 6
                invoke:
                  method: onQuiz
                  args:
                    - ref:quiz
                    - ref:ctxQuiz
                assert:
                  verifyCall:
                    dependency: nlpTokenizer
                    method: countTokens
                    times: 1
