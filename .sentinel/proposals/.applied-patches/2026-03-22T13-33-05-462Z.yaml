          - name: Given a valid sentence quiz, when onQuiz is called, then nlpTokenizer countTokens is called with quiz sentence
            target: SentenceLengthAnalyzer
            type: integration
            traceability:
              feature: F-SLEN
              rule: F-SLEN-R013
            fixtures:
              - id: milestone
                type: com.learney.contentaudit.audit-domain.AuditableMilestone
