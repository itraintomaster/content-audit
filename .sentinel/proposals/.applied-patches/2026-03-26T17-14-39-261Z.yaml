code: __proposal__
description: "Remove nlpTokenizer from SentenceLengthAnalyzer requiresInject, replace\
  \ tokenCount with tokens in all AuditableQuiz test fixtures, remove nlpTokenizer\
  \ mocks, and delete the verifyCall test"
modules:
- name: audit-domain
  implementations:
  - name: SentenceLengthAnalyzer
    requiresInject:
    - name: config
      type: SentenceLengthConfig
    tests:
    - name: "Given a null milestoneId, when onQuiz is called, then quiz is excluded\
        \ and getResults is empty"
      target: SentenceLengthAnalyzer
      fixtures:
      - id: milestone
        type: com.learney.contentaudit.audit-domain.AuditableMilestone
        construct:
          topics: "[]"
      - id: ctxMilestoneNull
        type: com.learney.contentaudit.audit-domain.AuditContext
        construct:
          topicId: t1
          knowledgeId: k1
          quizId: q1
      - id: knowledge
        type: com.learney.contentaudit.audit-domain.AuditableKnowledge
        construct:
          title: Greetings
          instructions: Complete
          isSentence: true
          quizzes: "[]"
      - id: ctxKnowledge
        type: com.learney.contentaudit.audit-domain.AuditContext
        construct:
          topicId: t1
          knowledgeId: k1
          quizId: q1
      - id: dummyToken
        type: com.learney.contentaudit.audit-domain.NlpToken
        construct:
          text: w
          lemma: w
          posTag: NOUN
          frequencyRank: 1
          isStop: false
          isPunct: false
      - id: quiz
        type: com.learney.contentaudit.audit-domain.AuditableQuiz
        construct:
          sentence: Hello world test
          tokens: "[ref:dummyToken, ref:dummyToken, ref:dummyToken]"
      - id: ctxQuiz
        type: com.learney.contentaudit.audit-domain.AuditContext
        construct:
          topicId: t1
          knowledgeId: k1
          quizId: q1
      type: integration
      steps:
      - invoke:
          method: onMilestone
          args:
          - ref:milestone
          - ref:ctxMilestoneNull
        assert:
          doesNotThrow: true
      - invoke:
          method: onKnowledge
          args:
          - ref:knowledge
          - ref:ctxKnowledge
        assert:
          doesNotThrow: true
      - invoke:
          method: onQuiz
          args:
          - ref:quiz
          - ref:ctxQuiz
        assert:
          doesNotThrow: true
      - invoke:
          method: getResults
        assert:
          returns: "[]"
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R001
      _change: modify
