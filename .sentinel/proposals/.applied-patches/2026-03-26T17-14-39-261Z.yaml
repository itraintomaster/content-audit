          instructions: Complete
          isSentence: true
          quizzes: "[]"
      - id: ctxSentKnowledge
        type: com.learney.contentaudit.audit-domain.AuditContext
        construct:
          milestoneId: "0"
          topicId: t1
          knowledgeId: k2
          quizId: q2
      - id: sentQuiz
        type: com.learney.contentaudit.audit-domain.AuditableQuiz
        construct:
          sentence: She likes red apples very much
          tokens: "[ref:dummyToken, ref:dummyToken, ref:dummyToken, ref:dummyToken,\
            \ ref:dummyToken, ref:dummyToken]"
      - id: ctxSentQuiz
