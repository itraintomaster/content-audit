          analyzerName: sentence-length
          target: QUIZ
          score: 1
          milestoneId: "0"
          topicId: t1
          knowledgeId: k2
          quizId: q2
      type: integration
      steps:
      - invoke:
          method: onMilestone
          args:
          - ref:milestone
          - ref:ctxMilestone
        assert:
          doesNotThrow: true
      - invoke:
          method: onKnowledge
          args:
          - ref:nonSentenceKnowledge
          - ref:ctxNonSentKnowledge
        assert:
          doesNotThrow: true
      - invoke:
          method: onQuiz
          args:
          - ref:nonSentQuiz
          - ref:ctxNonSentQuiz
        assert:
          doesNotThrow: true
      - invoke:
          method: onKnowledge
          args:
          - ref:sentenceKnowledge
          - ref:ctxSentKnowledge
        assert:
          doesNotThrow: true
      - invoke:
          method: onQuiz
          args:
          - ref:sentQuiz
          - ref:ctxSentQuiz
        mocks:
        - dependency: config
          method: getTargetRange
          thenReturn: Optional.of(ref:rangeA1)
          args:
          - match: any
        - dependency: config
          method: getToleranceMargin
          thenReturn: 4
        assert:
          doesNotThrow: true
      - invoke:
          method: getResults
        assert:
          returns: "[ref:expectedScore]"
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R001
      _change: modify
