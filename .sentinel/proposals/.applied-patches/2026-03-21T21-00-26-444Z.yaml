code: __proposal__
description: "Tests for SentenceLengthAnalyzer; Tests for SentenceLengthAnalyzer —\
  \ 16 tests covering getName, getTarget, scoring logic (R002/R009), exclusion (R001),\
  \ edge cases, config (R012), and tokenizer delegation (R013)"
modules:
- name: audit-domain
  implementations:
  - name: SentenceLengthAnalyzer
    tests:
    - name: "Given a SentenceLengthAnalyzer instance, when getName is called, then\
        \ returns sentence-length"
      target: SentenceLengthAnalyzer
      invoke:
        method: getName
      type: unit
      assert:
        returns: sentence-length
    - name: "Given a SentenceLengthAnalyzer instance, when getTarget is called, then\
        \ returns QUIZ"
      target: SentenceLengthAnalyzer
      invoke:
        method: getTarget
      type: unit
      assert:
        returns: QUIZ
    - name: "Given a quiz with token count within A1 range, when scored, then quiz\
        \ score is 1.0"
      target: SentenceLengthAnalyzer
      fixtures:
      - id: milestone
        type: AuditableMilestone
      - id: ctxMilestone
        type: AuditContext
        construct:
          milestoneId: "0"
          topicId: t1
          knowledgeId: k1
          quizId: q1
      - id: knowledge
        type: AuditableKnowledge
        construct:
          title: Basic greetings
          instructions: Complete
          isSentence: true
      - id: ctxKnowledge
        type: AuditContext
        construct:
          milestoneId: "0"
          topicId: t1
          knowledgeId: k1
          quizId: q1
      - id: quiz
        type: AuditableQuiz
        construct:
          sentence: She likes red apples very much
          tokenCount: 6
      - id: ctxQuiz
        type: AuditContext
        construct:
          milestoneId: "0"
          topicId: t1
          knowledgeId: k1
          quizId: q1
      - id: rangeA1
        type: TargetRange
        construct:
          level: A1
          minTokens: 5
          maxTokens: 8
      - id: expectedScore
        type: ScoredItem
        construct:
          analyzerName: sentence-length
          target: QUIZ
          score: 1.0
          milestoneId: "0"
          topicId: t1
          knowledgeId: k1
          quizId: q1
      type: unit
      steps:
      - invoke:
          method: onMilestone
          args:
          - ref:milestone
          - ref:ctxMilestone
        assert:
          doesNotThrow: true
      - invoke:
          method: onKnowledge
          args:
          - ref:knowledge
          - ref:ctxKnowledge
        assert:
          doesNotThrow: true
      - invoke:
          method: onQuiz
          args:
          - ref:quiz
          - ref:ctxQuiz
        mocks:
        - dependency: config
          method: getTargetRange
          thenReturn: Optional.of(ref:rangeA1)
          args:
          - match: any
        - dependency: config
          method: getToleranceMargin
          thenReturn: 4
        - dependency: nlpTokenizer
          method: countTokens
          thenReturn: 6
          args:
          - match: eq
            value: She likes red apples very much
        assert:
          doesNotThrow: true
      - invoke:
          method: getResults
        assert:
          returns: "[ref:expectedScore]"
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R002
    - name: "Given a quiz 1 token below A1 range minimum, when scored, then quiz score\
        \ is 0.75"
      target: SentenceLengthAnalyzer
