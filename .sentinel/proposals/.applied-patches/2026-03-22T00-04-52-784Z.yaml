      - id: ctxQuiz
        type: AuditContext
        construct:
          milestoneId: 0
          topicId: t1
          knowledgeId: k1
          quizId: q1
      - id: rangeA1
        type: TargetRange
        construct:
          level: A1
          minTokens: 5
          maxTokens: 8
      type: integration
      steps:
      - invoke:
          method: onMilestone
          args:
          - ref:milestone
          - ref:ctxMilestone
        assert:
          doesNotThrow: true
      - invoke:
          method: onKnowledge
          args:
          - ref:knowledge
          - ref:ctxKnowledge
        assert:
          doesNotThrow: true
      - invoke:
