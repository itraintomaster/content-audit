code: __proposal__
description: Tests for SentenceLengthAnalyzer - fix Optional.of wrapping on getTargetRange
  mocks
modules:
- name: audit-domain
  implementations:
  - name: SentenceLengthAnalyzer
    tests:
    - name: "Given a SentenceLengthAnalyzer instance, when getName is called, then\
        \ returns sentence-length"
      target: SentenceLengthAnalyzer
      invoke:
        method: getName
      type: unit
      assert:
        returns: sentence-length
    - name: "Given a SentenceLengthAnalyzer instance, when getTarget is called, then\
        \ returns QUIZ"
      target: SentenceLengthAnalyzer
      invoke:
        method: getTarget
      type: unit
      assert:
        returns: QUIZ
    - name: "Given a SentenceLengthAnalyzer, when onTopic is called, then it completes\
        \ without error"
      target: SentenceLengthAnalyzer
      invoke:
        method: onTopic
        args:
        - ref:topic
        - ref:ctx
      fixtures:
      - id: topic
        type: AuditableTopic
        construct:
          knowledge: "[]"
      - id: ctx
        type: AuditContext
        construct:
          milestoneId: 0
          topicId: t1
          knowledgeId: k1
          quizId: q1
      type: unit
      assert:
        doesNotThrow: true
    - name: "Given a SentenceLengthAnalyzer, when onCourseComplete is called, then\
        \ it completes without error"
      target: SentenceLengthAnalyzer
      invoke:
        method: onCourseComplete
        args:
        - ref:course
        - ref:ctx
      fixtures:
      - id: course
        type: AuditableCourse
        construct:
          milestones: "[]"
      - id: ctx
        type: AuditContext
        construct:
          milestoneId: 0
          topicId: t1
          knowledgeId: k1
          quizId: q1
      type: unit
      assert:
        doesNotThrow: true
    - name: "Given a null milestoneId, when onQuiz is called, then quiz is excluded\
        \ and getResults is empty"
      target: SentenceLengthAnalyzer
      fixtures:
      - id: milestone
        type: AuditableMilestone
        construct:
          topics: "[]"
      - id: ctxMilestoneNull
        type: AuditContext
        construct:
          topicId: t1
          knowledgeId: k1
          quizId: q1
      - id: knowledge
        type: AuditableKnowledge
        construct:
          title: Greetings
          instructions: Complete
          isSentence: true
          quizzes: "[]"
      - id: ctxKnowledge
        type: AuditContext
        construct:
          topicId: t1
          knowledgeId: k1
          quizId: q1
      - id: quiz
        type: AuditableQuiz
        construct:
          sentence: Hello world test
          tokenCount: 3
      - id: ctxQuiz
        type: AuditContext
        construct:
          topicId: t1
          knowledgeId: k1
          quizId: q1
      type: integration
      steps:
      - invoke:
          method: onMilestone
          args:
          - ref:milestone
          - ref:ctxMilestoneNull
        assert:
          doesNotThrow: true
      - invoke:
          method: onKnowledge
          args:
          - ref:knowledge
          - ref:ctxKnowledge
        assert:
          doesNotThrow: true
      - invoke:
          method: onQuiz
          args:
          - ref:quiz
          - ref:ctxQuiz
        assert:
          doesNotThrow: true
      - invoke:
          method: getResults
        assert:
          returns: "[]"
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R001
