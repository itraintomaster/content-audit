code: __proposal__
description: Declarative unit tests and handwritten integration tests for FileSystemCourseRepository
  covering all 16 business rules (R001-R016) and 6 user journeys (J001-J006)
modules:
- name: course-infrastructure
  implementations:
  - name: FileSystemCourseRepository
    tests:
    - name: "Given a valid course entity, when save is called, then validator is invoked\
        \ and no exception is thrown"
      target: FileSystemCourseRepository
      mocks:
      - dependency: courseValidator
        method: validate
        args:
        - match: any
      invoke:
        method: save
        args:
        - ref:course1
        - ref:targetPath
      fixtures:
      - id: sentencePart1
        type: SentencePartEntity
        construct:
          kind: TEXT
          text: 'She '
      - id: sentencePart2
        type: SentencePartEntity
        construct:
          kind: CLOZE
          options:
          - plays
      - id: form1
        type: FormEntity
        construct:
          kind: CLOZE
          incidence: 1.0
          sentenceParts:
          - ref:sentencePart1
          - ref:sentencePart2
      - id: quiz1
        type: QuizTemplateEntity
        construct:
          id: aaa111bbb222ccc333ddd441
          oidId: aaa111bbb222ccc333ddd441
          kind: CLOZE
          knowledgeId: aaa111bbb222ccc333ddd440
          title: Affirmative sentences
          instructions: Escribe la forma afirmativa.
          translation: Ella juega
          theoryId: a1.01.Present_Simple
          topicName: Present Simple
          form: ref:form1
          difficulty: 0.0
          retries: 0.0
          noScoreRetries: 0.0
          answerAudioUrl: A1.01.01.01
      - id: knowledge1
        type: KnowledgeEntity
        construct:
          id: aaa111bbb222ccc333ddd440
          code: aaa111bbb222ccc333ddd440
          kind: KNOWLEDGE
          label: Affirmative sentences
          oldId: 11111111-1111-1111-1111-111111111111
          parentId: aaa111bbb222ccc333ddd430
          isRule: true
          instructions: Escribe la forma afirmativa.
          order: 1
          slug: affirmative-sentences
          quizTemplates:
          - ref:quiz1
      - id: topic1
        type: TopicEntity
        construct:
          id: aaa111bbb222ccc333ddd430
          code: aaa111bbb222ccc333ddd430
          kind: TOPIC
          label: Present Simple
          oldId: 22222222-2222-2222-2222-222222222222
          parentId: aaa111bbb222ccc333ddd420
          ruleIds:
          - aaa111bbb222ccc333ddd440
          order: 1
          slug: present-simple
          knowledges:
          - ref:knowledge1
      - id: milestone1
        type: MilestoneEntity
        construct:
          id: aaa111bbb222ccc333ddd420
          code: aaa111bbb222ccc333ddd420
          kind: MILESTONE
          label: A1
          oldId: 33333333-3333-3333-3333-333333333333
          parentId: aaa111bbb222ccc333ddd410
          children:
          - aaa111bbb222ccc333ddd430
          order: 1
          slug: a1
          topics:
          - ref:topic1
      - id: rootNode
        type: RootNodeEntity
        construct:
          id: aaa111bbb222ccc333ddd410
          code: root
          kind: ROOT
          children:
          - aaa111bbb222ccc333ddd420
          milestones:
          - ref:milestone1
      - id: course1
        type: CourseEntity
        construct:
          id: '000000000000000000000000'
          title: english-course
          knowledgeIds:
          - aaa111bbb222ccc333ddd440
          root: ref:rootNode
          slug: english-course
      - id: targetPath
        type: Path
        construct:
          value: /tmp/test-course-output
      type: unit
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R014
      assert:
        verifyCall:
          dependency: courseValidator
          method: validate
          times: 1
    - name: "Given an invalid course entity, when save is called, then validator throws\
        \ CourseValidationException"
      target: FileSystemCourseRepository
      mocks:
      - dependency: courseValidator
        method: validate
        args:
        - match: any
        thenThrow:
          type: CourseValidationException
          construct:
            path: "/tmp"
            detail: "estructura invalida"
      invoke:
        method: save
        args:
        - ref:invalidCourse
        - ref:targetPath
      fixtures:
      - id: invalidCourse
        type: CourseEntity
        construct:
          id: '000000000000000000000000'
          title: invalid-course
          slug: invalid-course
      - id: targetPath
        type: Path
        construct:
          value: /tmp/test-invalid-output
      type: unit
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R014
      assert:
        assertThrows: CourseValidationException
    - name: "Given a course entity with validator passing, when save is called, then\
        \ no exception is thrown"
      target: FileSystemCourseRepository
      mocks:
      - dependency: courseValidator
        method: validate
        args:
        - match: any
      invoke:
        method: save
        args:
        - ref:validCourse
        - ref:targetPath
      fixtures:
      - id: sentencePart1
        type: SentencePartEntity
        construct:
          kind: TEXT
          text: 'He '
      - id: sentencePart2
        type: SentencePartEntity
        construct:
          kind: CLOZE
          options:
          - runs
      - id: form1
        type: FormEntity
        construct:
          kind: CLOZE
          incidence: 1.0
          sentenceParts:
          - ref:sentencePart1
          - ref:sentencePart2
      - id: quiz1
        type: QuizTemplateEntity
        construct:
          id: bbb111ccc222ddd333eee441
          oidId: bbb111ccc222ddd333eee441
          kind: CLOZE
          knowledgeId: bbb111ccc222ddd333eee440
          title: Running verbs
          instructions: Completa la oracion.
          translation: El corre
          theoryId: a1.02.Verbs
          topicName: Verbs
          form: ref:form1
          difficulty: 0.0
          retries: 0.0
          noScoreRetries: 0.0
          answerAudioUrl: A1.02.01.01
      - id: knowledge1
        type: KnowledgeEntity
        construct:
          id: bbb111ccc222ddd333eee440
          code: bbb111ccc222ddd333eee440
          kind: KNOWLEDGE
          label: Running verbs
          oldId: 44444444-4444-4444-4444-444444444444
          parentId: bbb111ccc222ddd333eee430
          isRule: true
          instructions: Completa la oracion.
          order: 1
          slug: running-verbs
          quizTemplates:
          - ref:quiz1
      - id: topic1
        type: TopicEntity
        construct:
          id: bbb111ccc222ddd333eee430
          code: bbb111ccc222ddd333eee430
          kind: TOPIC
          label: Verbs
          oldId: 55555555-5555-5555-5555-555555555555
          parentId: bbb111ccc222ddd333eee420
          ruleIds:
          - bbb111ccc222ddd333eee440
          order: 1
          slug: verbs
          knowledges:
          - ref:knowledge1
      - id: milestone1
        type: MilestoneEntity
        construct:
          id: bbb111ccc222ddd333eee420
          code: bbb111ccc222ddd333eee420
          kind: MILESTONE
          label: A1
          oldId: 66666666-6666-6666-6666-666666666666
          parentId: bbb111ccc222ddd333eee410
          children:
          - bbb111ccc222ddd333eee430
          order: 1
          slug: a1
          topics:
          - ref:topic1
      - id: rootNode
        type: RootNodeEntity
        construct:
          id: bbb111ccc222ddd333eee410
          code: root
          kind: ROOT
          children:
          - bbb111ccc222ddd333eee420
          milestones:
          - ref:milestone1
      - id: validCourse
        type: CourseEntity
        construct:
          id: '000000000000000000000000'
          title: english-course
          knowledgeIds:
          - bbb111ccc222ddd333eee440
          root: ref:rootNode
          slug: english-course
      - id: targetPath
        type: Path
        construct:
          value: /tmp/test-valid-output
      type: unit
      traceability:
        feature: F-COURSE
        journey: F-COURSE-J002
      assert:
        doesNotThrow: true
    - name: "Given a null course entity, when save is called, then an exception is\
        \ thrown"
      target: FileSystemCourseRepository
      invoke:
        method: save
        args:
        - null
        - /tmp/test-null-output
      type: unit
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R009
      assert:
        assertThrows: IllegalArgumentException
    - name: "Given validator rejects course with duplicate IDs, when save is called,\
        \ then CourseValidationException propagates"
      target: FileSystemCourseRepository
      mocks:
      - dependency: courseValidator
        method: validate
        args:
        - match: any
        thenThrow:
          type: CourseValidationException
          construct:
            path: "/tmp/test-dup-output"
            detail: "Identificador duplicado: el ID aaa111 aparece en Milestone y en Topic"
      invoke:
        method: save
        args:
        - ref:duplicateIdCourse
        - /tmp/test-dup-output
      fixtures:
      - id: duplicateIdCourse
        type: CourseEntity
        construct:
          id: '000000000000000000000000'
          title: duplicate-course
          slug: duplicate-course
      type: unit
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R006
      assert:
        assertThrows: CourseValidationException
    - name: "Given validator rejects course with broken parent references, when save\
        \ is called, then CourseValidationException propagates"
      target: FileSystemCourseRepository
      mocks:
      - dependency: courseValidator
        method: validate
        args:
        - match: any
        thenThrow:
          type: CourseValidationException
          construct:
            path: "/tmp/test-broken-ref-output"
            detail: "Integridad referencial rota: Topic (abc123) referencia al padre xyz789, pero el padre esperado es def456"
      invoke:
        method: save
        args:
        - ref:brokenRefCourse
        - /tmp/test-broken-ref-output
      fixtures:
      - id: brokenRefCourse
        type: CourseEntity
        construct:
          id: '000000000000000000000000'
          title: broken-ref-course
          slug: broken-ref-course
      type: unit
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R008
      assert:
        assertThrows: CourseValidationException
    - name: "Given validator rejects milestone with no topics, when save is called,\
        \ then CourseValidationException propagates"
      target: FileSystemCourseRepository
      mocks:
      - dependency: courseValidator
        method: validate
        args:
        - match: any
        thenThrow:
          type: CourseValidationException
          construct:
            path: "/tmp/test-empty-milestone-output"
            detail: "Estructura incompleta: Milestone 'A1' (abc123) no tiene hijos"
      invoke:
        method: save
        args:
        - ref:emptyMilestoneCourse
        - /tmp/test-empty-milestone-output
      fixtures:
      - id: emptyMilestoneCourse
        type: CourseEntity
        construct:
          id: '000000000000000000000000'
          title: empty-milestone-course
          slug: empty-milestone-course
      type: unit
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R015
      assert:
        assertThrows: CourseValidationException
    - name: "Given a valid course directory, when load is called, then returns CourseEntity\
        \ with 5-level hierarchy including ROOT node"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R001
    - name: "Given a course with ordered milestones and topics, when load is called,\
        \ then child order matches parent children lists"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R002
    - name: "Given a loaded course, when saved and reloaded, then the result is semantically\
        \ equivalent to the original"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R003
    - name: "Given a course directory with quiz templates, when load is called, then\
        \ every knowledge has at least one quiz template"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R004
    - name: "Given a course directory with consistent IDs, when load is called, then\
        \ all child ID references resolve to existing entities"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R005
    - name: "Given a course directory with unique IDs, when load is called, then no\
        \ duplicate IDs exist across any hierarchy level"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R006
    - name: "Given a valid directory structure, when load is called, then each directory\
        \ level contains its expected descriptor file"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R007
    - name: "Given a loaded course, when inspecting parent references, then each child\
        \ parentId matches its actual parent id"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R008
    - name: "Given a course with all required fields populated, when load is called,\
        \ then all mandatory fields are non-null"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R009
    - name: "Given a course with empty string and null field values, when saved and\
        \ reloaded, then empty and null values are preserved exactly"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R010
    - name: "Given quiz templates with dual id and oidId fields, when load is called,\
        \ then both fields contain the same value"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R011
    - name: "Given quiz templates with numberDouble format values, when saved to JSON,\
        \ then numeric fields preserve MongoDB Extended JSON format"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R012
    - name: "Given a loaded course, when inspecting order fields, then milestones\
        \ topics and knowledges have sequential 1-based order within their parent"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R013
    - name: "Given a milestone with empty children list, when load is called, then\
        \ validation rejects the course with a descriptive error"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R015
    - name: "Given entities with labels, when saved to disk, then directory names\
        \ are deterministic slugs derived from the labels"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        rule: F-COURSE-R016
    - name: "Given a course directory with full hierarchy, when loading step by step,\
        \ then all levels are resolved with correct hierarchy order and validation"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        journey: F-COURSE-J001
    - name: "Given a course in memory, when saving to a target directory, then the\
        \ directory structure and JSON files are written correctly"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        journey: F-COURSE-J002
    - name: "Given a course loaded from files, when saved to a new directory and reloaded,\
        \ then the reloaded course equals the original"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        journey: F-COURSE-J003
    - name: "Given a loaded course, when navigating from ROOT to milestones to topics\
        \ to knowledges to quizzes, then each level is accessible and correctly ordered"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        journey: F-COURSE-J004
    - name: "Given a loaded course, when a knowledge label is modified and the course\
        \ is saved and reloaded, then the change is reflected and unmodified data\
        \ remains intact"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        journey: F-COURSE-J005
    - name: "Given a nonexistent path or missing descriptor or malformed JSON, when\
        \ load is called, then a descriptive error is thrown and no partial course\
        \ is returned"
      target: FileSystemCourseRepository
      type: integration
      traceability:
        feature: F-COURSE
        journey: F-COURSE-J006
