code: __proposal__
description: "Tests for SentenceLengthAnalyzer; Tests for SentenceLengthAnalyzer -\
  \ corrected per reviewer feedback: fixed A1 range to [5,8], removed onMilestone\
  \ steps, removed speculative tests, fixed token counts"
modules:
- name: audit-domain
  implementations:
  - name: SentenceLengthAnalyzer
    tests:
    - name: "Given SentenceLengthAnalyzer, when getName is called, then returns sentence-length"
      target: SentenceLengthAnalyzer
      invoke:
        method: getName
      assert:
        returns: sentence-length
    - name: "Given SentenceLengthAnalyzer, when getTarget is called, then returns\
        \ QUIZ"
      target: SentenceLengthAnalyzer
      invoke:
        method: getTarget
      assert:
        returns: QUIZ
    - name: "Given no quizzes processed, when getResults is called, then returns empty\
        \ list"
      target: SentenceLengthAnalyzer
      invoke:
        method: getResults
      assert:
        returns: "[]"
    - name: "Given a quiz with token count within range, when onQuiz is called, then\
        \ score is 1.0"
      target: SentenceLengthAnalyzer
      fixtures:
      - id: quiz1
        type: AuditableQuiz
        construct:
          sentence: She plays the piano every day
      - id: ctx
        type: AuditContext
        construct:
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
          quizId: q1
      - id: range
        type: TargetRange
        construct:
          level: A1
          minTokens: 5
          maxTokens: 8
      - id: expectedScore
        type: ScoredItem
        construct:
          analyzerName: sentence-length
          target: QUIZ
          score: 1
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
          quizId: q1
      type: integration
      steps:
      - invoke:
          method: onQuiz
          args:
          - ref:quiz1
          - ref:ctx
        mocks:
        - dependency: nlpTokenizer
          method: countTokens
          thenReturn: 6
          args:
          - match: eq
            value: She plays the piano every day
        - dependency: config
          method: getTargetRange
          thenReturn: ref:range
          args:
          - match: any
        - dependency: config
          method: getToleranceMargin
          thenReturn: 4
        assert:
          doesNotThrow: true
      - invoke:
          method: getResults
        assert:
          returns: "[ref:expectedScore]"
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R002
    - name: "Given a quiz 1 token below range, when onQuiz is called, then score is\
        \ 0.75"
      target: SentenceLengthAnalyzer
