code: __proposal__
description: "Reorganize nlp-infrastructure module into packages with visibility control:\
  \ public 'api' package for factory and config, private 'spacy' package for internal\
  \ processing implementations"
modules:
- name: nlp-infrastructure
  models:
  - name: NlpTokenizerConfig
    type: record
    _change: delete
  interfaces:
  - name: NlpTokenizerFactory
    sealed: false
    _change: delete
  implementations:
  - name: DefaultNlpTokenizerFactory
    _change: delete
  - name: SpacyNlpTokenizer
    _change: delete
  - name: SpacyProcessRunner
    _change: delete
  - name: SpacyResultParser
    _change: delete
  - name: CachedNlpTokenizer
    _change: delete
  packages:
  - name: api
    description: Public API surface for NLP tokenization. Exposes factory and configuration
      to dependent modules.
    visibility: public
    models:
    - name: NlpTokenizerConfig
      type: record
      fields:
      - name: pythonScriptPath
        type: String
        description: Path to the SpaCy Python processing script
      - name: cocaDataPath
        type: String
        description: Path to the COCA frequency data file
      - name: timeoutSeconds
        type: int
        description: Maximum seconds to wait for SpaCy process completion
      _change: add
    interfaces:
    - name: NlpTokenizerFactory
      stereotype: factory
      sealed: true
      exposes:
      - signature: "create(NlpTokenizerConfig config): NlpTokenizer"
      _change: add
    implementations:
    - name: DefaultNlpTokenizerFactory
      types:
      - Component
      implements:
      - NlpTokenizerFactory
      _change: add
    _change: add
  - name: spacy
    description: Internal SpaCy-backed tokenization implementation. Not visible outside
      this package.
    visibility: private
    implementations:
    - name: SpacyNlpTokenizer
      requiresInject:
      - name: processRunner
        type: SpacyProcessRunner
      - name: resultParser
        type: SpacyResultParser
      implements:
      - NlpTokenizer
      _change: add
    - name: SpacyProcessRunner
      requiresInject:
      - name: config
        type: NlpTokenizerConfig
      _change: add
    - name: SpacyResultParser
      _change: add
    - name: CachedNlpTokenizer
      requiresInject:
      - name: delegate
        type: NlpTokenizer
      implements:
      - NlpTokenizer
      _change: add
    _change: add
  _change: modify
