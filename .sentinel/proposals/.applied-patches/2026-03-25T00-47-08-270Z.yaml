code: __proposal__
description: Tests for KnowledgeTitleLengthAnalyzer — knowledge title weighted-length
  scoring
modules:
- name: audit-domain
  implementations:
  - name: KnowledgeTitleLengthAnalyzer
    tests:
    - name: "Given a KnowledgeTitleLengthAnalyzer, when getName is called, then returns\
        \ knowledge-title-length"
      target: KnowledgeTitleLengthAnalyzer
      invoke:
        method: getName
      type: unit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
      assert:
        returns: knowledge-title-length
    - name: "Given a KnowledgeTitleLengthAnalyzer, when getTarget is called, then\
        \ returns KNOWLEDGE"
      target: KnowledgeTitleLengthAnalyzer
      invoke:
        method: getTarget
      type: unit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
      assert:
        returns: KNOWLEDGE
    - name: "Given a knowledge with null title, when onKnowledge is called and getResults\
        \ checked, then score is 0.0"
      target: KnowledgeTitleLengthAnalyzer
      fixtures:
      - id: knowledge
        type: AuditableKnowledge
        construct:
          quizzes: "[]"
          instructions: some instructions
          isSentence: false
      - id: ctx
        type: AuditContext
        construct:
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
      - id: expectedScore
        type: ScoredItem
        construct:
          analyzerName: knowledge-title-length
          target: KNOWLEDGE
          score: 0.0
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
      type: integration
      steps:
      - invoke:
          method: onKnowledge
          args:
          - ref:knowledge
          - ref:ctx
        assert:
          doesNotThrow: true
      - invoke:
          method: getResults
        assert:
          returns: "[ref:expectedScore]"
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R003
