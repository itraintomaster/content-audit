                  milestoneId: m1
                  topicId: t1
                  knowledgeId: k1
                  quizId: q1
              - id: range
                type: com.learney.contentaudit.audit-domain.TargetRange
                construct:
                  level: A1
                  minTokens: 5
                  maxTokens: 8
              - id: expectedScore
                type: com.learney.contentaudit.audit-domain.ScoredItem
                construct:
                  analyzerName: sentence-length
                  target: QUIZ
                  score: 0.75
                  milestoneId: m1
                  topicId: t1
                  knowledgeId: k1
                  quizId: q1
            steps:
              - mocks:
                  - dependency: nlpTokenizer
                    method: countTokens
                    args:
                      - match: eq
                        value: She plays well today
                    thenReturn: 4
                  - dependency: config
                    method: getTargetRange
                    args:
                      - match: any
                    thenReturn: ref:range
                  - dependency: config
                    method: getToleranceMargin
                    thenReturn: 4
                invoke:
                  method: onQuiz
                  args:
                    - ref:quiz1
                    - ref:ctx
                assert:
                  doesNotThrow: true
              - invoke:
                  method: getResults
                  args: []
                assert:
                  returns: '[ref:expectedScore]'
          - name: Given a quiz 2 tokens above range, when onQuiz is called, then score is 0.5
