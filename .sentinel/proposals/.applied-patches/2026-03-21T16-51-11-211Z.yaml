code: __proposal__
description: Tests for SentenceLengthAnalyzer
modules:
  - name: audit-domain
    implementations:
      - name: SentenceLengthAnalyzer
        tests:
          - name: Given SentenceLengthAnalyzer, when getName is called, then returns sentence-length
            target: SentenceLengthAnalyzer
            invoke:
              method: getName
              args: []
            assert:
              returns: sentence-length
          - name: Given SentenceLengthAnalyzer, when getTarget is called, then returns QUIZ
            target: SentenceLengthAnalyzer
            invoke:
              method: getTarget
              args: []
            assert:
              returns: QUIZ
          - name: Given no quizzes processed, when getResults is called, then returns empty list
            target: SentenceLengthAnalyzer
            invoke:
              method: getResults
              args: []
            assert:
              returns: '[]'
          - name: Given a quiz with token count within range, when onQuiz is called, then score is 1.0
            target: SentenceLengthAnalyzer
            type: integration
            traceability:
              feature: F-SLEN
              rule: F-SLEN-R002
            fixtures:
              - id: quiz1
                type: com.learney.contentaudit.audit-domain.AuditableQuiz
                construct:
                  sentence: She plays the piano every day
              - id: ctx
                type: com.learney.contentaudit.audit-domain.AuditContext
                construct:
                  milestoneId: m1
                  topicId: t1
                  knowledgeId: k1
                  quizId: q1
              - id: range
                type: com.learney.contentaudit.audit-domain.TargetRange
                construct:
                  level: A1
                  minTokens: 5
                  maxTokens: 8
              - id: expectedScore
                type: com.learney.contentaudit.audit-domain.ScoredItem
                construct:
                  analyzerName: sentence-length
                  target: QUIZ
                  score: 1
                  milestoneId: m1
                  topicId: t1
                  knowledgeId: k1
                  quizId: q1
            steps:
              - mocks:
                  - dependency: nlpTokenizer
                    method: countTokens
                    args:
                      - match: eq
                        value: She plays the piano every day
                    thenReturn: 6
                  - dependency: config
                    method: getTargetRange
                    args:
                      - match: any
                    thenReturn: ref:range
                  - dependency: config
                    method: getToleranceMargin
                    thenReturn: 4
                invoke:
                  method: onQuiz
                  args:
                    - ref:quiz1
                    - ref:ctx
                assert:
                  doesNotThrow: true
              - invoke:
                  method: getResults
                  args: []
                assert:
                  returns: '[ref:expectedScore]'
          - name: Given a quiz 1 token below range, when onQuiz is called, then score is 0.75
            target: SentenceLengthAnalyzer
            type: integration
            traceability:
              feature: F-SLEN
              rule: F-SLEN-R002
            fixtures:
