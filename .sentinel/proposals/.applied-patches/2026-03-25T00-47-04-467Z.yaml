code: __proposal__
description: "Tests for KnowledgeInstructionsLengthAnalyzer — instructions length\
  \ scoring (R005, R006, R008)"
modules:
- name: audit-domain
  implementations:
  - name: KnowledgeInstructionsLengthAnalyzer
    tests:
    - name: "Given a KnowledgeInstructionsLengthAnalyzer, when getName is called,\
        \ then returns knowledge-instructions-length"
      target: KnowledgeInstructionsLengthAnalyzer
      invoke:
        method: getName
      type: unit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
      assert:
        returns: knowledge-instructions-length
    - name: "Given a KnowledgeInstructionsLengthAnalyzer, when getTarget is called,\
        \ then returns KNOWLEDGE"
      target: KnowledgeInstructionsLengthAnalyzer
      invoke:
        method: getTarget
      type: unit
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R008
      assert:
        returns: KNOWLEDGE
    - name: "Given a knowledge with null instructions, when onKnowledge is called\
        \ and getResults checked, then score is 1.0"
      target: KnowledgeInstructionsLengthAnalyzer
      fixtures:
      - id: knowledge
        type: AuditableKnowledge
        construct:
          quizzes: "[]"
          title: Some Title
          isSentence: false
      - id: ctx
        type: AuditContext
        construct:
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
      - id: expectedScore
        type: ScoredItem
        construct:
          analyzerName: knowledge-instructions-length
          target: KNOWLEDGE
          score: 1.0
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
      type: integration
      steps:
      - invoke:
          method: onKnowledge
          args:
          - ref:knowledge
          - ref:ctx
        assert:
          doesNotThrow: true
      - invoke:
          method: getResults
        assert:
          returns: "[ref:expectedScore]"
      traceability:
        feature: F-KTLEN
        rule: F-KTLEN-R006
    - name: "Given a knowledge with empty instructions, when onKnowledge is called\
        \ and getResults checked, then score is 1.0"
