        - ref:ctx
      fixtures:
      - id: quiz
        type: AuditableQuiz
        construct:
          sentence: A test sentence
          tokenCount: 3
      - id: ctx
        type: AuditContext
        construct:
          milestoneId: m1
          topicId: t1
          knowledgeId: k1
          quizId: q1
      type: unit
      assert:
        doesNotThrow: true
    - name: "Given a KnowledgeInstructionsLengthAnalyzer, when onMilestone is called,\
