        construct:
          topics:
          - ref:topic
      - id: course
        type: AuditableCourse
        construct:
          milestones:
          - ref:milestone
      - id: ctx
        type: AuditContext
      - id: rangeA1
        type: TargetRange
        construct:
          level: A1
          minTokens: 5
          maxTokens: 8
      type: unit
      steps:
      - invoke:
          method: onMilestone
          args:
          - ref:milestone
          - ref:ctx
        mocks:
        - dependency: config
          method: getTargetRange
          thenReturn: ref:rangeA1
          args:
