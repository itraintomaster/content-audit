code: __proposal__
description: "Tests for SentenceLengthAnalyzer - 32 tests covering all 16 business\
  \ rules, 5 journeys, and additional edge cases"
modules:
- name: audit-domain
  implementations:
  - name: SentenceLengthAnalyzer
    tests:
    - name: "Given a knowledge with non-sentence quizzes, when onKnowledge is called,\
        \ then non-sentence quizzes are excluded from scoring"
      target: SentenceLengthAnalyzer
      fixtures:
      - id: sentenceQuiz
        type: AuditableQuiz
        construct:
          sentence: She plays tennis
          tokenCount: 3
      - id: nonSentenceQuiz
        type: AuditableQuiz
        construct:
          sentence: vocabulary list
          tokenCount: 2
      - id: knowledge
        type: AuditableKnowledge
        construct:
          quizzes:
          - ref:sentenceQuiz
          - ref:nonSentenceQuiz
          title: Basic sentences
          instructions: Complete the sentence
          isSentence: false
      - id: sentenceKnowledge
        type: AuditableKnowledge
        construct:
          quizzes:
          - ref:sentenceQuiz
          title: Sentence knowledge
          instructions: Write the sentence
          isSentence: true
      - id: topic
        type: AuditableTopic
        construct:
          knowledge:
          - ref:knowledge
          - ref:sentenceKnowledge
      - id: milestone
        type: AuditableMilestone
        construct:
          topics:
          - ref:topic
      - id: course
        type: AuditableCourse
        construct:
          milestones:
          - ref:milestone
      - id: ctx
        type: AuditContext
      - id: rangeA1
        type: TargetRange
        construct:
          level: A1
          minTokens: 5
          maxTokens: 8
      type: unit
      steps:
      - invoke:
          method: onMilestone
          args:
          - ref:milestone
          - ref:ctx
        mocks:
        - dependency: config
          method: getTargetRange
          thenReturn: ref:rangeA1
          args:
          - match: any
        - dependency: config
          method: getToleranceMargin
          thenReturn: 4
        assert:
          doesNotThrow: true
      - invoke:
          method: onTopic
          args:
          - ref:topic
          - ref:ctx
        assert:
          doesNotThrow: true
      - invoke:
          method: onKnowledge
          args:
          - ref:knowledge
          - ref:ctx
        assert:
          doesNotThrow: true
      - invoke:
          method: onKnowledge
          args:
          - ref:sentenceKnowledge
          - ref:ctx
        assert:
          doesNotThrow: true
      - invoke:
          method: onCourseComplete
          args:
          - ref:course
          - ref:ctx
        assert:
          doesNotThrow: true
      - invoke:
          method: getResult
        assert:
          doesNotThrow: true
      traceability:
        feature: F-SLEN
        rule: F-SLEN-R001
    - name: "Given a knowledge where all quizzes are non-sentences, when processed,\
        \ then knowledge score is not available"
