- module: audit-infrastructure
  status: EXISTS
  implementations:
  - name: FileSystemAuditReportStore
    status: EXISTS
    filePath: audit-infrastructure/src/main/java/com/learney/contentaudit/auditinfrastructure/FileSystemAuditReportStore.java
    tests:
    - name: should save an AuditReport and load it back with identical content
      status: EXISTS
      testFilePath: audit-infrastructure/src/test/java/com/learney/contentaudit/auditinfrastructure/FileSystemAuditReportStoreTest.java
    testCleanViews:
    - |
      test: "should save an AuditReport and load it back with identical content"
      trace: FEAT-STORE

      given:
        quiz = AuditableQuiz(List.of(new NlpToken("cat", "cat", "NOUN", 500, false, false)), "quiz-1", "Quiz One", "Q1", null, List.of("The cat sat on the mat."), "The cat sat on the mat.")
        quizDiagnoses = DefaultQuizDiagnoses()
        sentenceDiagnosis = SentenceLengthDiagnosis(7, 5, 10, CefrLevel.A1, 0, 2)
        quizLemmaDiagnosis = LemmaPlacementDiagnosis(0, List.of())
        quizScores = HashMap<>()
        quizMetadata = HashMap<>()
        quizNode = AuditNode(quiz, AuditTarget.QUIZ, null, List.of(), quizScores, quizMetadata, quizDiagnoses)
        knowledge = AuditableKnowledge(List.of(quiz), "Prepositions", "Complete the sentence with the correct preposition.", true, "know-1", "Knowledge One", "K1")
        knowledgeDiagnoses = DefaultKnowledgeDiagnoses()
        knowledgeLemmaDiagnosis = LemmaPlacementDiagnosis(1, List.of())
        knowledgeScores = HashMap<>()
        knowledgeMetadata = HashMap<>()
        knowledgeNode = AuditNode(knowledge, AuditTarget.KNOWLEDGE, null, new ArrayList<>(List.of(quizNode)), knowledgeScores, knowledgeMetadata, knowledgeDiagnoses)
        topic = AuditableTopic(List.of(knowledge), "topic-1", "Topic One", "T1")
        topicScores = HashMap<>()
        topicNode = AuditNode(topic, AuditTarget.TOPIC, null, new ArrayList<>(List.of(knowledgeNode)), topicScores, new HashMap<>(), null)
        milestone = AuditableMilestone(List.of(topic), "ms-1", "Milestone One", "M1")
        milestoneScores = HashMap<>()
        milestoneNode = AuditNode(milestone, AuditTarget.MILESTONE, null, new ArrayList<>(List.of(topicNode)), milestoneScores, new HashMap<>(), null)
        courseScores = HashMap<>()
        rootNode = AuditNode(null, AuditTarget.COURSE, null, new ArrayList<>(List.of(milestoneNode)), courseScores, new HashMap<>(), null)
        original = AuditReport(rootNode)
        store = FileSystemAuditReportStore(tempDir)
        id = store.save(original)
        loadedOpt = store.load(id)
        loaded = loadedOpt.get()
        loadedRoot = loaded.getRoot()
        loadedMilestone = loadedRoot.getChildren().get(0)
        loadedMilestoneEntity = (AuditableMilestone) loadedMilestone.getEntity()
        loadedTopic = loadedMilestone.getChildren().get(0)
        loadedTopicEntity = (AuditableTopic) loadedTopic.getEntity()
        loadedKnowledge = loadedTopic.getChildren().get(0)
        loadedKnowledgeEntity = (AuditableKnowledge) loadedKnowledge.getEntity()
        loadedKD = (DefaultKnowledgeDiagnoses) loadedKnowledge.getDiagnoses()
        loadedQuiz = loadedKnowledge.getChildren().get(0)
        loadedQuizEntity = (AuditableQuiz) loadedQuiz.getEntity()
        loadedToken = loadedQuizEntity.getTokens().get(0)
        loadedQD = (DefaultQuizDiagnoses) loadedQuiz.getDiagnoses()
        loadedSLD = loadedQD.getSentenceLengthDiagnosis().get()

      when:
        sut.setSentenceLengthDiagnosis(sentenceDiagnosis)

      then:
        id is not null
        id.isBlank() is false
        loadedOpt.isPresent() is true
        assertNotSame(original)
        loadedRoot is not null
        loadedRoot.getParent() is null
        loadedRoot.getTarget() == AuditTarget.COURSE
        loadedRoot.getScores() == courseScores
        loadedRoot.getEntity() is null
        loadedRoot.getChildren().size() == 1
        loadedMilestone.getTarget() == AuditTarget.MILESTONE
        loadedMilestone.getParent() is not null
        loadedMilestone.getParent().getTarget() == AuditTarget.COURSE
        loadedMilestone.getScores() == milestoneScores
        loadedMilestone.getEntity() instanceof AuditableMilestone is true
        loadedMilestoneEntity.getId() == "ms-1"
        loadedMilestoneEntity.getLabel() == "Milestone One"
        loadedMilestoneEntity.getCode() == "M1"
        loadedMilestone.getChildren().size() == 1
        loadedTopic.getTarget() == AuditTarget.TOPIC
        loadedTopic.getParent() is not null
        loadedTopic.getParent().getTarget() == AuditTarget.MILESTONE
        loadedTopic.getEntity() instanceof AuditableTopic is true
        loadedTopicEntity.getId() == "topic-1"
        loadedTopic.getChildren().size() == 1
        loadedKnowledge.getTarget() == AuditTarget.KNOWLEDGE
        loadedKnowledge.getParent() is not null
        loadedKnowledge.getParent().getTarget() == AuditTarget.TOPIC
        loadedKnowledge.getScores() == knowledgeScores
        loadedKnowledge.getEntity() instanceof AuditableKnowledge is true
        loadedKnowledgeEntity.getId() == "know-1"
        loadedKnowledgeEntity.getTitle() == "Prepositions"
        loadedKnowledgeEntity.isIsSentence() is true
        loadedKnowledge.getDiagnoses() is not null
        loadedKnowledge.getDiagnoses() instanceof DefaultKnowledgeDiagnoses is true
        loadedKD.getLemmaAbsenceDiagnosis().isPresent() is true
        loadedKD.getLemmaAbsenceDiagnosis().get().getMisplacedLemmaCount() == 1
        loadedKnowledge.getChildren().size() == 1
        loadedQuiz.getTarget() == AuditTarget.QUIZ
        loadedQuiz.getParent() is not null
        loadedQuiz.getParent().getTarget() == AuditTarget.KNOWLEDGE
        loadedQuiz.getChildren().size() == 0
