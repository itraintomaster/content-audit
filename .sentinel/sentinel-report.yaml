    - |
      test: "Given a config with activeName null, when active is called, then it returns Optional.empty"
      trace: FEAT-LAPS / F-LAPS-R004

      given:
        alpha = strategyWithName("alpha")
        registry = registryWith(null, alpha)
        active = registry.active()

      then:
        active.isPresent() is false
    - |
      test: "Given a config with activeName pointing to a name that is not in the registered list, when active is called, then it returns Optional.empty"
      trace: FEAT-LAPS / F-LAPS-R004

      given:
        alpha = strategyWithName("alpha")
        registry = registryWith("nonexistent", alpha)
        active = registry.active()

      then:
        active.isPresent() is false
    - |
      test: "Given multiple registered strategies, when byName is called with the name of each registered strategy, then every lookup returns the corresponding strategy and byName of an unknown name returns Optional.empty"
      trace: FEAT-LAPS / F-LAPS-R004

      given:
        s1 = strategyWithName("lemma-absence-mvp")
        s2 = strategyWithName("lemma-absence-experimental")
        s3 = strategyWithName("lemma-absence-v2")
        registry = registryWith("lemma-absence-mvp", s1, s2, s3)
        found1 = registry.byName("lemma-absence-mvp")
        found2 = registry.byName("lemma-absence-experimental")
        found3 = registry.byName("lemma-absence-v2")
        notFound = registry.byName("does-not-exist")

      then:
        found1.isPresent() is true
        found1.get().id().getName() == "lemma-absence-mvp"
        found2.isPresent() is true
        found2.get().id().getName() == "lemma-absence-experimental"
        found3.isPresent() is true
        found3.get().id().getName() == "lemma-absence-v2"
        notFound.isPresent() is false
    - |
      test: "Given multiple registered strategies, when listAll is called, then it returns the StrategyId of every registered strategy without dropping or deduplicating entries"
      trace: FEAT-LAPS / F-LAPS-R004

      given:
        s1 = strategyWithName("lemma-absence-mvp")
        s2 = strategyWithName("lemma-absence-experimental")
        registry = registryWith("lemma-absence-mvp", s1, s2)
        all = registry.listAll()

      then:
        all.size() == 2
        all.stream().anyMatch(id -> "lemma-absence-mvp".equals(id.getName())) is true
        all.stream().anyMatch(id -> "lemma-absence-experimental".equals(id.getName())) is true
