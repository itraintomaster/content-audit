      status: EXISTS
      testFilePath: revision-domain/src/test/java/com/learney/contentaudit/revisiondomain/engine/DefaultLemmaAbsenceProposalDeriverTest.java
    - name: "Given a candidate whose translation differs from elementBefore.translation,\
