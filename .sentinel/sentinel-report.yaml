      trace: FEAT-DLABS / F-DLABS-R011, F-DLABS-R012 / F-DLABS-J002

      given:
        course = makeNode(AuditTarget.COURSE, null, null)
        milestoneNode = makeNode(AuditTarget.MILESTONE, milestone("m1", "A1"), course)
        topicNode = makeNode(AuditTarget.TOPIC, topic("t1", "Topic"), milestoneNode)
        knowledgeNode = makeNode(AuditTarget.KNOWLEDGE, knowledge("k1", "Knowledge"), topicNode)
        quizNode = makeNode(AuditTarget.QUIZ, quiz("q1"), knowledgeNode)
        ld = DefaultLevelDiagnoses()
        diag = LemmaAbsenceLevelDiagnosis(CefrLevel.A1, 100, 10, 10.0, 0.90, 0.85, 0.80, 0.75, AbsenceAssessment.ACCEPTABLE, List.of(), List.of(), 0, 0, 0)
        ancestorOpt = quizNode.ancestor(AuditTarget.MILESTONE)
        foundMilestone = ancestorOpt.get()
        levelDiag = (LevelDiagnoses) foundMilestone.getDiagnoses()

      when:
        sut.setLemmaAbsenceDiagnosis(diag)

      then:
        ancestorOpt.isPresent() is true
        foundMilestone.getTarget() == AuditTarget.MILESTONE
