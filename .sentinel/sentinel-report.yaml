    testCleanViews:
    - |
      test: "should save an AuditReport and load it back with identical content"
      trace: FEAT-STORE

      given:
        quiz = AuditableQuiz("The cat sat on the mat.", List.of(new NlpToken("cat", "cat", "NOUN", 500, false, false)), "quiz-1", "Quiz One", "Q1", null)
        quizDiagnoses = DefaultQuizDiagnoses()
        sentenceDiagnosis = SentenceLengthDiagnosis(7, 5, 10, CefrLevel.A1, 0, 2)
        quizLemmaDiagnosis = LemmaPlacementDiagnosis(0, List.of())
        quizScores = HashMap<>()
        quizMetadata = HashMap<>()
        quizNode = AuditNode(quiz, AuditTarget.QUIZ, null, List.of(), quizScores, quizMetadata, quizDiagnoses)
        knowledge = AuditableKnowledge(List.of(quiz), "Prepositions", "Complete the sentence with the correct preposition.", true, "know-1", "Knowledge One", "K1")
        knowledgeDiagnoses = DefaultKnowledgeDiagnoses()
        knowledgeLemmaDiagnosis = LemmaPlacementDiagnosis(1, List.of())
        knowledgeScores = HashMap<>()
        knowledgeMetadata = HashMap<>()
        knowledgeNode = AuditNode(knowledge, AuditTarget.KNOWLEDGE, null, new ArrayList<>(List.of(quizNode)), knowledgeScores, knowledgeMetadata, knowledgeDiagnoses)
        topic = AuditableTopic(List.of(knowledge), "topic-1", "Topic One", "T1")
        topicScores = HashMap<>()
        topicNode = AuditNode(topic, AuditTarget.TOPIC, null, new ArrayList<>(List.of(knowledgeNode)), topicScores, new HashMap<>(), null)
        milestone = AuditableMilestone(List.of(topic), "ms-1", "Milestone One", "M1")
        milestoneScores = HashMap<>()
        milestoneNode = AuditNode(milestone, AuditTarget.MILESTONE, null, new ArrayList<>(List.of(topicNode)), milestoneScores, new HashMap<>(), null)
        courseScores = HashMap<>()
        rootNode = AuditNode(null, AuditTarget.COURSE, null, new ArrayList<>(List.of(milestoneNode)), courseScores, new HashMap<>(), null)
        original = AuditReport(rootNode)
        store = FileSystemAuditReportStore(tempDir)
        id = store.save(original)
        loadedOpt = store.load(id)
        loaded = loadedOpt.get()
        loadedRoot = loaded.getRoot()
        loadedMilestone = loadedRoot.getChildren().get(0)
        loadedMilestoneEntity = (AuditableMilestone) loadedMilestone.getEntity()
        loadedTopic = loadedMilestone.getChildren().get(0)
