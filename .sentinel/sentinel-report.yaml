        \ y no destructivo a nivel observable)"
      status: EXISTS
      testFilePath: audit-infrastructure/src/test/java/com/learney/contentaudit/auditinfrastructure/FileSystemActiveAnalysisSelectionStoreTest.java
    - name: "Dado un store con una seleccion escrita, cuando clear corre, entonces\
        \ read posterior retorna Optional.empty"
      status: EXISTS
      testFilePath: audit-infrastructure/src/test/java/com/learney/contentaudit/auditinfrastructure/FileSystemActiveAnalysisSelectionStoreTest.java
    - name: "Dado un courseRoot con AuditReports y RefinementPlans persistidos, cuando\
        \ write y clear se invocan sobre el ActiveAnalysisSelectionStore, entonces\
        \ ningun AuditReport, RefinementPlan, RevisionArtifact ni archivo del curso\
        \ se modifica"
      status: EXISTS
      testFilePath: audit-infrastructure/src/test/java/com/learney/contentaudit/auditinfrastructure/FileSystemActiveAnalysisSelectionStoreTest.java
    testCleanViews:
    - |
      test: "Dado un ActiveAnalysisSelection escrito previamente con write, cuando read corre, entonces retorna un Optional con esa misma seleccion (auditId y planId)"
      trace: FEAT-CDIFF / F-CDIFF-R001

      given:
        store = storeFor(tempDir)
        selection = ActiveAnalysisSelection("audit-001", "plan-001")
        result = store.read()

      when:
        sut.write(selection)

      then:
        result.isPresent() is true
        result.get().getAuditId() == "audit-001"
        result.get().getPlanId() == "plan-001"
    - |
      test: "Dado un store sin seleccion previa (archivo ausente), cuando read corre, entonces retorna Optional.empty"
      trace: FEAT-CDIFF / F-CDIFF-R001

      given:
        store = storeFor(tempDir)
        result = store.read()

      then:
        result.isPresent() is false
    - |
      test: "Dado un store con una seleccion ya escrita, cuando write se invoca con la misma seleccion, entonces el archivo no se reescribe (write idempotente y no destructivo a nivel observable)"
      trace: FEAT-CDIFF / F-CDIFF-R002

      given:
        store = storeFor(tempDir)
        selection = ActiveAnalysisSelection("audit-abc", "plan-xyz")
        activeFile = tempDir.resolve(".content-audit/active-analysis.json")
        lastModifiedAfterFirstWrite = Files.getLastModifiedTime(activeFile).toMillis()
        lastModifiedAfterSecondWrite = Files.getLastModifiedTime(activeFile).toMillis()
        read = store.read()

      when:
        sut.write(selection)

      then:
        lastModifiedAfterSecondWrite == lastModifiedAfterFirstWrite
        read.isPresent() is true
        read.get() == selection
    - |
      test: "Dado un store con una seleccion escrita, cuando clear corre, entonces read posterior retorna Optional.empty"
      trace: FEAT-CDIFF / F-CDIFF-R001

      given:
        store = storeFor(tempDir)

      when:
        sut.write(new ActiveAnalysisSelection("audit-001", "plan-001"))

      then:
        store.read().isPresent() is false
    - |
      test: "Dado un courseRoot con AuditReports y RefinementPlans persistidos, cuando write y clear se invocan sobre el ActiveAnalysisSelectionStore, entonces ningun AuditReport, RefinementPlan, RevisionArtifact ni archivo del curso se modifica"
      trace: FEAT-CDIFF / F-CDIFF-R002

      given:
        auditsDir = tempDir.resolve(".content-audit/audits")
        auditFile = auditsDir.resolve("audit-2026-01-01T00:00:00Z.json")
        revisionsDir = tempDir.resolve(".content-audit/revisions/plan-001")
        revisionFile = revisionsDir.resolve("proposal-001.json")
        courseFile = tempDir.resolve("_course.json")
        auditFileModified = Files.getLastModifiedTime(auditFile).toMillis()
        revisionFileModified = Files.getLastModifiedTime(revisionFile).toMillis()
        courseFileModified = Files.getLastModifiedTime(courseFile).toMillis()
        store = storeFor(tempDir)

      when:
        sut.createDirectories(auditsDir)

      then:
        Files.getLastModifiedTime(auditFile).toMillis() == auditFileModified
        Files.getLastModifiedTime(revisionFile).toMillis() == revisionFileModified
        Files.getLastModifiedTime(courseFile).toMillis() == courseFileModified
