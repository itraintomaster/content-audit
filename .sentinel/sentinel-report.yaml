    testCleanViews:
    - |
      test: "should resolve context with all fields populated from quiz diagnosis and ancestor entities"
      trace: FEAT-RCSL / F-RCSL-R001

      given:
        quiz = AuditableQuiz(List.of(), "quiz-1", null, null, "El gato se sentó.", List.of("The cat sat."), null)
        knowledge = AuditableKnowledge(List.of(), "Animals", "Complete the sentence.", true, "know-1", null, null)
        topic = AuditableTopic(List.of(), "topic-1", "Basic Animals", null)
        milestone = AuditableMilestone(List.of(), "ms-1", "A1", null)
        sld = buildDiagnosis(3, 2, 5, CefrLevel.A1, 0)
        quizDiag = buildQuizDiagnoses(sld)
        absentLemmas = List.of(buildAbsentLemma("cat", "NOUN", AbsenceType.COMPLETELY_ABSENT, 500))
        milestoneDiag = buildMilestoneDiagnoses(absentLemmas)
        tree = buildFullTree("ms-1", new AuditableMilestone(List.of(), "ms-1", "A1", null), milestoneDiag, new AuditableTopic(List.of(), "topic-1", "Basic Animals", null), new AuditableKnowledge(List.of(), "Animals", "Complete the sentence.", true, "know-1", null, null), new AuditableQuiz(List.of(), "quiz-1", null, null, "El gato se sentó.", List.of("The cat sat."), null), quizDiag)
        report = AuditReport(tree[0])
        task = buildTask("quiz-1")
        result = sut.resolve(report, task)
        ctx = result.get()

      then:
        result.isPresent() is true
        ctx.getTaskId() == "task-1"
        ctx.getSentence() == "The cat sat."
        ctx.getTranslation() == "El gato se sentó."
        ctx.getKnowledgeTitle() == "Animals"
        ctx.getKnowledgeInstructions() == "Complete the sentence."
        ctx.getTopicLabel() == "Basic Animals"
        ctx.getCefrLevel() == CefrLevel.A1
        ctx.getTokenCount() == 3
        ctx.getTargetMin() == 2
        ctx.getTargetMax() == 5
        ctx.getDelta() == 0
        ctx.getSuggestedLemmas() is not null
    - |
      test: "should populate sentence and translation from AuditableQuiz entity on the quiz node"
      trace: FEAT-RCSL / F-RCSL-R001

      given:
        quiz = AuditableQuiz(List.of(), "quiz-2", null, null, "Me encanta aprender.", List.of("I love learning."), null)
