    testCleanViews:
    - |
      test: "Given a valid course entity, when save is called, then validator is invoked and no exception is thrown"
      trace: F-COURSE

      given:
        sentencePart1 = SentencePartEntity(SentencePartKind.TEXT, "She ", List.of())
        sentencePart2 = SentencePartEntity(SentencePartKind.CLOZE, null, List.of("plays"))
        form1 = FormEntity("CLOZE", 1.0, null, null, List.of(sentencePart1, sentencePart2))
        quiz1 = QuizTemplateEntity("aaa111bbb222ccc333ddd441", "aaa111bbb222ccc333ddd441", "CLOZE", "aaa111bbb222ccc333ddd440", "Affirmative sentences", "Escribe la forma afirmativa.", "Ella juega", "a1.01.Present_Simple", "Present Simple", form1, 0.0, 0.0, 0.0, null, null, null, "A1.01.01.01", null, null, null)
        knowledge1 = KnowledgeEntity("aaa111bbb222ccc333ddd440", "aaa111bbb222ccc333ddd440", NodeKind.KNOWLEDGE, "Affirmative sentences", "11111111-1111-1111-1111-111111111111", "aaa111bbb222ccc333ddd430", true, "Escribe la forma afirmativa.", 1, "affirmative-sentences", List.of(quiz1))
        topic1 = TopicEntity("aaa111bbb222ccc333ddd430", "aaa111bbb222ccc333ddd430", NodeKind.TOPIC, "Present Simple", "22222222-2222-2222-2222-222222222222", "aaa111bbb222ccc333ddd420", List.of(), List.of("aaa111bbb222ccc333ddd440"), 1, "present-simple", List.of(knowledge1))
        milestone1 = MilestoneEntity("aaa111bbb222ccc333ddd420", "aaa111bbb222ccc333ddd420", NodeKind.MILESTONE, "A1", "33333333-3333-3333-3333-333333333333", "aaa111bbb222ccc333ddd410", List.of("aaa111bbb222ccc333ddd430"), 1, "a1", List.of(topic1))
        rootNode = RootNodeEntity("aaa111bbb222ccc333ddd410", "root", NodeKind.ROOT, null, List.of("aaa111bbb222ccc333ddd420"), List.of(milestone1))
        course1 = CourseEntity("000000000000000000000000", "english-course", List.of("aaa111bbb222ccc333ddd440"), rootNode, "english-course")
        targetPath = Path.of("/tmp/test-course-output")

      mock:
        courseValidator.validate(any())

      when:
        sut.save(course1, targetPath)

      then:
        verify: courseValidator.validate(any())
    - |
      test: "Given an invalid course entity, when save is called, then validator throws CourseValidationException"
      trace: F-COURSE

      given:
        invalidCourse = CourseEntity("000000000000000000000000", "invalid-course", List.of(), null, "invalid-course")
        targetPath = Path.of("/tmp/test-invalid-output")

      mock:
        courseValidator.validate(any()) -> throws CourseValidationException("/tmp", "estructura invalida")

      when:
        throws CourseValidationException: sut.save(invalidCourse, targetPath)
    - |
      test: "Given a course entity with validator passing, when save is called, then no exception is thrown"
      trace: F-COURSE

      given:
        sentencePart1 = SentencePartEntity(SentencePartKind.TEXT, "He ", List.of())
        sentencePart2 = SentencePartEntity(SentencePartKind.CLOZE, null, List.of("runs"))
        form1 = FormEntity("CLOZE", 1.0, null, null, List.of(sentencePart1, sentencePart2))
        quiz1 = QuizTemplateEntity("bbb111ccc222ddd333eee441", "bbb111ccc222ddd333eee441", "CLOZE", "bbb111ccc222ddd333eee440", "Running verbs", "Completa la oracion.", "El corre", "a1.02.Verbs", "Verbs", form1, 0.0, 0.0, 0.0, null, null, null, "A1.02.01.01", null, null, null)
        knowledge1 = KnowledgeEntity("bbb111ccc222ddd333eee440", "bbb111ccc222ddd333eee440", NodeKind.KNOWLEDGE, "Running verbs", "44444444-4444-4444-4444-444444444444", "bbb111ccc222ddd333eee430", true, "Completa la oracion.", 1, "running-verbs", List.of(quiz1))
        topic1 = TopicEntity("bbb111ccc222ddd333eee430", "bbb111ccc222ddd333eee430", NodeKind.TOPIC, "Verbs", "55555555-5555-5555-5555-555555555555", "bbb111ccc222ddd333eee420", List.of(), List.of("bbb111ccc222ddd333eee440"), 1, "verbs", List.of(knowledge1))
        milestone1 = MilestoneEntity("bbb111ccc222ddd333eee420", "bbb111ccc222ddd333eee420", NodeKind.MILESTONE, "A1", "66666666-6666-6666-6666-666666666666", "bbb111ccc222ddd333eee410", List.of("bbb111ccc222ddd333eee430"), 1, "a1", List.of(topic1))
        rootNode = RootNodeEntity("bbb111ccc222ddd333eee410", "root", NodeKind.ROOT, null, List.of("bbb111ccc222ddd333eee420"), List.of(milestone1))
        validCourse = CourseEntity("000000000000000000000000", "english-course", List.of("bbb111ccc222ddd333eee440"), rootNode, "english-course")
        targetPath = Path.of("/tmp/test-valid-output")

      mock:
        courseValidator.validate(any())

      when:
        doesNotThrow: sut.save(validCourse, targetPath)
    - |
      test: "Given a null course entity, when save is called, then an exception is thrown"
      trace: F-COURSE

      when:
        throws IllegalArgumentException: sut.save(null, Path.of("/tmp/test-null-output"))
    - |
      test: "Given validator rejects course with duplicate IDs, when save is called, then CourseValidationException propagates"
      trace: F-COURSE

      given:
        duplicateIdCourse = CourseEntity("000000000000000000000000", "duplicate-course", List.of(), null, "duplicate-course")

      mock:
        courseValidator.validate(any()) -> throws CourseValidationException("/tmp/test-dup-output", "Identificador duplicado: el ID aaa111 aparece en Milestone y en Topic")

      when:
        throws CourseValidationException: sut.save(duplicateIdCourse, Path.of("/tmp/test-dup-output"))
    - |
      test: "Given validator rejects course with broken parent references, when save is called, then CourseValidationException propagates"
      trace: F-COURSE

      given:
        brokenRefCourse = CourseEntity("000000000000000000000000", "broken-ref-course", List.of(), null, "broken-ref-course")

      mock:
        courseValidator.validate(any()) -> throws CourseValidationException("/tmp/test-broken-ref-output", "Integridad referencial rota: Topic (abc123) referencia al padre xyz789, pero el padre esperado es def456")

      when:
        throws CourseValidationException: sut.save(brokenRefCourse, Path.of("/tmp/test-broken-ref-output"))
    - |
      test: "Given validator rejects milestone with no topics, when save is called, then CourseValidationException propagates"
      trace: F-COURSE

      given:
        emptyMilestoneCourse = CourseEntity("000000000000000000000000", "empty-milestone-course", List.of(), null, "empty-milestone-course")

      mock:
        courseValidator.validate(any()) -> throws CourseValidationException("/tmp/test-empty-milestone-output", "Estructura incompleta: Milestone 'A1' (abc123) no tiene hijos")

      when:
        throws CourseValidationException: sut.save(emptyMilestoneCourse, Path.of("/tmp/test-empty-milestone-output"))
