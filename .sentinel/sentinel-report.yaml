        absentLemma = makeAbsentLemma("go", "VERB", AbsenceType.COMPLETELY_ABSENT, PriorityLevel.HIGH)
        topicNode = milestoneNode.getChildren().get(0)
        misplacedLemma = makeMisplacedLemma("run", "VERB", CefrLevel.A1)
        knowledgeNode = topicNode.getChildren().get(0)
        result = formatter.format("lemma-absence", course, "text")

      when:
        sut.setDiagnoses(courseWithAssessment(AbsenceAssessment.NEEDS_IMPROVEMENT))

      then:
