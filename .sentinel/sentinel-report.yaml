        quizDiagnoses.getLemmaAbsenceDiagnosis().get().getMisplacedLemmas().isEmpty() is false
    - |
      test: "should populate MisplacedLemma with lemmaAndPos expectedLevel and foundInLevel on quiz diagnosis"
      trace: FEAT-DLABS / F-DLABS-R010

      given:
        ambiguous = LemmaAndPos("ambiguous", "ADJ")
        token = NlpToken("ambiguous", "ambiguous", "ADJ", 2000, false, false)
