        output.contains("sentenceLength") || output.contains("scores") is true
    - |
      test: "Dado un ConsolidatedView con cualquier conjunto de fieldChanges, cuando format corre, entonces la salida NO contiene campos numericos precomputados acceptedDelta ni pendingDelta en ningun lugar; cada FieldChange se serializa como tripleta (original, consolidated, pendingProjection) sin restas — R010"
