    - name: "Dados tres AuditNode donde una de las hojas escalares pertenece a un\
        \ tipo de diagnostico no enumerado en seed alguna del exclusionRegistry, cuando\
        \ diff corre y los valores de esa hoja difieren entre fotos, entonces la hoja\
        \ aparece como field del mapa SIN requerir registro previo en ningun catalogo\
        \ — R019 invariante 2: aparicion automatica de cosas nuevas"
