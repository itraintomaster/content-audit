        sld2 = buildDiagnosis(2, 2, 5, CefrLevel.A1, 0)
        diag1 = buildQuizDiagnoses(sld1)
        diag2 = buildQuizDiagnoses(sld2)
        milestoneDiag = buildMilestoneDiagnoses(List.of())
