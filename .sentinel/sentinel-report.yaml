      then:
        output.contains("prop-nap-1") is true
        output.contains("prop-nap-2") is true
        output.contains("NODE_ABSENT") is true
        output.contains("ELEMENT_BEFORE_MISMATCH") is true
        output.contains("El nodo 'quiz-absent' no existe") is true
    - |
      test: "Dado un ConsolidatedView con availability UNAVAILABLE y un unavailability con reason y detail, cuando format corre, entonces la salida incluye consolidatedAvailability=UNAVAILABLE con la categoria y el detalle, y nodeImpacts no se intenta rendererizar como datos validos — R013 (v3 cleanup)"
