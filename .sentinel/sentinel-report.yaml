    testCleanViews:
    - |
      test: "should include LEMMA_ABSENCE tasks targeting QUIZ when quiz has lemma-absence score below 1.0"
      trace: FEAT-RCLA / F-RCLA-R001

      given:
        report = buildTreeWithQuizLemmaAbsenceScore(0.7)
        plan = sut.plan(report, "audit-001")
        lemmaAbsenceTasks = plan.getTasks().stream().filter(t -> t.getDiagnosisKind() == DiagnosisKind.LEMMA_ABSENCE).toList()

      then:
        lemmaAbsenceTasks.size() == 1
        lemmaAbsenceTasks.get(0).getNodeTarget() == AuditTarget.QUIZ
    - |
