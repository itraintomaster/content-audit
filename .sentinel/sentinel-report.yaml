    testCleanViews:
    - |
      test: "should treat multi-entry options and pipe-splits as equivalent variants of the same answer"
      trace: FEAT-QSENT / F-QSENT-R001

      given:
        multiEntry = form(text(""), cloze("He's", "He is"), text(" great."))
        pipeEntry = form(text(""), cloze("He's|He is"), text(" great."))
        fromMultiEntry = converter.toPlainSentences(multiEntry)
        fromPipeEntry = converter.toPlainSentences(pipeEntry)

      then:
        fromMultiEntry.size() == 2
        fromPipeEntry.size() == 2
        normalize(fromPipeEntry.get(0)) == normalize(fromMultiEntry.get(0))
        fromPipeEntry.stream().map(DefaultQuizSentenceConverterTest::normalize).sorted().collect(Collectors.toList()) == fromMultiEntry.stream().map(DefaultQuizSentenceConverterTest::normalize).sorted().collect(Collectors.toList())
    - |
      test: "should treat the pipe character as separator of equivalent variants inside an options entry"
      trace: FEAT-QSENT / F-QSENT-R002

      given:
        form = form(text("He"), cloze("is|'s"), text(" a teacher."))
        plains = converter.toPlainSentences(form)

      then:
        plains.size() == 2
        normalize(plains.get(0)) == "He is a teacher."
        normalize(plains.get(1)) == "He 's a teacher."
    - |
      test: "should fail atomically when a TEXT part has options populated"
      trace: FEAT-QSENT / F-QSENT-R003

      given:
        invalid = form(new SentencePartEntity(SentencePartKind.TEXT, "He is", List.of("wrong")), cloze("great"))

      when:
        throws QuizSentenceSerializationException: sut.serialize(invalid)
    - |
      test: "should fail atomically when a CLOZE part has null or empty options"
      trace: FEAT-QSENT / F-QSENT-R004

      given:
        nullOptions = form(text("He "), new SentencePartEntity(SentencePartKind.CLOZE, "", null))
        emptyOptions = form(text("He "), new SentencePartEntity(SentencePartKind.CLOZE, "", List.of()))

      when:
        throws QuizSentenceSerializationException: sut.serialize(nullOptions)
    - |
      test: "should reject an underscore run of length other than four as a blank"
      trace: FEAT-QSENT / F-QSENT-R005

      when:
        throws QuizSentenceParseException: sut.parse("He ___ [is] a teacher.")
    - |
      test: "should reject a blank that is not followed by an answer block in brackets"
      trace: FEAT-QSENT / F-QSENT-R006

      when:
        throws QuizSentenceParseException: sut.parse("He ____ is a teacher.")
    - |
      test: "should recognize parenthesized segments as pedagogical hints inside plain-text positions"
      trace: FEAT-QSENT / F-QSENT-R007

      given:
        form = form(text("He"), cloze("is|'s"), text(" (to be) great."))
        quizSentence = converter.serialize(form)
        reparsed = converter.parse(quizSentence)
        hintInTextPart = reparsed.getSentenceParts().stream().filter(p -> p.getKind() == SentencePartKind.TEXT).anyMatch(p -> p.getText() != null && p.getText().contains("(to be)"))

      then:
        quizSentence.contains("(to be)") is true
