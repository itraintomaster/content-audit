        output.contains("CourseElementSnapshot") is false
    - |
      test: "Dado un ConsolidatedView con varios nodeImpacts cuyos fieldChanges incluyen scores escalares cambiados, cuando format corre, entonces la salida NO contiene una seccion paralela 'statisticImpacts' ni equivalente; los scores cambiados solo aparecen como entradas del mapa fieldChanges del nodo correspondiente — R009"
