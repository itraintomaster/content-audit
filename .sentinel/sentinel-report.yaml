      status: EXISTS
      testFilePath: audit-infrastructure/src/test/java/com/learney/contentaudit/auditinfrastructure/FileSystemRevisionArtifactStoreTest.java
    - name: "Given the store is constructed with a non-default baseDir, when save\
        \ is called, then the artifact file lands under <baseDir>/.content-audit/revisions/<planId>/<proposalId>.*\
        \ and NOT under System.getProperty('user.dir')"
      status: EXISTS
      testFilePath: audit-infrastructure/src/test/java/com/learney/contentaudit/auditinfrastructure/FileSystemRevisionArtifactStoreTest.java
    testCleanViews:
    - |
      test: "Given a RevisionArtifact, when save is called, then a file is written under .content-audit/revisions/"
      trace: FEAT-REVBYP / F-REVBYP-R008

      given:
        store = storeFor(tempDir)
        artifact = buildArtifact("plan-001", "task-001-20260418T100000Z")
        returnedId = store.save(artifact)
        revisionsRoot = tempDir.resolve(".content-audit/revisions")

      then:
        Files.isDirectory(revisionsRoot) is true
        fileCount > 0 is true
        returnedId is not null
        returnedId.isBlank() is false
    - |
      test: "Given an artifact for plan P1 and proposal PR1, when save is called, then the file path is .content-audit/revisions/P1/PR1.<ext>"
      trace: FEAT-REVBYP / F-REVBYP-R009

      given:
        planId = "plan-P1"
        proposalId = "task-001-20260418T100000Z"
        store = storeFor(tempDir)
        artifact = buildArtifact(planId, proposalId)
        planDir = tempDir.resolve(".content-audit/revisions/" + planId)

      when:
        sut.save(artifact)

      then:
        Files.isDirectory(planDir) is true
    - |
      test: "Given a persisted artifact, when load is called, then all RevisionProposal fields plus verdict and rejectionReason are recoverable"
      trace: FEAT-REVBYP / F-REVBYP-R010

      given:
        planId = "plan-001"
        proposalId = "task-001-20260418T100000Z"
        store = storeFor(tempDir)
        original = buildArtifact(planId, proposalId)
        loadedOpt = store.load(planId, proposalId)
        loaded = loadedOpt.get()
        loadedProposal = loaded.getProposal()
        loadedBefore = loadedProposal.getElementBefore()
        loadedAfter = loadedProposal.getElementAfter()

      when:
        sut.save(original)

      then:
        loadedOpt.isPresent() is true
        loaded.getVerdict() == RevisionVerdict.APPROVED
        loaded.getRejectionReason() is null
        loadedProposal is not null
        loadedProposal.getProposalId() == proposalId
        loadedProposal.getTaskId() == "task-001"
        loadedProposal.getPlanId() == planId
        loadedProposal.getSourceAuditId() == "audit-001"
        loadedProposal.getDiagnosisKind() == DiagnosisKind.SENTENCE_LENGTH
        loadedProposal.getNodeTarget() == AuditTarget.QUIZ
        loadedProposal.getNodeId() == "quiz-node-001"
        loadedProposal.getRationale() == "bypass: identity revision"
        loadedProposal.getReviserKind() == "bypass"
        loadedProposal.getCreatedAt() == Instant.parse("2026-04-18T10:00:00Z")
        loadedBefore is not null
        loadedBefore.getNodeTarget() == AuditTarget.QUIZ
        loadedBefore.getNodeId() == "quiz-node-001"
        loadedAfter is not null
        loadedAfter.getNodeTarget() == AuditTarget.QUIZ
        loadedAfter.getNodeId() == "quiz-node-001"
    - |
      test: "Given artifacts saved under multiple plan directories, when findByProposalId(id, Optional.empty()) is called, then it scans subdirectories and returns the matching artifact"
      trace: FEAT-REVAPR / F-REVAPR-R002

      given:
        store = storeFor(tempDir)
        planA = "plan-alpha"
        planB = "plan-beta"
        targetProposalId = "task-xyz-20260420T100000Z"
        otherProposalId = "task-abc-20260420T090000Z"
        result = store.findByProposalId(targetProposalId, Optional.empty())

      when:
        sut.save(buildArtifact(planA, otherProposalId))

      then:
        result.isPresent() is true
        result.get().getProposal().getProposalId() == targetProposalId
        result.get().getProposal().getPlanId() == planB
    - |
      test: "Given no artifact matches the id, when findByProposalId(id, Optional.empty()) is called, then it returns Optional.empty"
      trace: FEAT-REVAPR / F-REVAPR-R002

      given:
        store = storeFor(tempDir)
        result = store.findByProposalId("task-nonexistent-20260420T100000Z", Optional.empty())

      when:
        sut.save(buildArtifact("plan-001", "task-aaa-20260420T100000Z"))

      then:
        result.isPresent() is false
    - |
      test: "Given an artifact saved under plan P1, when findByProposalId(id, Optional.of(P1)) is called, then it takes the direct path and returns the artifact"
      trace: FEAT-REVAPR / F-REVAPR-R002

      given:
        store = storeFor(tempDir)
        planId = "plan-P1"
        proposalId = "task-001-20260420T100000Z"
        result = store.findByProposalId(proposalId, Optional.of(planId))

      when:
        sut.save(buildArtifact(planId, proposalId))

      then:
        result.isPresent() is true
        result.get().getProposal().getProposalId() == proposalId
        result.get().getProposal().getPlanId() == planId
    - |
      test: "Given no artifact under plan P1 with that id, when findByProposalId(id, Optional.of(P1)) is called, then it returns Optional.empty"
      trace: FEAT-REVAPR / F-REVAPR-R002

      given:
        store = storeFor(tempDir)
        planId = "plan-P1"
        targetProposalId = "task-target-20260420T100000Z"
        result = store.findByProposalId(targetProposalId, Optional.of(planId))

      when:
        sut.save(buildArtifact(planId, "task-other-20260420T090000Z"))

      then:
        result.isPresent() is false
    - |
      test: "Given a PENDING_APPROVAL artifact whose taskId matches, when hasPendingProposalForTask is called, then it returns true"
      trace: FEAT-REVAPR / F-REVAPR-R009

      given:
        store = storeFor(tempDir)
        planId = "plan-001"
        taskId = "task-001"
        proposalId = taskId + "-20260420T100000Z"
