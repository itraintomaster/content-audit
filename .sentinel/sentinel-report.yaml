    testCleanViews:
    - |
      test: "Given a valid course path, when runAudit is called, then returns the audit report from the full chain"
      trace: F-CLI / F-CLI-R001 / F-CLI-J001

      given:
        result = sut.runAudit(coursePath, null)

      mock:
        courseRepository.load(coursePath) -> courseEntity
        courseToAuditableMapper.map(courseEntity) -> auditableCourse
        auditEngine.runAudit(auditableCourse) -> auditReport

      then:
        assertSame(auditReport)
    - |
      test: "Given a valid course path, when runAudit is called, then courseRepository load is invoked with the path"
      trace: F-CLI / F-CLI-R001

      mock:
        courseRepository.load(coursePath) -> courseEntity
        courseToAuditableMapper.map(courseEntity) -> auditableCourse
        auditEngine.runAudit(auditableCourse) -> auditReport

      when:
        sut.runAudit(coursePath, null)

      then:
        verify: courseRepository.load(coursePath)
    - |
      test: "Given a valid course path, when runAudit is called, then courseToAuditableMapper map is invoked with the loaded entity"
      trace: F-CLI / F-CLI-R001

      mock:
        courseRepository.load(coursePath) -> courseEntity
        courseToAuditableMapper.map(courseEntity) -> auditableCourse
        auditEngine.runAudit(auditableCourse) -> auditReport

      when:
        sut.runAudit(coursePath, null)

      then:
        verify: courseToAuditableMapper.map(courseEntity)
    - |
      test: "Given a valid course path, when runAudit is called, then contentAudit audit is invoked with the mapped auditable course"
      trace: F-CLI / F-CLI-R001

      mock:
        courseRepository.load(coursePath) -> courseEntity
        courseToAuditableMapper.map(courseEntity) -> auditableCourse
        auditEngine.runAudit(auditableCourse) -> auditReport

      when:
        sut.runAudit(coursePath, null)

      then:
        verify: auditEngine.runAudit(auditableCourse)
    - |
      test: "Given courseRepository throws an exception, when runAudit is called, then the exception propagates"
      trace: F-CLI / F-CLI-R001

      mock:
        courseRepository.load(coursePath) -> throws RuntimeException("load failed")

      when:
