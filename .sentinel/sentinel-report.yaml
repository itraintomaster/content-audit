      mock:
        courseRepository.load(coursePath) -> courseEntity
        courseToAuditableMapper.map(courseEntity) -> auditableCourse
        auditEngine.runAudit(auditableCourse) -> throws RuntimeException("audit failed")

      when:
        throws RuntimeException: sut.runAudit(coursePath, null)
    - |
      test: "Given a course with no milestones, when runAudit is called, then returns the report from contentAudit"
      trace: F-CLI / F-CLI-R001

      given:
