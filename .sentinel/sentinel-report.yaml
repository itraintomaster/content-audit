        evpCatalogPort.getCocaRank(single) -> Optional.of(500)
        evpCatalogPort.getSemanticCategory(single) -> Optional.of("animal")

      when:
        sut.onCourseComplete(rootNode)

      then:
        rootNode.getScores().getOrDefault("lemma-absence", 0.0) < 1.0 is true
