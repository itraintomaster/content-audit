    - |
      test: "should have priority bounds ordered high less than medium less than low"
      trace: FEAT-LABS / F-LABS-R011

      then:
        config.getHighPriorityBound() < config.getMediumPriorityBound() is true
        config.getMediumPriorityBound() < config.getLowPriorityBound() is true
    - |
      test: "should weight critical levels A1 and A2 higher than B1 and B2"
      trace: FEAT-LABS / F-LABS-R024

      then:
        config.getLevelWeight(CefrLevel.A1) > config.getLevelWeight(CefrLevel.B1) is true
        config.getLevelWeight(CefrLevel.A2) > config.getLevelWeight(CefrLevel.B2) is true
    - |
      test: "should have report limits increasing from high to low priority"
      trace: FEAT-LABS / F-LABS-R026

      then:
        config.getHighReportLimit() < config.getMediumReportLimit() is true
        config.getMediumReportLimit() < config.getLowReportLimit() is true
    - |
      test: "should have critical absence threshold greater than acceptable absence threshold"
      trace: FEAT-LABS / F-LABS-R025

      then:
        config.getCriticalAbsenceThreshold() > config.getAcceptableAbsenceThreshold() is true
    - |
      test: "should have alert thresholds non-decreasing from high to low priority"
      trace: FEAT-LABS / F-LABS-R014

      then:
        config.getHighPriorityAlertThreshold() <= config.getMediumPriorityAlertThreshold() is true
        config.getMediumPriorityAlertThreshold() <= config.getLowPriorityAlertThreshold() is true
    - |
      test: "should enforce zero tolerance for high priority alert threshold"
      trace: FEAT-LABS / F-LABS-R014

      then:
        config.getHighPriorityAlertThreshold() == 0
    - |
      test: "should enforce A1 zero tolerance with both absolute and percentage thresholds at zero"
      trace: FEAT-LABS / F-LABS-R021

      then:
        config.getAbsoluteThreshold(CefrLevel.A1) == 0
        config.getPercentageThreshold(CefrLevel.A1) == 0.0
    - |
      test: "should have discount per level that limits max penalty to 0.3 for three-level distance"
      trace: FEAT-LABS / F-LABS-R018

      then:
        config.getDiscountPerLevel() * 3 == 0.3
    - |
      test: "should return non-negative values for all thresholds and bounds"
      trace: FEAT-LABS / F-LABS-R021

      then:
        config.getHighPriorityBound() >= 0 is true
        config.getMediumPriorityBound() >= 0 is true
        config.getLowPriorityBound() >= 0 is true
        config.getCriticalAbsenceThreshold() >= 0 is true
        config.getAcceptableAbsenceThreshold() >= 0 is true
    - |
      test: "should return positive report limits for all priority levels"
      trace: FEAT-LABS / F-LABS-R026

      then:
        config.getHighReportLimit() > 0 is true
        config.getMediumReportLimit() > 0 is true
        config.getLowReportLimit() > 0 is true
    - |
      test: "should return discount per level between 0 exclusive and 1 exclusive"
      trace: FEAT-LABS / F-LABS-R018

      given:
        discount = config.getDiscountPerLevel()

      then:
        discount > 0.0 && discount < 1.0 is true
    - |
      test: "should return coverage target 0.95 for A1"
      trace: FEAT-LABS / F-LABS-R032

      then:
        config.getCoverageTarget(CefrLevel.A1) == 0.95
    - |
      test: "should return coverage target 0.85 for A2"
      trace: FEAT-LABS / F-LABS-R032

      then:
        config.getCoverageTarget(CefrLevel.A2) == 0.85
    - |
      test: "should return coverage target 0.70 for B1"
      trace: FEAT-LABS / F-LABS-R032

      then:
        config.getCoverageTarget(CefrLevel.B1) == 0.70
    - |
      test: "should return coverage target 0.55 for B2"
      trace: FEAT-LABS / F-LABS-R032

      then:
        config.getCoverageTarget(CefrLevel.B2) == 0.55
    - |
      test: "should have coverage targets decreasing from A1 to B2"
      trace: FEAT-LABS / F-LABS-R032

      then:
        config.getCoverageTarget(CefrLevel.A1) > config.getCoverageTarget(CefrLevel.A2) is true
        config.getCoverageTarget(CefrLevel.A2) > config.getCoverageTarget(CefrLevel.B1) is true
        config.getCoverageTarget(CefrLevel.B1) > config.getCoverageTarget(CefrLevel.B2) is true
