        sut.onQuiz(nonSentQuizNode)

      then:
        nonSentQuizNode.getScores().containsKey("sentence-length") is false
        sentQuizNode.getScores().containsKey("sentence-length") is true
        sentQuizNode.getScores().get("sentence-length") == 1.0
