      given:
        proposalId = "task-012a-100009"
        taskId = "task-012a"
        planId = "plan-012a"
        reason = "Content quality insufficient for this level"
        artifact = buildArtifact(proposalId, taskId, planId, RevisionVerdict.PENDING_APPROVAL)
        plan = buildPlanWithTask(planId, taskId, RefinementTaskStatus.PENDING)
        service = buildService()
        outcome = service.reject(proposalId, Optional.of(planId), Optional.of(reason))
        captor = ArgumentCaptor.forClass(RevisionArtifact.class)
        saved = captor.getValue()

      mock:
        artifactStore.findByProposalId(eq(proposalId), any()) -> Optional.of(artifact)
        refinementPlanStore.load(planId) -> Optional.of(plan)
        artifactStore.save(any(RevisionArtifact.class)) -> ".content-audit/revisions/" + planId + "/" + proposalId

      then:
        saved.getVerdict() == RevisionVerdict.REJECTED
        saved.getDecisionNote() == reason
        verify: artifactStore.save(captor.capture())
    - |
      test: "Given a PENDING_APPROVAL artifact, when reject is called, then CourseRepository is never asked to load or save the course"
      trace: FEAT-REVAPR / F-REVAPR-R012

      given:
        proposalId = "task-012b-100010"
        taskId = "task-012b"
        planId = "plan-012b"
        artifact = buildArtifact(proposalId, taskId, planId, RevisionVerdict.PENDING_APPROVAL)
        plan = buildPlanWithTask(planId, taskId, RefinementTaskStatus.PENDING)
        service = buildService()

      mock:
        artifactStore.findByProposalId(eq(proposalId), any()) -> Optional.of(artifact)
        refinementPlanStore.load(planId) -> Optional.of(plan)
        artifactStore.save(any(RevisionArtifact.class)) -> ".content-audit/revisions/" + planId + "/" + proposalId

      when:
        sut.reject(proposalId, Optional.of(planId), Optional.empty())

      then:
        verify: courseRepository.load(any(Path.class)) x 0
        verify: courseRepository.save(any(CourseEntity.class), any(Path.class)) x 0
    - |
      test: "Given reject succeeds, then the associated RefinementTask returns to its previous state (typically PENDING)"
      trace: FEAT-REVAPR / F-REVAPR-R014

      given:
        proposalId = "task-014c-100011"
        taskId = "task-014c"
        planId = "plan-014c"
        artifact = buildArtifact(proposalId, taskId, planId, RevisionVerdict.PENDING_APPROVAL)
        plan = buildPlanWithTask(planId, taskId, RefinementTaskStatus.PENDING)
        service = buildService()
        outcome = service.reject(proposalId, Optional.of(planId), Optional.empty())
        planCaptor = ArgumentCaptor.forClass(RefinementPlan.class)
        savedPlan = planCaptor.getValue()
        savedTask = savedPlan.getTasks().stream().filter(t -> taskId.equals(t.getId())).findFirst().orElseThrow(() -> new AssertionError("Task " + taskId + " not found in saved plan"))

      mock:
        artifactStore.findByProposalId(eq(proposalId), any()) -> Optional.of(artifact)
        refinementPlanStore.load(planId) -> Optional.of(plan)
        artifactStore.save(any(RevisionArtifact.class)) -> ".content-audit/revisions/" + planId + "/" + proposalId

      then:
        outcome.getKind() == ProposalDecisionOutcomeKind.REJECTED
        savedTask.getStatus() == RefinementTaskStatus.PENDING
        verify: refinementPlanStore.save(planCaptor.capture())
    - |
      test: "Given no proposal matches the supplied id, when reject is called, then the outcome is NOT_FOUND and no artifact or course is written"
      trace: FEAT-REVAPR / F-REVAPR-R012

      given:
        proposalId = "nonexistent-proposal-id-reject"
        service = buildService()
        outcome = service.reject(proposalId, Optional.empty(), Optional.empty())

      mock:
        artifactStore.findByProposalId(eq(proposalId), any()) -> Optional.empty()

      then:
        outcome.getKind() == ProposalDecisionOutcomeKind.NOT_FOUND
        verify: artifactStore.save(any(RevisionArtifact.class)) x 0
        verify: courseRepository.save(any(CourseEntity.class), any(Path.class)) x 0
    - |
      test: "Given a proposal whose verdict is already APPROVED, when reject is called, then the outcome is ALREADY_DECIDED and no side effects occur"
      trace: FEAT-REVAPR / F-REVAPR-R013

      given:
        proposalId = "task-013c-100013"
        taskId = "task-013c"
        planId = "plan-013c"
        artifact = buildArtifact(proposalId, taskId, planId, RevisionVerdict.APPROVED)
        service = buildService()
        outcome = service.reject(proposalId, Optional.of(planId), Optional.empty())

      mock:
        artifactStore.findByProposalId(eq(proposalId), any()) -> Optional.of(artifact)

      then:
        outcome.getKind() == ProposalDecisionOutcomeKind.ALREADY_DECIDED
        verify: artifactStore.save(any(RevisionArtifact.class)) x 0
        verify: courseRepository.save(any(CourseEntity.class), any(Path.class)) x 0
        verify: refinementPlanStore.save(any(RefinementPlan.class)) x 0
    - |
      test: "Given a proposal whose verdict is already REJECTED, when reject is called, then the outcome is ALREADY_DECIDED and no side effects occur"
      trace: FEAT-REVAPR / F-REVAPR-R013

      given:
        proposalId = "task-013d-100014"
        taskId = "task-013d"
        planId = "plan-013d"
        artifact = buildArtifact(proposalId, taskId, planId, RevisionVerdict.REJECTED)
        service = buildService()
        outcome = service.reject(proposalId, Optional.of(planId), Optional.empty())

      mock:
        artifactStore.findByProposalId(eq(proposalId), any()) -> Optional.of(artifact)

      then:
        outcome.getKind() == ProposalDecisionOutcomeKind.ALREADY_DECIDED
        verify: artifactStore.save(any(RevisionArtifact.class)) x 0
        verify: courseRepository.save(any(CourseEntity.class), any(Path.class)) x 0
        verify: refinementPlanStore.save(any(RefinementPlan.class)) x 0
  - name: DefaultLemmaAbsenceProposalStrategyRegistry
