        quizDiag = buildQuizDiagnoses(sld)
        absentLemmas = List.of(buildAbsentLemma("walk", "VERB", AbsenceType.COMPLETELY_ABSENT, 100), buildAbsentLemma("run", "VERB", AbsenceType.APPEARS_TOO_LATE, 200), buildAbsentLemma("fly", "VERB", AbsenceType.APPEARS_TOO_EARLY, 300))
