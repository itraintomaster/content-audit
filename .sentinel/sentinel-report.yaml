        course = AuditableCourse(Collections.emptyList())
        rootNode = buildEmptyCourseTree()

      mock:
        evpCatalogPort.getExpectedLemmas(CefrLevel.A1) -> new HashSet<>(List.of(phrase, single))
        evpCatalogPort.getExpectedLemmas(CefrLevel.A2) -> Collections.emptySet()
        evpCatalogPort.getExpectedLemmas(CefrLevel.B1) -> Collections.emptySet()
        evpCatalogPort.getExpectedLemmas(CefrLevel.B2) -> Collections.emptySet()
        evpCatalogPort.isPhrase("look up") -> true
        evpCatalogPort.isPhrase("cat") -> false
