    - |
      test: "should emit LemmaAbsenceLevelDiagnosis with coverage metrics on LevelDiagnoses milestone nodes"
      trace: FEAT-DLABS / F-DLABS-R002, F-DLABS-R005

      given:
        cat = LemmaAndPos("cat", "NOUN")
        rootNode = buildEmptyCourseTree()
        a1Node = rootNode.getChildren().get(0)
        levelDiagnoses = (LevelDiagnoses) a1Node.getDiagnoses()
        diagnosis = levelDiagnoses.getLemmaAbsenceDiagnosis().get()

      mock:
        evpCatalogPort.getExpectedLemmas(CefrLevel.A1) -> new HashSet<>(List.of(cat))
        evpCatalogPort.getExpectedLemmas(CefrLevel.A2) -> Collections.emptySet()
        evpCatalogPort.getExpectedLemmas(CefrLevel.B1) -> Collections.emptySet()
        evpCatalogPort.getExpectedLemmas(CefrLevel.B2) -> Collections.emptySet()
        evpCatalogPort.isPhrase("cat") -> false
        contentWordFilter.isContentWord(any()) -> true
        evpCatalogPort.getCocaRank(cat) -> Optional.of(500)
        evpCatalogPort.getSemanticCategory(cat) -> Optional.empty()

      when:
        sut.onCourseComplete(rootNode)

      then:
        assertInstanceOf(LevelDiagnoses.class)
        levelDiagnoses.getLemmaAbsenceDiagnosis().isPresent() is true
        diagnosis.getLevel() == CefrLevel.A1
        diagnosis.getTotalExpected() == 1
        diagnosis.getTotalAbsent() == 1
        diagnosis.getAbsencePercentage() > 0.0 is true
    - |
      test: "should include typed AbsentLemma entries with lemma pos absenceType and priority in level diagnosis"
      trace: FEAT-DLABS / F-DLABS-R006

      given:
        cat = LemmaAndPos("cat", "NOUN")
        rootNode = buildEmptyCourseTree()
        a1Node = rootNode.getChildren().get(0)
