      testFilePath: revision-domain/src/test/java/com/learney/contentaudit/revisiondomain/fielddiff/RecursiveNodeFieldDifferTest.java
    - name: "Dados tres AuditNode donde la unica diferencia entre fotos es un campo\
        \ cuyo nombre el exclusionRegistry clasifica como OPAQUE_PERSISTENCE_ID, cuando\
        \ diff corre, entonces el mapa retornado esta vacio: la hoja no se emite aunque\
        \ difiera — R020 categoria 1"
