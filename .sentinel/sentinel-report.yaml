        result = converter.serialize(form)

      then:
        result == "He ____ [is|'s] (to be) great."
    - |
      test: "should tolerate runs of whitespace on parse and normalize them"
      trace: FEAT-QSENT / F-QSENT-R010

      given:
        withExtraSpaces = "He  ____  [is|'s]  (to be) great."
        result = assertDoesNotThrow(() -> converter.parse(withExtraSpaces), "extra whitespace between elements should be tolerated by the parser")
        reSerialised = converter.serialize(result)

      then:
        normalize(reSerialised) == normalize("He ____ [is|'s] (to be) great.")
    - |
      test: "should serialize each TEXT preserving its hints with canonical whitespace"
      trace: FEAT-QSENT / F-QSENT-R011

      given:
        form = form(text("She sang"), cloze("loudly"), text(" (loud / loudly)."))
        result = converter.serialize(form)

      then:
        result == "She sang ____ [loudly] (loud / loudly)."
    - |
      test: "should serialize each CLOZE as four underscores followed by bracketed pipe-joined variants"
      trace: FEAT-QSENT / F-QSENT-R012

      given:
        multiEntry = form(text(""), cloze("He's", "He is"), text(" great."))
        result = multiEntry != null ? converter.serialize(multiEntry) : null
        pipeEntry = form(text("They"), cloze("'re going to drink|are going to drink"), text(" soon."))
        result2 = converter.serialize(pipeEntry)

      then:
        result is not null
        result.contains("____ [He's|He is]") is true
        result2.contains("____ ['re going to drink|are going to drink]") is true
    - |
      test: "should fail atomically when serializing an invalid FormEntity without producing partial output"
      trace: FEAT-QSENT / F-QSENT-R013

      given:
        invalidTextOptions = FormEntity("CLOZE", 1.0, "", "", List.of(new SentencePartEntity(SentencePartKind.TEXT, "He is", List.of("wrong")), new SentencePartEntity(SentencePartKind.CLOZE, "", List.of("great"))))
        ex = assertThrows(QuizSentenceSerializationException.class, () -> converter.serialize(invalidTextOptions))

      then:
        ex.getReason() is not null
        ex.getReason().isBlank() is false
    - |
      test: "should reconstruct alternating TEXT and CLOZE parts by scanning blank+block occurrences"
      trace: FEAT-QSENT / F-QSENT-R014

      given:
        quizSentence = "She sang ____ [loudly] (loud / loudly)."
        result = converter.parse(quizSentence)
        parts = result.getSentenceParts()
        allVariants = String.join("|", parts.get(1).getOptions())

      then:
        result is not null
        parts.size() == 3
        parts.get(0).getKind() == SentencePartKind.TEXT
        parts.get(1).getKind() == SentencePartKind.CLOZE
        parts.get(2).getKind() == SentencePartKind.TEXT
        parts.get(1).getOptions() is not null
        parts.get(1).getOptions().isEmpty() is false
        allVariants.contains("loudly") is true
    - |
      test: "should preserve hints inside the reconstructed TEXT text field and not extract them to the model"
      trace: FEAT-QSENT / F-QSENT-R015

      given:
        quizSentence = "She sang ____ [loudly] (loud / loudly)."
        result = converter.parse(quizSentence)
        parts = result.getSentenceParts()
        noHintKind = parts.stream().noneMatch(p -> p.getKind() == null || (!p.getKind().equals(SentencePartKind.TEXT) && !p.getKind().equals(SentencePartKind.CLOZE)))
        trailingText = parts.get(parts.size() - 1)

      then:
        noHintKind is true
        trailingText.getKind() == SentencePartKind.TEXT
        trailingText.getText().contains("(loud / loudly)") is true
    - |
      test: "should fail atomically when parsing a malformed quizSentence without producing partial output"
      trace: FEAT-QSENT / F-QSENT-R016

      given:
        ex = assertThrows(QuizSentenceParseException.class, () -> converter.parse("He [is] a teacher."), "bracket without blank must fail parse")

      then:
        ex.getReason() is not null
        ex.getReason().isBlank() is false
    - |
      test: "should return a list with one plain sentence per equivalent variant of the answer"
      trace: FEAT-QSENT / F-QSENT-R017

      given:
        form = form(text("He"), cloze("is|'s"), text(" a teacher."))
        plains = converter.toPlainSentences(form)

      when:
        sut.forEach(s -> assertFalse(s == null || s.isBlank(), "each plain sentence must be a non-blank string"))

      then:
        plains is not null
        plains.size() == 2
    - |
      test: "should place the first sub-variant of the first options entry at index 0 as the canonical variant"
      trace: FEAT-QSENT / F-QSENT-R018

      given:
        form1 = form(text("He"), cloze("is|'s"), text(" great."))
        plains1 = converter.toPlainSentences(form1)
        form2 = form(text(""), cloze("He's", "He is"), text(" great."))
        plains2 = converter.toPlainSentences(form2)
        form3 = form(text("They"), cloze("'re going to drink|are going to drink"), text(" tonight."))
        plains3 = converter.toPlainSentences(form3)

      then:
        normalize(plains1.get(0)) == "He is great."
        normalize(plains2.get(0)).contains("He's") is true
        normalize(plains3.get(0)).contains("'re going to drink") is true
    - |
      test: "should strip pedagogical hints from every emitted plain sentence"
      trace: FEAT-QSENT / F-QSENT-R019

      given:
        form = form(text("He"), cloze("is|'s"), text(" (to be) great."))
        plains = converter.toPlainSentences(form)

      when:
        sut.forEach(s -> assertFalse(s.contains("(to be)"), "plain sentence must not contain hint '(to be)': " + s))
    - |
      test: "should normalize whitespace in every emitted plain sentence after hint stripping"
      trace: FEAT-QSENT / F-QSENT-R019

      given:
        form = form(text("He "), cloze("is"), text(" (to be) great."))
        plains = converter.toPlainSentences(form)
        plain = plains.get(0)

      then:
        plains.size() == 1
        plain.contains("  ") is false
        plain.trim() == "He is great."
    - |
      test: "should produce the same plain sentences list whether derived directly from sentenceParts or via quizSentence"
      trace: FEAT-QSENT / F-QSENT-R020

      given:
        form = form(text("She sang"), cloze("loudly"), text(" (loud / loudly)."))
        viaPartsDirectly = converter.toPlainSentences(form)
        quizSentence = converter.serialize(form)
        reparsed = converter.parse(quizSentence)
        viaQuizSentence = converter.toPlainSentences(reparsed)

      then:
        viaQuizSentence.size() == viaPartsDirectly.size()
    - |
      test: "should fail atomically when toPlainSentences is called on an invalid FormEntity"
      trace: FEAT-QSENT / F-QSENT-R024

      given:
        invalidClozeNoOptions = form(text("He "), new SentencePartEntity(SentencePartKind.CLOZE, "", null))

      when:
        throws QuizSentenceSerializationException: sut.toPlainSentences(invalidClozeNoOptions)
    - |
      test: "should preserve semantics on round-trip sentenceParts to quizSentence to sentenceParts under whitespace-normalized equivalence"
      trace: FEAT-QSENT / F-QSENT-R021

      given:
        original = form(text("She sang"), cloze("loudly"), text(" (loud / loudly)."))
        quizSentence = converter.serialize(original)
        recovered = converter.parse(quizSentence)
        origParts = original.getSentenceParts()
        recovParts = recovered.getSentenceParts()

      then:
        recovParts.size() == origParts.size()
    - |
      test: "should preserve the quizSentence string on round-trip through sentenceParts under whitespace-normalized equivalence"
      trace: FEAT-QSENT / F-QSENT-R022

      given:
        original = "She sang ____ [loudly] (loud / loudly)."
        parsed = converter.parse(original)
        recovered = converter.serialize(parsed)

      then:
        normalize(recovered) == normalize(original)
    - |
      test: "should expose only the three forward conversions and no inverse reconstruction from a plain sentence"
      trace: FEAT-QSENT / F-QSENT-R023

      given:
        methods = QuizSentenceConverter.class.getDeclaredMethods()
        methodNames = Arrays.stream(methods).filter(m -> !m.isDefault() && !java.lang.reflect.Modifier.isStatic(m.getModifiers())).map(Method::getName).sorted().collect(Collectors.toList())

      when:
        sut.forEach(name -> assertFalse(name.toLowerCase().contains("from") || name.toLowerCase().contains("reconstruct"), "interface must not expose inverse reconstruction: " + name))

      then:
        methodNames.size() == 3
        methodNames.contains("serialize") is true
        methodNames.contains("parse") is true
        methodNames.contains("toPlainSentences") is true
    - |
      test: "should round-trip every real CLOZE in db english-course quizzes json fixtures without error"
      trace: FEAT-QSENT / F-QSENT-R028

      given:
        realFixtures = List.of(// From a1/adjetives-and-adverbs/adjective-vs-adverb/quizzes.json
      form(text("She sang"), cloze("loudly"), text(" (loud / loudly).")), // From a1/adjetives-and-adverbs/good-or-well/quizzes.json
      form(text("Peter speaks"), cloze("well"), text(" (good / well) English.")), // From b2/adjectives/hyphenated-compound-adjectives/quizzes.json
      form(text("The river was"), cloze("fast flowing"), text(" (fast flowing / fast-flowing) because it had rained a lot.")), // Pipe-variant option pattern (observed in present-simple topics)
      form(text("He"), cloze("is|'s"), text(" a teacher.")), // Multi-entry options pattern (observed with contractions)
      form(text(""), cloze("He's", "He is"), text(" at work.")), // Pipe-variant with possessive (observed in future tense topics)
      form(text("They"), cloze("'re going to drink|are going to drink"), text(" some water.")), // Hint with (to be) pattern
      form(text("He"), cloze("is|'s"), text(" (to be) great.")))
    - |
      test: "should be consumable as a public course-domain service from another module"
      trace: FEAT-QSENT / F-QSENT-R025

      given:
        converterInterface = QuizSentenceConverter.class
        serializationEx = QuizSentenceSerializationException.class
        parseEx = QuizSentenceParseException.class

      then:
        java.lang.reflect.Modifier.isPublic(converterInterface.getModifiers()) is true
        java.lang.reflect.Modifier.isPublic(serializationEx.getModifiers()) is true
        java.lang.reflect.Modifier.isPublic(parseEx.getModifiers()) is true
        converterInterface.getPackageName() == "com.learney.contentaudit.coursedomain.quizsentence"
        serializationEx.getPackageName() == "com.learney.contentaudit.coursedomain.quizsentence"
        parseEx.getPackageName() == "com.learney.contentaudit.coursedomain.quizsentence"
        java.lang.reflect.Modifier.isPublic(DefaultQuizSentenceConverter.class.getModifiers()) is true
        converterInterface.isInstance(converter) is true
