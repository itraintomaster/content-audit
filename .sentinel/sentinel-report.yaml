        report = AuditReport(tree[0])
        task = buildTask("quiz-9")
        result = sut.resolve(report, task)
        lemmas = result.get().getSuggestedLemmas()

      then:
        result.isPresent() is true
        lemmas.size() == 2
        lemmas.stream().noneMatch(l -> l.getReason().equals("APPEARS_TOO_EARLY")) is true
        lemmas.stream().anyMatch(l -> l.getLemma().equals("walk")) is true
        lemmas.stream().anyMatch(l -> l.getLemma().equals("run")) is true
