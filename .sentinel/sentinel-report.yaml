    - |
      test: "should include only COMPLETELY_ABSENT and APPEARS_TOO_LATE lemmas and exclude APPEARS_TOO_EARLY"
      trace: FEAT-RCSL / F-RCSL-R003

      given:
        quiz = AuditableQuiz(List.of(), "quiz-9", null, null, null, List.of("A sentence."), null)
        knowledge = AuditableKnowledge(List.of(), "T", "D.", true, "know-9", null, null)
