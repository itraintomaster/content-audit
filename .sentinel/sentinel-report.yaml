      trace: FEAT-RCLA / F-RCLA-R001

      given:
        report = buildTreeWithQuizLemmaAbsenceScore(1.0)
        plan = sut.plan(report, "audit-003")
        lemmaAbsenceCount = plan.getTasks().stream().filter(t -> t.getDiagnosisKind() == DiagnosisKind.LEMMA_ABSENCE).count()

      then:
        lemmaAbsenceCount == 0
    - |
      test: "should still generate COCA_BUCKETS and LEMMA_RECURRENCE tasks at MILESTONE and COURSE level after re-routing"
      trace: FEAT-RCLA / F-RCLA-R001

      given:
        courseNode = buildNode(AuditTarget.COURSE, "course-1", "My Course", Map.of("coca-buckets-distribution", 0.6, "lemma-recurrence", 0.7))
        milestoneNode = buildNode(AuditTarget.MILESTONE, "ms-1", "Milestone A1", Map.of("coca-buckets-distribution", 0.5, "lemma-recurrence", 0.8))
        topicNode = buildNode(AuditTarget.TOPIC, "topic-1", "Topic 1", Collections.emptyMap())
        knowledgeNode = buildNode(AuditTarget.KNOWLEDGE, "knowledge-1", "Knowledge 1", Collections.emptyMap())
        quizNode = buildNode(AuditTarget.QUIZ, "quiz-1", "Quiz 1", Map.of("lemma-absence", 1.0))
        report = AuditReport(courseNode)
        plan = sut.plan(report, "audit-004")
        cocaTaskCount = plan.getTasks().stream().filter(t -> t.getDiagnosisKind() == DiagnosisKind.COCA_BUCKETS).count()
        lrecTaskCount = plan.getTasks().stream().filter(t -> t.getDiagnosisKind() == DiagnosisKind.LEMMA_RECURRENCE).count()
        lemmaAbsenceCount = plan.getTasks().stream().filter(t -> t.getDiagnosisKind() == DiagnosisKind.LEMMA_ABSENCE).count()

      then:
        cocaTaskCount > 0 is true
        lrecTaskCount > 0 is true
        lemmaAbsenceCount == 0
