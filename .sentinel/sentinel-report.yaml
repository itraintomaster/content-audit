        sentencePart2 = SentencePartEntity(SentencePartKind.CLOZE, null, List.of("plays"))
        form1 = FormEntity("CLOZE", 1.0, null, null, List.of(sentencePart1, sentencePart2))
        quiz1 = QuizTemplateEntity("aaa111bbb222ccc333ddd441", "aaa111bbb222ccc333ddd441", "CLOZE", "aaa111bbb222ccc333ddd440", "Affirmative sentences", "Escribe la forma afirmativa.", "Ella juega", "a1.01.Present_Simple", "Present Simple", form1, 0.0, 0.0, 0.0, null, null, null, "A1.01.01.01", null, null, null)
        knowledge1 = KnowledgeEntity("aaa111bbb222ccc333ddd440", "aaa111bbb222ccc333ddd440", NodeKind.KNOWLEDGE, "Affirmative sentences", "11111111-1111-1111-1111-111111111111", "aaa111bbb222ccc333ddd430", true, "Escribe la forma afirmativa.", 1, "affirmative-sentences", List.of(quiz1))
        topic1 = TopicEntity("aaa111bbb222ccc333ddd430", "aaa111bbb222ccc333ddd430", NodeKind.TOPIC, "Present Simple", "22222222-2222-2222-2222-222222222222", "aaa111bbb222ccc333ddd420", List.of(), List.of("aaa111bbb222ccc333ddd440"), 1, "present-simple", List.of(knowledge1))
        milestone1 = MilestoneEntity("aaa111bbb222ccc333ddd420", "aaa111bbb222ccc333ddd420", NodeKind.MILESTONE, "A1", "33333333-3333-3333-3333-333333333333", "aaa111bbb222ccc333ddd410", List.of("aaa111bbb222ccc333ddd430"), 1, "a1", List.of(topic1))
        rootNode = RootNodeEntity("aaa111bbb222ccc333ddd410", "root", NodeKind.ROOT, null, List.of("aaa111bbb222ccc333ddd420"), List.of(milestone1))
        course1 = CourseEntity("000000000000000000000000", "english-course", List.of("aaa111bbb222ccc333ddd440"), rootNode, "english-course")
        targetPath = Path.of("/tmp/test-course-output")

      mock:
        courseValidator.validate(any())

      when:
        sut.save(course1, targetPath)

      then:
        verify: courseValidator.validate(any())
    - |
      test: "Given an invalid course entity, when save is called, then validator throws CourseValidationException"
      trace: F-COURSE

      given:
        invalidCourse = CourseEntity("000000000000000000000000", "invalid-course", List.of(), null, "invalid-course")
        targetPath = Path.of("/tmp/test-invalid-output")

      mock:
        courseValidator.validate(any()) -> throws CourseValidationException("/tmp", "estructura invalida")

      when:
