        nonSentQuiz = AuditableQuiz(tokens(1), null, null, null, null, List.of("apple"), null)
        nonSentQuizNode = buildQuizNode(nonSentKnowledgeNode, nonSentQuiz)
        sentKnowledge = AuditableKnowledge(List.of(), "Sentences", "Complete", true, null, null, null)
        sentKnowledgeNode = buildKnowledgeNode(topicNode, sentKnowledge)
        sentQuiz = AuditableQuiz(tokens(6), null, null, null, null, List.of("She likes red apples very much"), null)
        sentQuizNode = buildQuizNode(sentKnowledgeNode, sentQuiz)
        rangeA1 = TargetRange(CefrLevel.A1, 5, 8)

      mock:
        config.getTargetRange(any()) -> Optional.of(rangeA1)
        config.getToleranceMargin() -> 4

