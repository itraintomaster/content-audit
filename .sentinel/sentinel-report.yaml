    tests:
    - name: classify returns LLM_OTHER for a Throwable not matched by any specific
        category
      status: EXISTS
      testFilePath: revision-infrastructure/src/test/java/com/learney/contentaudit/revisioninfrastructure/lagenopenai/DefaultLangChainErrorClassifierTest.java
    - name: classify never returns null for any non-null Throwable
      status: EXISTS
      testFilePath: revision-infrastructure/src/test/java/com/learney/contentaudit/revisioninfrastructure/lagenopenai/DefaultLangChainErrorClassifierTest.java
    - name: classify returns LLM_UNREACHABLE for a ConnectException anywhere in the
        cause chain
      status: EXISTS
      testFilePath: revision-infrastructure/src/test/java/com/learney/contentaudit/revisioninfrastructure/lagenopenai/DefaultLangChainErrorClassifierTest.java
    - name: classify returns LLM_UNREACHABLE for an UnknownHostException anywhere
        in the cause chain
      status: EXISTS
      testFilePath: revision-infrastructure/src/test/java/com/learney/contentaudit/revisioninfrastructure/lagenopenai/DefaultLangChainErrorClassifierTest.java
    - name: classify returns LLM_UNREACHABLE for a NoRouteToHostException anywhere
        in the cause chain
      status: EXISTS
      testFilePath: revision-infrastructure/src/test/java/com/learney/contentaudit/revisioninfrastructure/lagenopenai/DefaultLangChainErrorClassifierTest.java
    - name: classify returns LLM_TIMEOUT for a SocketTimeoutException anywhere in
        the cause chain
      status: EXISTS
      testFilePath: revision-infrastructure/src/test/java/com/learney/contentaudit/revisioninfrastructure/lagenopenai/DefaultLangChainErrorClassifierTest.java
    - name: classify returns LLM_TIMEOUT for a java.util.concurrent.TimeoutException
        anywhere in the cause chain
      status: EXISTS
      testFilePath: revision-infrastructure/src/test/java/com/learney/contentaudit/revisioninfrastructure/lagenopenai/DefaultLangChainErrorClassifierTest.java
    - name: classify returns LLM_AUTH_FAILED for an OpenAiHttpException whose statusCode
        is 401
      status: EXISTS
      testFilePath: revision-infrastructure/src/test/java/com/learney/contentaudit/revisioninfrastructure/lagenopenai/DefaultLangChainErrorClassifierTest.java
    - name: classify returns LLM_AUTH_FAILED for an OpenAiHttpException whose statusCode
        is 403
      status: EXISTS
      testFilePath: revision-infrastructure/src/test/java/com/learney/contentaudit/revisioninfrastructure/lagenopenai/DefaultLangChainErrorClassifierTest.java
    - name: classify returns LLM_AUTH_FAILED when the root cause message matches the
        auth heuristic regex (case-insensitive 'unauthorized' / 'forbidden' / '401'
        / '403' / 'invalid api key')
      status: EXISTS
      testFilePath: revision-infrastructure/src/test/java/com/learney/contentaudit/revisioninfrastructure/lagenopenai/DefaultLangChainErrorClassifierTest.java
    testCleanViews:
    - |
      test: "classify returns LLM_OTHER for a Throwable not matched by any specific category"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        generic = RuntimeException("Something unexpected happened")
        result = classifier.classify(generic)

      then:
        result == LlmGenerationFailureCategory.LLM_OTHER
    - |
      test: "classify never returns null for any non-null Throwable"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        cause = RuntimeException("any error")
        result = classifier.classify(cause)

      then:
        result is not null
    - |
      test: "classify returns LLM_UNREACHABLE for a ConnectException anywhere in the cause chain"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        root = ConnectException("Connection refused to localhost:1234")
        wrapper = RuntimeException("LLM call failed", root)
        result = classifier.classify(wrapper)

      then:
        result == LlmGenerationFailureCategory.LLM_UNREACHABLE
    - |
      test: "classify returns LLM_UNREACHABLE for an UnknownHostException anywhere in the cause chain"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        root = UnknownHostException("api.example.com")
        wrapper = RuntimeException("Network error", root)
        result = classifier.classify(wrapper)

      then:
        result == LlmGenerationFailureCategory.LLM_UNREACHABLE
    - |
      test: "classify returns LLM_UNREACHABLE for a NoRouteToHostException anywhere in the cause chain"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        root = NoRouteToHostException("No route to 192.168.1.100")
        wrapper = RuntimeException("Routing error", root)
        result = classifier.classify(wrapper)

      then:
        result == LlmGenerationFailureCategory.LLM_UNREACHABLE
    - |
      test: "classify returns LLM_TIMEOUT for a SocketTimeoutException anywhere in the cause chain"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        root = SocketTimeoutException("Read timed out after 30s")
        wrapper = RuntimeException("Request failed", root)
        result = classifier.classify(wrapper)

      then:
        result == LlmGenerationFailureCategory.LLM_TIMEOUT
    - |
      test: "classify returns LLM_TIMEOUT for a java.util.concurrent.TimeoutException anywhere in the cause chain"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        root = TimeoutException("Future timed out after 30s")
        wrapper = RuntimeException("Async failure", root)
        result = classifier.classify(wrapper)

      then:
        result == LlmGenerationFailureCategory.LLM_TIMEOUT
    - |
      test: "classify returns LLM_TIMEOUT for an InterruptedIOException anywhere in the cause chain (OkHttp call/read timeout)"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        root = java.io.InterruptedIOException("timeout")
        wrapper = RuntimeException(root)
        result = classifier.classify(wrapper)

      then:
        result == LlmGenerationFailureCategory.LLM_TIMEOUT
    - |
      test: "classify returns LLM_AUTH_FAILED for an OpenAiHttpException whose statusCode is 401"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        httpEx = OpenAiHttpException(401, "Unauthorized")
        result = classifier.classify(httpEx)

      then:
        result == LlmGenerationFailureCategory.LLM_AUTH_FAILED
    - |
      test: "classify returns LLM_AUTH_FAILED for an OpenAiHttpException whose statusCode is 403"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        httpEx = OpenAiHttpException(403, "Forbidden")
        result = classifier.classify(httpEx)

      then:
        result == LlmGenerationFailureCategory.LLM_AUTH_FAILED
    - |
      test: "classify returns LLM_AUTH_FAILED when the root cause message matches the auth heuristic regex (case-insensitive 'unauthorized' / 'forbidden' / '401' / '403' / 'invalid api key')"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        heuristicMatch = RuntimeException("Request failed: invalid api key provided")
        result = classifier.classify(heuristicMatch)

      then:
        result == LlmGenerationFailureCategory.LLM_AUTH_FAILED
