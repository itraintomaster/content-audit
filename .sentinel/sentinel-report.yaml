    - |
      test: "should read typed diagnoses from course milestone and quiz nodes for formatting"
      trace: FEAT-DLABS / F-DLABS-R004, F-DLABS-R005, F-DLABS-R009 / F-DLABS-J003

      given:
        course = buildFullTree()
        cd = courseWithAssessment(AbsenceAssessment.NEEDS_IMPROVEMENT)
        milestoneNode = course.getChildren().get(0)
        absentLemma = makeAbsentLemma("take", "VERB", AbsenceType.COMPLETELY_ABSENT, PriorityLevel.LOW)
        ld = levelWithDiagnosis(300, 30, 10.0, 0.80, 0.75, 0.70, 0.65, List.of(absentLemma))
        topicNode = milestoneNode.getChildren().get(0)
        knowledgeNode = topicNode.getChildren().get(0)
        quizNode = knowledgeNode.getChildren().get(0)
        quizMisplaced = makeMisplacedLemma("know", "VERB", CefrLevel.A1)
        jsonResult = formatter.format("lemma-absence", course, "json")

      when:
        sut.setDiagnoses(cd)

      then:
        jsonResult.contains("NEEDS_IMPROVEMENT") is true
        jsonResult.contains("\"totalExpected\": 300") is true
        jsonResult.contains("\"totalAbsent\": 30") is true
        jsonResult.contains("take") is true
        jsonResult.contains("know") is true
    - |
      test: "should handle missing diagnosis gracefully when analyzer did not produce results"
      trace: FEAT-DLABS / F-DLABS-R003 / F-DLABS-J003

      given:
        course = buildFullTree()

      then:
        assertDoesNotThrow(() -> {
          String textResult = formatter.format("lemma-absence", course, "text");
          assertNotNull(textResult);
          assertTrue(textResult.contains("N/A"), "Missing course diagnosis should produce N/A assessment");
      })
        assertDoesNotThrow(() -> {
          String jsonResult = formatter.format("lemma-absence", course, "json");
          assertNotNull(jsonResult);
          assertTrue(jsonResult.contains("\"assessment\": null"), "Missing course diagnosis should produce null assessment in JSON");
      })
        assertDoesNotThrow(() -> {
          String tableResult = formatter.format("lemma-absence", course, "table");
          assertNotNull(tableResult);
          assertTrue(tableResult.contains("N/A"), "Missing course diagnosis should produce N/A in table");
      })
