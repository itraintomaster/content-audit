    - |
      test: "should have alert thresholds non-decreasing from high to low priority"
      trace: FEAT-LABS / F-LABS-R014

      then:
        config.getHighPriorityAlertThreshold() <= config.getMediumPriorityAlertThreshold() is true
        config.getMediumPriorityAlertThreshold() <= config.getLowPriorityAlertThreshold() is true
    - |
