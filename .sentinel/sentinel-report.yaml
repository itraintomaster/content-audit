      test: "Dado un ScoreDelta producido por compute para cualquier (nivel, dimension), entonces los tres campos before, after y difference estan presentes y difference es exactamente after menos before"
      trace: FEAT-PIPRE / F-PIPRE-R006

      given:
        course = minimalCourse("course-r006-001")
        prop = proposal("proposal-r006-001", "quiz-r006-001")
        baselineLemmaScore = 0.60
        simulatedLemmaScore = 0.75
        expectedDifference = simulatedLemmaScore - baselineLemmaScore
        quizBaseline = AuditNode(null, AuditTarget.QUIZ, null, List.of(), Map.of("lemma-absence", baselineLemmaScore), Map.of(), null)
        courseBaseline = AuditNode(null, AuditTarget.COURSE, null, List.of(quizBaseline), Map.of("lemma-absence", baselineLemmaScore), Map.of(), null)
        baselineReport = AuditReport(courseBaseline)
        quizSim = AuditNode(null, AuditTarget.QUIZ, null, List.of(), Map.of("lemma-absence", simulatedLemmaScore), Map.of(), null)
        courseSim = AuditNode(null, AuditTarget.COURSE, null, List.of(quizSim), Map.of("lemma-absence", simulatedLemmaScore), Map.of(), null)
        simulatedReport = AuditReport(courseSim)
        auditableCourse = mock(AuditableCourse.class)
        computer = buildComputer()
        preview = computer.compute(course, prop)
        quizImpact = preview.getLevelImpacts().stream().filter(li -> li.getNodeTarget() == AuditTarget.QUIZ).findFirst().orElseThrow(() -> new AssertionError("QUIZ not found in levelImpacts"))
        lemmaAbsenceDelta = quizImpact.getDimensionDeltas().stream().filter(dd -> "lemma-absence".equals(dd.getDimension())).findFirst().orElseThrow(() -> new AssertionError("lemma-absence dimension not found"))

      mock:
        auditReportStore.loadLatest() -> Optional.of(baselineReport)
        elementLocator.snapshot(any(), any(), any()) -> Optional.of(prop.getElementAfter())
        elementLocator.replace(any(), any()) -> course
        courseMapper.map(any()) -> auditableCourse
        auditEngine.runAudit(any()) -> simulatedReport

      when:
        sut.forEach(li -> {
          // Check aggregateDelta
          var agg = li.getAggregateDelta();
          assertEquals(agg.getAfter() - agg.getBefore(), agg.getDifference(), 0.0001, "aggregateDelta.difference must equal after-before at level " + li.getNodeTarget());
          // Check each dimensionDelta
          li.getDimensionDeltas().forEach(dd -> {
              var d = dd.getDelta();
              assertEquals(d.getAfter() - d.getBefore(), d.getDifference(), 0.0001, "DimensionDelta.difference must equal after-before for dimension " + dd.getDimension());
          });
      })

      then:
        preview.getAvailability() == ImpactPreviewAvailability.AVAILABLE
        preview.getLevelImpacts().isEmpty() is false
        lemmaAbsenceDelta.getDelta().getBefore() == baselineLemmaScore
        lemmaAbsenceDelta.getDelta().getAfter() == simulatedLemmaScore
        lemmaAbsenceDelta.getDelta().getDifference() == expectedDifference
