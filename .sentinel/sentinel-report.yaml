    tests:
    - name: "Given a Reviser registered for SENTENCE_LENGTH, when propose is called\
        \ with a SENTENCE_LENGTH task, then the registered Reviser handles it"
      status: EXISTS
      testFilePath: revision-domain/src/test/java/com/learney/contentaudit/revisiondomain/engine/DispatchingReviserTest.java
    - name: "Given no Reviser registered for a DiagnosisKind, when propose is called,\
        \ then the IdentityReviser fallback handles it"
      status: EXISTS
      testFilePath: revision-domain/src/test/java/com/learney/contentaudit/revisiondomain/engine/DispatchingReviserTest.java
    - name: "Given neither a registered Reviser nor a fallback, when handles is queried\
        \ for an unknown DiagnosisKind, then it returns false"
      status: EXISTS
      testFilePath: revision-domain/src/test/java/com/learney/contentaudit/revisiondomain/engine/DispatchingReviserTest.java
    testCleanViews:
    - |
      test: "Given a Reviser registered for SENTENCE_LENGTH, when propose is called with a SENTENCE_LENGTH task, then the registered Reviser handles it"
      trace: FEAT-REVBYP / F-REVBYP-R003

      given:
        sentenceLengthReviser = mock(Reviser.class)
        task = mock(RefinementTask.class)
        snapshot = mock(CourseElementSnapshot.class)
        expectedProposal = mock(RevisionProposal.class)
        fallback = mock(IdentityReviser.class)
        dispatcher = DispatchingReviser(Map.of(DiagnosisKind.SENTENCE_LENGTH, sentenceLengthReviser), fallback)
        actual = dispatcher.propose(task, null, snapshot)

      mock:
        task.getDiagnosisKind() -> DiagnosisKind.SENTENCE_LENGTH
        sentenceLengthReviser.handles(DiagnosisKind.SENTENCE_LENGTH) -> true
        sentenceLengthReviser.propose(eq(task), any(), eq(snapshot)) -> expectedProposal

      then:
        assertSame(expectedProposal)
        verify: sentenceLengthReviser.propose(eq(task), any(), eq(snapshot))
    - |
      test: "Given no Reviser registered for a DiagnosisKind, when propose is called, then the IdentityReviser fallback handles it"
      trace: FEAT-REVBYP / F-REVBYP-R004

      given:
        task = mock(RefinementTask.class)
        snapshot = mock(CourseElementSnapshot.class)
        fallbackProposal = mock(RevisionProposal.class)
        fallback = mock(IdentityReviser.class)
        dispatcher = DispatchingReviser(Map.of(), fallback)
        actual = dispatcher.propose(task, null, snapshot)

      mock:
        task.getDiagnosisKind() -> DiagnosisKind.COCA_BUCKETS
        fallback.handles(DiagnosisKind.COCA_BUCKETS) -> true
        fallback.propose(eq(task), any(), eq(snapshot)) -> fallbackProposal

      then:
        assertSame(fallbackProposal)
        verify: fallback.propose(eq(task), any(), eq(snapshot))
    - |
      test: "Given neither a registered Reviser nor a fallback, when handles is queried for an unknown DiagnosisKind, then it returns false"
      trace: FEAT-REVBYP / F-REVBYP-R005

      given:
        dispatcher = DispatchingReviser(Map.of(), null)

      then:
        dispatcher.handles(DiagnosisKind.SENTENCE_LENGTH) is false
