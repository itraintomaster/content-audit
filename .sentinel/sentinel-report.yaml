        output.contains("pendingDelta") is false
        output.contains("original") || output.contains("8") is true
    - |
      test: "Dado un ConsolidatedView con un NodeImpact cuyo acceptedProposalIds y pendingProposalIds estan poblados, cuando format corre, entonces la salida del nodo incluye ambas listas con sus proposalIds — R011"
      trace: FEAT-CDIFF / F-CDIFF-R011

      given:
