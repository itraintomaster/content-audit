        milestone1 = MilestoneEntity("bbb111ccc222ddd333eee420", "bbb111ccc222ddd333eee420", NodeKind.MILESTONE, "A1", "66666666-6666-6666-6666-666666666666", "bbb111ccc222ddd333eee410", List.of("bbb111ccc222ddd333eee430"), 1, "a1", List.of(topic1))
        rootNode = RootNodeEntity("bbb111ccc222ddd333eee410", "root", NodeKind.ROOT, null, List.of("bbb111ccc222ddd333eee420"), List.of(milestone1))
        validCourse = CourseEntity("000000000000000000000000", "english-course", List.of("bbb111ccc222ddd333eee440"), rootNode, "english-course")
        targetPath = Path.of("/tmp/test-valid-output")

