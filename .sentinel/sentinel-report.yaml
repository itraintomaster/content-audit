    - |
      test: "Given only an APPROVED artifact exists for the task, when hasPendingProposalForTask is called, then it returns false"
      trace: FEAT-REVAPR / F-REVAPR-R009

      given:
        store = storeFor(tempDir)
        planId = "plan-001"
        taskId = "task-001"
        result = store.hasPendingProposalForTask(planId, taskId)

