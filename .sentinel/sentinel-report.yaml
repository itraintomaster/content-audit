    testCleanViews:
    - |
      test: "Given an APPROVED proposal, when revise runs, then CourseRepository saves the updated course"
      trace: FEAT-REVBYP / F-REVBYP-R011

      given:
        planId = "plan-001"
        taskId = "task-001"
        auditId = "audit-001"
        nodeId = "quiz-001"
        coursePath = Path.of("./db/english-course")
        task = RefinementTask(taskId, AuditTarget.QUIZ, nodeId, "Quiz about verbs", DiagnosisKind.SENTENCE_LENGTH, 1, RefinementTaskStatus.PENDING)
        plan = RefinementPlan(planId, auditId, Instant.now(), List.of(task))
        auditReport = mock(AuditReport.class)
        context = mock(CorrectionContext.class)
        course = mock(CourseEntity.class)
        snapshot = CourseElementSnapshot(AuditTarget.QUIZ, nodeId, null)
        proposal = RevisionProposal(taskId + "-123456", taskId, planId, auditId, DiagnosisKind.SENTENCE_LENGTH, AuditTarget.QUIZ, nodeId, snapshot, snapshot, "bypass: identity revision", "bypass", Instant.now())
        validatorResult = mock(RevisionValidatorResult.class)
        engine = buildEngine()
        outcome = engine.revise(planId, taskId, coursePath)

      mock:
        validatorResult.verdict() -> RevisionVerdict.APPROVED
        validatorResult.rejectionReason() -> Optional.empty()
        refinementPlanStore.load(planId) -> Optional.of(plan)
        auditReportStore.load(auditId) -> Optional.of(auditReport)
        contextResolver.resolve(eq(auditReport), eq(task)) -> Optional.of(context)
        courseRepository.load(coursePath) -> course
        elementLocator.snapshot(course, AuditTarget.QUIZ, nodeId) -> Optional.of(snapshot)
        reviser.handles(DiagnosisKind.SENTENCE_LENGTH) -> true
        reviser.propose(task, context, snapshot) -> proposal
        validator.validate(proposal) -> validatorResult
        artifactStore.save(any(RevisionArtifact.class)) -> ".content-audit/revisions/" + planId + "/" + proposal.getProposalId()
        elementLocator.replace(eq(course), eq(snapshot)) -> course

      then:
        outcome.getKind() == RevisionOutcomeKind.APPROVED_APPLIED
        verify: courseRepository.save(any(CourseEntity.class), eq(coursePath))
