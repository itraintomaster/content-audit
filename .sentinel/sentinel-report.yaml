      status: EXISTS
      testFilePath: revision-domain/src/test/java/com/learney/contentaudit/revisiondomain/engine/DefaultLemmaAbsenceProposalDeriverTest.java
    - name: "Given a candidate that carries only quizSentence and translation, when\
        \ derive is called, then the deriver never asks the candidate for plain sentence\
        \ text or quizForm fields (the strategy emits only those two pieces)"
      status: EXISTS
      testFilePath: revision-domain/src/test/java/com/learney/contentaudit/revisiondomain/engine/DefaultLemmaAbsenceProposalDeriverTest.java
    testCleanViews:
    - |
      test: "Given an elementBefore quiz and a candidate whose quizSentence differs from the original, when derive is called, then the returned elementAfter carries a new sentence plain text and a new quizForm parsed from the candidate's quizSentence via QuizSentenceConverter"
      trace: FEAT-LAPS / F-LAPS-R012

      given:
        before = buildElementBefore()
        candidate = buildCandidateWithDifferentAnswer()
        after = deriver.derive(before, candidate)
        afterQuiz = after.getQuiz()
        afterForm = afterQuiz.getForm()
        hasStudies = afterForm.getSentenceParts().stream().filter(p -> p.getKind() == SentencePartKind.CLOZE).anyMatch(p -> p.getOptions().contains("studies"))

      then:
        afterQuiz.getTitle() == "She studies books."
        hasStudies == true
    - |
      test: "Given an elementBefore and a candidate with a non-identity quizSentence, when derive is called, then elementAfter is not structurally equal to elementBefore (non-identity proposal)"
      trace: FEAT-LAPS / F-LAPS-R001

      given:
        before = buildElementBefore()
        candidate = buildCandidateWithDifferentAnswer()
        after = deriver.derive(before, candidate)

      then:
        before != null
        before.getQuiz().getForm() != null
    - |
      test: "Given an elementBefore and a candidate, when derive is called, then elementAfter replaces the entire quiz form and translation in one step rather than splicing word-by-word changes onto the original"
      trace: FEAT-LAPS / F-LAPS-R003

      given:
        before = buildElementBefore()
        candidate = LemmaAbsenceQuizCandidate("I ____ [walk|go] (walk) to school.", "Yo camino a la escuela.")
        after = deriver.derive(before, candidate)
        afterForm = after.getQuiz().getForm()
        hasWalk = afterForm.getSentenceParts().stream().filter(p -> p.getKind() == SentencePartKind.CLOZE).anyMatch(p -> p.getOptions().stream().anyMatch(o -> o.contains("walk")))
        hasReads = afterForm.getSentenceParts().stream().filter(p -> p.getKind() == SentencePartKind.CLOZE).anyMatch(p -> p.getOptions().contains("reads"))

      then:
        hasWalk == true
        hasReads == false
        after.getQuiz().getTranslation() == "Yo camino a la escuela."
    - |
      test: "Given an elementBefore with a specific quizId, nodeIds, instructions and order, and any candidate, when derive is called, then those fields on elementAfter are bit-for-bit identical to elementBefore"
      trace: FEAT-LAPS / F-LAPS-R014

      given:
        before = buildElementBefore()
        candidate = buildCandidateWithDifferentAnswer()
        after = deriver.derive(before, candidate)
        beforeQuiz = before.getQuiz()
        afterQuiz = after.getQuiz()

      then:
        afterQuiz.getId() == beforeQuiz.getId()
        afterQuiz.getOidId() == beforeQuiz.getOidId()
        afterQuiz.getKnowledgeId() == beforeQuiz.getKnowledgeId()
        afterQuiz.getInstructions() == beforeQuiz.getInstructions()
        afterQuiz.getKind() == beforeQuiz.getKind()
        afterQuiz.getTheoryId() == beforeQuiz.getTheoryId()
        afterQuiz.getTopicName() == beforeQuiz.getTopicName()
        after.getNodeId() == before.getNodeId()
        after.getNodeTarget() == before.getNodeTarget()
    - |
      test: "Given a candidate whose translation differs from elementBefore.translation, when derive is called, then elementAfter.translation equals the candidate.translation verbatim"
      trace: FEAT-LAPS / F-LAPS-R013

      given:
        before = buildElementBefore()
        newTranslation = "Ella estudia libros."
        candidate = LemmaAbsenceQuizCandidate("She ____ [studies] (study) books.", newTranslation)
        after = deriver.derive(before, candidate)

      then:
        after.getQuiz().getTranslation() == newTranslation
        before.getQuiz().getTranslation() != null
    - |
      test: "Given a candidate whose quizSentence changes the correct answer and accepted variants of a CLOZE, when derive is called, then elementAfter.quizForm reflects those new answers and variants parsed from the candidate's DSL"
      trace: FEAT-LAPS / F-LAPS-R013

      given:
        before = buildElementBefore()
        candidate = LemmaAbsenceQuizCandidate("She ____ [studies|learns] (study/learn) books.", "Ella estudia o aprende libros.")
        after = deriver.derive(before, candidate)
        afterForm = after.getQuiz().getForm()
        clozeParts = afterForm.getSentenceParts().stream().filter(p -> p.getKind() == SentencePartKind.CLOZE).toList()
        options = clozeParts.get(0).getOptions()
        hasStudies = options.stream().anyMatch(o -> o.equals("studies") || o.contains("studies"))
        hasLearns = options.stream().anyMatch(o -> o.equals("learns") || o.contains("learns"))

      then:
        clozeParts.size() == 1
        hasStudies == true
        hasLearns == true
    - |
      test: "Given the same elementBefore and the same candidate, when derive is called twice, then both invocations return equal elementAfter snapshots (determinism)"
      trace: FEAT-LAPS / F-LAPS-R012

      given:
        before = buildElementBefore()
        candidate = buildCandidateWithDifferentAnswer()
        after1 = deriver.derive(before, candidate)
        after2 = deriver.derive(before, candidate)

      then:
        after2 == after1
    - |
      test: "Given a candidate whose quizSentence is malformed according to the FEAT-QSENT grammar, when derive is called, then it throws ProposalDerivationException and does not return a partial elementAfter"
      trace: FEAT-LAPS / F-LAPS-R012

      given:
        before = buildElementBefore()
        malformedCandidate = LemmaAbsenceQuizCandidate(// missing [answers] after ____
      "She ____ without-an-answer-block to school.", "Ella va a la escuela.")

      when:
        throws ProposalDerivationException: sut.derive(before, malformedCandidate)
    - |
      test: "Given a candidate that carries only quizSentence and translation, when derive is called, then the deriver never asks the candidate for plain sentence text or quizForm fields (the strategy emits only those two pieces)"
      trace: FEAT-LAPS / F-LAPS-R019

      given:
        candidate = LemmaAbsenceQuizCandidate("I ____ [run] (run) fast.", "Yo corro rapido.")
        before = buildElementBefore()
        after = deriver.derive(before, candidate)
        hasRun = after.getQuiz().getForm().getSentenceParts().stream().filter(p -> p.getKind() == SentencePartKind.CLOZE).anyMatch(p -> p.getOptions().contains("run"))

      then:
        candidate.getQuizSentence() == "I ____ [run] (run) fast."
        candidate.getTranslation() == "Yo corro rapido."
