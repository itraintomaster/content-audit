    - |
      test: "should return discount per level of 0.1"
      trace: FEAT-LABS / F-LABS-R018

      then:
        config.getDiscountPerLevel() == 0.1
    - |
      test: "should have absolute thresholds increasing from A1 to B2"
      trace: FEAT-LABS / F-LABS-R021

      then:
        config.getAbsoluteThreshold(CefrLevel.A1) < config.getAbsoluteThreshold(CefrLevel.A2) is true
        config.getAbsoluteThreshold(CefrLevel.A2) < config.getAbsoluteThreshold(CefrLevel.B1) is true
        config.getAbsoluteThreshold(CefrLevel.B1) < config.getAbsoluteThreshold(CefrLevel.B2) is true
    - |
      test: "should have percentage thresholds increasing from A1 to B2"
      trace: FEAT-LABS / F-LABS-R021

      then:
        config.getPercentageThreshold(CefrLevel.A1) < config.getPercentageThreshold(CefrLevel.A2) is true
        config.getPercentageThreshold(CefrLevel.A2) < config.getPercentageThreshold(CefrLevel.B1) is true
        config.getPercentageThreshold(CefrLevel.B1) < config.getPercentageThreshold(CefrLevel.B2) is true
    - |
      test: "should have priority bounds ordered high less than medium less than low"
