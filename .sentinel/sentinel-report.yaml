      test: "should resolve context with all fields populated from quiz diagnosis and ancestor entities"
      trace: FEAT-RCLA / F-RCLA-R003

      given:
        quiz = AuditableQuiz("The cat sat.", List.of(), "quiz-la-1", null, null, "El gato se sentó.")
        knowledge = AuditableKnowledge(List.of(), "Animals", "Complete the sentence.", true, "know-la-1", null, null)
        topic = AuditableTopic(List.of(), "topic-la-1", "Basic Animals", null)
        milestone = AuditableMilestone(List.of(), "ms-la-1", "A1", null)
        ml = buildMisplacedLemma("cat", "NOUN", CefrLevel.A2, CefrLevel.A1, 300)
        quizDiag = buildQuizDiagnosesWithPlacement(List.of(ml))
        milestoneDiag = buildMilestoneDiagnoses(CefrLevel.A1, List.of())
        tree = buildFullTree(milestone, milestoneDiag, topic, knowledge, quiz, quizDiag)
        report = AuditReport(tree[0])
        task = buildTask("quiz-la-1")
        result = sut.resolve(report, task)
        ctx = result.get()

      then:
        result.isPresent() is true
        ctx.getTaskId() == "task-la-1"
        ctx.getSentence() == "The cat sat."
        ctx.getTranslation() == "El gato se sentó."
        ctx.getKnowledgeTitle() == "Animals"
        ctx.getKnowledgeInstructions() == "Complete the sentence."
