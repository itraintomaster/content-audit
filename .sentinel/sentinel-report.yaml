        thrown = assertThrows(ProposalStrategyFailedException.class, () -> parser.parse(raw(arrayTranslation), TASK_ID, STRATEGY_NAME), "Non-string translation must throw ProposalStrategyFailedException (R005)")

      then:
        thrown.getReason().startsWith("LLM_RESPONSE_MALFORMED") is true
    - |
      test: "parse embeds the taskId in the message of any ProposalStrategyFailedException it raises"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        badJson = "not json at all"
        thrown = assertThrows(ProposalStrategyFailedException.class, () -> parser.parse(raw(badJson), TASK_ID, STRATEGY_NAME))

      then:
        thrown.getMessage().contains(TASK_ID) is true
        thrown.getTaskId() == TASK_ID
    - |
      test: "parse embeds the strategyName in the message of any ProposalStrategyFailedException it raises"
      trace: FEAT-LAGEN / F-LAGEN-R006

      given:
        badJson = "not json"
        thrown = assertThrows(ProposalStrategyFailedException.class, () -> parser.parse(raw(badJson), TASK_ID, STRATEGY_NAME))

      then:
        thrown.getMessage().contains(STRATEGY_NAME) is true
        thrown.getStrategyName() == STRATEGY_NAME
    - |
      test: "parse accepts a quizSentence whose plain-text length looks unusually short or long: only structural validation applies"
      trace: FEAT-LAGEN / F-LAGEN-R010

      given:
        veryShort = "{\"quizSentence\": \"Go.\", \"translation\": \"Ve.\"}"
        veryLong = "{\"quizSentence\": \"" + "She walks to the " + "very ".repeat(100) + "long school.\", \"translation\": \"Ella camina.\"}"
        shortResult = parser.parse(raw(veryShort), TASK_ID, STRATEGY_NAME)
        longResult = parser.parse(raw(veryLong), TASK_ID, STRATEGY_NAME)

      then:
        shortResult.getQuizSentence() == "Go."
        longResult.getQuizSentence().length() > 100 is true
    - |
      test: "parse accepts a response without re-checking that misplacedLemmas were replaced or that new words come from suggestedLemmas"
      trace: FEAT-LAGEN / F-LAGEN-R010

      given:
        keepsMisplaced = "{\"quizSentence\": \"She ____[runs|jogs] every morning.\", " + "\"translation\": \"Ella corre cada mañana.\"}"
        result = parser.parse(raw(keepsMisplaced), TASK_ID, STRATEGY_NAME)

      then:
        result.getQuizSentence() == "She ____[runs|jogs] every morning."
    - |
      test: "parse accepts a response without re-tokenizing the quizSentence to verify its CEFR level"
      trace: FEAT-LAGEN / F-LAGEN-R010

      given:
        advancedVocab = "{\"quizSentence\": \"The ____[entrepreneur|businessman] ____[renegotiated|revised] the sophisticated contract.\", " + "\"translation\": \"El empresario renegociará el contrato sofisticado.\"}"
        result = parser.parse(raw(advancedVocab), TASK_ID, STRATEGY_NAME)

      then:
        result.getQuizSentence().contains("entrepreneur") is true
    - |
      test: "parse accepts a quizSentence regardless of whether it parses as the FEAT-QSENT DSL: grammar validation is delegated downstream"
      trace: FEAT-LAGEN / F-LAGEN-R010

      given:
        malformedDsl = "{\"quizSentence\": \"She ____[walks to school.\", " + "\"translation\": \"Ella camina a la escuela.\"}"
        result = parser.parse(raw(malformedDsl), TASK_ID, STRATEGY_NAME)

      then:
        result.getQuizSentence() == "She ____[walks to school."
  - name: DefaultLangChainErrorClassifier
    status: EXISTS
