    fields:
    - name: taskId
      type: String
      description: Identifier of the refinement task
    - name: sentence
      type: String
      description: Current quiz sentence as plain text
    - name: translation
      type: String
      description: Spanish translation of the sentence
    - name: knowledgeTitle
      type: String
      description: Title of the parent knowledge
    - name: knowledgeInstructions
      type: String
      description: Instructions of the exercise
    - name: topicLabel
      type: String
      description: Label of the parent topic
    - name: cefrLevel
      type: CefrLevel
      description: CEFR level determined by milestone ancestor
    - name: misplacedLemmas
      type: List<MisplacedLemmaContext>
      description: Words in the quiz whose expected CEFR level is higher than the
        quiz level
    - name: suggestedLemmas
      type: List<SuggestedLemma>
      description: Absent lemmas from the level that could serve as replacements (reuses
        existing SuggestedLemma model)
    - name: quizSentence
      type: String
      description: FEAT-QSENT DSL of the original quiz (R001). Copied verbatim from
        AuditableQuiz.quizSentence by LemmaAbsenceContextResolver; never recomputed
        in this module. Coexists with `sentence` (plain) per R001 — both correspond
        to the same quiz and the same derivation step (R003). Null when the upstream
        AuditableQuiz was built before FEAT-QSENT was shipped.
    - name: tokenCount
      type: Integer
      description: |
        Cantidad actual de tokens en la oracion del quiz, copiada de SentenceLengthDiagnosis.tokenCount sobre el mismo nodo quiz (F-RCLALEN-R001, F-RCLALEN-R003). Nullable cuando no hay diagnostico de longitud disponible (F-RCLALEN-R004); reusa nombre y semantica de F-RCSL-R001.
    - name: targetMin
      type: Integer
      description: |
        Minimo de tokens esperados para el nivel CEFR del quiz, copiado de SentenceLengthDiagnosis.targetMin (F-RCLALEN-R001). Nullable cuando no hay diagnostico (F-RCLALEN-R004).
    - name: targetMax
      type: Integer
      description: |
        Maximo de tokens esperados para el nivel CEFR del quiz, copiado de SentenceLengthDiagnosis.targetMax (F-RCLALEN-R001). Nullable cuando no hay diagnostico (F-RCLALEN-R004).
    - name: delta
      type: Integer
      description: |
        Desviacion respecto al rango: 0 si esta dentro, positivo si excede el maximo, negativo si esta por debajo del minimo (F-RCLALEN-R001). Nullable cuando no hay diagnostico (F-RCLALEN-R004). Misma convencion de signo que F-RCSL-R001.
    - name: lengthDirection
      type: LengthDirection
      description: |
        Direccion accionable derivada del signo de delta por el resolver (F-RCLALEN-R002). Cuando no hay SentenceLengthDiagnosis se establece a UNKNOWN (F-RCLALEN-R004), nunca null. Pre-calculado del lado del sistema para que el prompt LLM sea deterministico y la salida CLI tenga una etiqueta legible para humanos.
    sentinelStatus: missing
