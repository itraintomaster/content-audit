# Global Lemma Distribution Analyzer Configuration
# Configuration for vocabulary inventory analysis and Zipf's Law validation

# Number of top frequent lemmas to include in the analysis
global.lemma.distribution.top.count=100

# Zipf's Law correlation threshold for "follows Zipf's Law" determination
global.lemma.distribution.zipf.threshold=0.8

# Minimum frequency for a lemma to be included in the analysis
global.lemma.distribution.min.frequency=2

# Whether to exclude function words from the analysis
global.lemma.distribution.exclude.function.words=true

# Maximum number of data points to use for Zipf analysis (performance optimization)
global.lemma.distribution.zipf.max.data.points=1000

# Zipf correlation quality thresholds
global.lemma.distribution.zipf.excellent.threshold=0.9
global.lemma.distribution.zipf.good.threshold=0.8
global.lemma.distribution.zipf.fair.threshold=0.7
global.lemma.distribution.zipf.poor.threshold=0.6 