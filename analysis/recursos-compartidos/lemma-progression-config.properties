# ==================== Lemma Progression Analysis Configuration ====================
# Configuración para el análisis de progresión de lemas por nivel CEFR
# Permite controlar qué tipos de análisis se ejecutan y sus parámetros

# ==================== General Configuration ====================
# Número mínimo de lemas para realizar análisis
lemma.progression.min.lemmas.for.analysis=10

# Número de lemas más frecuentes a incluir en análisis detallado  
lemma.progression.top.frequent.lemmas.count=20

# Umbral mínimo de frecuencia para incluir en análisis top
lemma.progression.min.frequency.for.top.analysis=2

# ==================== Validation Configuration ====================
# Habilitar validación de apropiación de lemas para niveles CEFR
lemma.progression.enable.level.appropriateness.validation=true

# Porcentaje de lemas inapropiados que dispara advertencia
lemma.progression.inappropriate.lemmas.warning.threshold=15.0

# Porcentaje de lemas inapropiados que dispara error
lemma.progression.inappropriate.lemmas.error.threshold=25.0

# ==================== Progression Thresholds ====================
# Porcentaje mínimo de lemas revisitados requerido para buen refuerzo
lemma.progression.min.revisited.lemmas.percentage=35.0

# Porcentaje máximo de lemas nuevos para evitar sobrecarga cognitiva
lemma.progression.max.new.lemmas.percentage=75.0

# ==================== Hybrid Analysis Configuration ====================
# Habilitar análisis híbrido con múltiples tipos de análisis
lemma.progression.enable.hybrid.analysis=true

# Usar analyzer híbrido como método primario de análisis
lemma.progression.use.hybrid.analyzer.as.primary=true

# ==================== Analysis Types Configuration ====================
# Habilitar análisis de palabras de contenido (excluye palabras funcionales)
lemma.progression.enable.content.words.analysis=true

# Habilitar análisis de frecuencia bruta (incluye todas las palabras)
lemma.progression.enable.raw.frequency.analysis=true

# Habilitar análisis TF-IDF para palabras distintivas
lemma.progression.enable.tfidf.analysis=true

# Habilitar análisis semántico para categorización temática
lemma.progression.enable.semantic.analysis=true

# ==================== Expected New Lemmas Ranges by CEFR Level ====================
# Rangos pedagógicamente apropiados para lemas nuevos por nivel

# A1: Vocabulario principalmente nuevo (foundation building)
lemma.progression.a1.new.lemmas.min=85.0
lemma.progression.a1.new.lemmas.max=100.0
lemma.progression.a1.new.lemmas.optimal=95.0

# A2: Alta novedad con algún refuerzo (expansion with review)
lemma.progression.a2.new.lemmas.min=60.0
lemma.progression.a2.new.lemmas.max=80.0
lemma.progression.a2.new.lemmas.optimal=70.0

# B1: Introducción balanceada (balanced introduction)
lemma.progression.b1.new.lemmas.min=40.0
lemma.progression.b1.new.lemmas.max=65.0
lemma.progression.b1.new.lemmas.optimal=50.0

# B2: Más refuerzo, novedad controlada (controlled novelty)
lemma.progression.b2.new.lemmas.min=25.0
lemma.progression.b2.new.lemmas.max=50.0
lemma.progression.b2.new.lemmas.optimal=35.0

# ==================== Performance and Caching ====================
# Habilitar caché de resultados para mejorar performance
lemma.progression.enable.result.caching=false

# Tamaño máximo del caché de análisis
lemma.progression.cache.max.size=100

# ==================== Logging and Debug ====================
# Nivel de detalle en logs para debugging
lemma.progression.log.level=INFO

# Habilitar métricas detalladas de performance
lemma.progression.enable.performance.metrics=true

# Habilitar exportación de datos intermedios para análisis
lemma.progression.enable.intermediate.data.export=false

# Progression Quality Assessment Thresholds
lemma.progression.excellent.quality.threshold=90
lemma.progression.good.quality.threshold=75
lemma.progression.fair.quality.threshold=60
lemma.progression.poor.quality.threshold=40

# Validation Rules
lemma.progression.max.vocabulary.gaps.allowed=2
lemma.progression.max.inappropriate.introductions.allowed=3
lemma.progression.enable.coca.rank.validation=true
lemma.progression.enable.evp.level.validation=true

# Display and Output Configuration
lemma.progression.include.lemma.details=true
lemma.progression.include.progression.validation=true
lemma.progression.include.level.recommendations=true
lemma.progression.export.format=JSON

# Logging
lemma.progression.enable.detailed.logging=true
lemma.progression.log.individual.lemmas=false
lemma.progression.log.progression.patterns=true 