# =============================================================================
# T018: Level Specific Absent Lemmas Configuration
# =============================================================================

# Thresholds por nivel CEFR (cantidad máxima aceptable de lemas ausentes)
level.specific.absent.lemmas.a1.threshold=0
level.specific.absent.lemmas.a2.threshold=2
level.specific.absent.lemmas.b1.threshold=5
level.specific.absent.lemmas.b2.threshold=8

# Porcentajes máximos aceptables (respecto al total esperado)
level.specific.absent.lemmas.a1.max.percentage=0.0
level.specific.absent.lemmas.a2.max.percentage=5.0
level.specific.absent.lemmas.b1.max.percentage=10.0
level.specific.absent.lemmas.b2.max.percentage=15.0

# Configuración de prioridades basada en COCA ranking
level.specific.absent.lemmas.priority.high.coca.max=1000
level.specific.absent.lemmas.priority.medium.coca.max=3000
level.specific.absent.lemmas.priority.low.coca.max=5000

# Configuración de tipos de ausencia a incluir en el análisis
level.specific.absent.lemmas.include.completely.absent=true
level.specific.absent.lemmas.include.appears.too.early=true
level.specific.absent.lemmas.include.appears.too.late=true
level.specific.absent.lemmas.include.scattered.placement=true

# Configuración de reportes y visualización
level.specific.absent.lemmas.report.max.lemmas.per.level=50
level.specific.absent.lemmas.report.include.recommendations=true
level.specific.absent.lemmas.report.include.coca.ranks=true
level.specific.absent.lemmas.report.include.semantic.categories=true

# Configuración de API endpoints
level.specific.absent.lemmas.api.max.results=100
level.specific.absent.lemmas.api.include.recommendations=true
level.specific.absent.lemmas.api.cache.ttl.minutes=60

# Configuración de assessment global
level.specific.absent.lemmas.assessment.critical.threshold=10
level.specific.absent.lemmas.assessment.acceptable.threshold=5
level.specific.absent.lemmas.assessment.optimal.threshold=0

# Configuración de logging
level.specific.absent.lemmas.logging.level=INFO
level.specific.absent.lemmas.logging.include.detailed.analysis=false
level.specific.absent.lemmas.logging.include.lemma.details=false 