# critical-absent-lemmas-config.properties
# Configuration for Critical Absent Lemmas Analyzer

# Bandas de criticidad por frequency rank
critical.absent.lemmas.high.frequency.min=1
critical.absent.lemmas.high.frequency.max=1000
critical.absent.lemmas.medium.frequency.min=1001
critical.absent.lemmas.medium.frequency.max=2500
critical.absent.lemmas.low.frequency.min=2501
critical.absent.lemmas.low.frequency.max=5000

# Thresholds de alerta por criticidad
critical.absent.lemmas.high.threshold=0
critical.absent.lemmas.medium.threshold=3
critical.absent.lemmas.low.threshold=10

# EVP específico - tolerancia cero
critical.absent.lemmas.evp.a1.threshold=0
critical.absent.lemmas.evp.a2.threshold=0

# Lemas funcionales críticos (siempre HIGH priority) - SOLO LEMMAS BASE
critical.absent.lemmas.functional.pronouns=I,you,he,she,it,we,they
critical.absent.lemmas.functional.auxiliaries=be,have,do,will,would,can,could,should,might,must
critical.absent.lemmas.functional.prepositions=in,on,at,for,with,by,from,to,of,about
critical.absent.lemmas.functional.connectors=and,but,or,so,because,when,if,while,since

# Configuración de reportes
critical.absent.lemmas.report.max.high=20
critical.absent.lemmas.report.max.medium=30
critical.absent.lemmas.report.max.low=50 