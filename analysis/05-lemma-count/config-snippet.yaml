# Configuracion de LemmaCountAnalyzer
# Extraida de: src/main/resources/pipeline/vocabulary-analyzer/config.yaml
# Seccion: targets.lemmaCount
# NOTA: Este analyzer esta INACTIVO en el orquestador actual

lemmaCount:
